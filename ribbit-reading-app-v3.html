// ── QUIZ — literal port, Tablet lines 901-958 (MC branch only; real story.quiz is all multiple-choice) ──
function renderQuiz(){
  const story=findStory(state.lastStoryId);
  if(!story||!story.quiz||!story.quiz.length) return renderComingSoon();
  const q=story.quiz[state.quizIndex];
  // Reuse the reader's own illustration + gradient fallback so the quiz looks like the story.
  const quizLevel=story.levelId?LEVELS.find(l=>l.id===story.levelId):null;
  const [illuG1,illuG2]=quizLevel?[quizLevel.g1,quizLevel.g2]:['#E3F3FC','#70C1B3'];
  const illuImg=story.images&&story.images[0];
  const illuBg=illuImg?`url('${escAttr(illuImg)}') center/cover no-repeat`:`linear-gradient(135deg,${illuG1},${illuG2})`;
  const dots=story.quiz.map((_,i)=>`<div class="quiz-dot" style="background:${i<state.quizIndex?'var(--primary)':i===state.quizIndex?'white':'#E5E9EE'};${i===state.quizIndex?'outline:2px solid var(--primary);outline-offset:1px':''}"></div>`).join('');
  const options=q.options.map((label,i)=>{
    const isCorrect=i===q.correct, isSelected=i===state.quizSelected;
    const showCorrect=state.quizAnswered&&isCorrect, showWrong=state.quizAnswered&&isSelected&&!isCorrect;
    const dim=state.quizAnswered&&!isCorrect&&!isSelected;
    const bg=showCorrect?'var(--correct-bg)':showWrong?'var(--wrong-bg)':'white';
    const border=showCorrect?'2px solid var(--correct)':showWrong?'2px solid var(--wrong)':'2px solid transparent';
    const badgeBg=showCorrect?'var(--correct)':showWrong?'var(--wrong)':'#F3F4F6';
    const badgeColor=(showCorrect||showWrong)?'white':'var(--text-muted)';
    const textColor=showCorrect?'#15803d':showWrong?'#dc2626':'var(--text)';
    const badgeContent=showCorrect?icon('status-check',14):showWrong?icon('ctrl-close',14):String.fromCharCode(65+i);
    // The speaker is a sibling of the option, never a child — a <button> inside a <button>
    // is invalid and breaks activation for keyboard and screen-reader users.
    return `<div class="quiz-option-row">
      <button class="quiz-option" onclick="selectQuizAnswer(${i})" style="background:${bg};border:${border};opacity:${dim?.5:1};cursor:${state.quizAnswered?'default':'pointer'}">
        <div class="quiz-option-badge" style="background:${badgeBg};color:${badgeColor}">${badgeContent}</div>
        <div class="quiz-option-text" lang="en" style="color:${textColor}">${label}</div>
      </button>
      <button class="quiz-option-speak" onclick="speakText('${escAttr(jsStr(label))}')" aria-label="${t('hearOption')}" title="${t('hearOption')}">${icon('ctrl-audio',18)}</button>
    </div>`;
  }).join('');
  const feedback=state.quizAnswered&&q.feedback?`<div class="quiz-feedback">${q.feedback}</div>`:'';
  const isLastQuestion=state.quizIndex===story.quiz.length-1;
  const nextBtn=state.quizAnswered
    ?`<button class="quiz-next-btn" onclick="advanceQuiz()">${isLastQuestion?t('seeResults'):t('nextQuestion')}</button>`
    :'';

  return `<div class="screen quiz-screen">
    <div class="quiz-topbar">
      <button class="quiz-exit-btn" onclick="exitQuiz()">${icon('ctrl-close',16)}</button>
      <div class="quiz-title">${t('quickQuiz')}</div>
      <div class="quiz-dots">${dots}</div>
      <div class="quiz-counter">${state.quizIndex+1} / ${story.quiz.length}</div>
      ${(state.comboStreak||0)>=2?`<span class="combo-pill">🔥 ×${state.comboStreak} ${t('comboLabel')}</span>`:''}
    </div>
    <div class="quiz-body">
      <div class="quiz-stage">
        <div class="quiz-illu" style="background:${illuBg}">
          ${illuImg?'':`<span>${story.emoji||'📖'}</span>`}
          <div class="quiz-illu-title" lang="en">${story.title}</div>
        </div>
        <div class="quiz-question-wrap">
          <div class="quiz-label">${t('question')} ${state.quizIndex+1} / ${story.quiz.length}</div>
          <div class="quiz-question-row">
            <div class="quiz-question-text" lang="en">${q.question}</div>
            <button class="quiz-speak-btn" onclick="speakText('${escAttr(jsStr(q.question))}')" aria-label="${t('hearQuestion')}" title="${t('hearQuestion')}">${icon('ctrl-audio',18)}</button>
          </div>
          <div class="quiz-options">${options}</div>
          ${feedback}
          ${nextBtn}
        </div>
      </div>
    </div>
  </div>`;
}

function renderCelebration(){
  const story=findStory(state.lastStoryId);
  if(!story) return renderComingSoon();
  const accuracyPct=story.quiz&&story.quiz.length?Math.round((state.quizCorrectCount/story.quiz.length)*100):0;
  const xpEarned=state.lastXpEarned||0;
  // Accuracy is the primary signal; audio is a bonus that guarantees at least 2 stars.
  let earnedStars=1;
  if(accuracyPct>=50) earnedStars=2;

function prefersReducedMotion(){
  return typeof matchMedia!=='undefined' && matchMedia('(prefers-reduced-motion: reduce)').matches;
}
function spawnConfetti(){
  if(prefersReducedMotion()) return; // 54 falling elements is exactly what this setting exists to prevent
  const colors=['#72C93A','#f9ad3b','#60a5fa','#f472b6','#34d399','#fb923c','#a78bfa'];
  const count=54;
  for(let i=0;i<count;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.left=Math.random()*100+'vw';
    el.style.background=colors[Math.floor(Math.random()*colors.length)];
    el.style.width=(7+Math.random()*8)+'px';
    el.style.height=(7+Math.random()*8)+'px';
    el.style.animationDuration=(1.4+Math.random()*1.6)+'s';
    el.style.animationDelay=(Math.random()*0.8)+'s';
    document.body.appendChild(el);
    el.addEventListener('animationend',()=>el.remove());
  }
}
// Story-completion celebration — Lottie replaces the DOM-div confetti + bouncing emoji frog
// (spawnConfetti() above is kept only as the CSS-only fallback referenced in docs/design-implementation-brief.md).
function playCelebrationAnims(){
  const completionSlot=document.getElementById('celeb-completion-anim');
  // Clear the slot when it finishes: this animation's last frame is an opaque green disc, and with
  // no cleanup it stayed there covering the stars and the XP chip. Same pattern as playPageTurn().
  if(completionSlot) playLottie(completionSlot,'assets/animations/celebrations/story-completion-celebration.json',{onComplete:()=>{ if(completionSlot.isConnected) completionSlot.innerHTML=''; }});

  const starsSlot=document.getElementById('celeb-stars');
  if(starsSlot){
    const earned=Number(starsSlot.dataset.earned)||1;
    playLottie(starsSlot,`assets/animations/rewards/star-collection-${earned}.json`);
  }

  const newlyUnlocked=earnedBadgeIds().filter(id=>!(state.seenBadges||[]).includes(id));
  const badgeSlot=document.getElementById('celeb-badge-anim');
  if(badgeSlot && newlyUnlocked.length){
    const badge=BADGES.find(b=>b.id===newlyUnlocked[0]);
    if(badge){
      fetch('assets/animations/badges/badge-unlock.json').then(r=>r.json()).then(data=>{
        if(!badgeSlot.isConnected) return;
        const recolored=recolorLottieData(data,badge.color);
        if(prefersReducedMotion()){ badgeSlot.innerHTML=icon(badge.icon,72); return; }
        lottie.loadAnimation({ container:badgeSlot, renderer:'svg', loop:false, autoplay:true, animationData:recolored });
      }).catch(()=>{ badgeSlot.innerHTML=icon(badge.icon,72); });
    }
  }
}

      <button class="complete-btn-primary" onclick="startStudyAll('${state.selectedDeckId}')">${t('studyAgain')}</button>
    </div>
  </div>`;
}

// ── PROGRESS — no longer its own tab. Progress and Profile rendered substantially the same
// content (stats grid + level progress), so these sections are now composed into Profile and
// the freed bottom-nav slot went to Flashcards, which is a core loop and had no tab at all.
function renderProgressSections(){
  const knownWords=Object.values(state.deckWordStatus).filter(s=>s==='known').length;
  const stats=[
    {icon:'status-streak-flame', tint:'#FFF0E4', value:state.streak||0, label:t('dayStreakLabel')},
    {icon:'xp-xp-star', tint:'#FCF4D6', value:(state.xp||0).toLocaleString(), label:t('totalXpLabel')},
    {icon:'📖', tint:'#E3F3FC', value:Object.keys(state.progress).length, label:t('storiesReadLabel')},
    {icon:'🔤', tint:'#DFF7F2', value:knownWords, label:t('wordsKnownLabel')},
  ];
  const statsHtml=stats.map(s=>`
    <div class="prog-stat-card">
      <div class="prog-stat-icon" style="background:${s.tint}">${iconOrEmoji(s.icon,20)}</div>
      <div class="prog-stat-value">${s.value}</div>
      <div class="prog-stat-label">${s.label}</div>
    </div>`).join('');

  // Real weekly activity: story completions per day for the last 7 days (Mon-Sun of the current week)
  const dayKeys=['dayMon','dayTue','dayWed','dayThu','dayFri','daySat','daySun'];
  const now=new Date();
  const todayIdx=(now.getDay()+6)%7; // 0=Mon
  const counts=Array.from({length:7},()=>0);
  Object.values(state.progress).forEach(p=>{
    const d=new Date(p.at);
    const diffDays=Math.floor((now-new Date(d.getFullYear(),d.getMonth(),d.getDate()))/86400000);
    const idxFromMonday=(d.getDay()+6)%7;
    if(diffDays>=0 && diffDays<7 && diffDays<= todayIdx){
      const weekday=idxFromMonday;
      if(weekday<=todayIdx) counts[weekday]++;
    }
  });
  const maxCount=Math.max(...counts,1);
  const activityHtml=dayKeys.map((dk,i)=>{
    const isToday=i===todayIdx, isFuture=i>todayIdx;
    const val=counts[i];
    const heightPct=isFuture?0:Math.max(val>0?18:6,Math.round((val/maxCount)*100));
    return `<div class="activity-col">
      ${val>0?`<div class="activity-value">${val}</div>`:''}
      <div class="activity-bar" style="${isFuture?'border:2px dashed var(--border);background:transparent':`background:${isToday?'var(--primary)':'var(--primary-light)'}`};height:${heightPct}%"></div>
      <div class="activity-day" style="color:${isToday?'var(--text)':'var(--text-muted)'};font-weight:${isToday?800:500}">${t(dk)}</div>
    </div>`;
  }).join('');

  const curLv=currentLevelId();
  const levelRows=LEVELS.map(lv=>{
    const pct=Math.round((levelDoneCount(lv.id)/10)*100);
    const isCurrent=lv.id===curLv;
    return `<div class="level-row" style="${isCurrent?`border:2px solid ${lv.color};box-shadow:0 4px 16px ${lv.color}33`:'border:2px solid transparent;opacity:.6'}">
      <div class="level-row-icon" style="background:${lv.color}26">${icon(lv.icon,20)}</div>
      <div class="level-row-body">
        <div class="level-row-name">${lv.pond}${isCurrent?`<span class="level-row-current" style="background:${lv.color}">${t('current')}</span>`:''}</div>
        <div class="level-row-bar"><div class="level-row-fill" style="width:${pct}%;background:${lv.color}"></div></div>
      </div>
      <div class="level-row-pct" style="color:${lv.color}">${pct}%</div>
    </div>`;
  }).join('');

  return `
    <div class="prog-stats-grid">${statsHtml}</div>
    <div>
      <div class="section-title">${t('thisWeek')}</div>
      <div class="activity-card">${activityHtml}</div>
    </div>
    <div>
      <div class="section-title">${t('levelProgress')}</div>
      <div class="level-rows">${levelRows}</div>
    </div>`;
}

// ── REWARDS / BADGES — literal port, Tablet lines 365-402, real checkable criteria ──
function renderRewards(){
  const earnedCount=BADGES.filter(b=>b.check()).length;
  const groups=BADGE_CATEGORIES.map(cat=>{
    const items=BADGES.filter(b=>b.category===cat.key).map(b=>{
      const earned=b.check();
      const name=b.levelRef?t('championName',b.levelRef):t(b.nameKey);
      const hint=b.levelRef?t('championHint',b.levelRef):t(b.hintKey);
      const tooltipOpen=state.openBadgeTooltip===b.id;
      const prog=!earned?badgeProgress(b):null;
      const progPct=prog?Math.round(prog.cur/prog.tot*100):0;
      return `<div class="badge-cell">
        <button class="badge-btn" onclick="toggleBadgeTooltip('${b.id}')">
          <div class="badge-ring" style="border-color:${earned?b.color:'#D8DEE6'};filter:${earned?'none':'grayscale(1)'}">
            <div class="badge-inner">${icon(b.icon,28)}</div>
            ${!earned?`<div class="badge-lock" role="img" aria-label="${t('locked')}">${icon('status-lock',16)}</div>`:''}
          </div>
          <div class="badge-name" style="color:${earned?'var(--text)':'#B0B8C1'}">${name}</div>
          ${prog?`<div class="badge-prog-wrap"><div class="badge-prog-bg"><div class="badge-prog-bar" style="width:${progPct}%"></div></div><div class="badge-prog-text">${prog.cur}/${prog.tot}</div></div>`:''}
        </button>
        ${tooltipOpen?`<div class="badge-tooltip">${earned?t('earnedBadge'):t('earnedToEarn',hint)}</div>`:''}
      </div>`;
    }).join('');
    return `<div>
      <div class="badge-group-label">${t(cat.labelKey)}</div>
      <div class="badge-grid">${items}</div>
    </div>`;
  }).join('');

  return `<div class="rewards-pane">
    <div class="rewards-header">
      <div class="rewards-title">${t('myBadges')}</div>
    </div>
    <div class="rewards-subtitle">${t('badgesEarned',earnedCount,BADGES.length)}</div>
    <div class="badge-groups">${groups}</div>
  </div>`;
}

// ── WORLD JOURNEY — literal port, Tablet lines 505-586, real destinations/stories ──
function renderWorld(){
  return state.worldSelectedId ? renderWorldDetail() : renderWorldGrid();
}

function renderWorldGrid(){
  const completedCount=DESTINATIONS.filter(d=>destComplete(d.id)).length;
  const pct=Math.round((completedCount/DESTINATIONS.length)*100);
  const lockedNotice=state.worldLockedNoticeId?DESTINATIONS.find(d=>d.id===state.worldLockedNoticeId):null;
  const cards=DESTINATIONS.map(d=>{
    const locked=destLocked(d), complete=destComplete(d.id), doneCount=destDoneCount(d.id);
    const inProgress=!locked && !complete && doneCount>0;
    return `<button class="dest-card" onclick="openDestination('${d.id}')" style="${locked?'opacity:.55':''}">
      <div class="dest-bg-emoji">${d.emoji}</div>
      ${complete?`<div class="dest-complete-badge" role="img" aria-label="${t('completed')}">${icon('status-check',14)}</div>`:inProgress?`<div class="dest-inprogress-badge">${t('inProgress')}</div>`:locked?`<div class="dest-lock-badge" role="img" aria-label="${t('locked')}">${icon('status-lock',14)}</div>`:''}
      <div class="dest-card-text">
        <div class="dest-card-name">${d.name}</div>
        <div class="dest-card-stories">${doneCount}/${d.storyCount}</div>
      </div>
    </button>`;
  }).join('');
  return `<div class="world-pane">
    <div class="world-header-row">
      <div class="world-title">${t('worldTitle')}</div>
      <div class="world-passport-pill">🛂 ${completedCount}/${DESTINATIONS.length}</div>
    </div>
    <div class="world-subtext">${t('placesExplored',completedCount)}${t('moreToComplete',DESTINATIONS.length-completedCount)}</div>
    <div class="world-progress-bar"><div class="world-progress-fill" style="width:${pct}%"></div></div>
    ${lockedNotice?`<div class="world-locked-notice">${icon('status-lock',14)} ${t('destLocked',lockedNotice.name)}</div>`:''}
    <div class="dest-grid">${cards}</div>
  </div>`;
}

function checkJourneyStamp(d){
  if(!state.journey[d.id]) state.journey[d.id]={stamped:false};
  const js=state.journey[d.id];
  if(!js.stamped && destComplete(d.id)){
    js.stamped=true;
    awardXP(200);
    markWeekQuestDone('journey1');
    save();
    setTimeout(()=>showToast(t('destStamped',d.name)),400);
  }
}
function renderWorldDetail(){
  const d=DESTINATIONS.find(x=>x.id===state.worldSelectedId);
  if(!d) return renderWorldGrid();
  checkJourneyStamp(d);
  const stories=destStories(d.id);
  const doneCount=destDoneCount(d.id);
  const cards=stories.map(s=>{
    const done=storyDone(s.id);
    return `<button class="jstory-card" onclick="openStoryModal('${s.id}')">
      <div class="jstory-cover">${s.emoji||'📖'}${done?`<div class="jstory-complete-badge" role="img" aria-label="${t('completed')}">${icon('status-check',12)}</div>`:''}</div>
      <div class="jstory-body"><div class="jstory-title">${s.title}</div></div>
    </button>`;
  }).join('');
  return `<div class="world-pane">
    <button class="world-back-link" onclick="goWorldRoot()">← ${t('worldTitle')}</button>
    <div class="dest-hero">
      <div class="dest-hero-emoji">${d.emoji}</div>
      <div class="dest-hero-name">${d.emoji} ${d.name}</div>
      <div class="dest-hero-blurb">${d.description}</div>
      ${doneCount>=d.storyCount?`<div class="dest-stamp">✓ PASSPORT STAMPED</div>`:`
        <div class="dest-hero-progress-wrap">
          <div class="dest-hero-progress-bar"><div class="dest-hero-progress-fill" style="width:${Math.round((doneCount/d.storyCount)*100)}%"></div></div>
          <div class="dest-hero-progress-text">${doneCount} / ${d.storyCount}</div>
        </div>`}
    </div>
    <div class="jstory-section-title">${t('storiesFrom',d.name)}</div>
    ${cards?`<div class="jstory-grid">${cards}</div>`:`<div class="coming-soon"><div class="coming-soon-emoji">${d.emoji}</div><div style="font-family:var(--font-head);font-weight:800;font-size:15px;color:var(--text)">${t('destNoStories')}</div></div>`}
  </div>`;
}

// ── PROFILE — literal port, Tablet lines 289-362, real stats only (no fabricated
// username/currency/settings — those need real accounts/audio features not built) ──
function renderProfile(){
  const curLv=LEVELS.find(l=>l.id===currentLevelId());
  const nextLv=LEVELS.find(l=>l.id===curLv.id+1);
  const doneCount=levelDoneCount(curLv.id);
  const pct=Math.round((doneCount/10)*100);

  // Progress's own 4-stat grid is a superset of the 3 Profile used to build, so it replaces it.
  const progressHtml=renderProgressSections();

  const earned=BADGES.filter(b=>b.check()).slice(0,3);
  const badgesHtml=earned.length?earned.map(b=>{
    const name=b.levelRef?t('championName',b.levelRef):t(b.nameKey);
    return `<div class="recent-badge">
      <div class="recent-badge-ring" style="border-color:${b.color}"><div class="recent-badge-icon">${icon(b.icon,22)}</div></div>
      <div class="recent-badge-name">${name}</div>
    </div>`;
  }).join(''):`<div class="no-badges-text">${t('noBadgesYet')}</div>`;

  return `<div class="profile-pane">
    <div class="profile-identity">
      <div class="profile-avatar">🐸</div>
      <div class="profile-level-badge" style="background:${curLv.color}26;color:${curLv.color}"><span>${icon(curLv.icon,18)}</span><span>${curLv.pond}</span></div>
    </div>
    <div class="profile-main">
      ${progressHtml}
      <div>
        <div class="section-title">${t('nextLevelUp')}</div>
        <div class="level-progress-card">
          <div class="level-progress-toprow">
            <span class="level-progress-curname">${curLv.pond}</span>
            ${nextLv?`<span class="level-progress-nextname">${pct}% · ${nextLv.pond} →</span>`:''}
          </div>
          <div class="level-row-bar"><div class="level-row-fill" style="width:${pct}%;background:${curLv.color}"></div></div>
          <div class="level-progress-motivation">${t('levelProgressMotivation',10-doneCount,nextLv?nextLv.pond:'')}</div>
        </div>
      </div>
      <div>
        <div class="recent-badges-header">
          <div class="section-title" style="margin-bottom:0">${t('recentBadges')}</div>
          <button class="see-all-link" onclick="navigate('rewards')">${t('seeAll')}</button>
        </div>
        <div class="recent-badges-card">${badgesHtml}</div>
      </div>
    </div>
  </div>`;
}

function renderComingSoon(){
  return `<div class="coming-soon">
    <div class="coming-soon-emoji">🚧</div>
    <div style="font-family:var(--font-head);font-weight:900;font-size:18px;color:var(--text)">${t('comingSoon')}</div>
    <div style="font-size:13px">${t('comingSoonBody')}</div>
  </div>`;
}

// ── HOME DASHBOARD — literal port, Tablet lines 111-185 ────
function renderHomeDash(){
  calcTodayCount();
  const lv=currentLevelId();
  const lvObj=LEVELS.find(l=>l.id===lv);
  const goalTotal=state.dailyGoal, goalDone=Math.min(state.todayCount,goalTotal);
  const goalDeg=Math.round((goalDone/Math.max(goalTotal,1))*360);
  const isGoalDone=state.todayCount>=state.dailyGoal;

  const {story:contStory,isNew}=getContinueStory();
  const [fallbackG1,fallbackG2]=LEVEL_GRADIENTS[contStory&&contStory.levelId?contStory.levelId:1];
  const [g1,g2]=storyGradient(contStory,fallbackG1,fallbackG2);
  // Real resume progress: pages already read / total. 0 for a story never opened.
  const contPages=contStory&&contStory.paragraphs?contStory.paragraphs.length:0;
  const contPage=contStory?resumePage(contStory.id):0;
  const contPct=contPages?Math.round((contPage/contPages)*100):0;
  const continueCard = contStory ? `
    <button class="continue-card" onclick="startReadingDirect('${contStory.id}')">
      <div class="continue-cover" style="background:linear-gradient(145deg,${g1},${g2})"><span>${contStory.emoji||'📖'}</span></div>
      <div class="continue-body">
        <div>
          <div class="continue-label">${isNew?t('startReading'):t('continueReading')}</div>
          <div class="continue-title">${contStory.title}</div>
          <div class="continue-meta">${t('pageMeta',contStory)}</div>
        </div>
        <div>
          <div class="continue-progress"><div class="continue-progress-fill" style="width:${isNew?0:contPct}%"></div></div>
          <div class="continue-btn"><span>${isNew?t('startBtn'):t('continueBtn')}</span></div>
        </div>
      </div>
    </button>` : `
    <button class="continue-card" onclick="navigate('library')">
      <div class="continue-cover" style="background:linear-gradient(145deg,${g1},${g2})"><span>🐸</span></div>
      <div class="continue-body"><div class="continue-title">${t('firstStoryBtn')}</div></div>
    </button>`;

  const storiesWaitingCount = Object.values(STORIES).flatMap(o=>Object.values(o)).flat().filter(s=>!storyDone(s.id)).length;
  const placesFoundCount = DESTINATIONS.filter(d=>destComplete(d.id)).length;
  const placesTotalCount = DESTINATIONS.length;
  const q = getTodayQuests();
  const questsTodayCount = [q.stories,q.perfect,q.fc].filter(Boolean).length;

  // The level test lives here, on demand — never forced on a child at first launch.
  // Once they've been placed, the same tile becomes a re-test and reports where they are.
  const placedLv=state.placement?LEVELS.find(l=>l.id===state.placement.level):null;
  const placeTile=placedLv
    ? {icon:'🔁', tint:'#E7E9FB', title:t('placeTileRetake'), sub:t('placeTileRetakeSub',placedLv.pond), fn:'openPlacement()'}
    : {icon:'🎣', tint:'#E7E9FB', title:t('placeTile'), sub:t('placeTileSub'), fn:'openPlacement()'};

  const quickLinks=[
    placeTile,
    {icon:'📚', tint:'#E3F3FC', title:t('exploreLibrary'), sub:t('storiesWaiting',storiesWaitingCount), screen:'library'},
    {icon:'🔤', tint:'#DFF7F2', title:t('flashCards'), sub:t('practiceVocab'), screen:'flashcards'},
    {icon:'🌍', tint:'#E7E9FB', title:t('worldJourney'), sub:t('placesFound',placesFoundCount,placesTotalCount), screen:'world'},
    {icon:'🎯', tint:'#FCF4D6', title:t('quests'), sub:t('questsToday',questsTodayCount), screen:'quests'},
    {icon:'📈', tint:'#FFF0E4', title:t('myProgress'), sub:t('trackLevels'), screen:'profile'},
    {icon:'🏆', tint:'#F1E8FF', title:t('rewards'), sub:t('checkBadges'), screen:'rewards'},
  ];
  const quickLinksHtml=quickLinks.map(l=>`
    <button class="ql-tile" onclick="${l.fn||`navigate('${l.screen}')`}">
      <div class="ql-icon" style="background:${l.tint}">${l.icon}</div>
      <div>
        <div class="ql-title">${l.title}</div>
        <div class="ql-subtitle">${l.sub}</div>
      </div>
      <span class="ql-arrow">→</span>
    </button>`).join('');

  // Journey preview nodes — same visual treatment as the design (complete/current/locked).
  // Windowed around curIdx so mid/high sub-level learners still see their current node.
  let curIdx=0;
  for(let i=0;i<10;i++){ if(subLevelAvailable(lv,i)&&!subLevelDone(lv,i)){curIdx=i;break;} }
  const winStart=Math.max(0,Math.min(curIdx-2,10-5));
  const subLevelsDone=Array.from({length:10},(_,i)=>subLevelDone(lv,i)).filter(Boolean).length;
  const nodesHtml=Array.from({length:5},(_,offset)=>{
    const i=winStart+offset;
    const done=subLevelDone(lv,i);
    const isCur=i===curIdx && !done;
    const circle=done
      ? `<div class="jn-done">${icon('status-check',18)}</div>`
      : isCur
        ? `<div class="jn-current">🐸</div>`
        : `<div class="jn-locked">${icon('status-lock',16)}</div>`;
    return `<div class="journey-node-wrap">${circle}<span class="journey-node-lbl">${i+1}</span></div>`;
  }).join('');

  return `<div class="home-dash">
    <div class="home-row1">
      ${continueCard}
      <div class="goal-card">
        <div class="goal-label">${t('todaysGoal')}</div>
        <div class="goal-ring" style="background:conic-gradient(var(--primary) 0deg ${goalDeg}deg, var(--border) ${goalDeg}deg 360deg)">
          <div class="goal-ring-inner">
            <div class="goal-fraction">${goalDone}/${goalTotal}</div>
            <div class="goal-stories-label">${t('storiesLabel')}</div>
          </div>
        </div>
        <div class="goal-remaining">${isGoalDone?t('goalDone'):t('moreToGo',goalTotal-goalDone)}</div>
      </div>
    </div>

    <div>
      <div class="section-title">${t('quickLinks')}</div>
      <div class="ql-grid">${quickLinksHtml}</div>
    </div>

    <div>
      <div class="journey-title-row">
        <span class="journey-title">${t('yourJourney',lvObj)} <span class="journey-progress-count">${t('pondProgress',subLevelsDone,10)}</span></span>
        <button class="journey-viewpath" onclick="viewPath()">${t('viewPath')}</button>
      </div>
      <div class="journey-track">
        <div class="journey-track-line"></div>
        <div class="journey-nodes">${nodesHtml}</div>
      </div>
    </div>
  </div>`;
}

// ── RENDER: LANDING / SPLASH ────────────────────────────────
function renderLanding(){
  document.getElementById('app').innerHTML=`
  <div class="screen landing-screen">
    <button class="landing-lang-pill" onclick="toggleUiLang()" aria-label="Language">🌐 ${state.uiLang==='en'?'English':'日本語'}</button>
    <div class="landing-content">
      <img class="landing-frog" src="OOSH_Logo_Square.png" alt="Ribbit">
      <div class="landing-title">Ribbit</div>
      <div class="landing-tagline">${state.uiLang==='en'?'Learn English the fun way!':'えいごをたのしくまなぼう！'}</div>
      <div class="landing-subtag">${state.uiLang==='en'?`${LEVELS.length} levels · ${DESTINATIONS.length} countries to explore`:`${LEVELS.length}レベル · 世界${DESTINATIONS.length}か国をたんけん`}</div>
      <div class="landing-ctas">
        <button class="landing-cta-primary" onclick="enterFromLanding()">${state.uiLang==='en'?'Get Started':'はじめる'}</button>
      </div>
    </div>
    <div class="landing-footer">OOSH Online · v3.0</div>
  </div>`;
}

// ── MASTER RENDER ────────────────────────────────────────────
const FULLBLEED_SCREENS=['reader','quiz','celebration','placement']; // no header/bottom-nav, matches the design's own top-level screens
function render(){
  if(state.screen==='landing'){ renderLanding(); return; }
  if(state.screen==='placement'){ document.getElementById('app').innerHTML=renderPlacement(); return; }
  if(state.screen==='reader'){ document.getElementById('app').innerHTML=renderReader(); return; }
  if(state.screen==='quiz'){ document.getElementById('app').innerHTML=renderQuiz(); return; }
  if(state.screen==='celebration'){ document.getElementById('app').innerHTML=renderCelebration(); playCelebrationAnims(); return; }
  let body;
  if(state.screen==='home') body=renderHomeDash();
  else if(state.screen==='library') body=renderLibrary();
  else if(state.screen==='flashcards') body=renderFlashcards();
  else if(state.screen==='progress') body=renderProfile(); // legacy screen id -> merged Profile
  else if(state.screen==='rewards') body=renderRewards();
  else if(state.screen==='world') body=renderWorld();
  else if(state.screen==='profile') body=renderProfile();
  else if(state.screen==='quests') body=renderQuests();
  else if(IMPLEMENTED_SCREENS.includes(state.screen)) body=renderHomeDash();
  else body=renderComingSoon();
  document.getElementById('app').innerHTML=`
  <div class="screen app-shell">
    ${renderHeader()}
    <div class="content-area">${body}</div>
    ${renderBottomNav()}
  </div>
  ${renderModal()}`;
  runHeaderAnims();
}
// Streak-flame idle loop + XP-earn pulse — header re-renders every state change (full
// innerHTML replace, no diffing), so these re-attach each render rather than mounting once.
function runHeaderAnims(){
  const flameSlot=document.getElementById('header-streak-flame');
  if(flameSlot && (state.streak||0)>0) playLottie(flameSlot,'assets/animations/idle/streak-flame-idle.json',{loop:true});
  if(state._xpFlash){
    state._xpFlash=false;
    const xpSlot=document.getElementById('header-xp-star');
    if(xpSlot) playLottie(xpSlot,'assets/animations/rewards/xp-lily-pad-earn.json',{onComplete:()=>{ xpSlot.innerHTML=icon('xp-xp-star',16); }});
  }
}

applyUiLang();
render();
setTimeout(checkDailyLoginBonus, 600);
</script>
