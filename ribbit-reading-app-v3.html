<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ribbit v3 — OOSH ESL Reading</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Nunito+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- TODO(brand): body font per docs/design-implementation-brief.md should be Glacial Indifference,
       not available on Google Fonts and no licensed copy found locally — Nunito Sans is the placeholder
       until Kyle supplies a licensed Glacial Indifference webfont file. -->
  <style>
    :root {
      /* Tokens per docs/design-implementation-brief.md: --primary repointed to
         #72C93A (the correct frog green) — #bada55 was a leftover placeholder. */
      --primary:#72C93A; --primary-dark:#599D2D; --primary-light:rgba(114,201,58,.15);
      --accent:#f9ad3b; --accent-dark:#d4831a;
      --correct:#22c55e; --correct-bg:#dcfce7; --wrong:#ef4444; --wrong-bg:#fee2e2;
      --bg:#eef7e8; --card:#ffffff; --text:#1A2340; --text-muted:#8FA0B5; --navy:#1A3260;
      --border:#EEF1F5;
      --shadow-sm:0 2px 8px rgba(0,0,0,.07); --shadow:0 2px 10px rgba(0,0,0,.08); --shadow-lg:0 4px 16px rgba(0,0,0,.12);
      --radius-sm:10px; --radius:16px; --radius-lg:24px;
      --font-head:'Baloo 2',sans-serif;
      --font-body:'Nunito Sans',sans-serif; /* TODO(brand): swap to Glacial Indifference once licensed file is supplied */
      --lv1:#c084fc; --lv2:#bada55; --lv3:#4ade80; --lv4:#38bdf8; --lv5:#fb923c; --lv6:#f43f5e;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
    h1,h2,h3,h4{font-family:var(--font-head)}
    button{font-family:var(--font-body);cursor:pointer;border:none;outline:none;background:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
    button:focus-visible{outline:2.5px solid var(--primary-dark);outline-offset:2px}
    #app{max-width:520px;margin:0 auto;min-height:100vh;position:relative;overflow-x:hidden}
    .screen{animation:fadeSlideIn .3s ease both}
    @keyframes fadeSlideIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
    @keyframes glow-pulse{0%,100%{box-shadow:0 0 0 4px rgba(186,218,85,.35)}50%{box-shadow:0 0 0 10px rgba(186,218,85,.12)}}
    @keyframes fade-up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes star-pop{0%{transform:scale(0) rotate(-15deg);opacity:0}65%{transform:scale(1.28) rotate(6deg);opacity:1}100%{transform:scale(1) rotate(0deg);opacity:1}}
    @keyframes bounce-in{0%{transform:translateY(60px);opacity:0}55%{transform:translateY(-10px);opacity:1}80%{transform:translateY(6px)}100%{transform:translateY(0);opacity:1}}

    /* Reduced motion: the app runs three looping animations continuously (landing frog float,
       glow-pulse on the current sub-level node, glow-pulse on in-progress story cards).
       animation-delay must be zeroed too — every delayed animation here uses fill-mode:both,
       so leaving the delay would hold elements (e.g. .celeb-star) at their invisible 0% frame. */
    @media (prefers-reduced-motion: reduce){
      *,*::before,*::after{
        animation-duration:.01ms !important;
        animation-delay:0ms !important;
        animation-iteration-count:1 !important;
        transition-duration:.01ms !important;
      }
      html{scroll-behavior:auto}
    }

    /* ══ SPLASH — matches design_handoff Screen 01 spec (already live, ported verbatim) ══ */
    .landing-screen{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 24px 48px;background:linear-gradient(175deg,#0d1f0e 0%,#1a3020 55%,#0c1a12 100%);overflow:hidden;text-align:center}
    .landing-screen::before,.landing-screen::after{content:'';position:absolute;border-radius:50%;background:rgba(186,218,85,1);opacity:.07;pointer-events:none}
    .landing-screen::before{width:320px;height:180px;top:-60px;left:-80px}
    .landing-screen::after{width:240px;height:140px;bottom:-60px;right:-60px}
    .landing-lang-pill{position:absolute;top:18px;right:18px;display:flex;align-items:center;justify-content:center;gap:6px;min-height:44px;background:rgba(255,255,255,.12);backdrop-filter:blur(8px);color:rgba(255,255,255,.9);font-family:var(--font-head);font-size:.75rem;font-weight:700;border-radius:22px;padding:10px 16px;z-index:2}
    .landing-content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;width:100%;max-width:340px}
    .landing-frog{width:130px;height:130px;margin-bottom:20px;filter:drop-shadow(0 12px 28px rgba(0,0,0,.4));animation:float 3.5s ease-in-out infinite}
    .landing-title{font-family:var(--font-head);font-size:54px;font-weight:900;color:var(--primary);letter-spacing:-1px;line-height:1}
    .landing-tagline{font-family:var(--font-body);font-size:17px;color:rgba(255,255,255,.88);margin-top:12px;font-weight:400}
    .landing-subtag{font-family:var(--font-body);font-size:12px;color:rgba(255,255,255,.45);margin-top:6px}
    .landing-ctas{width:100%;margin-top:36px;display:flex;flex-direction:column;gap:12px}
    .landing-cta-primary{height:56px;width:100%;background:var(--accent);color:#151515;border-radius:18px;font-family:var(--font-head);font-size:19px;font-weight:900;box-shadow:0 6px 24px rgba(249,173,59,0.5);transition:transform .15s,box-shadow .15s}
    .landing-cta-primary:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(249,173,59,.55)}
    .landing-cta-secondary{height:50px;width:100%;background:transparent;color:rgba(255,255,255,.8);border-radius:18px;font-family:var(--font-head);font-size:16px;font-weight:700;border:2px solid rgba(255,255,255,.2);transition:background .2s}
    .landing-cta-secondary:hover{background:rgba(255,255,255,.06)}
    .landing-footer{position:relative;z-index:1;margin-top:28px;font-family:var(--font-body);font-size:11px;color:rgba(255,255,255,.3);letter-spacing:.04em}

    /* ══ APP SHELL — literal port, Ribbit Tablet.dc.html lines 37-106, 738-752 ══ */
    .app-shell{display:flex;flex-direction:column;min-height:100vh;background:var(--bg)}
    .app-header{background:var(--card);display:flex;flex-wrap:wrap;align-items:center;padding:10px 14px 8px;gap:6px 10px;border-bottom:1.5px solid var(--border);flex-shrink:0}
    .app-brand-wrap{display:flex;align-items:center;gap:8px;flex-shrink:0}
    .app-logo{width:34px;height:34px;background:var(--primary);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;overflow:hidden}
    .app-brand{font-family:var(--font-head);font-weight:900;font-size:17px;color:var(--navy);letter-spacing:-0.5px}
    .header-greeting{order:3;flex-basis:100%;font-size:12px;font-weight:600;color:var(--text)}
    .header-breadcrumb{order:3;flex-basis:100%;display:flex;align-items:center;gap:6px;font-size:13px;cursor:default}
    .header-breadcrumb span[onclick]{cursor:pointer}
    .header-breadcrumb .crumb-sep{color:#C8D4E0;font-size:12px}
    .header-stats{display:flex;align-items:center;gap:6px;flex-shrink:0;margin-left:auto}
    .stat-pill{display:flex;align-items:center;gap:5px;background:var(--bg);border-radius:8px;padding:5px 9px}
    .stat-pill .sp-val{font-size:12px;font-weight:800;color:var(--text)}
    .stat-pill .sp-label{font-size:10px;font-weight:500;color:var(--text-muted)}
    .lottie-slot{width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
    .avatar-btn{width:52px;height:52px;background:var(--primary);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;flex-shrink:0;overflow:hidden;border:none;cursor:pointer;padding:0}
    .lang-toggle-pill{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:4px;min-height:44px;background:var(--bg);border-radius:22px;padding:10px 14px;font-size:12px;font-weight:700;color:var(--text)}

    .content-area{flex:1;overflow-y:auto;padding-bottom:8px}

    .bottom-nav{height:72px;background:var(--card);border-top:1.5px solid var(--border);display:flex;align-items:stretch;flex-shrink:0;position:sticky;bottom:0;z-index:100}
    .nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;height:100%;position:relative}
    .nav-indicator{width:22px;height:3px;border-radius:999px;background:transparent}
    .nav-tab.active .nav-indicator{background:var(--tab-accent)}
    .ico svg{width:100%;height:100%}
    .nav-icon-wrap{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:transparent;color:var(--navy)}
    .nav-tab.active .nav-icon-wrap{background:var(--tab-tint);color:var(--tab-accent)}
    .nav-badge{position:absolute;top:-1px;right:8px;width:9px;height:9px;background:#E05C5C;border-radius:50%;border:2px solid white}
    .nav-label{font-size:9.5px;font-weight:500;color:var(--text-muted)}
    .nav-tab.active .nav-label{font-weight:800}

    .coming-soon{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:10px;padding:24px;text-align:center;color:var(--text-muted)}
    .coming-soon-emoji{font-size:48px}

    /* ══ HOME DASHBOARD — literal port, Tablet lines 111-185 ══ */
    .home-dash{padding:18px 16px 16px;display:flex;flex-direction:column;gap:18px}
    .home-row1{display:flex;flex-direction:column;gap:12px}
    .continue-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);display:flex;overflow:hidden;text-align:left;min-height:150px}
    .continue-cover{width:96px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
    .continue-cover span{font-size:40px;line-height:1}
    .continue-body{flex:1;padding:14px 14px;display:flex;flex-direction:column;justify-content:space-between;min-width:0}
    .continue-label{font-size:9.5px;font-weight:800;color:var(--text-muted);letter-spacing:.08em;margin-bottom:4px}
    .continue-title{font-family:var(--font-head);font-weight:900;font-size:16px;color:var(--text);line-height:1.2;margin-bottom:4px}
    .continue-meta{font-size:11px;color:var(--text-muted);font-weight:500}
    .continue-progress{height:5px;background:var(--border);border-radius:999px;margin:10px 0}
    .continue-progress-fill{height:100%;background:var(--primary);border-radius:999px}
    .continue-btn{display:inline-flex;align-items:center;gap:6px;background:var(--primary);border-radius:10px;padding:9px 14px;box-shadow:0 4px 14px rgba(186,218,85,.4)}
    .continue-btn span{font-family:var(--font-head);font-weight:800;font-size:12px;color:#151515;white-space:nowrap}

    .goal-card{flex:1;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:14px}
    .goal-label{font-size:9.5px;font-weight:800;color:var(--text-muted);letter-spacing:.08em}
    .goal-ring{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center}
    .goal-ring-inner{width:60px;height:60px;border-radius:50%;background:var(--card);display:flex;flex-direction:column;align-items:center;justify-content:center}
    .goal-fraction{font-family:var(--font-head);font-weight:900;font-size:15px;color:var(--text);line-height:1}
    .goal-stories-label{font-size:8.5px;color:var(--text-muted);font-weight:600}
    .goal-remaining{font-size:11px;font-weight:700;color:var(--primary-dark)}

    .section-title{font-size:11px;font-weight:800;color:var(--text);letter-spacing:.06em;margin-bottom:8px}
    .ql-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .ql-tile{min-height:92px;background:var(--card);border-radius:14px;box-shadow:var(--shadow-sm);padding:12px 13px;display:flex;flex-direction:column;justify-content:space-between;position:relative;text-align:left}
    .ql-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px}
    .ql-title{font-family:var(--font-head);font-weight:800;font-size:12px;color:var(--text);margin-bottom:1px}
    .ql-subtitle{font-size:9.5px;color:var(--text-muted);font-weight:500}
    .ql-arrow{position:absolute;top:12px;right:13px;color:#C8D4E0;font-size:12px}

    .journey-title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:8px}
    .journey-title{font-size:11px;font-weight:800;color:var(--text);letter-spacing:.06em}
    .journey-progress-count{font-weight:600;opacity:0.6;font-size:10px;letter-spacing:0}
    .journey-viewpath{font-size:11px;font-weight:700;color:var(--primary-dark);flex-shrink:0}
    .journey-track{background:var(--card);border-radius:14px;box-shadow:var(--shadow-sm);padding:12px 18px 14px;position:relative;display:flex;align-items:center}
    .journey-track-line{position:absolute;left:36px;right:36px;top:32px;height:2px;background:repeating-linear-gradient(90deg,#DDE6D4 0 6px,transparent 6px 11px);z-index:0}
    .journey-nodes{display:flex;justify-content:space-between;width:100%;position:relative;z-index:1;align-items:flex-start}
    .journey-node-wrap{display:flex;flex-direction:column;align-items:center;gap:5px}
    .jn-done{width:40px;height:40px;border-radius:50%;background:var(--primary);color:white;display:flex;align-items:center;justify-content:center}
    .jn-current{width:46px;height:46px;border-radius:50%;background:white;border:3px solid var(--primary);font-size:18px;display:flex;align-items:center;justify-content:center;animation:glow-pulse 2s ease-in-out infinite}
    .jn-locked{width:40px;height:40px;border-radius:50%;background:#E5E9EE;color:#B0B8C1;display:flex;align-items:center;justify-content:center}
    .journey-node-lbl{font-size:10px;font-weight:700;color:var(--text-muted);line-height:1}

    /* ══ QUESTS — ported from the live app, daily + weekly quest tracking ══ */
    .quests-pane{padding:16px;display:flex;flex-direction:column;gap:20px}
    .quests-wrap{display:flex;flex-direction:column;gap:8px}
    .quests-section-title{font-family:var(--font-head);font-weight:800;font-size:13px;color:var(--text);margin-bottom:2px}
    .quest-list{display:flex;flex-direction:column;gap:10px}
    .quest-card{background:var(--card);border-radius:14px;box-shadow:var(--shadow-sm);padding:12px 14px;display:flex;align-items:center;gap:12px}
    .quest-card.quest-done{opacity:.6}
    .quest-icon{font-size:20px;flex-shrink:0}
    .quest-body{flex:1;min-width:0}
    .quest-text{font-size:12.5px;font-weight:700;color:var(--text)}
    .quest-prog{font-size:10.5px;color:var(--text-muted);font-weight:600;margin-top:2px}
    .quest-prog-bar-wrap{height:5px;background:var(--border);border-radius:999px;margin-top:6px}
    .quest-prog-bar-fill{height:100%;background:var(--primary);border-radius:999px;transition:width .3s ease}
    .quest-check{font-size:16px;color:var(--primary-dark);opacity:0;flex-shrink:0}
    .quest-card.quest-done .quest-check{opacity:1}
    .quest-bonus-card{background:var(--primary-light);border-radius:14px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px}
    .quest-bonus-card.quest-bonus-done{background:var(--correct-bg)}
    .quest-bonus-txt{font-size:12px;font-weight:800;color:var(--primary-dark)}
    .quest-bonus-card.quest-bonus-done .quest-bonus-txt{color:#15803d}
    .quest-xp-badge{background:var(--accent);color:white;border-radius:999px;padding:3px 10px;font-size:10.5px;font-weight:800;flex-shrink:0}

    .toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(6px);background:#151515;color:#e4edd8;border-radius:99px;padding:10px 20px;font-family:var(--font-head);font-size:.85rem;font-weight:700;z-index:600;pointer-events:none;white-space:nowrap;animation:toastIn .28s cubic-bezier(.34,1.56,.64,1) forwards}
    .toast.toast-out{animation:toastOut .22s ease forwards}
    @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(14px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
    @keyframes toastOut{to{opacity:0;transform:translateX(-50%) translateY(8px)}}

    /* ══ LIBRARY — literal port, Tablet lines 187-278 ══ */
    .library-pane{padding:16px}
    .lvl-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .lvl-card{background:var(--card);border-radius:14px;overflow:hidden;box-shadow:var(--shadow-sm);text-align:left}
    .lvl-card.locked{opacity:.75}
    .lvl-cover{height:90px;display:flex;align-items:center;justify-content:center;position:relative}
    .lvl-cover span{font-size:38px;line-height:1}
    .lvl-cefr-badge{position:absolute;bottom:6px;left:6px;background:rgba(255,255,255,.88);border-radius:999px;padding:2px 8px;font-size:9px;font-weight:800}
    .lvl-lock-badge{position:absolute;top:6px;right:6px;width:22px;height:22px;background:rgba(0,0,0,.35);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff}
    .lvl-body{padding:10px 12px 12px}
    .lvl-name{font-family:var(--font-head);font-weight:900;font-size:13px;color:var(--text);margin-bottom:2px}
    .lvl-meta{font-size:9.5px;color:var(--text-muted);font-weight:600;margin-bottom:8px}
    .lvl-locked-text{font-size:10.5px;font-weight:700;color:#B0B8C1}
    .lvl-progress-bar{height:5px;background:var(--border);border-radius:999px;margin-bottom:5px}
    .lvl-progress-fill{height:100%;border-radius:999px}
    .lvl-progress-text{font-size:10.5px;font-weight:700}
    .lvl-dots{display:flex;gap:3px;margin-top:6px}
    .lvl-dot{flex:1;height:5px;border-radius:99px;background:var(--border)}
    .lvl-dot.lvl-dot-done{background:var(--dot-color,var(--primary))}

    .sublevel-panel{background:var(--card);border-radius:16px;box-shadow:var(--shadow);padding:18px 14px}
    .sublevel-header{display:flex;align-items:center;gap:10px;margin-bottom:18px}
    .sublevel-header-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
    .sublevel-header-name{font-family:var(--font-head);font-weight:900;font-size:15px;color:var(--text)}
    .sublevel-header-meta{font-size:10px;color:var(--text-muted);font-weight:600}
    .sublevel-track{position:relative;overflow-x:auto;padding-bottom:6px}
    .sublevel-track-line{position:absolute;left:20px;right:20px;top:20px;height:2px;background:repeating-linear-gradient(90deg,#DDE6D4 0 6px,transparent 6px 11px);z-index:0}
    .sublevel-nodes{display:flex;justify-content:space-between;gap:14px;position:relative;z-index:1;min-width:520px}
    /* The button is the hit target, not the circle — keep the 36px circle visually but pad the
       button out to the 44px WCAG 2.1 minimum. These are the library's primary nav for ages 5-7. */
    .sub-node{display:flex;flex-direction:column;align-items:center;gap:5px;background:none;min-width:60px;min-height:60px;padding:2px 4px}
    .sub-node-circle{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
    .sub-node-label{font-size:10px;font-weight:600}

    .story-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .story-card{background:var(--card);border-radius:14px;overflow:hidden;cursor:pointer;text-align:left;width:100%}
    .story-stars{display:flex;gap:1px;padding:3px 0 0}
    .story-cover{height:100px;display:flex;align-items:center;justify-content:center;font-size:38px;position:relative}
    .story-level-badge{position:absolute;bottom:6px;left:6px;border-radius:999px;padding:2px 7px;font-size:8.5px;font-weight:700;color:#fff}
    .story-complete-badge{position:absolute;top:6px;right:6px;width:20px;height:20px;background:var(--primary);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#151515;font-size:11px;font-weight:700}
    .story-inprogress-badge{position:absolute;top:6px;right:6px;background:#F5C842;border-radius:999px;padding:2px 7px;font-size:7.5px;font-weight:800;color:#1A2340;letter-spacing:.04em}
    .story-card.story-inprogress{animation:glow-pulse 2s ease-in-out infinite}
    .story-progress-bar{position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(0,0,0,.15)}
    .story-progress-fill{height:100%;background:var(--primary)}
    .story-body{padding:8px 9px 9px}
    .story-title{font-size:11px;font-weight:600;color:var(--text);line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

    .modal-overlay{position:fixed;inset:0;background:rgba(8,16,36,.6);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}

    /* height (not min-height) + min-height:0 down the flex chain. Without this, flex items

       overflow-y:auto never engages — a long page scrolls the whole document and pushes the

    .reader-audio-pill{flex:1;min-width:140px;height:52px;background:var(--primary);border-radius:999px;display:flex;align-items:center;padding:0 14px;gap:10px}
    .reader-audio-btn{width:44px;height:44px;background:rgba(255,255,255,.28);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;color:white;font-weight:700;flex-shrink:0;border:none;cursor:pointer}

    .reader-illu{width:100%;height:180px;display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0;background-size:cover;background-position:center}
    .reader-illu-emoji{font-size:64px;line-height:1}
    /* `safe center` centres the page when it fits but falls back to flex-start when it doesn't.
       Plain `center` overflows equally in both directions on a scroll container, putting the
       first line above scrollTop:0 where it can never be scrolled back into view.
       The unprefixed `center` below it is the fallback for engines that don't parse `safe`. */
    .reader-text-area{flex:1;min-height:0;background:#FFFDF8;display:flex;flex-direction:column;justify-content:center;justify-content:safe center;padding:24px 20px;overflow-y:auto;cursor:default;position:relative}
    .page-turn-anim-slot{position:absolute;inset:0;pointer-events:none;z-index:5}
    .reader-progress-bar{height:3px;background:var(--border);border-radius:999px;margin-bottom:20px}
    .reader-progress-fill{height:100%;background:var(--primary);border-radius:999px;transition:width .3s ease}
    /* Type scales with the level: a Pre-A1 page is one short sentence and wants primer-sized
       type, while a B2 page is a real paragraph that must still fit. Set per-story in renderReader(). */
    .reader-page-text{font-size:var(--reader-size,18px);font-weight:400;color:#2B2B2B;line-height:1.6;animation:fade-up .3s ease both}
    .reader-footer{height:64px;background:white;border-top:1.5px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:10px;flex-shrink:0}
    .reader-nav-btn{display:flex;align-items:center;justify-content:center;gap:5px;min-height:44px;padding:8px 14px;border-radius:10px;border:1.5px solid var(--border);flex-shrink:0;background:none;font-size:12px;font-weight:700;color:var(--text-muted)}
    .reader-page-counter{flex:1;text-align:center;font-size:12px;font-weight:600;color:var(--text)}
    .reader-next-btn{display:flex;align-items:center;justify-content:center;gap:5px;min-height:44px;background:var(--primary);border-radius:10px;padding:8px 16px;flex-shrink:0;border:none;font-size:13px;font-weight:800;color:#151515}
    .tappable-word{background:var(--primary-light);border-radius:4px;padding:0 2px;cursor:pointer}
    .challenge-word{border-bottom:1.5px dashed #F9AD3B;cursor:default}
    .word-popup-overlay{position:fixed;inset:0;background:rgba(8,16,36,.5);display:flex;align-items:center;justify-content:center;z-index:250;padding:20px}
    .word-popup-card{width:100%;max-width:340px;background:var(--card);border-radius:18px;padding:22px;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,.3);animation:modal-in .2s ease both;position:relative}
    .word-popup-word-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px}
    .word-popup-word{font-family:var(--font-head);font-weight:900;font-size:20px;color:var(--text);text-transform:capitalize}
    .word-speak-btn{width:44px;height:44px;border-radius:50%;background:var(--primary-light);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
    .word-speak-btn:active{background:var(--primary)}
    .word-popup-def{font-size:13px;color:var(--text-muted);margin-bottom:8px;line-height:1.5}
    .word-popup-ja{font-size:13px;color:var(--primary-dark);margin-bottom:16px;line-height:1.5}
    .word-popup-ja-lead{font-family:var(--font-head);font-size:22px;font-weight:800;color:var(--navy);margin-bottom:6px;line-height:1.3}
    .word-popup-btn{width:100%;height:44px;background:var(--primary);border-radius:12px;font-family:var(--font-head);font-weight:800;font-size:13px;color:#151515}

    /* ══ QUIZ — literal port, Tablet lines 901-958. Full-bleed, no app shell. ══ */
    .quiz-screen{min-height:100vh;display:flex;flex-direction:column;background:#F5F9EF}
    .quiz-topbar{height:56px;background:white;display:flex;align-items:center;padding:0 16px;gap:10px;border-bottom:1.5px solid #EAF0E2;flex-shrink:0}
    .quiz-exit-btn{width:44px;height:44px;background:var(--bg);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--text-muted);border:none;flex-shrink:0}
    .quiz-title{font-family:var(--font-head);font-weight:800;font-size:13px;color:var(--text)}
    .quiz-dots{display:flex;align-items:center;gap:6px;margin-left:auto}
    .quiz-dot{width:8px;height:8px;border-radius:50%}
    .quiz-counter{font-size:11px;color:var(--text-muted);font-weight:600}
    .quiz-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
    /* The story illustration stays on screen through the quiz: Pre-A1 questions like
       "What is this?" refer to the picture, and without it they are unanswerable. */
    .quiz-stage{width:100%;max-width:980px;display:flex;flex-direction:column;align-items:center;gap:18px}
    .quiz-illu{width:100%;max-width:520px;height:150px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:56px;position:relative;flex-shrink:0;overflow:hidden;background-size:cover;background-position:center}
    .quiz-illu-title{position:absolute;bottom:8px;left:10px;background:rgba(0,0,0,.4);color:#fff;border-radius:999px;padding:3px 10px;font-size:11px;font-weight:700}
    .quiz-question-wrap{width:100%;max-width:520px}
    .quiz-label{font-size:11px;font-weight:800;color:var(--text-muted);letter-spacing:.08em;margin-bottom:8px;text-align:center}
    .quiz-question-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:22px}
    .quiz-question-text{font-family:var(--font-head);font-weight:900;font-size:19px;color:var(--text);text-align:center;line-height:1.3}
    .quiz-speak-btn{width:60px;height:60px;border-radius:50%;background:white;box-shadow:var(--shadow-sm);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
    .quiz-speak-btn:active{background:var(--primary-light)}
    .quiz-options{display:flex;flex-direction:column;gap:10px}
    .quiz-option-row{display:flex;align-items:center;gap:8px}
    .quiz-option-row .quiz-option{flex:1;min-width:0}
    .quiz-option-speak{width:44px;height:44px;border-radius:12px;background:white;box-shadow:var(--shadow-sm);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
    .quiz-option{display:flex;align-items:center;gap:12px;border-radius:14px;padding:13px 16px;text-align:left;box-shadow:var(--shadow-sm)}
    .quiz-option-badge{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800}
    .quiz-option-text{font-size:14px;font-weight:700}
    .quiz-feedback{margin-top:14px;font-size:14px;color:var(--text);text-align:center;line-height:1.5;background:white;border-radius:12px;padding:12px 14px;box-shadow:var(--shadow-sm)}
    .quiz-next-btn{margin-top:18px;width:100%;min-height:52px;background:var(--primary);border-radius:14px;font-family:var(--font-head);font-weight:800;font-size:15px;color:#151515;box-shadow:0 4px 14px rgba(186,218,85,.4);animation:fade-up .25s ease both}
    .combo-pill{display:flex;align-items:center;gap:5px;margin-left:8px;background:#fff3e0;border-radius:20px;padding:4px 10px;font-family:var(--font-head);font-weight:900;font-size:12px;color:var(--accent-dark);white-space:nowrap}

    /* Combo-streak overlay — purely cosmetic feedback layered on top of the quiz-answer flow.
       Anchored to the top, NOT centred: centring parked the card directly over the answer
       options, hiding the correct answer and the feedback text for the whole time it was up. */
    .combo-overlay{position:fixed;inset:0;z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:64px;pointer-events:none;user-select:none}
    .combo-inner{position:relative;z-index:1;text-align:center;padding:14px 22px;background:rgba(15,26,16,.95);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.12);border-radius:22px;box-shadow:0 8px 36px rgba(0,0,0,.5);animation:comboPop .42s cubic-bezier(.34,1.56,.64,1) both}
    .combo-inner.combo-exit{animation:comboExit .22s ease both}
    @keyframes comboPop{from{opacity:0;transform:scale(.3) rotate(-10deg)}to{opacity:1;transform:scale(1) rotate(0)}}
    @keyframes comboExit{to{opacity:0;transform:scale(.82) translateY(-10px)}}
    .combo-frog-em{font-size:3.5rem;display:block;animation:frogHop .5s cubic-bezier(.34,1.56,.64,1) both .05s;line-height:1.1}
    @keyframes frogHop{0%{transform:translateY(20px) scale(.75)}55%{transform:translateY(-14px) scale(1.15)}100%{transform:translateY(0) scale(1)}}
    .combo-label{font-family:var(--font-head);font-size:1.5rem;font-weight:900;line-height:1;margin:6px 0 4px;letter-spacing:-.5px;text-transform:uppercase}
    .combo-label.is-correct{color:var(--primary)}
    .combo-label.is-wrong{color:var(--wrong)}
    .combo-pts-pill{display:inline-block;background:var(--accent);color:#fff;font-family:var(--font-head);font-size:1rem;font-weight:900;padding:4px 16px;border-radius:99px;box-shadow:0 3px 12px rgba(249,173,59,.5);animation:ptsPop .4s cubic-bezier(.34,1.56,.64,1) both .15s;margin-top:2px}
    @keyframes ptsPop{from{opacity:0;transform:scale(.5) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
    .combo-streak-line{font-size:.8rem;color:var(--text-muted);margin-top:5px;font-family:var(--font-body)}

    /* ══ PLACEMENT TEST — full-bleed, no app shell. Never shows a score or a wrong answer:
       the frog is finding its pond, not passing an exam. ══ */
    .place-screen{min-height:100vh;display:flex;flex-direction:column;background:#F5F9EF}
    .place-topbar{height:56px;background:white;display:flex;align-items:center;padding:0 16px;gap:12px;border-bottom:1.5px solid #EAF0E2;flex-shrink:0}
    .place-title{font-family:var(--font-head);font-weight:800;font-size:13px;color:var(--text)}
    .place-dots{display:flex;gap:5px;margin-left:auto}
    .place-dot{width:8px;height:8px;border-radius:50%;background:#E5E9EE}
    .place-dot.place-dot-done{background:var(--primary)}
    .place-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
    .place-frog{font-size:64px;margin-bottom:14px;animation:float 3.5s ease-in-out infinite}
    .place-head{font-family:var(--font-head);font-weight:900;font-size:22px;color:var(--navy);margin-bottom:10px}
    .place-sub{font-size:14px;color:var(--text-muted);line-height:1.6;max-width:440px;margin-bottom:24px}
    .place-age-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;width:100%;max-width:520px}
    .place-age-btn{min-height:56px;background:white;border-radius:14px;box-shadow:var(--shadow-sm);font-family:var(--font-head);font-weight:900;font-size:18px;color:var(--text)}
    .place-age-btn:active{background:var(--primary-light)}
    .place-stage{width:100%;max-width:560px}
    .place-prompt-row{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:22px}
    .place-word{font-family:var(--font-head);font-weight:900;font-size:34px;color:var(--text);text-transform:capitalize}
    .place-cloze{font-size:20px;line-height:1.7;color:var(--text);text-align:left}
    .place-speak-btn{width:52px;height:52px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;box-shadow:0 4px 14px rgba(186,218,85,.4);color:white}
    .place-options{display:flex;flex-direction:column;gap:10px}
    .place-option{display:flex;align-items:center;gap:12px;border-radius:14px;padding:15px 16px;text-align:left;box-shadow:var(--shadow-sm);background:white;border:2px solid transparent;font-size:16px;font-weight:700;color:var(--text);min-height:56px}
    .place-option-badge{width:28px;height:28px;border-radius:50%;background:#F3F4F6;color:var(--text-muted);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
    .place-next-btn{margin-top:20px;width:100%;min-height:56px;background:var(--primary);border-radius:14px;font-family:var(--font-head);font-weight:800;font-size:16px;color:#151515;box-shadow:0 4px 14px rgba(186,218,85,.4)}
    .place-result-card{background:white;border-radius:20px;box-shadow:var(--shadow-lg);padding:26px;max-width:420px;width:100%}
    .place-result-pond{font-family:var(--font-head);font-weight:900;font-size:26px;margin:6px 0 4px}
    .place-result-meta{font-size:13px;color:var(--text-muted);margin-bottom:18px}
    .place-level-chips{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin-bottom:18px}
    .place-chip{width:60px;height:60px;border-radius:12px;background:var(--bg);font-family:var(--font-head);font-weight:800;font-size:14px;color:var(--text-muted);display:flex;align-items:center;justify-content:center}
    .place-chip.place-chip-on{color:#151515}
    .place-change-hint{font-size:11px;color:var(--text-muted);margin-bottom:12px}
    @media (min-width:768px){
      .place-word{font-size:44px}
      .place-cloze{font-size:24px}
      .place-options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
      .place-next-btn{max-width:280px;margin-left:auto;margin-right:auto;display:block}
    }

    /* ══ CELEBRATION — literal port, Tablet lines 963-1007. Full-bleed, no app shell. ══ */
    /* safe center + overflow-y:auto — the talk-prompt card can make this screen taller than
       the viewport on a small phone, and plain "center" would push the buttons out of reach. */
    .celeb-screen{min-height:100vh;background:#FFFDF8;display:flex;flex-direction:column;align-items:center;justify-content:safe center;position:relative;overflow-x:hidden;overflow-y:auto;padding:24px;text-align:center}
    .confetti-piece{position:fixed;top:-14px;width:10px;height:10px;border-radius:2px;pointer-events:none;z-index:9999;animation:confettiFall linear forwards}
    @keyframes confettiFall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
    .celeb-frog{font-size:96px;animation:bounce-in .65s ease both,float 2.5s ease-in-out .8s infinite;line-height:1;margin-bottom:16px}
    .celeb-title{font-family:var(--font-head);font-weight:900;font-size:22px;color:var(--navy);max-width:400px;line-height:1.25;animation:fade-up .4s .15s ease both;margin-bottom:18px}
    .celeb-stars{display:flex;gap:12px;margin-bottom:18px;width:180px;height:60px;justify-content:center}
    .celeb-completion-anim-slot{position:absolute;inset:0;pointer-events:none;z-index:1}
    .celeb-badge-anim-slot{width:96px;height:96px;margin-bottom:8px}
    .celeb-badge-anim-slot:empty{display:none}
    .celeb-chip{display:flex;align-items:center;gap:6px;background:#EBF9DE;border-radius:999px;padding:8px 16px;margin-bottom:14px;animation:fade-up .4s .5s ease both}
    .celeb-chip span{font-family:var(--font-head);font-weight:800;font-size:13px;color:#2D6B12}
    .celeb-perf{font-size:12px;color:var(--text-muted);margin-bottom:26px;max-width:320px}
    /* ── Talk prompt — an open speaking question, never marked, never scored ── */
    .celeb-talk{width:100%;max-width:360px;background:#fff;border:2px solid #EBF9DE;border-radius:var(--radius);padding:14px 16px;margin:-8px 0 22px;box-shadow:var(--shadow);animation:fade-up .4s .55s ease both;text-align:left}
    .celeb-talk-head{display:flex;align-items:center;gap:6px;font-family:var(--font-head);font-weight:800;font-size:12px;color:#2D6B12;margin-bottom:8px;text-transform:uppercase;letter-spacing:.4px}
    .celeb-talk-row{display:flex;align-items:flex-start;gap:10px}
    .celeb-talk-q{flex:1;font-family:var(--font-head);font-weight:800;font-size:15px;color:var(--navy);line-height:1.35}
    .celeb-talk-ja{font-size:12px;color:var(--text-muted);line-height:1.5;margin-top:6px}
    .celeb-talk-say{flex-shrink:0;width:44px;height:44px;border-radius:50%;background:#EBF9DE;color:#2D6B12;display:flex;align-items:center;justify-content:center}
    .celeb-btns{display:flex;flex-direction:column;gap:12px;width:100%;max-width:280px;animation:fade-up .4s .6s ease both}
    .celeb-btn-secondary{height:50px;background:transparent;border:2px solid var(--navy);border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:var(--font-head);font-weight:800;font-size:14px;color:var(--navy)}
    .celeb-btn-primary{height:50px;background:var(--primary);border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:var(--font-head);font-weight:800;font-size:14px;color:#151515}

    /* Tablet frame adaptation (>=768px), matching the design's native 1024x768 canvas */
    #app:has(.app-shell),#app:has(.reader-screen),#app:has(.quiz-screen),#app:has(.celeb-screen),#app:has(.place-screen){max-width:1024px}
    @media (min-width:768px){
      .app-header{height:56px;padding:0 22px;flex-wrap:nowrap}
      .app-brand{font-size:19px}
      .header-greeting{order:0;flex-basis:auto;flex:1;font-size:15px}
      .header-breadcrumb{order:0;flex-basis:auto;flex:1;font-size:14px}
      .stat-pill{padding:6px 12px}
      .home-dash{padding:22px 24px 20px;gap:20px}
      .home-row1{flex-direction:row;height:190px}
      .continue-card{flex:1.6}
      .goal-card{flex:1}
      .continue-cover{width:170px}
      .continue-cover span{font-size:64px}
      .continue-body{padding:22px 24px}
      .continue-title{font-size:21px}
      .continue-meta{font-size:13px}
      .goal-ring{width:104px;height:104px}
      .goal-ring-inner{width:78px;height:78px}
      .goal-fraction{font-size:19px}
      .ql-grid{grid-template-columns:repeat(3,1fr)}
      .ql-tile{min-height:104px;padding:15px 16px}
      .bottom-nav{height:72px}
      .library-pane{padding:22px}
      .lvl-grid{grid-template-columns:repeat(3,1fr)}
      .lvl-cover{height:118px}
      .lvl-cover span{font-size:52px}
      .sublevel-panel{padding:34px 32px}
      .sublevel-header-icon{width:44px;height:44px;font-size:22px}
      .sublevel-header-name{font-size:19px}
      .sublevel-track-line{left:24px;right:24px}
      .sublevel-nodes{min-width:0}
      .story-grid{grid-template-columns:repeat(5,1fr)}
      .story-cover{height:140px;font-size:52px}
      .reader-header{height:64px;padding:0 14px;flex-wrap:nowrap}
      .reader-content{flex-direction:row}
      .reader-illu{width:52%;height:auto}
      .reader-illu-emoji{font-size:118px}
      .reader-text-area{padding:44px 48px}
      .reader-page-text{font-size:var(--reader-size-lg,26px)}
      .quiz-question-text{font-size:25px}
      /* Landscape: illustration left, question right — same spatial model as the reader,
         and it fills the dead centre column the old centred layout left empty. */
      .quiz-stage{flex-direction:row;align-items:center;gap:30px}
      .quiz-illu{width:40%;max-width:none;height:330px}
      .quiz-question-wrap{flex:1;max-width:none}
      .celeb-btns{flex-direction:row;max-width:460px}
      .flash-pane{padding:22px}
      .word-grid{grid-template-columns:repeat(4,1fr)}
      .bank-grid{grid-template-columns:repeat(6,1fr)}
      .study-top-row,.study-progress-bar,.study-card-wrap,.study-actions{max-width:420px}
      .study-card-wrap{height:280px}
      .complete-btns{flex-direction:row;max-width:340px}
      .progress-pane,.rewards-pane{padding:22px}
      .prog-stats-grid{grid-template-columns:repeat(4,1fr)}
      .badge-grid{grid-template-columns:repeat(4,1fr)}
      .world-pane{padding:24px 28px}
      .dest-grid{grid-template-columns:repeat(3,1fr)}
      .jstory-grid{grid-template-columns:repeat(5,1fr)}
      .profile-pane{padding:22px 24px;flex-direction:row;gap:26px}
      .profile-identity{flex:0 0 26%;flex-direction:column;padding-top:8px}
      .profile-avatar{width:90px;height:90px;font-size:54px}
      .profile-main{flex:1;min-width:0}
    }
  </style>
</head>

<script>

// ── Lottie helper — shared player wired to assets/animations/, honours prefers-reduced-motion
// (checked live via prefersReducedMotion(), defined below, so it always reflects the current OS setting)
function playLottie(container, path, {loop=false, onComplete}={}){
  if(!container) return null;
  container.innerHTML='';
  if(prefersReducedMotion()){ onComplete&&onComplete(); return null; }
  const anim = lottie.loadAnimation({ container, renderer:'svg', loop, autoplay:true, path });
  if(onComplete && !loop) anim.addEventListener('complete', onComplete);
  return anim;
}
// Recolors a shape-layer Lottie's fill/stroke color tokens at runtime (used for badge-unlock, which is shared across all badge colors)
function recolorLottieData(data, hex){
  const rgb = [1,3,5].map((i,n)=>parseInt(hex.slice(i,i+2),16)/255);
  const clone = JSON.parse(JSON.stringify(data));
  (function walk(node){
    if(!node || typeof node!=='object') return;
    if(node.ty==='fl' || node.ty==='st'){ if(node.c && node.c.k) node.c.k=[...rgb,1]; }
    for(const k in node) if(typeof node[k]==='object') walk(node[k]);
  })(clone);
  return clone;
}
function playPageTurn(){
  const slot=document.getElementById('page-turn-anim');
  if(slot) playLottie(slot,'assets/animations/transitions/page-turn.json',{onComplete:()=>{ if(slot.isConnected) slot.innerHTML=''; }});
}

// A badge's check() reads live state, so "earned" is derived, never stored. The dot on the
// Rewards tab means "you earned something you haven't looked at yet" — nothing else.
function earnedBadgeIds(){
  return BADGES.filter(b=>{ try{ return b.check(); }catch(e){ return false; } }).map(b=>b.id);
}
function unseenBadgeCount(){
  const seen=state.seenBadges||[];
  return earnedBadgeIds().filter(id=>!seen.includes(id)).length;
}
function markBadgesSeen(){ state.seenBadges=earnedBadgeIds(); save(); }
function badgeProgress(b){
  const sc=Object.keys(state.progress).length;
  const wc=Object.keys(state.flashCards).length;
  const str=state.streak||0;
  if(b.id==='ten-tales')       return {cur:Math.min(sc,10),tot:10};
  if(b.id==='century-club')    return {cur:Math.min(sc,100),tot:100};
  if(b.id==='quiz-ace')        return {cur:Math.min(state.perfectCount||0,5),tot:5};
  if(b.id==='story-streak')    return {cur:Math.min(storiesCompletedInLastDays(7),3),tot:3};
  if(b.id==='streak-keeper')   return {cur:Math.min(str,7),tot:7};
  if(b.id==='two-week-streak') return {cur:Math.min(str,14),tot:14};
  if(b.id==='monthly-marathon')return {cur:Math.min(str,30),tot:30};
  if(b.id==='word-watcher')    return {cur:Math.min(wc,5),tot:5};
  if(b.id==='word-collector')  return {cur:Math.min(wc,25),tot:25};
  if(b.id==='vocabulary-vault')return {cur:Math.min(wc,50),tot:50};
  if(b.id==='known-master')    return {cur:Math.min(Object.values(state.deckWordStatus).filter(s=>s==='known').length,10),tot:10};
  if(b.levelRef)               return {cur:Math.min(levelDoneCount(b.levelRef.id),10),tot:10};
  return null; // first-leap, skill-star, world-traveler: boolean-only, no partial count
}

  localStorage.setItem('rbt_dws', JSON.stringify(state.deckWordStatus));
  if(state.lastStoryId) localStorage.setItem('rbt_laststory', state.lastStoryId);
}
window.addEventListener('beforeunload', save);
// beforeunload is unreliable on iOS Safari (backgrounding/switching apps doesn't fire it) —
// visibilitychange + pagehide catch those cases so progress isn't lost mid-session.
document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='hidden') save(); });
window.addEventListener('pagehide', save);

function navigate(screen){
  if(screen==='progress') screen='profile'; // Progress merged into Profile; keep old call sites working
  const prevScreen=state.screen; // state.screen is overwritten below — capture before comparing
  if(state.screen==='reader' && screen!=='reader' && typeof speechSynthesis!=='undefined') speechSynthesis.cancel();
  state.screen=screen; state.modalOpen=false; state.audioPlaying=false;
  // Preserve library drill-down context through the reading pipeline so "Back to Library"
  // returns to the exact sublevel the learner came from, not the root level grid.
  if(screen!=='library' && screen!=='reader' && screen!=='quiz' && screen!=='celebration'){ state.libraryLevel=null; state.librarySublevel=null; }
  if(screen!=='world' && screen!=='celebration' && screen!=='reader' && screen!=='quiz'){ state.worldSelectedId=null; }
  if(screen==='rewards') markBadgesSeen(); // must precede render() so the dot clears in the same frame
  // Entering Flashcards from the nav should land on the deck list, not resume a half-finished
  // study session. openDeck()/startStudy() set flashView and render() directly, so they're unaffected.
  if(screen==='flashcards' && prevScreen!=='flashcards') state.flashView='decks';
  render(); window.scrollTo(0,0);
}
function enterFromLanding(){
  localStorage.setItem('rbt_seenSplash','1');

}

function openLibrarySublevel(levelId,sub,locked){ if(locked) return; state.librarySublevel=sub; render(); }
// "View path" belongs on the lily-pad sub-level track, not the stats screen. navigate() clears
// libraryLevel for non-library screens, so set the drill-down after switching.
function viewPath(){

  state.libraryLevel=currentLevelId(); state.librarySublevel=null;
  render();
}
function goLibraryRoot(){ state.libraryLevel=null; state.librarySublevel=null; render(); }
function goLibraryLevel(){ state.librarySublevel=null; render(); }
function openStoryModal(id){ state.modalOpen=true; state.selectedStory=id; render(); }
function closeStoryModal(){ state.modalOpen=false; state.selectedStory=null; render(); }
// Resume on the page the learner left off. Clamped, so a story whose paragraph count
// shrank (content edit) can't strand a saved index past the end.
function resumePage(storyId){
  const story=findStory(storyId);
  if(!story) return 0;
  const saved=state.readingPos[storyId];
  if(!Number.isInteger(saved)) return 0;
  return Math.max(0, Math.min(saved, story.paragraphs.length-1));
}
function startReadingFromModal(){
  state.lastStoryId=state.selectedStory; state.modalOpen=false;
  state.currentPage=resumePage(state.selectedStory); state.audioPlaying=false; state.audioEverPlayed=false;
  navigate('reader');
}
function readAgain(){
  delete state.readingPos[state.lastStoryId]; save();
  state.currentPage=0; state.audioPlaying=false; state.audioEverPlayed=false; navigate('reader');
}
function startReadingDirect(id){ state.lastStoryId=id; state.currentPage=resumePage(id); state.audioPlaying=false; state.audioEverPlayed=false; navigate('reader'); }

// ── READING ──────────────────────────────────────────────
// Stories are always English, regardless of UI language — without an explicit
// lang/voice, a Japanese-locale iPad's default system voice reads them aloud.
function pickEnglishVoice(){
  const voices=speechSynthesis.getVoices();
  return voices.find(v=>v.lang==='en-GB') || voices.find(v=>v.lang&&v.lang.startsWith('en')) || null;
}
function toggleAudio(){
  if(typeof speechSynthesis==='undefined') return;
  if(state.audioPlaying){ speechSynthesis.cancel(); state.audioPlaying=false; render(); return; }
  const story=findStory(state.lastStoryId);
  if(!story) return;
  const utter=new SpeechSynthesisUtterance(story.paragraphs[state.currentPage]);
  utter.lang='en-GB';
  const voice=pickEnglishVoice();
  if(voice) utter.voice=voice;
  utter.onend=()=>{ state.audioPlaying=false; render(); };
  speechSynthesis.cancel(); speechSynthesis.speak(utter);
  state.audioPlaying=true; state.audioEverPlayed=true;
  render();
}
function speakText(text, rate){
  if(typeof speechSynthesis==='undefined'||!text) return;
  speechSynthesis.cancel();
  const utter=new SpeechSynthesisUtterance(text);
  utter.lang='en-GB'; utter.rate=rate||0.9;
  const voice=pickEnglishVoice();
  if(voice) utter.voice=voice;
  speechSynthesis.speak(utter);
}
// Slower than story playback: an isolated word carries no prosodic context, so L2
// learners need the extra time to catch the vowel.
function speakWord(word){ speakText(word, 0.8); }
// Escapes a word for interpolation into an inline onclick="..." JS string literal.
function jsStr(word){ return String(word).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

// Swipe navigation for the reader (iPad landscape) — audit flagged this as missing;
// prev/next buttons stay as the accessible fallback, this just adds the gesture on top.
let readerSwipe=null;
function readerSwipeStart(e){ const t=e.changedTouches[0]; readerSwipe={x:t.clientX,y:t.clientY}; }
function readerSwipeEnd(e){
  if(!readerSwipe) return;
  const t=e.changedTouches[0];
  const dx=t.clientX-readerSwipe.x, dy=t.clientY-readerSwipe.y;
  readerSwipe=null;
  if(Math.abs(dx)<60 || Math.abs(dx)<Math.abs(dy)*1.5) return; // too short, or more vertical (scrolling) than horizontal
  if(dx<0) nextPage(); else prevPage();
}
function nextPage(){
  const story=findStory(state.lastStoryId);
  if(typeof speechSynthesis!=='undefined') speechSynthesis.cancel();
  state.audioPlaying=false; state.wordPopup=null;
  if(state.currentPage < story.paragraphs.length-1){
    state.currentPage++;
    state.readingPos[story.id]=state.currentPage; save();
    render();
    playPageTurn();
  } else {
    state.screen='quiz'; state.quizIndex=0; state.quizAnswered=false;
    state.quizSelected=null; state.quizCorrectCount=0; state.quizStartTime=Date.now();
    state.comboStreak=0;
    render();
  }
}
function prevPage(){
  if(state.currentPage>0){
    state.currentPage--; state.wordPopup=null;
    state.readingPos[state.lastStoryId]=state.currentPage; save();
    render();
    playPageTurn();
  }
}
function exitReading(){
  if(typeof speechSynthesis!=='undefined') speechSynthesis.cancel();
  state.audioPlaying=false;
  navigate(state.worldSelectedId ? 'world' : state.libraryLevel ? 'library' : 'home');
}

// ── QUIZ ─────────────────────────────────────────────────
function selectQuizAnswer(i){
  if(state.quizAnswered) return;
  const story=findStory(state.lastStoryId);
  const q=story.quiz[state.quizIndex];
  const isCorrect=i===q.correct;
  state.quizAnswered=true; state.quizSelected=i;
  if(isCorrect) state.quizCorrectCount++;
  state.comboStreak=isCorrect?(state.comboStreak||0)+1:0;
  render();
  showComboOverlay(isCorrect, state.comboStreak);
}
// The learner advances, not a timer. The old 900ms auto-advance gave an L2 reader no chance
// to see which answer was right, let alone read the question's feedback line.
function advanceQuiz(){
  if(!state.quizAnswered) return;
  const story=findStory(state.lastStoryId);
  if(state.quizIndex < story.quiz.length-1){
    state.quizIndex++; state.quizAnswered=false; state.quizSelected=null;
    render();
  } else {
    state.quizElapsedSec=Math.max(1,Math.round((Date.now()-(state.quizStartTime||Date.now()))/1000));
    finishStory(story);
    state.screen='celebration'; state.quizIndex=0; state.quizAnswered=false; state.quizSelected=null;
    render(); // master render() spawns the confetti for the celebration screen
  }
}
function exitQuiz(){ navigate(state.worldSelectedId ? 'world' : state.libraryLevel ? 'library' : 'home'); }

// ── FLASHCARDS — real deck model: "My Words" auto-deck built from state.flashCards
// (populated by tap-to-save in the reader), plus user-created custom decks that
// pick a subset of those same real saved words. No fabricated word-bank content.
function getDeckList(){
  const myWords={ id:'my-words', title:t('myWords'), subtitle:t('savedWhileReading'), color:'#72C93A', tint:'#EBF9DE', wordIds:Object.keys(state.flashCards) };
  const custom=state.customDecks.map(d=>({...d, subtitle:t('myWords'), color:'#9B72CF', tint:'#F1E8FF'}));
  return [myWords, ...custom];
}
function getDeckById(id){ return getDeckList().find(d=>d.id===id)||null; }
function deckWords(deck){ return deck? deck.wordIds.filter(w=>state.flashCards[w]).map(w=>({id:w, word:w, ...state.flashCards[w]})) : []; }

function goDecks(){ state.flashView='decks'; state.flashFlipped=false; render(); }
function openDeck(id){ state.flashView='grid'; state.selectedDeckId=id; state.flashFlipped=false; render(); }
function openCreateDeck(){ state.flashView='create'; state.createSelectedIds=[]; state.createDeckName=''; render(); }
function setCreateDeckName(v){ state.createDeckName=v; }
function toggleCreateWord(id){
  const has=state.createSelectedIds.includes(id);
  if(has) state.createSelectedIds=state.createSelectedIds.filter(x=>x!==id);
  else if(state.createSelectedIds.length<10) state.createSelectedIds=[...state.createSelectedIds,id];
  // Preserve the deck-name input's focus/caret across the full re-render triggered by tapping a tile.
  // .bank-tile buttons carry onmousedown="event.preventDefault()" so Chromium doesn't steal focus
  // from the input before onclick fires — without that, activeElement shifts to the button first
  // and the guard below is always false on Chromium (Chromebooks, Chrome desktop).
  const input=document.querySelector('.deck-name-input');
  const caret=(input&&document.activeElement===input)?input.selectionStart:null;
  render();
  if(caret!==null){
    const newInput=document.querySelector('.deck-name-input');
    if(newInput){ newInput.focus(); newInput.setSelectionRange(caret,caret); }
  }
}
function saveCustomDeck(){
  if(state.createSelectedIds.length<2) return;
  const deck={ id:`custom-${Date.now()}`, title: state.createDeckName.trim()||t('myWords'), wordIds: state.createSelectedIds };
  state.customDecks=[...state.customDecks, deck];
  save();
  state.flashView='decks';
  render();
}
function startStudy(deckId,queue){
  state.flashView='study'; state.selectedDeckId=deckId; state.studyQueue=queue;
  state.studyIdx=0; state.studyResults={}; state.flashFlipped=false;
  markQuestDone('fc');
  render();
}
function startStudyAll(deckId){ const deck=getDeckById(deckId); startStudy(deckId, deck?deck.wordIds.filter(w=>state.flashCards[w]):[]); }
function startPracticeAgain(deckId){
  const deck=getDeckById(deckId); if(!deck) return;
  const leftover=deck.wordIds.filter(id=>state.deckWordStatus[`${deckId}:${id}`]==='practiceMore');
  startStudy(deckId, leftover.length?leftover:deck.wordIds.filter(w=>state.flashCards[w]));
}
function flipCard(){
  state.flashFlipped=!state.flashFlipped; render();
  const slot=document.getElementById('flashcard-flip-anim');
  if(slot) playLottie(slot,'assets/animations/transitions/flashcard-flip.json',{onComplete:()=>{ if(slot.isConnected) slot.innerHTML=''; }});
}
function answerCard(status){
  const wordId=state.studyQueue[state.studyIdx];
  state.deckWordStatus[`${state.selectedDeckId}:${wordId}`]=status;
  state.studyResults[wordId]=status;
  save();
  const nextIdx=state.studyIdx+1;
  if(nextIdx>=state.studyQueue.length){ state.flashView='complete'; state.flashFlipped=false; }
  else { state.studyIdx=nextIdx; state.flashFlipped=false; }

}

function toggleBadgeTooltip(id){ state.openBadgeTooltip = state.openBadgeTooltip===id ? null : id; render(); }

function openDestination(id){
  const d=DESTINATIONS.find(x=>x.id===id); if(!d) return;
  if(destLocked(d)){ state.worldLockedNoticeId=d.id; render(); setTimeout(()=>{ state.worldLockedNoticeId=null; render(); },2500); return; }
  state.worldSelectedId=d.id; render();
}
function goWorldRoot(){ state.worldSelectedId=null; render(); }

const STREAK_MILESTONES=[7,14,30];
function checkStreakMilestone(n){
  if(STREAK_MILESTONES.includes(n)) setTimeout(()=>showToast(t('streakMilestone',n)),1800);
}
function updateStreak(){
  const today=new Date().toDateString();
  const yesterday=new Date(Date.now()-86400000).toDateString();
  if(state.lastRead===today) return;
  state.streak = state.lastRead===yesterday ? state.streak+1 : 1;
  state.lastRead=today;
  checkStreakMilestone(state.streak);
}
function finishStory(story){
  const accuracyPct=story.quiz.length? Math.round((state.quizCorrectCount/story.quiz.length)*100):0;
  const newScore=accuracyPct/100;
  const prev=state.progress[story.id];
  const prevScore=prev?prev.score:null;
  // Delta rule: first completion earns full XP; replays only award the improvement fraction.
  const baseXP=30+state.quizCorrectCount*10;
  const xpEarned=prevScore===null ? baseXP : Math.round(baseXP*Math.max(0, newScore-prevScore));
  state.progress[story.id]={at:Date.now(), score:Math.max(newScore, prevScore||0)};
  delete state.readingPos[story.id]; // finished — the continue card should move on
  if(xpEarned>0) awardXP(xpEarned);
  state.lastXpEarned=xpEarned;
  updateStreak();
  save();
  calcTodayCount();
  checkStoriesQuest();
  if(accuracyPct===100){ markQuestDone('perfect'); state.perfectCount=(state.perfectCount||0)+1; }
  checkWeekQuests();
}

// ── DATA HELPERS (pure logic, ported verbatim from the live app) ──
function findStory(id){
  for(const lv in STORIES) for(const sl in STORIES[lv]){
    const f=STORIES[lv][sl].find(s=>s.id===id); if(f) return f;
  }
  if(typeof JOURNEY_STORIES!=='undefined') for(const destId in JOURNEY_STORIES){
    const f=JOURNEY_STORIES[destId].find(s=>s.id===id); if(f) return f;
  }
  return null;
}
function storyDone(id){ return !!state.progress[id]; }
function storyStarCount(score){ return score>=0.8?3:score>=0.5?2:1; }
function subLevelDone(lv,sl){
  const stories=STORIES[lv]&&STORIES[lv][sl]||[];
  return stories.length>0 && stories.every(s=>storyDone(s.id));
}
function subLevelAvailable(lv,sl){ return sl===0 || subLevelDone(lv,sl-1); }
function hasStoriesFor(lv,sl){ return !!(STORIES[lv]&&STORIES[lv][sl]&&STORIES[lv][sl].length); }
// Escapes a value for safe interpolation into an HTML attribute (e.g. value="...", onclick='...').
function escAttr(str){ return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Wraps a story's vocabulary words in tappable spans — reused pattern from the live app,
// real data source: each story's own `vocabulary` dict (word -> {def,pos}).
function makeWordTappable(text,vocab){
  const appLevel=currentLevelId();
  return text.split(/(\s+)/).map(part=>{
    const clean=part.replace(/[^a-zA-Z'-]/g,'').toLowerCase();
    if(!clean) return part;
    if(vocab[clean]) return `<span class="tappable-word" onclick="event.stopPropagation();showWordPopup('${clean.replace(/'/g,"\\'")}')">${part}</span>`;
    if(typeof getChallengeLevel==='function'){
      const lvl=getChallengeLevel(clean,appLevel);
      if(lvl) return `<span class="challenge-word">${part}</span>`;
    }
    return part;
  }).join('');
}
function showWordPopup(word){
  state.wordPopup=word;
  // speakWord() cancels any queued utterance, which would silently kill story playback
  // while the header still showed a pause icon — clear the flag before it does.
  state.audioPlaying=false;
  render();
  const slot=document.getElementById('word-highlight-anim');
  if(slot) playLottie(slot,'assets/animations/transitions/word-highlight-reveal.json',{onComplete:()=>{ if(slot.isConnected) slot.innerHTML=''; }});
  speakWord(word); // hearing the word is the point of tapping it
}
function closeWordPopup(){ state.wordPopup=null; render(); }
function addWordToDeck(word){
  const story=findStory(state.lastStoryId);
  const vocab=story&&story.vocabulary&&story.vocabulary[word];
  const ja=typeof JA_TRANSLATIONS!=='undefined'?JA_TRANSLATIONS[word]:null;
  state.flashCards[word]={
    def: vocab?vocab.def:'', pos: vocab?vocab.pos:'',
    translation: ja?ja.w:null, translationDef: ja?ja.d:null,
  };
  save();
  render();
}
function removeWordFromDeck(word){ delete state.flashCards[word]; save(); render(); }
function levelDoneCount(lv){ let c=0; for(let sl=0;sl<10;sl++) if(subLevelDone(lv,sl)) c++; return c; }
function currentLevelId(){
  // What the learner last actually read always wins — real behaviour beats a test result.
  if(state.lastStoryId){const s=findStory(state.lastStoryId); if(s&&s.levelId) return s.levelId;}
  // Otherwise honour the level test. Without this, every new learner starts at Level 1,
  // so a 12-year-old beginner would walk through 75 Pre-A1 stories to reach their own age band.
  if(state.placement && state.placement.level) return state.placement.level;
  for(const lv of LEVELS){ if(levelDoneCount(lv.id)<10) return lv.id; }
  return LEVELS[LEVELS.length-1].id;
}
function getContinueStory(){
  const last=state.lastStoryId?findStory(state.lastStoryId):null;
  if(last && !storyDone(last.id)) return {story:last, isNew:false};
  const lv=currentLevelId();
  for(let sl=0;sl<10;sl++){
    if(!subLevelAvailable(lv,sl)) continue;
    const stories=STORIES[lv]&&STORIES[lv][sl]||[];
    const next=stories.find(s=>!storyDone(s.id));
    if(next) return {story:next, isNew:true};
  }
  return {story:null, isNew:true};
}
function calcTodayCount(){
  const today=new Date().toDateString();
  state.todayCount=Object.values(state.progress).filter(p=>new Date(p.at).toDateString()===today).length;
}
// ── COMBO-STREAK OVERLAY — ported from the live app. Purely cosmetic feedback
// layered on top of the existing answer/advance timing in selectQuizAnswer();
// no fabricated points shown here since v3 only awards real XP once per story.
function showComboOverlay(correct, streak){
  const app=document.getElementById('app');
  const overlay=document.createElement('div');
  overlay.className='combo-overlay';
  const isCombo=correct && streak>=2;
  const multiplier=Math.min(streak,5);
  const label=isCombo?`×${multiplier} ${t('comboLabel')}`:correct?t('correctLabel'):t('wrongLabel');
  const frogEmoji=correct?(streak>=3?'🐸✨':'🐸'):'😔';
  const streakHtml=isCombo?`<div class="combo-streak-line">🔥 ${t('comboStreakLine',streak)}</div>`:'';
  overlay.innerHTML=`
    <div class="combo-inner">
      <span class="combo-frog-em">${frogEmoji}</span>
      <div class="combo-label ${correct?'is-correct':'is-wrong'}">${label}</div>
      ${streakHtml}
    </div>`;
  app.appendChild(overlay);
  setTimeout(()=>{
    const inner=overlay.querySelector('.combo-inner');
    if(inner) inner.classList.add('combo-exit');
    setTimeout(()=>overlay.remove(),220);
  },650);
}
function showToast(msg){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const el=document.createElement('div');
  el.className='toast'; el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>{ el.classList.add('toast-out'); setTimeout(()=>el.remove(),220); },2000);
}

// ── XP MILESTONE CELEBRATIONS — ported from the live app, one-time toasts
// when the player crosses key XP thresholds. All XP awards should go through
// awardXP() rather than mutating state.xp directly, so milestones stay accurate.
const XP_MILESTONES=[
  {xp:100,  key:'xpMilestone100'},
  {xp:500,  key:'xpMilestone500'},
  {xp:1000, key:'xpMilestone1000'},
  {xp:5000, key:'xpMilestone5000'},
];
function checkXPMilestone(prevXP){
  const now=state.xp||0;
  XP_MILESTONES.filter(m=>prevXP<m.xp && now>=m.xp)
    .forEach((m,i)=>setTimeout(()=>showToast(t(m.key)), 3000+i*2600));
}
function awardXP(n){
  const prevXP=state.xp||0;
  state.xp=prevXP+n;
  if(n>0) state._xpFlash=true;
  checkXPMilestone(prevXP);
}

// ── DAILY LOGIN BONUS — ported from the live app. Awards XP once per calendar
// day on first load; bigger bonus at 7/14/30-day streak milestones.
function checkDailyLoginBonus(){
  // The splash isn't "inside the app" yet — awarding XP there spends the day's bonus
  // on a screen the learner may never get past, and toasts over the landing CTAs.
  if(state.screen==='landing') return;
  const today=new Date().toDateString();
  if(localStorage.getItem('rbt_lastlogin')===today) return;
  localStorage.setItem('rbt_lastlogin', today);
  let bonus=10, msgKey='loginBonus', streak=state.streak||0;
  if(streak>=30) bonus=35; else if(streak>=14) bonus=25; else if(streak>=7) bonus=20;
  awardXP(bonus);
  save();
  setTimeout(()=>showToast(streak>=7?t('loginBonusStreak',streak,bonus):t('loginBonus',bonus)),700);
}

// ── DAILY + WEEKLY QUESTS — ported from the live app ──
function getTodayQuests(){
  const key=new Date().toDateString();
  if(!state.questProgress) state.questProgress={};
  if(!state.questProgress[key]) state.questProgress[key]={stories:false,perfect:false,fc:false,bonus:false};
  const keys=Object.keys(state.questProgress);
  if(keys.length>10) keys.sort().slice(0,-10).forEach(k=>delete state.questProgress[k]);
  return state.questProgress[key];
}
function getWeekQuestKey(){
  const d=new Date();
  const day=(d.getDay()+6)%7; // 0=Mon … 6=Sun
  return new Date(d.getTime()-day*86400000).toDateString();
}
function getWeekQuests(){
  const key=getWeekQuestKey();
  if(!state.weekQuestProgress) state.weekQuestProgress={};
  if(!state.weekQuestProgress[key]) state.weekQuestProgress[key]={levels3:false,journey1:false,fc10:false,bonus:false};
  const keys=Object.keys(state.weekQuestProgress);
  if(keys.length>5) keys.sort().slice(0,-5).forEach(k=>delete state.weekQuestProgress[k]);
  return state.weekQuestProgress[key];
}
function markQuestDone(type){
  const q=getTodayQuests();
  if(q[type]) return;
  q[type]=true;
  awardXP(20);
  const names={stories:t('questStories',state.dailyGoal),perfect:t('questPerfect'),fc:t('questFlashcard')};
  save();
  setTimeout(()=>showToast(t('questDoneToast',names[type]||'',20)),400);
  if(!q.bonus && q.stories && q.perfect && q.fc){
    q.bonus=true; awardXP(30); save();
    setTimeout(()=>showToast(t('questAllDoneToast',30)),2800);
  }
}
function markWeekQuestDone(type){
  const q=getWeekQuests();
  if(q[type]) return;
  q[type]=true;
  awardXP(30);
  const names={levels3:t('questLevels3'),journey1:t('questJourney1'),fc10:t('questFc10')};
  save();
  setTimeout(()=>showToast(t('questDoneToast',names[type]||'',30)),400);
  if(!q.bonus && q.levels3 && q.journey1 && q.fc10){
    q.bonus=true; awardXP(50); save();
    setTimeout(()=>showToast(t('questAllDoneToast',50)),2800);
  }
}
function checkStoriesQuest(){
  if(state.todayCount>=state.dailyGoal) markQuestDone('stories');
}
function checkWeekQuests(){

// ══ PLACEMENT TEST ══════════════════════════════════════════
// Items are derived at runtime from the app's own levelled stories — no separate item bank to
// author or keep in sync. This measures readiness for *these* stories, which is what placement
// is actually for. (Oxford's and Cambridge's placement tests are licensed products delivered on
// their own platforms; neither exposes an item API, so an embedded third-party test isn't an option.)
//
//   Levels 1-2  word -> Japanese meaning. Pre-A1/A1 reading is word recognition, and the
//               Japanese gloss covers ~100% of L1-L2 vocabulary.
//   Levels 3-6  cloze from a real story sentence. Needs no Japanese gloss, which matters
//               because L6 gloss coverage is only 36%, and it tests reading in context.
const PLACEMENT_MAX_ITEMS=8;   // 4 blocks of 2 — roughly 3-4 minutes for a child
const PLACEMENT_BLOCK=2;

// Age -> starting level, taken from the LEVELS age bands, then stepped DOWN one.
// Starting below the age prior means a learner meets an easy item first. An older beginner
// who starts at their age band instead fails three blocks in a row before the test finds them.
// The LEVELS age bands overlap at their edges (L2 is 7–9, L3 is 9–11), so take the HIGHEST
// band the age falls in. Taking the first match would send every 9-year-old to Level 1.
function placementAgeBand(age){
  const bands=LEVELS.filter(l=>{
    const [lo,hi]=l.ages.replace('+','-99').split(/[–-]/).map(Number);
    return age>=lo && age<=hi;
  });
  return (bands.length?bands[bands.length-1]:LEVELS[0]).id;
}
function placementStartLevel(age){ return Math.max(1, placementAgeBand(age)-1); }

// Multi-word vocabulary keys ("ground contact time", "anticipatory governance") make absurd
// distractors that a learner can eliminate on shape alone. Single tokens only.
function isSimpleWord(w){ return /^[a-z][a-z'-]{1,}$/.test(w); }

let _placeCache=null;
function placementPool(){
  if(_placeCache) return _placeCache;
  _placeCache={};
  const ja=typeof JA_TRANSLATIONS!=='undefined'?JA_TRANSLATIONS:{};
  for(const lv of [1,2,3,4,5,6]){
    const stories=Object.values(STORIES[lv]||{}).flat();
    const words=new Map(); // word -> pos
    const cloze=[];
    stories.forEach(s=>{
      const vocab=s.vocabulary||{};
      Object.entries(vocab).forEach(([w,v])=>{ if(isSimpleWord(w)) words.set(w,(v&&v.pos)||''); });
      // Don't split after a title or abbreviation — "Mr. Chen" would otherwise yield the
      // fragment "Chen over several months, Sasha helped ______", which reads as broken English.
      s.paragraphs.forEach(p=>p.split(/(?<!\b(?:Mr|Mrs|Ms|Dr|Prof|St|Mt|Jr|Sr|vs|etc|eg|ie)\.)(?<=[.!?])\s+(?=[A-Z"'])/).forEach(sent=>{
        if(sent.length<20||sent.length>170) return;
        if(!/^[A-Z"']/.test(sent)) return; // a fragment, not a sentence
        Object.keys(vocab).forEach(w=>{
          if(!isSimpleWord(w)) return;
          // Require exactly one lower-case, mid-sentence occurrence: blanking a capitalised
          // sentence-initial word leaks the answer, and two blanks would be ambiguous.
          const hits=sent.match(new RegExp(`\\b${w}\\b`,'g'))||[];
          if(hits.length===1 && !new RegExp(`^${w}\\b`,'i').test(sent)){
            cloze.push({sentence:sent, word:w, pos:(vocab[w]&&vocab[w].pos)||''});
          }
        });
      }));
    });
    const all=[...words.entries()].map(([word,pos])=>({word,pos}));
    _placeCache[lv]={
      all,                                  // cloze distractors — a gloss is irrelevant here
      glossed:all.filter(x=>ja[x.word]),    // word->meaning items need a Japanese gloss
      cloze,
    };
  }
  return _placeCache;
}
function pickRandom(arr,n,exclude){
  const pool=arr.filter(x=>!exclude||!exclude(x));
  const out=[];
  while(out.length<n && pool.length) out.push(pool.splice(Math.floor(Math.random()*pool.length),1)[0]);
  return out;
}
function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

// Picks 3 distractors that look plausible next to `target`: same part of speech where possible,
// then the closest in length, so the answer can't be spotted by word shape alone.
function pickDistractors(candidates, target){
  const samePos=candidates.filter(x=>x.word!==target.word && target.pos && x.pos===target.pos);
  const base=samePos.length>=6?samePos:candidates.filter(x=>x.word!==target.word);
  if(base.length<3) return null;
  const near=[...base].sort((a,b)=>
    Math.abs(a.word.length-target.word.length)-Math.abs(b.word.length-target.word.length))
    .slice(0, Math.max(8, Math.min(20, base.length)));
  const picked=pickRandom(near,3);
  return picked.length===3?picked:null;
}

function buildPlacementItem(level){
  const pool=placementPool()[level];
  const ja=typeof JA_TRANSLATIONS!=='undefined'?JA_TRANSLATIONS:{};
  const used=state.placeUsed;
  if(level<=2){
    const [target]=pickRandom(pool.glossed,1,x=>used.includes(x.word));
    if(!target) return null;
    const correct=ja[target.word].w;
    // Dedupe on the Japanese gloss, not the English word: "sunflower" and "sunflowers" both
    // gloss to ひまわり, and two identical options is a broken question.
    const seen=new Set([correct]);
    const cands=pool.glossed.filter(x=>{
      const g=ja[x.word].w;
      if(seen.has(g)) return false;
      seen.add(g); return true;
    });
    const picked=pickDistractors(cands,target);
    if(!picked) return null;
    const options=shuffle([correct,...picked.map(x=>ja[x.word].w)]);
    return {type:'word', level, prompt:target.word, speak:target.word,
            options, correct:options.indexOf(correct), id:target.word};
  }
  const [c]=pickRandom(pool.cloze,1,x=>used.includes(x.word));
  if(!c) return null;
  // Distractors come from `all`, not `glossed` — a cloze option needs no Japanese translation,
  // and at Level 6 only 36% of vocabulary is glossed, which would gut the candidate pool.
  const picked=pickDistractors(pool.all,{word:c.word,pos:c.pos});
  if(!picked) return null;
  const options=shuffle([c.word,...picked.map(x=>x.word)]);
  const blanked=c.sentence.replace(new RegExp(`\\b${c.word}\\b`),'______');
  return {type:'cloze', level, prompt:blanked, speak:blanked.replace('______','blank'),
          options, correct:options.indexOf(c.word), id:c.word};
}

// A child cannot read B2 prose on the strength of vocabulary alone, so the result is capped
// one level above their age band regardless of how the items went.
// Derive the cap from the age band itself. Deriving it from placementStartLevel() would be off
// by one at the bottom, since that clamps to 1 — a 5-year-old's band is 1, not 2.
function capPlacement(level, age){
  return Math.max(1, Math.min(level, placementAgeBand(age)+1, LEVELS.length));
}

function openPlacement(){
  state.placeStep='intro'; state.placeAge=null; state.placeItem=null;
  state.placeBlock=[]; state.placeAsked=0; state.placeUsed=[]; state.placeAnswered=null;
  state.placeMovedUp=false; state.placeMovedDown=false;
  navigate('placement');
}
function exitPlacement(){ navigate('home'); } // a half-finished test is simply discarded

function setPlaceAge(age){
  state.placeAge=age;
  state.placeLevel=placementStartLevel(age);
  state.placeStep='test';
  // Reset the run here rather than relying on openPlacement() having done it — otherwise a
  // second test in the same session inherits the first one's item count and staircase history.
  state.placeBlock=[]; state.placeAsked=0; state.placeUsed=[]; state.placeAnswered=null;
  state.placeMovedUp=false; state.placeMovedDown=false;
  loadPlacementItem();
}
function loadPlacementItem(){
  const item=buildPlacementItem(state.placeLevel);
  if(!item) return finishPlacement(state.placeLevel); // pool exhausted — place where we are
  state.placeItem=item; state.placeUsed.push(item.id); state.placeAnswered=null;
  render();
}
function answerPlacement(i){
  if(state.placeAnswered!==null) return;
  state.placeAnswered=i;
  state.placeBlock.push(i===state.placeItem.correct);
  state.placeAsked++;
  render();
}
// 1-up/1-down staircase over 2-item blocks. Two right: the level is too easy, climb. Two wrong:
// too hard, drop. One right: this is the level. A reversal (climbed then fell, or fell then
// climbed) means we've bracketed them, so stop rather than oscillate.
function advancePlacement(){
  if(state.placeAnswered===null) return;
  const outOfItems=state.placeAsked>=PLACEMENT_MAX_ITEMS;
  if(state.placeBlock.length<PLACEMENT_BLOCK && !outOfItems) return loadPlacementItem();

  const score=state.placeBlock.filter(Boolean).length;
  state.placeBlock=[];
  if(score===PLACEMENT_BLOCK){
    if(state.placeLevel>=LEVELS.length) return finishPlacement(LEVELS.length);
    if(state.placeMovedDown) return finishPlacement(state.placeLevel);
    state.placeMovedUp=true; state.placeLevel++;
  } else if(score===0){
    if(state.placeLevel<=1) return finishPlacement(1);
    if(state.placeMovedUp) return finishPlacement(state.placeLevel-1);
    state.placeMovedDown=true; state.placeLevel--;
  } else {
    return finishPlacement(state.placeLevel); // split block — they belong here
  }
  if(outOfItems) return finishPlacement(state.placeLevel);
  loadPlacementItem();
}
function finishPlacement(level){
  state.placeLevel=capPlacement(level, state.placeAge||7);
  state.placeStep='result';
  render();
}
function choosePlacementLevel(level){ state.placeLevel=level; render(); }
function applyPlacement(){
  state.placement={level:state.placeLevel, age:state.placeAge, at:Date.now()};
  save();
  navigate('home');
}

// Reading type scale, in px: [portrait/narrow, landscape tablet].
// The level sets a ceiling — a C1 page never gets primer-sized type. Page length then pulls
// the size down, because level alone is a poor proxy: Level 1's later sub-levels contain
// 350-character pages that would need internal scrolling at 46px. Sizing on the page that is
// actually on screen keeps every page whole, which matters most for the youngest readers.
const READER_TYPE_CEILING={1:[26,46], 2:[24,40], 3:[21,32], 4:[20,29], 5:[19,27], 6:[18,25]};
const READER_TYPE_BY_LENGTH=[
  {maxChars:60,       sm:26, lg:46},
  {maxChars:120,      sm:24, lg:38},
  {maxChars:200,      sm:22, lg:32},
  {maxChars:320,      sm:20, lg:28},
  {maxChars:450,      sm:19, lg:25},
  {maxChars:Infinity, sm:18, lg:22},
];
// Journey stories have no levelId and sit at A2 -> the level-3 ceiling.
function readerTypeScale(levelId, pageText){
  const ceiling=READER_TYPE_CEILING[levelId] || READER_TYPE_CEILING[3];
  const tier=READER_TYPE_BY_LENGTH.find(t=>(pageText||'').length<=t.maxChars);
  return [Math.min(ceiling[0],tier.sm), Math.min(ceiling[1],tier.lg)];
}
