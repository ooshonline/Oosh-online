<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ribbit — OOSH ESL Reading</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600;700&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>@font-face{font-family:'Etna Sans Serif';font-display:swap}@font-face{font-family:'Glacial Indifference';font-display:swap}</style>
  <style>
    :root {
      --primary:#bada55; --primary-dark:#8fb832; --primary-light:#f0f7d0;
      --primary-mid:#d4ec96; --accent:#f9ad3b; --accent-light:#fef3d6;
      --accent-dark:#d4831a; --red:#E05C5C; --red-light:#FDEAEA;
      --bg:#f8faf8; --card:#FFFFFF; --text:#151515; --text-muted:#5e6648;
      --text-light:#9aaa72; --border:#deeab8;
      --shadow-sm:0 1px 4px rgba(143,184,50,.1);
      --shadow:0 4px 20px rgba(143,184,50,.16);
      --shadow-lg:0 8px 40px rgba(143,184,50,.22);
      --radius-sm:10px; --radius:16px; --radius-lg:24px;
      --font-head:'Etna Sans Serif','Josefin Sans',sans-serif;
      --font-body:'Glacial Indifference','Nunito',sans-serif;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
    h1,h2,h3,h4{font-family:var(--font-head)}
    button{font-family:var(--font-body);cursor:pointer;border:none;outline:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
    #app{max-width:520px;margin:0 auto;min-height:100vh;position:relative;overflow-x:hidden}
    .screen{animation:fadeSlideIn .3s ease both}
    @keyframes fadeSlideIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

    /* LANDING / SPLASH */
    .landing-screen{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 28px 40px;background:linear-gradient(175deg,#0d1f0e 0%,#1a3020 55%,#0c1a12 100%);overflow:hidden;text-align:center}
    .landing-screen::before,.landing-screen::after{content:'';position:absolute;border-radius:50%;background:var(--primary);opacity:.06;pointer-events:none}
    .landing-screen::before{width:340px;height:340px;top:-120px;left:-100px}
    .landing-screen::after{width:260px;height:260px;bottom:-90px;right:-80px}
    .landing-lang-pill{position:absolute;top:18px;right:18px;display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#dfe9c9;font-size:.78rem;font-weight:700;border-radius:99px;padding:8px 14px;z-index:2}
    .landing-content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;width:100%;max-width:340px}
    .landing-frog{width:130px;height:130px;margin-bottom:18px;filter:drop-shadow(0 12px 28px rgba(0,0,0,.4));animation:float 3s ease-in-out infinite}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
    .landing-title{font-family:var(--font-head);font-size:3.4rem;color:var(--primary);letter-spacing:-1px;line-height:1}
    .landing-tagline{font-size:1.05rem;color:#e7f0d4;margin-top:12px;font-weight:600}
    .landing-subtag{font-size:.82rem;color:#9fb285;margin-top:6px}
    .landing-ctas{width:100%;margin-top:36px;display:flex;flex-direction:column;gap:12px}
    .landing-cta-primary{height:56px;width:100%;background:var(--accent);color:#151515;border-radius:var(--radius);font-size:1.05rem;font-weight:800;box-shadow:0 8px 24px rgba(249,173,59,.35);transition:transform .15s,box-shadow .15s}
    .landing-cta-primary:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(249,173,59,.42)}
    .landing-cta-secondary{height:50px;width:100%;background:transparent;color:var(--primary);border-radius:var(--radius);font-size:.98rem;font-weight:700;border:2px solid rgba(186,218,85,.5);transition:background .2s,border-color .2s}
    .landing-cta-secondary:hover{background:rgba(186,218,85,.08);border-color:var(--primary)}
    .landing-footer{position:relative;z-index:1;margin-top:28px;font-size:.7rem;color:#6f8458;letter-spacing:.04em}

    /* NAV BAR */
    .nav-bar{display:flex;align-items:center;gap:12px;padding:16px 20px 12px;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
    .nav-bar h2{font-size:1.1rem;color:var(--text);flex:1}
    .back-btn{width:44px;height:44px;border-radius:50%;background:var(--primary-light);color:var(--primary-dark);font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:background .2s}
    .back-btn:hover{background:var(--primary-mid)}

    /* HOME */
    .home-screen{display:flex;flex-direction:column;align-items:center;padding:40px 20px 32px;min-height:100vh;background:linear-gradient(160deg,#f0f7d0 0%,#f8faf0 50%,#fef3d6 100%)}
    .logo-block{text-align:center;margin-bottom:32px}
    .frog-logo{width:96px;height:96px;margin:0 auto 14px;filter:drop-shadow(0 8px 24px rgba(143,184,50,.25))}
    .logo-block h1{font-size:2.8rem;color:var(--primary-dark);letter-spacing:-1px;line-height:1}
    .logo-block p{font-size:1rem;color:var(--text-muted);margin-top:6px}
    .streak-badge{display:inline-flex;align-items:center;gap:6px;background:var(--accent-light);color:var(--accent-dark);font-weight:700;font-size:.9rem;border-radius:99px;padding:8px 18px;margin-bottom:24px;border:1px solid #f9ad3b}
    .home-stats{display:flex;gap:12px;margin-bottom:24px;width:100%}
    .home-stat-card{flex:1;background:var(--card);border-radius:var(--radius);padding:16px;text-align:center;box-shadow:var(--shadow-sm);border:1px solid var(--border)}
    .home-stat-card .big{font-size:2rem;font-weight:800;color:var(--primary-dark);line-height:1;font-family:var(--font-head)}
    .home-stat-card .label{font-size:.78rem;color:var(--text-muted);margin-top:4px}
    .xp-wrap{width:100%;margin-bottom:24px}
    .xp-meta{display:flex;justify-content:space-between;margin-bottom:6px;font-size:.8rem;color:var(--text-muted)}
    .xp-bar-wrap{height:8px;background:var(--primary-light);border-radius:99px;overflow:hidden}
    .xp-bar-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:99px;transition:width .6s ease}
    .home-cta{width:100%;padding:18px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:var(--text);border-radius:var(--radius);font-size:1.1rem;font-weight:700;box-shadow:0 6px 24px rgba(143,184,50,.35);transition:transform .15s,box-shadow .15s;margin-bottom:12px}
    .home-cta:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(143,184,50,.4)}
    .home-secondary{width:100%;padding:14px;background:var(--card);color:var(--primary-dark);border-radius:var(--radius);font-size:1rem;font-weight:600;border:2px solid var(--border);transition:border-color .2s,background .2s}
    .home-secondary:hover{border-color:var(--primary);background:var(--primary-light)}

    /* POND MAP HOME */
    .pond-screen{display:flex;flex-direction:column;min-height:100vh;background:#eef7e8}
    .pond-header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 6px;gap:10px}
    .pond-header .ph-title{font-family:var(--font-head);font-size:1.2rem;color:var(--primary-dark);line-height:1.2}
    .pond-header .ph-sub{font-size:.78rem;color:var(--text-muted);margin-top:2px}
    .pond-level-btn{background:none;border:none;text-align:left;padding:0;cursor:pointer}
    .pond-level-btn .ph-change{font-size:.72rem;color:var(--accent-dark);font-weight:700;margin-top:2px;display:inline-block}
    .pond-chips{display:flex;gap:8px;flex-shrink:0;align-items:center}
    .pond-chip{display:inline-flex;align-items:center;gap:5px;background:var(--accent-light);color:var(--accent-dark);font-weight:700;font-size:.8rem;border-radius:99px;padding:6px 12px;border:1px solid #f9ad3b}
    .pond-chip.goal-done{background:var(--primary-light);color:var(--primary-dark);border-color:var(--primary)}
    .frog-bubble{display:flex;align-items:flex-end;gap:10px;padding:8px 20px 0}
    .frog-bubble img{width:52px;height:52px;flex-shrink:0;filter:drop-shadow(0 4px 12px rgba(143,184,50,.3))}
    .frog-bubble .fb-text{background:var(--card);border:1.5px solid var(--border);border-radius:16px 16px 16px 4px;padding:10px 14px;font-size:.88rem;color:var(--text);line-height:1.5;animation:fadeSlideIn .4s ease both}
    .pond-map-wrap{flex:1;padding:4px 0 8px;display:flex;justify-content:center}
    .pond-map{width:100%;max-width:380px;display:block}
    .pad-group{cursor:pointer}
    .pad-group.locked{cursor:default}
    .pad-group circle.pad{transition:transform .15s}
    .pad-group.current circle.pad{animation:glow-pulse-pad 2s ease-in-out infinite}
    .pulse-ring{pointer-events:none;transform-box:fill-box;transform-origin:center;animation:pulse-ring 1.8s ease-out infinite}
    .pulse-ring-2{animation-delay:.6s}
    @keyframes pulse-ring{0%{transform:scale(1);opacity:.7}100%{transform:scale(1.7);opacity:0}}
    @keyframes glow-pulse-pad{0%,100%{filter:drop-shadow(0 0 3px rgba(249,173,59,.5))}50%{filter:drop-shadow(0 0 9px rgba(249,173,59,.2))}}
    .pond-cta-wrap{position:sticky;bottom:64px;padding:10px 20px 14px;background:linear-gradient(to top,rgba(238,247,232,.95),rgba(238,247,232,0));z-index:150}
    .pond-cta{width:100%;padding:17px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:var(--text);border-radius:var(--radius);font-size:1.05rem;font-weight:800;box-shadow:0 6px 24px rgba(143,184,50,.35);transition:transform .15s}
    .pond-cta:hover{transform:translateY(-2px)}

    /* LEVEL SELECT */
    .levels-grid{padding:16px;display:flex;flex-direction:column;gap:12px;padding-bottom:32px}
    .level-card{background:var(--card);border-radius:var(--radius);padding:18px 20px;border:2px solid var(--border);cursor:pointer;transition:border-color .2s,box-shadow .2s,transform .15s;display:flex;align-items:center;gap:16px;position:relative;overflow:hidden}
    .level-card:hover{border-color:var(--primary);box-shadow:var(--shadow);transform:translateY(-2px)}
    .level-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:5px;border-radius:0 3px 3px 0}
    .level-card[data-lv="1"]::before{background:#d4ec96}
    .level-card[data-lv="2"]::before{background:#bada55}
    .level-card[data-lv="3"]::before{background:#8fb832}
    .level-card[data-lv="4"]::before{background:#f9ad3b}
    .level-card[data-lv="5"]::before{background:#d4831a}
    .level-card[data-lv="6"]::before{background:#151515}
    .level-num{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:800;font-family:var(--font-head);flex-shrink:0}
    .level-card[data-lv="1"] .level-num{background:#f0f7d0;color:#6b8a1e}
    .level-card[data-lv="2"] .level-num{background:#e4f3a8;color:#6b8a1e}
    .level-card[data-lv="3"] .level-num{background:#d4ec96;color:#5a7218}
    .level-card[data-lv="4"] .level-num{background:#fef3d6;color:#d4831a}
    .level-card[data-lv="5"] .level-num{background:#fde8c0;color:#a0580e}
    .level-card[data-lv="6"] .level-num{background:#e8e8e8;color:#151515}
    .level-info{flex:1}
    .level-info h3{font-size:1.05rem;margin-bottom:2px}
    .level-meta{font-size:.78rem;color:var(--text-muted);margin-bottom:6px}
    .tag{font-size:.72rem;font-weight:600;padding:2px 8px;border-radius:99px}
    .tag-green{background:var(--primary-light);color:var(--primary-dark)}
    .tag-amber{background:var(--accent-light);color:var(--accent-dark)}
    .tag-red{background:var(--red-light);color:#A03030}
    .level-progress{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
    .level-stars{font-size:.9rem}
    .level-count{font-size:.75rem;color:var(--text-muted)}
    .level-card-complete{border-color:#f9ad3b;background:linear-gradient(135deg,var(--card),#fef9ec)}
    .level-card-complete:hover{border-color:#d4831a;box-shadow:0 4px 20px rgba(249,173,59,.2)}
    .level-badge{display:inline-flex;align-items:center;gap:4px;font-size:.72rem;font-weight:700;color:#7a4800;background:#fef3d6;border:1px solid #f9ad3b;border-radius:99px;padding:2px 8px;margin-top:4px}

    /* SUB-LEVEL SELECT */
    .sublevel-hero{padding:20px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:var(--text)}
    .sublevel-hero h2{font-size:1.3rem;margin-bottom:4px}
    .sublevel-hero p{font-size:.85rem;opacity:.85}
    .sublevel-hero .badges{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
    .hero-badge{font-size:.75rem;font-weight:600;background:rgba(255,255,255,.35);color:var(--text);padding:3px 10px;border-radius:99px;border:1px solid rgba(255,255,255,.45)}
    .sublevels-grid{padding:16px;display:grid;grid-template-columns:1fr 1fr;gap:10px;padding-bottom:32px}
    .sublevel-card{background:var(--card);border-radius:var(--radius);padding:14px;border:2px solid var(--border);cursor:pointer;transition:border-color .2s,box-shadow .2s,transform .15s;text-align:center}
    .sublevel-card:hover{border-color:var(--primary);box-shadow:var(--shadow);transform:translateY(-2px)}
    .sublevel-card.complete{border-color:var(--primary-mid);background:var(--primary-light)}
    .sublevel-card .sl-num{font-size:1.6rem;font-weight:900;color:var(--primary-dark);font-family:var(--font-head);line-height:1;margin-bottom:4px}
    .sublevel-card .sl-label{font-size:.82rem;color:var(--text);font-weight:600;margin-bottom:6px}
    .sublevel-card .sl-meta{font-size:.72rem;color:var(--text-muted)}
    .sublevel-card .sl-stars{font-size:.85rem;margin-top:4px}

    /* STORY BROWSER */
    .stories-list{padding:12px 16px;display:flex;flex-direction:column;gap:12px;padding-bottom:32px}
    .story-card{background:var(--card);border-radius:var(--radius);padding:16px;border:1px solid var(--border);cursor:pointer;transition:box-shadow .2s,transform .15s,border-color .2s;display:flex;gap:14px;align-items:flex-start}
    .story-card:hover{box-shadow:var(--shadow);transform:translateY(-2px);border-color:var(--primary-mid)}
    .story-card.done{border-color:var(--primary-mid)}
    .story-emoji{font-size:2.2rem;line-height:1;flex-shrink:0;margin-top:2px}
    .story-info{flex:1}
    .story-info h3{font-size:1rem;margin-bottom:4px}
    .story-info p{font-size:.82rem;color:var(--text-muted);margin-bottom:8px;line-height:1.5}
    .story-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .meta-chip{font-size:.75rem;color:var(--text-muted)}
    .story-action{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:8px}
    .read-btn{padding:8px 18px;background:var(--primary);color:var(--text);border-radius:99px;font-size:.85rem;font-weight:700;transition:background .2s}
    .read-btn:hover{background:var(--primary-dark)}
    .done-badge{font-size:.75rem;color:var(--primary);font-weight:700}

    /* READER */
    .reader-screen{padding-bottom:140px}
    .reader-prog-bar{height:4px;background:var(--primary-light)}
    .reader-prog-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));transition:width .4s ease}
    .reader-time-est{text-align:right;font-size:.68rem;font-weight:700;color:var(--text-muted);padding:4px 14px 0;background:var(--card)}
    .reader-header{padding:12px 20px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
    .reader-header h3{font-size:1rem;flex:1;text-align:center;padding:0 8px}
    .icon-btn{width:44px;height:44px;border-radius:50%;background:var(--primary-light);color:var(--primary-dark);display:flex;align-items:center;justify-content:center;font-size:1rem;transition:background .2s}
    .icon-btn:hover{background:var(--primary-mid)}
    .reader-story-meta{padding:16px 24px 8px;display:flex;gap:10px;flex-wrap:wrap}
    .meta-pill{display:flex;align-items:center;gap:5px;font-size:.78rem;color:var(--text-muted);background:var(--primary-light);padding:4px 12px;border-radius:99px}
    .reader-body{padding:8px 24px 24px}
    .reader-body p{font-size:1.18rem;line-height:1.75;letter-spacing:.01em;color:var(--text);margin-bottom:1.2em}
    .level-early .reader-body p{font-size:1.3rem;line-height:1.9;letter-spacing:.015em}
    .reader-body .tappable{border-bottom:2px solid var(--primary);background:var(--primary-light);padding:0 2px;border-radius:3px;color:var(--primary-dark)}
    .tappable{display:inline;border-bottom:1.5px dotted var(--primary-mid);cursor:pointer;border-radius:2px;transition:background .15s,color .15s}
    .tappable:hover{background:var(--primary-light);color:var(--primary-dark)}
    .tappable.hl{background:var(--accent-light);color:var(--accent-dark);border-bottom-color:var(--accent)}
    /* Vocab highlight mode — story vocabulary (green) */
    .tappable-hl{background:#d4ec96;color:var(--primary-dark);border-bottom:2px solid var(--primary);padding:0 2px;border-radius:3px}
    .tappable-hl:hover{background:var(--primary-light)}
    .tappable-hl.hl{background:var(--accent-light);color:var(--accent-dark);border-bottom-color:var(--accent)}
    /* Above-level words from CEFR word lists (blue) */
    .tappable-challenge{background:#EFF6FF;color:#1D4ED8;border-bottom:2px solid #93C5FD;padding:0 2px;border-radius:3px;cursor:pointer}
    .tappable-challenge:hover{background:#DBEAFE}
    .tappable-challenge.hl{background:#DBEAFE;color:#1E40AF}
    /* Level badge in popup */
    .wp-level-badge{font-size:.72rem;font-weight:800;background:#EFF6FF;color:#1D4ED8;border:1px solid #93C5FD;padding:2px 8px;border-radius:99px;margin-left:8px}
    .wp-challenge-note{font-size:.82rem;color:#1D4ED8;background:#EFF6FF;border-radius:8px;padding:8px 10px;margin-bottom:10px;border:1px solid #BFDBFE}
    .vocab-section{margin:8px 0 24px;padding:16px;background:var(--primary-light);border-radius:var(--radius);border:1px solid var(--primary-mid)}
    .vocab-section h4{font-size:.82rem;color:var(--primary-dark);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
    .vocab-chips{display:flex;flex-wrap:wrap;gap:8px}
    .vocab-chip{padding:4px 12px;background:var(--card);border:1px solid var(--primary-mid);color:var(--primary-dark);border-radius:99px;font-size:.82rem;font-weight:600;cursor:pointer;transition:background .2s,color .2s}
    .vocab-chip:hover{background:var(--primary-mid);color:var(--text)}
    .reader-bottom{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;background:var(--card);border-top:1px solid var(--border);padding:12px 20px 20px;z-index:100}
    .finish-btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:var(--text);border-radius:var(--radius);font-size:1rem;font-weight:700;box-shadow:0 4px 16px rgba(143,184,50,.3);transition:transform .15s,box-shadow .15s}
    .finish-btn:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(143,184,50,.4)}
    .step-counter{text-align:center;font-size:.8rem;color:var(--text-muted);margin-bottom:6px;font-family:'Glacial Indifference',sans-serif}
    .step-dots{display:flex;justify-content:center;gap:6px;margin-bottom:10px}
    .sdot{width:8px;height:8px;border-radius:50%;background:var(--primary-light);transition:background .3s,transform .3s}
    .sdot.done{background:var(--primary)}
    .sdot.cur{background:var(--primary-dark);transform:scale(1.25)}
    .reader-back-link{display:block;margin:8px auto 0;background:none;border:none;color:var(--text-muted);font-size:.85rem;font-weight:600;padding:6px 16px}
    .reader-back-link:hover{color:var(--primary-dark)}
    .step-new{animation:stepIn .4s ease both}
    @keyframes stepIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .reader-sentence{padding:4px 0}
    .story-image-wrap{width:100%;max-width:320px;margin:0 auto 18px;aspect-ratio:1/1;border-radius:var(--radius);overflow:hidden;background:var(--primary-light)}
    .story-image-wrap img{width:100%;height:100%;object-fit:cover;display:block}
    .story-image-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:3rem;opacity:.4}

    /* WORD POPUP */
    .word-popup{position:fixed;bottom:120px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:488px;background:#151515;border-radius:16px;box-shadow:0 8px 24px rgba(0,0,0,.35);padding:14px 18px;z-index:200;animation:popIn .25s cubic-bezier(.34,1.56,.64,1) both}
    @keyframes popIn{from{opacity:0;transform:translateX(-50%) translateY(20px) scale(.95)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}
    .word-popup.hiding{animation:popOut .2s ease both}
    @keyframes popOut{to{opacity:0;transform:translateX(-50%) translateY(12px)}}
    .wp-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .wp-word{font-size:1.15rem;font-weight:900;color:#fff;font-family:var(--font-head)}
    .wp-pos{font-size:.65rem;color:#151515;background:#bada55;padding:3px 8px;border-radius:8px;font-weight:800;margin-left:8px;text-transform:uppercase;letter-spacing:.04em}
    .wp-close{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.12);color:rgba(255,255,255,.7);font-size:.9rem;display:flex;align-items:center;justify-content:center}
    .wp-ja-word{display:block;font-size:1.25rem;font-weight:800;color:#bada55;font-family:var(--font-head);margin-top:2px}
    .wp-ja-def{font-size:1rem;font-weight:700;color:#d4ec96;font-family:var(--font-head);line-height:1.4;margin-bottom:8px}
    .wp-def{font-size:.95rem;color:rgba(255,255,255,.8);line-height:1.5;margin-bottom:8px}
    .wp-section-label{font-size:.68rem;font-weight:700;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;margin-top:10px}
    .wp-native-def{font-size:1.25rem;font-weight:800;color:#bada55;font-family:var(--font-head);line-height:1.4;margin-bottom:4px;min-height:0}
    .wp-example{font-size:.78rem;color:rgba(255,255,255,.6);line-height:1.5;font-style:italic;margin-bottom:8px;background:rgba(255,255,255,.06);border-radius:8px;padding:8px 10px}
    .wp-translation{min-height:22px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
    .wp-tl-loading{font-size:.78rem;color:rgba(255,255,255,.4);font-style:italic}
    .wp-tl-lang{font-size:.68rem;font-weight:700;background:rgba(186,218,85,.18);color:#bada55;padding:2px 6px;border-radius:99px}
    .wp-tl-text{font-size:1rem;font-weight:700;color:#bada55;font-family:var(--font-head)}
    .wp-actions{display:flex;flex-direction:column;gap:8px}
    .wp-translate-btn{width:100%;padding:10px 14px;border-radius:var(--radius);font-size:.85rem;font-weight:700;background:rgba(249,173,59,.14);color:#f9ad3b;border:1px solid rgba(249,173,59,.3);transition:background .2s,color .2s;text-align:center}
    .wp-translate-btn:hover{background:rgba(249,173,59,.26)}
    .wp-translate-btn:disabled{opacity:.6;cursor:default}
    .wp-fc-btn{width:100%;padding:10px 14px;border-radius:var(--radius);font-size:.85rem;font-weight:700;background:rgba(186,218,85,.16);color:#bada55;transition:background .2s,color .2s;text-align:center}
    .wp-fc-btn:hover{background:#bada55;color:#151515}
    .wp-fc-btn.in-deck{background:#bada55;color:#151515}
    .wp-save{display:flex;align-items:center;gap:6px;font-size:.82rem;color:#bada55;font-weight:700;background:none;padding:0;transition:color .2s}
    .wp-save:hover{color:#d4ec96}
    .wp-save.saved{color:#f9ad3b}

    /* QUIZ */
    .quiz-progress{padding:12px 20px;display:flex;align-items:center;gap:12px}
    .combo-pill{display:flex;align-items:center;gap:4px;margin-left:auto;background:#fff3e0;border-radius:20px;padding:6px 12px;font-family:var(--font-head);font-weight:900;font-size:.8rem;color:#f9ad3b;opacity:0;transform:scale(.85);transition:opacity .2s,transform .2s;white-space:nowrap}
    .combo-pill.show{opacity:1;transform:scale(1)}
    .q-label{font-size:.82rem;color:var(--text-muted);font-weight:600;white-space:nowrap}
    .q-dots{display:flex;gap:6px}
    .q-dot{width:10px;height:10px;border-radius:50%;background:var(--border);transition:background .3s}
    .q-dot.cur{background:var(--primary);transform:scale(1.2)}
    .q-dot.ok{background:var(--primary)}
    .q-dot.bad{background:var(--accent)}
    .quiz-body{padding:8px 20px 20px}
    .quiz-qnum{font-size:.78rem;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
    .quiz-question{font-size:1.2rem;color:var(--text);line-height:1.5;margin-bottom:24px;font-family:var(--font-head)}
    .quiz-options{display:flex;flex-direction:column;gap:16px}
    .q-opt{padding:18px 18px;background:var(--card);border:2px solid var(--border);border-radius:var(--radius);font-size:.95rem;text-align:left;cursor:pointer;transition:border-color .2s,background .2s;display:flex;align-items:center;gap:12px}
    .q-opt:hover:not(:disabled){border-color:var(--primary);background:var(--primary-light)}
    .q-opt:disabled{cursor:default}
    .q-opt.ok{border-color:var(--primary);background:var(--primary-light);color:var(--primary-dark);font-weight:700}
    .q-opt.bad{border-color:var(--accent);background:var(--accent-light);color:#7a4800}
    .opt-letter{width:28px;height:28px;border-radius:50%;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;flex-shrink:0}
    .q-opt.ok .opt-letter{background:var(--primary);border-color:var(--primary);color:#151515}
    .q-opt.bad .opt-letter{background:var(--accent);border-color:var(--accent);color:#151515}
    .quiz-fb{margin-top:16px;padding:14px 16px;border-radius:var(--radius-sm);font-size:.9rem;line-height:1.5;animation:fadeSlideIn .25s ease both;display:none}
    .quiz-fb.ok{background:var(--primary-light);color:var(--primary-dark);border:1px solid var(--primary-mid)}
    .quiz-fb.bad{background:var(--accent-light);color:#7a4800;border:1px solid #f9ad3b}
    .quiz-fitb-wrap{display:flex;gap:8px;margin-top:12px}
    .quiz-fitb-input{flex:1;padding:12px;border:2px solid var(--border);border-radius:var(--radius);font-size:1rem;font-family:var(--font-body);outline:none}
    .quiz-fitb-input:focus{border-color:var(--primary)}
    .type-slots-wrap{margin-top:12px}
    .type-slots{display:flex;flex-wrap:wrap;gap:8px;cursor:text}
    .type-slot{width:48px;height:56px;border:2px solid var(--primary);border-radius:14px;box-shadow:0 3px 10px rgba(186,218,85,.3);display:flex;align-items:center;justify-content:center;font-family:var(--font-body);font-weight:900;font-size:1.5rem;color:#151515;background:var(--card);transition:border-color .15s,box-shadow .15s}
    .type-slot.cursor{border-style:solid;border-bottom:3px solid var(--primary)}
    .type-slot.filled{border-color:var(--primary-dark)}
    .type-slots.slots-ok .type-slot{border-color:var(--primary-dark);background:var(--primary-light)}
    .type-slots.slots-bad .type-slot{border-color:#e05656;background:rgba(224,86,86,.1)}
    .type-hint{margin-top:8px;font-size:.75rem;font-weight:700;color:var(--primary-dark)}
    .type-hidden-input{position:absolute;opacity:0;height:1px;width:1px;pointer-events:none}
    .dnd-bank{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
    .dnd-tile{padding:10px 14px;background:var(--card);border:2px solid var(--border);border-radius:var(--radius);font-size:.95rem;cursor:grab;font-family:var(--font-body);transition:border-color .15s,background .15s}
    .dnd-tile.sel{border-color:var(--primary);background:rgba(186,218,85,.25)}
    .dnd-tile.placed{cursor:pointer;background:rgba(186,218,85,.15)}
    .dnd-tile:disabled{opacity:.6;cursor:default}
    .dnd-zone{min-height:52px;border:2px dashed var(--border);border-radius:var(--radius);padding:8px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:12px}
    .dnd-hint{color:var(--text-muted);font-size:.85rem}
    .dnd-blank-zone{display:inline-block;min-width:90px;border-bottom:2px dashed var(--primary);text-align:center;padding:0 6px}
    .dnd-blank-zone.ok{color:var(--primary);border-color:var(--primary);font-weight:bold}
    .dnd-blank-zone.bad{color:#e05656;border-color:#e05656;font-weight:bold}
    .dnd-slot{border:2px dashed var(--border);border-radius:var(--radius);padding:8px 12px;min-width:84px;text-align:center;font-size:.9rem;cursor:pointer}
    .dnd-slot.filled{border-style:solid}
    .dnd-slot.ok{border-color:var(--primary);background:rgba(186,218,85,.15)}
    .dnd-slot.bad{border-color:#e05656;background:rgba(224,86,86,.1)}
    .dnd-match-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
    .dnd-match-def{flex:1;font-size:.9rem;color:var(--text)}
    .dnd-check-btn{margin-top:14px;padding:12px 22px;background:var(--primary);border:none;border-radius:var(--radius);font-weight:bold;cursor:pointer;font-family:var(--font-body)}
    .dnd-check-btn:disabled{opacity:.4;cursor:default}
    .quiz-fitb-btn{padding:12px 18px;background:var(--primary);color:var(--text);border-radius:var(--radius);font-weight:700;white-space:nowrap}
    .quiz-next{margin-top:20px;width:100%;padding:15px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:var(--text);border-radius:var(--radius);font-size:1rem;font-weight:700;box-shadow:0 4px 16px rgba(143,184,50,.25);transition:transform .15s;display:none}
    .quiz-next.vis{display:block}
    .quiz-next:hover{transform:translateY(-1px)}

    /* RESULTS */
    .results-screen{padding:16px 16px 12px;display:flex;flex-direction:column;align-items:center;text-align:center;min-height:100dvh;max-height:100dvh;overflow-y:auto;box-sizing:border-box;background:linear-gradient(160deg,var(--primary-light) 0%,var(--bg) 60%)}
    .res-emoji{font-size:3rem;line-height:1;margin-bottom:6px;display:block;animation:bounceIn .6s cubic-bezier(.34,1.56,.64,1) both}
    @keyframes bounceIn{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
    @keyframes stampDrop{from{opacity:0;transform:scale(2) rotate(-15deg)}to{opacity:1;transform:scale(1) rotate(0deg)}}
    .results-screen h2{font-size:1.4rem;color:var(--primary-dark);margin-bottom:2px}
    .res-score{font-size:2.4rem;font-weight:900;color:var(--primary);font-family:var(--font-head);margin:4px 0}
    .res-card .rc-icon{font-size:.95rem;margin-bottom:1px}
    .res-card .rc-val{font-size:1rem;font-weight:800;color:var(--text);font-family:var(--font-head)}
    .res-card .rc-label{font-size:.6rem;color:var(--text-muted);margin-top:1px}
    .res-continue{width:100%;padding:13px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:var(--text);border-radius:var(--radius);font-size:1rem;font-weight:700;box-shadow:0 4px 20px rgba(143,184,50,.3);margin-bottom:8px;transition:transform .15s}
    .res-continue:hover{transform:translateY(-2px)}
    .res-again{width:100%;padding:11px;background:var(--card);color:var(--primary-dark);border-radius:var(--radius);font-size:.9rem;font-weight:600;border:2px solid var(--border);transition:border-color .2s;margin-bottom:6px}
    .res-again:hover{border-color:var(--primary)}
    .res-reread{width:100%;padding:10px;background:none;color:var(--text-muted);border-radius:var(--radius);font-size:.84rem;font-weight:600;border:1px solid var(--border)}
    .sublevel-unlock{background:linear-gradient(135deg,#fef3d6,#fde8b0);border:1px solid #f9ad3b;border-radius:var(--radius);padding:12px 16px;text-align:center;font-weight:700;color:#7a4800;margin:12px 0;font-size:.9rem;animation:stepIn .4s ease both}

    /* WORDLIST */
    .wl-empty{text-align:center;padding:48px 20px;color:var(--text-muted)}
    .wl-empty .we-icon{font-size:3rem;margin-bottom:12px}
    .wl-items{padding:12px 16px;display:flex;flex-direction:column;gap:10px;padding-bottom:100px}
    .wl-item{background:var(--card);border-radius:var(--radius);padding:14px 16px;border:1px solid var(--border);display:flex;align-items:center;gap:12px}
    .wl-word{font-size:1.05rem;font-weight:700;color:var(--primary-dark);font-family:var(--font-head)}
    .wl-def{font-size:.82rem;color:var(--text-muted);line-height:1.4;margin-top:2px}
    .wl-del{color:var(--text-light);font-size:1rem;background:none;transition:color .2s;padding:4px 8px}
    .wl-del:hover{color:var(--red)}
    /* Daily goal ring */
    .daily-goal-wrap{display:flex;align-items:center;gap:16px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;margin-bottom:20px;width:100%}
    .goal-ring{width:72px;height:72px;flex-shrink:0}
    .daily-goal-title{font-size:1rem;font-weight:700;color:var(--text);font-family:var(--font-head)}
    .daily-goal-sub{font-size:.85rem;color:var(--text-muted);margin-top:2px}
    .daily-goal-done{font-size:.82rem;color:var(--accent-dark);font-weight:700;margin-top:4px}
    /* Font size */
    .font-large .reader-body p{font-size:1.3rem;line-height:2.1}
    .font-large.level-early .reader-body p{font-size:1.45rem;line-height:2.2}
    .font-large .fc-front-word{font-size:2.7rem}
    .font-large .fc-back-word{font-size:1.8rem}
    .font-large .fc-back-def{font-size:1.05rem}
    .font-size-toggle{display:flex;gap:10px;margin-bottom:4px}
    .fs-btn{width:56px;height:56px;border-radius:var(--radius);border:2px solid var(--border);background:var(--card);color:var(--text-muted);font-weight:800;font-size:1rem;transition:all .2s}
    .fs-btn-large{font-size:1.5rem}
    .fs-active{border-color:var(--primary);background:var(--primary-light);color:var(--primary-dark)}
    /* TTS — Text-to-Speech bar */
    .tts-bar{display:flex;align-items:center;gap:8px;padding:8px 20px;background:white;border-bottom:1px solid #f3f4f6;position:sticky;top:57px;z-index:49}
    .tts-play-btn{width:44px;height:44px;border-radius:50%;background:var(--primary);color:#151515;font-size:1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s}
    .tts-play-btn:hover{background:var(--primary-dark)}
    .tts-play-btn.paused{background:var(--accent);color:var(--text)}
    .tts-stop-btn{width:44px;height:44px;border-radius:50%;background:var(--card);color:var(--text-muted);font-size:.9rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid var(--border);transition:background .2s}
    .tts-stop-btn:hover{background:var(--border)}
    .tts-rate-slider-wrap{display:flex;align-items:center;gap:6px;margin-left:auto;background:#f3f4f6;border-radius:12px;padding:4px 10px}
    .tts-rate-emoji{font-size:.85rem;line-height:1;flex-shrink:0}
    .tts-rate-slider{width:64px;height:3px;-webkit-appearance:none;appearance:none;background:linear-gradient(to right,var(--primary) 0%,var(--primary) var(--fill,50%),#ddd var(--fill,50%),#ddd 100%);border-radius:99px;cursor:pointer;outline:none}
    .tts-rate-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--primary-dark);border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.25)}
    .tts-rate-slider::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--primary-dark);border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.25)}
    .tts-rate-readout{font-size:.68rem;font-weight:700;color:var(--text-muted);min-width:26px;text-align:center}
    .tts-label{font-size:.78rem;font-weight:700;color:var(--primary-dark);white-space:nowrap}
    /* TTS word highlight */
    .tts-w{transition:background .1s}
    .tts-word-hl{background:#f9ad3b !important;color:#151515 !important;border-radius:3px;padding:0 1px}
    .icon-btn.tts-active{background:var(--primary);color:white}
    /* Reader bottom row with back + next */
    .reader-bottom-row{display:flex;align-items:center;gap:10px;padding:0}
    .reader-back-btn{padding:14px 18px;background:var(--bg);color:var(--text-muted);border:1px solid var(--border);border-radius:var(--radius);font-size:.95rem;font-weight:700;white-space:nowrap;transition:background .2s}
    .reader-back-btn:hover{background:var(--border)}
    .reader-next-btn{flex:1}
    /* Flash card Got it / Still learning */
    .fc-got-btn{flex:1;padding:14px;border-radius:var(--radius);font-size:.95rem;font-weight:700;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:white;box-shadow:0 4px 16px rgba(143,184,50,.3)}
    .fc-hard-btn{flex:1;padding:14px;border-radius:var(--radius);font-size:.95rem;font-weight:700;background:var(--bg);color:var(--text);border:1px solid var(--border)}
    /* Flash card summary */
    .fc-summary{padding:24px 20px;display:flex;flex-direction:column;align-items:center;gap:12px}
    .fc-sum-emoji{font-size:3.5rem;margin-bottom:4px}
    .fc-sum-row{width:100%;display:flex;justify-content:space-between;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px}
    .fc-sum-got{font-weight:700;color:var(--primary-dark)}
    .fc-sum-hard{font-weight:700;color:#7a4800}
    .fc-sum-num{font-size:1.4rem;font-weight:800;color:var(--text)}
    .fc-sum-perfect{color:var(--primary-dark);font-weight:700;font-size:1rem}
    .fc-play-btn-outline{background:none!important;border:2px solid var(--primary);color:var(--primary-dark)!important;box-shadow:none!important;margin-top:4px}
    /* Settings / language picker */
    .home-settings{width:100%;padding:12px;background:none;color:var(--text-muted);font-size:.85rem;font-weight:600;border:1px solid var(--border);border-radius:var(--radius);margin-top:8px;transition:background .2s}
    .home-settings:hover{background:var(--bg)}
    .lang-picker-screen{display:flex;flex-direction:column;padding-bottom:32px}
    .lang-picker-hero{text-align:center;padding:40px 24px 20px}
    .lang-picker-emoji{font-size:3rem;margin-bottom:12px}
    .lang-picker-hero h2{margin-bottom:8px}
    .lang-picker-hero p{color:var(--text-muted);font-size:.9rem}
    .lang-list{display:flex;flex-direction:column;gap:8px;padding:8px 16px 32px}
    .lang-item{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);transition:border-color .2s,background .2s;text-align:left}
    .lang-item:hover{border-color:var(--primary);background:var(--primary-light)}
    .lang-selected{border-color:var(--primary)!important;background:var(--primary-light)!important}
    .lang-flag{font-size:1.5rem;width:32px;text-align:center}
    .lang-name{flex:1;font-size:.95rem;font-weight:600;color:var(--text)}
    .lang-check{color:var(--primary);font-size:1.1rem;font-weight:800}
    .settings-section{padding:16px}
    .settings-label{font-size:.75rem;font-weight:800;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
    .settings-desc{font-size:.85rem;color:var(--text-muted);margin-bottom:14px;line-height:1.5}
    /* Flash card list */
    .fc-list-actions{padding:16px 16px 4px}
    .fc-play-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:white;border-radius:var(--radius);font-size:1rem;font-weight:700;box-shadow:0 4px 16px rgba(143,184,50,.3)}
    .fc-item{flex-direction:row;align-items:flex-start}
    .fc-item-left{flex:1}
    .fc-item-tl{font-size:.82rem;color:var(--primary);margin-top:4px}
    .fc-item-actions{display:flex;align-items:center}
    /* Flash card play */
    .fc-play-screen{padding-bottom:100px}
    .fc-card-wrap{padding:24px 20px;display:flex;justify-content:center;position:relative}
    .fc-stack-layer{position:absolute;top:24px;left:50%;width:calc(100% - 40px);max-width:400px;height:260px;border-radius:24px;pointer-events:none}
    .fc-stack-3{background:#dde8ce;transform:translateX(-50%) rotate(3deg)}
    .fc-stack-2{background:#e8f2d8;transform:translateX(-50%) rotate(-1.5deg);box-shadow:0 4px 12px rgba(0,0,0,.06)}
    .fc-card{width:100%;max-width:400px;height:260px;perspective:900px;cursor:pointer;position:relative;z-index:2;animation:card-in .4s ease forwards}
    @keyframes card-in{from{transform:perspective(600px) rotateY(90deg);opacity:0}to{transform:perspective(600px) rotateY(0deg);opacity:1}}
    .fc-card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1)}
    .fc-card-inner.flipped{transform:rotateY(180deg)}
    .fc-face{position:absolute;inset:0;border-radius:18px;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;box-shadow:0 8px 32px rgba(0,0,0,.10);border:1px solid var(--border)}
    .fc-front{background:var(--card)}
    .fc-back{background:linear-gradient(135deg,var(--primary-light),#e4f3a8);transform:rotateY(180deg)}
    .fc-front-word{font-size:2.2rem;font-weight:800;color:var(--primary-dark);font-family:var(--font-head);text-align:center}
    .fc-tap-hint{font-size:.8rem;color:var(--text-muted);margin-top:16px}
    .fc-back-word{font-size:1.5rem;font-weight:800;color:var(--primary-dark);font-family:var(--font-head);text-align:center}
    .fc-back-pos{font-size:.75rem;color:var(--text-muted);background:white;padding:2px 10px;border-radius:99px;margin:6px 0 10px}
    .fc-back-tl-block{display:flex;align-items:center;gap:8px;background:#fef9ec;border:1px solid #fde8b0;border-radius:99px;padding:6px 14px;margin:4px 0 8px}
    .fc-back-tl-lang{font-size:.65rem;font-weight:800;color:#7a4800;background:#fde8b0;padding:2px 6px;border-radius:99px}
    .fc-back-tl-text{font-size:1.15rem;font-weight:800;color:#5a3200;font-family:var(--font-head)}
    .fc-back-tl-fetch{background:#fef9ec;color:#7a4800;border:1px solid #fde8b0;border-radius:99px;padding:6px 16px;font-size:.82rem;font-weight:700;margin:4px 0 8px;transition:background .2s}
    .fc-back-tl-fetch:hover{background:#fde8b0}
    .fc-back-divider{width:80%;height:1px;background:rgba(0,0,0,.08);margin:8px 0}
    .fc-back-def{font-size:.9rem;color:var(--text);text-align:center;line-height:1.5}
    .fc-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;background:var(--card);border-top:1px solid var(--border);padding:12px 20px 20px;gap:12px;z-index:100}
    .fc-prev,.fc-next{flex:1;padding:14px;border-radius:var(--radius);font-size:1rem;font-weight:700;transition:background .2s}
    .fc-prev{background:var(--bg);color:var(--text);border:1px solid var(--border)}
    .fc-next{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:white;box-shadow:0 4px 16px rgba(143,184,50,.3)}
    .fc-done{background:linear-gradient(135deg,var(--accent),var(--accent-dark))!important}

    /* BOTTOM TAB BAR */
    .tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom,0)}
    .tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 0 12px;background:none;border:none;cursor:pointer;transition:color .15s;position:relative}
    .tab-btn .tab-icon{font-size:1.3rem;line-height:1}
    .tab-btn .tab-label{font-size:.65rem;font-weight:700;letter-spacing:.02em;text-transform:uppercase}
    .tab-btn.active .tab-label,.tab-btn.active .tab-icon{color:var(--primary-dark)}
    .tab-btn:not(.active) .tab-label,.tab-btn:not(.active) .tab-icon{color:var(--text-muted)}
    .tab-notif-dot{position:absolute;top:7px;right:calc(50% - 14px);width:8px;height:8px;background:#f9ad3b;border-radius:50%;border:2px solid var(--card);animation:pulse 1.8s ease-in-out infinite}
    @keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.3);opacity:.7}}
    /* Subtle ticket-ready strip on results */
    .ticket-ready-strip{display:flex;align-items:center;justify-content:center;gap:6px;background:#fffbf0;border:1.5px solid #f9ad3b;border-radius:8px;padding:8px 14px;font-size:.8rem;font-weight:700;color:#7a4800;margin:10px 0;cursor:pointer;transition:background .15s}
    .ticket-ready-strip:hover{background:#fdefc8}
    /* WORLD JOURNEY HUB */
    .journey-hub-screen{background:#0f1d2a;min-height:100vh}
    .journey-hero{padding:24px 20px 16px;background:transparent;border-bottom:1px solid rgba(255,255,255,.08);text-align:center}
    .journey-hero h2{font-size:1.3rem;margin-bottom:4px;color:#fff;font-weight:900}
    .journey-hero p{font-size:.85rem;color:rgba(255,255,255,.55)}
    .dest-card-row{padding:14px 16px;display:flex;flex-direction:column;gap:10px;padding-bottom:32px}
    .dest-hub-card{background:rgba(255,255,255,.06);border-radius:var(--radius);border:2px solid rgba(255,255,255,.1);padding:16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:border-color .2s,transform .15s}
    .dest-hub-card:hover{border-color:var(--primary);transform:translateY(-1px)}
    .dest-hub-card.active-dest{border-color:var(--primary);background:rgba(186,218,85,.12)}
    .dest-hub-card.locked-dest{opacity:.5;cursor:default}
    .dest-hub-card.stamped-dest{border-color:var(--accent);background:rgba(249,173,59,.1)}
    .dest-hub-card.depart-dest{border-color:#f9ad3b;background:rgba(249,173,59,.08);cursor:default}
    /* Depart button */
    .depart-btn{width:100%;margin-top:8px;padding:9px 12px;background:linear-gradient(135deg,#f9ad3b,#e8941a);color:#fff;border:none;border-radius:var(--radius);font-weight:700;font-size:.82rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:transform .12s,box-shadow .12s;white-space:nowrap}
    .depart-btn:active{transform:scale(.97)}
    .depart-btn:disabled{opacity:.45;cursor:default;background:#ccc}
    /* Ticket counter in journey hub header */
    .journey-ticket-count{display:inline-flex;align-items:center;gap:5px;background:rgba(249,173,59,.12);border:1.5px solid #f9ad3b;border-radius:20px;padding:4px 12px;font-weight:700;font-size:.85rem;color:#ffd58a;margin-top:6px}
    /* Ticket earned banner — removed; replaced by .ticket-ready-strip */
    /* Departure animation overlay */
    .depart-overlay{position:fixed;inset:0;z-index:9999;background:rgba(10,30,60,.82);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;animation:fadeIn .3s ease both}
    .boarding-pass{background:#fff;border-radius:16px;padding:22px 28px;text-align:center;width:min(300px,88vw);position:relative;box-shadow:0 24px 64px rgba(0,0,0,.45);animation:boardingPassIn .55s cubic-bezier(.22,1,.36,1) both}
    .boarding-pass::before,.boarding-pass::after{content:'';position:absolute;top:50%;transform:translateY(-50%);width:22px;height:22px;background:rgba(10,30,60,.82);border-radius:50%}
    .boarding-pass::before{left:-11px}
    .boarding-pass::after{right:-11px}
    .bp-airline{font-size:.65rem;letter-spacing:.18em;color:#aaa;text-transform:uppercase;margin-bottom:6px}
    .bp-dest-emoji{font-size:2.6rem;line-height:1;margin-bottom:4px}
    .bp-dest-name{font-size:1.6rem;font-weight:900;font-family:var(--font-head);color:var(--primary-dark);margin-bottom:2px}
    .bp-dest-country{font-size:.78rem;color:#888;margin-bottom:12px}
    .bp-divider{border:none;border-top:1.5px dashed #ddd;margin:10px 0}
    .bp-row{display:flex;justify-content:space-between;align-items:center;font-size:.72rem;color:#666}
    .bp-gate{font-weight:700;color:#333;font-size:.82rem}
    .bp-plane-row{font-size:1.8rem;margin-top:20px;overflow:hidden;width:100%;display:flex;justify-content:flex-start}
    .bp-plane-fly{display:inline-block;animation:planeFly 1.6s ease-in 0.7s both}
    @keyframes boardingPassIn{0%{transform:translateY(60px) scale(.9);opacity:0}65%{transform:translateY(-6px) scale(1.02);opacity:1}100%{transform:translateY(0) scale(1);opacity:1}}
    @keyframes planeFly{0%{transform:translateX(0);opacity:0}10%{opacity:1}100%{transform:translateX(calc(100vw + 120px));opacity:1}}
    .dest-emoji{font-size:2rem;flex-shrink:0;line-height:1}
    .dest-hub-info{flex:1}
    .dest-hub-info h3{font-size:1rem;margin-bottom:2px;color:#fff;font-weight:800}
    .dest-hub-info .dest-country{font-size:.78rem;color:rgba(255,255,255,.55);margin-bottom:6px}
    .dest-hub-prog{height:5px;background:rgba(255,255,255,.12);border-radius:99px;overflow:hidden;margin-top:4px}
    .dest-hub-prog-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:99px;transition:width .5s}
    .dest-hub-badge{font-size:.68rem;font-weight:700;padding:3px 8px;border-radius:99px}
    .dhb-open{background:rgba(186,218,85,.15);color:var(--primary)}
    .dhb-locked{background:rgba(255,255,255,.07);color:rgba(255,255,255,.45);border:1px solid rgba(255,255,255,.12)}
    .dhb-stamped{background:rgba(249,173,59,.15);color:var(--accent);border:1px solid var(--accent)}
    .dest-stamp{width:40px;height:40px;border-radius:50%;border:3px solid var(--primary-dark);display:flex;align-items:center;justify-content:center;color:var(--primary-dark);font-weight:900;font-size:1.2rem;transform:rotate(-15deg);background:rgba(186,218,85,.1);flex-shrink:0;animation:stampDrop .5s cubic-bezier(.34,1.56,.64,1) both}
    /* DESTINATION DETAIL */
    .dest-detail-hero{padding:20px;background:var(--primary-light);border-bottom:1px solid var(--primary-mid)}
    .dest-detail-hero h2{font-size:1.2rem;margin-bottom:4px}
    .dest-detail-hero p{font-size:.82rem;color:var(--text-muted);line-height:1.5}
    .activity-track{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:14px 16px;margin:0 16px 10px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:border-color .2s}
    .activity-track:hover:not(.locked-track){border-color:var(--primary)}
    .activity-track.locked-track{opacity:.55;cursor:default}
    .activity-track.done-track{border-color:var(--primary);background:var(--primary-light)}
    .at-icon{font-size:1.6rem;flex-shrink:0}
    .at-info{flex:1}
    .at-info h3{font-size:.95rem;margin-bottom:2px}
    .at-info .at-sub{font-size:.78rem;color:var(--text-muted)}
    .at-prog{height:4px;background:var(--border);border-radius:99px;overflow:hidden;margin-top:5px}
    .at-prog-fill{height:100%;background:var(--primary);border-radius:99px}
    .at-count{font-size:.78rem;color:var(--text-muted);flex-shrink:0;white-space:nowrap}
    .locked-story{opacity:.5;cursor:default!important}
    /* Bust silhouette icon — pure CSS */
    .bust-icon{width:22px;height:22px;position:relative;display:flex;align-items:flex-end;justify-content:center}
    .bust-icon::before{content:'';width:10px;height:10px;border-radius:50%;background:currentColor;position:absolute;top:0;left:50%;transform:translateX(-50%)}
    .bust-icon::after{content:'';width:20px;height:11px;border-radius:10px 10px 0 0;background:currentColor;position:absolute;bottom:0;left:50%;transform:translateX(-50%)}
    /* Screens with tab bar need bottom padding so content isn't hidden */
    .has-tab-bar{padding-bottom:70px}

    /* PROFILE PAGE */
    .profile-hero{padding:28px 20px 20px;text-align:center;background:var(--primary-light);border-bottom:1px solid var(--primary-mid)}
    .profile-avatar{width:80px;height:80px;border-radius:50%;background:var(--primary);margin:0 auto 12px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
    .profile-avatar::before{content:'';width:34px;height:34px;border-radius:50%;background:var(--card);position:absolute;top:10px;left:50%;transform:translateX(-50%)}
    .profile-avatar::after{content:'';width:60px;height:38px;border-radius:30px 30px 0 0;background:var(--card);position:absolute;bottom:-4px;left:50%;transform:translateX(-50%)}
    .profile-name{font-size:1.2rem;font-weight:800;color:var(--text);font-family:var(--font-head);margin-bottom:4px}
    .profile-sub{font-size:.82rem;color:var(--text-muted)}
    .profile-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:16px 20px}
    .pstat{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 8px;text-align:center}
    .pstat .pval{font-size:1.6rem;font-weight:900;color:var(--primary-dark);font-family:var(--font-head);line-height:1}
    .pstat .plabel{font-size:.68rem;color:var(--text-muted);margin-top:4px}
    .profile-section{padding:4px 20px 16px}
    .profile-section-title{font-size:.72rem;font-weight:800;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;padding-top:12px}
    /* Level progress bars */
    .lv-prog-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
    .lv-prog-badge{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:.82rem;font-weight:800;font-family:var(--font-head);flex-shrink:0}
    .lv-prog-info{flex:1}
    .lv-prog-name{font-size:.82rem;font-weight:700;color:var(--text)}
    .lv-prog-bar-wrap{height:6px;background:var(--primary-light);border-radius:99px;overflow:hidden;margin-top:4px}
    .lv-prog-bar-fill{height:100%;background:var(--primary);border-radius:99px;transition:width .5s ease}
    .lv-prog-count{font-size:.72rem;color:var(--text-muted);flex-shrink:0;white-space:nowrap}
    /* Badge grid */
    .badge-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
    .badge-item{display:flex;flex-direction:column;align-items:center;gap:5px}
    .badge-circle{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.5rem;border:2px solid var(--border)}
    .badge-circle.earned{background:var(--primary-light);border-color:var(--primary-mid)}
    .badge-circle.locked{background:var(--bg);filter:grayscale(1);opacity:.4}
    .badge-name{font-size:.62rem;color:var(--text-muted);text-align:center;line-height:1.3}

    /* CONFETTI */
    .confetti{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:300;overflow:hidden}
    .confetti-dot{position:absolute;animation:cFall linear both}
    @keyframes cFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

    /* ── GAMIFICATION ─────────────────────────────────────── */
    /* COMBO OVERLAY */
    .combo-overlay{position:fixed;inset:0;z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;user-select:none}
    .combo-inner{position:relative;z-index:1;text-align:center;padding:14px 22px;background:rgba(255,255,255,.94);backdrop-filter:blur(10px);border-radius:22px;box-shadow:0 8px 36px rgba(0,0,0,.18);pointer-events:auto;animation:comboPop .42s cubic-bezier(.34,1.56,.64,1) both}
    @keyframes comboPop{from{opacity:0;transform:scale(.3) rotate(-10deg)}to{opacity:1;transform:scale(1) rotate(0)}}
    .combo-inner.combo-exit{animation:comboExit .22s ease both}
    @keyframes comboExit{to{opacity:0;transform:scale(.82) translateY(-10px)}}
    .combo-frog-em{font-size:3.5rem;display:block;animation:frogHop .5s cubic-bezier(.34,1.56,.64,1) both .05s;line-height:1.1}
    @keyframes frogHop{0%{transform:translateY(20px) scale(.75)}55%{transform:translateY(-14px) scale(1.15)}100%{transform:translateY(0) scale(1)}}
    .combo-label{font-family:var(--font-head);font-size:1.5rem;font-weight:900;line-height:1;margin:6px 0 4px;letter-spacing:-.5px;text-transform:uppercase}
    .combo-label.is-correct{color:#5a8a00}
    .combo-label.is-wrong{color:#E05C5C}
    .combo-pts-pill{display:inline-block;background:var(--accent);color:#fff;font-family:var(--font-head);font-size:1rem;font-weight:900;padding:4px 16px;border-radius:99px;box-shadow:0 3px 12px rgba(249,173,59,.5);animation:ptsPop .4s cubic-bezier(.34,1.56,.64,1) both .15s;margin-top:2px}
    @keyframes ptsPop{from{opacity:0;transform:scale(.5) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
    .combo-streak-line{font-size:.8rem;color:var(--text-muted);margin-top:5px;font-family:var(--font-body)}

    /* POINTS GAUGE — lily pad track */
    /* POINTS GAUGE */
    .frog-growth-panel{width:100%;background:linear-gradient(145deg,#eef7e0,#f7fbe9);border:1px solid var(--primary-mid);border-radius:20px;padding:14px 16px;margin:6px 0}
    .frog-growth-label{font-size:.68rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);text-align:center;margin-bottom:10px}
    .frog-growth-track{display:flex;align-items:flex-start;justify-content:space-between}
    .frog-stage{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;opacity:.35;transition:opacity .3s}
    .frog-stage.past{opacity:.7}
    .frog-stage.current{opacity:1}
    .frog-stage-circle{width:40px;height:40px;border-radius:50%;background:var(--card);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.3rem}
    .frog-stage.past .frog-stage-circle{background:var(--primary-light);border-color:var(--primary-mid)}
    .frog-stage.current .frog-stage-circle{background:var(--primary);border-color:var(--primary-dark);animation:glow-pulse 2s ease-in-out infinite}
    .frog-stage-label{font-size:.62rem;font-weight:800;color:var(--text-muted);text-align:center;line-height:1.2}
    .frog-stage.current .frog-stage-label{color:var(--primary-dark)}
    .frog-stage-here{font-size:.58rem;font-weight:800;color:var(--primary-dark)}
    .frog-stage-divider{width:1px;align-self:stretch;background:var(--border);margin-top:18px}
    .frog-growth-note{margin-top:10px;font-size:.72rem;font-weight:700;color:var(--primary-dark);text-align:center}
    @keyframes glow-pulse{0%,100%{box-shadow:0 0 0 4px rgba(249,173,59,.4)}50%{box-shadow:0 0 0 10px rgba(249,173,59,.15)}}
    .pts-gauge-wrap{width:100%;margin:8px 0 4px;padding:12px 14px;background:linear-gradient(145deg,#e4f5c8,#f2fbe0);border-radius:var(--radius);border:1px solid var(--primary-mid);display:flex;flex-direction:column;gap:10px}
    .pts-gauge-top{display:flex;align-items:stretch;gap:12px}
    /* left: life-cycle card */
    .pts-life-track{background:white;border-radius:12px;border:2px solid var(--primary-mid);padding:8px 6px;display:flex;flex-direction:column;justify-content:space-between;align-items:center;flex-shrink:0;width:68px;box-shadow:0 2px 8px rgba(143,184,50,.15)}
    .pts-life-stage{font-size:1.9rem;line-height:1;opacity:.18;filter:grayscale(.7);transition:opacity .4s,transform .35s,filter .4s}
    .pts-life-stage.lit{opacity:1;filter:none;transform:scale(1.12)}
    /* right: numbers */
    .pts-gauge-right{flex:1;display:flex;flex-direction:column;justify-content:center;gap:0}
    .pts-round-line{display:flex;align-items:baseline;gap:5px;line-height:1;margin-bottom:4px}
    .pts-round-prefix,.pts-round-num{font-family:var(--font-head);font-size:2.6rem;font-weight:900;color:var(--primary-dark);line-height:1}
    .pts-round-pts-label{font-family:var(--font-head);font-size:1.3rem;font-weight:800;color:var(--primary-dark);margin-left:2px}
    .pts-total-label{font-family:var(--font-head);font-size:.8rem;font-weight:800;color:var(--primary-dark);opacity:.7;margin-top:6px}
    .pts-total-num{font-family:var(--font-head);font-size:3rem;font-weight:900;color:var(--primary-dark);line-height:1.05}
    .pts-badges{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
    .pts-perfect-badge,.pts-fast-badge{display:inline-flex;align-items:center;gap:4px;font-family:var(--font-head);font-size:.78rem;font-weight:800;padding:5px 11px;border-radius:8px}
    .pts-perfect-badge{background:var(--primary-dark);color:white}
    .pts-fast-badge{background:var(--primary-dark);color:white}
    /* stat cards — full-width bottom row */
    .pts-stat-cards{display:flex;gap:6px;width:100%}
    .res-card{flex:1;background:white;border-radius:10px;padding:10px 4px;border:1px solid var(--border);text-align:center;opacity:0;transform:scale(.5)}
    @keyframes cardBurst{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
    .res-card.burst{animation:cardBurst .4s cubic-bezier(.34,1.56,.64,1) both;opacity:1;transform:scale(1)}

    /* PROFILE POINTS BANNER */
    .profile-pts-banner{margin:0 20px 0;padding:16px 20px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));border-radius:var(--radius);color:white;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow)}
    .ppb-left .ppb-label{font-size:.72rem;font-weight:700;opacity:.8;text-transform:uppercase;letter-spacing:.05em}
    .ppb-left .ppb-val{font-family:var(--font-head);font-size:2.4rem;font-weight:900;line-height:1;margin-top:2px}
    .ppb-right{font-size:2.5rem;opacity:.85}
  </style>
</head>
<body>
<div id="app"></div>
<script src="ribbit-stories.js"></script>
<script src="ribbit-wordlists.js"></script>
<script src="ribbit-ja-translations.js"></script>
<script>
// ── STATE ──────────────────────────────────────────────────
const state = {
  screen: localStorage.getItem('rbt_seenSplash') ? 'home' : 'landing',
  levelId:null,      // 1-6
  subLevel:null,     // 0-9 (0-indexed)
  storyId:null,
  readerStep:0,      // current revealed step index in stepped reader
  quizIndex:0,
  quizAnswers:[],
  lastScore:0, lastCorrect:0, lastTotal:0, lastXP:0, lastSubLevelUnlocked:null, lastLevelId:null,
  nativeLang:      localStorage.getItem('rbt_lang')||null,
  fontSize:        localStorage.getItem('rbt_fontsize')||'normal',
  vocabHighlight:  localStorage.getItem('rbt_highlight')!=='off',
  dailyGoal:       parseInt(localStorage.getItem('rbt_goal')||'3'),
  todayCount:      0,   // stories completed today (recalculated on load)
  lastStoryId:     localStorage.getItem('rbt_laststory')||null,
  savedWords: JSON.parse(localStorage.getItem('rbt_words')||'{}'),
  flashCards: JSON.parse(localStorage.getItem('rbt_fc')   ||'{}'),
  fcStudyIndex: 0,   // current card index in play mode
  fcOrder: [],       // shuffled card keys for play mode
  fcHard: [],        // cards marked 'still learning' this round
  progress:   JSON.parse(localStorage.getItem('rbt_prog')    ||'{}'),
  xp:         parseInt(localStorage.getItem('rbt_xp')        ||'0'),
  streak:     parseInt(localStorage.getItem('rbt_streak')    ||'0'),

function save(){
  if(state.nativeLang)   localStorage.setItem('rbt_lang',       state.nativeLang);
  if(state.lastStoryId)  localStorage.setItem('rbt_laststory',  state.lastStoryId);
  localStorage.setItem('rbt_fontsize',  state.fontSize);
  localStorage.setItem('rbt_highlight', state.vocabHighlight ? 'on' : 'off');
  localStorage.setItem('rbt_goal',      state.dailyGoal);
  localStorage.setItem('rbt_words',    JSON.stringify(state.savedWords));
  localStorage.setItem('rbt_fc',       JSON.stringify(state.flashCards));
  localStorage.setItem('rbt_prog',     JSON.stringify(state.progress));
  localStorage.setItem('rbt_xp',       state.xp);
  localStorage.setItem('rbt_streak',   state.streak);
  localStorage.setItem('rbt_lastread', state.lastRead||'');
  localStorage.setItem('rbt_points',   state.points);
  localStorage.setItem('rbt_tickets',  state.tickets||0);
  localStorage.setItem('rbt_journey',  JSON.stringify(state.journey||{}));
}
// Safety net — save whenever the user closes or navigates away
window.addEventListener('beforeunload', save);

function calcTodayCount(){
  const today=new Date().toDateString();
  state.todayCount=Object.values(state.progress).filter(p=>new Date(p.at).toDateString()===today).length;
}

function updateStreak(){
  const today=new Date().toDateString();
  const yesterday=new Date(Date.now()-86400000).toDateString();
  if(state.lastRead===today) return;
  state.streak = state.lastRead===yesterday ? state.streak+1 : 1;
  state.lastRead=today; save();
}

// ── WORLD JOURNEY STATE HELPERS ──────────────────────────────────────────────
function getJourneyState(destId){
  if(!state.journey) state.journey={};
  if(!state.journey[destId]) state.journey[destId]={
    storiesDone:[],     // array of story ids completed
    wordsDone:[],       // array of words marked learned
    quizScore:null,     // null = not attempted; number = score out of 5
    stamped:false,      // true when all three tracks complete
    departed:false,     // true when player has spent a ticket to unlock this destination
  };
  const js=state.journey[destId];
  // Add departed flag if missing (older saved data)
  if(!js.hasOwnProperty('departed')) js.departed=false;
  // Migration: if a destination already has progress, treat it as departed
  if(!js.departed && (js.stamped || js.storiesDone.length>0 || js.wordsDone.length>0 || js.quizScore!==null)){
    js.departed=true;
  }
  return js;
}

function journeyStoryDone(destId, storyId){
  return getJourneyState(destId).storiesDone.includes(storyId);
}

function journeyWordDone(destId, word){
  return getJourneyState(destId).wordsDone.includes(word);
}

function journeyAllStoriesDone(destId){
  const dest=DESTINATIONS.find(d=>d.id===destId);
  if(!dest) return false;
  const js=getJourneyState(destId);
  return (JOURNEY_STORIES[destId]||[]).every(s=>js.storiesDone.includes(s.id));
}

function journeyAllWordsDone(destId){
  const dest=DESTINATIONS.find(d=>d.id===destId);
  if(!dest) return false;
  const js=getJourneyState(destId);
  return dest.localWords.every(w=>js.wordsDone.includes(w.word));
}

function journeyQuizDone(destId){
  return getJourneyState(destId).quizScore !== null;
}

function journeyComplete(destId){
  return journeyAllStoriesDone(destId) && journeyAllWordsDone(destId) && journeyQuizDone(destId);
}

function markJourneyStoryDone(destId, storyId){
  const js=getJourneyState(destId);
  if(!js.storiesDone.includes(storyId)) js.storiesDone.push(storyId);
  save();
}

function markJourneyWordDone(destId, word){
  const dest=DESTINATIONS.find(d=>d.id===destId);
  const js=getJourneyState(destId);
  if(!js.wordsDone.includes(word)) js.wordsDone.push(word);
  // Auto-add to flash card deck
  const wObj=dest.localWords.find(w=>w.word===word);
  if(wObj && !state.flashCards[word]){
    state.flashCards[word]={def:wObj.def, pos:wObj.pos, lang:null, translation:null};
  }
  save();
}

// STORIES is defined in ribbit-stories.js:
// STORIES[levelId][subLevelIndex] = [array of 5 story objects]

// ── HELPERS ────────────────────────────────────────────────
function navigate(screen,data={}){
  // Stop TTS when leaving the reader
  if(state.screen==='reader' && screen!=='reader' && typeof speechSynthesis!=='undefined'){
    speechSynthesis.cancel(); tts.active=false; tts.paused=false;
  }
  // Reset reader step whenever navigating to a new story
  if(screen==='reader' && data.storyId && data.storyId!==state.storyId) data.readerStep=0;
  if(screen==='journeyreaderpage' && data.journeyStoryId && data.journeyStoryId!==state.journeyStoryId) data.readerStep=0;
  // Track last story opened
  if(data.storyId) state.lastStoryId=data.storyId;
  Object.assign(state,data,{screen});
  applyFontSize();
  applyVocabHighlight();
  render(); window.scrollTo(0,0);
}
function applyFontSize(){
  document.body.classList.toggle('font-large', state.fontSize==='large');
  document.body.classList.toggle('level-early', !!(state.levelId && state.levelId<=2));
}
function applyVocabHighlight(){
  document.body.classList.toggle('vocab-highlight', state.vocabHighlight);
}

function getStory(){ return findStory(state.storyId); }
function findStory(id){
  for(const lv in STORIES) for(const sl in STORIES[lv]){
    const f=STORIES[lv][sl].find(s=>s.id===id); if(f) return f;
  }
  return null;
}

function storyDone(id){ return !!state.progress[id]; }
function subLevelDone(lv,sl){
  const stories=STORIES[lv]&&STORIES[lv][sl]||[];
  return stories.length>0 && stories.every(s=>storyDone(s.id));
}
function levelDoneCount(lv){
  let c=0;
  for(let sl=0;sl<10;sl++) if(subLevelDone(lv,sl)) c++;
  return c;
}
function subLevelAvailable(lv,sl){
  if(sl===0) return true;
  return subLevelDone(lv,sl-1);
}
function hasStoriesFor(lv,sl){ return !!(STORIES[lv]&&STORIES[lv][sl]&&STORIES[lv][sl].length); }

function storyXP(story,score){ const sl=story.levelId===6?story.subLevel:story.subLevel+1; return Math.round(story.levelId*5*sl*score); }

function makeWordTappable(text,vocab){
  return text.split(/(\s+)/).map(part=>{
    const clean=part.replace(/[^a-zA-Z'-]/g,'').toLowerCase();
    if(!clean) return part;
    // Story vocabulary word — green highlight
    if(vocab[clean]){
      return `<span class="tappable${state.vocabHighlight?' tappable-hl':''}" data-word="${clean}">${part}</span>`;
    }
    // Above-level word from CEFR word lists — blue highlight
    if(state.vocabHighlight && typeof getChallengeLevel==='function'){
      const lvl=getChallengeLevel(clean, state.levelId||1);
      if(lvl) return `<span class="tappable tappable-challenge" data-challenge="${lvl}" data-word="${clean}">${part}</span>`;
    }
    return part;
  }).join('');
}

function starsFor(storyId){
  const p=state.progress[storyId]; if(!p) return '☆☆☆';
  return p.score>=.9?'★★★':p.score>=.6?'★★☆':'★☆☆';
}

function renderGoalRing(){
  const pct=Math.min(1, state.todayCount/state.dailyGoal);
  const r=30, cx=40, cy=40;
  const circ=2*Math.PI*r;
  const dash=circ*pct;
  const done=state.todayCount>=state.dailyGoal;
  const color=done?'#f9ad3b':'#bada55';
  return `<svg class="goal-ring" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#f0f7d0" stroke-width="7"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="7"
      stroke-dasharray="${dash} ${circ}" stroke-dashoffset="${circ/4}"
      stroke-linecap="round" style="transition:stroke-dasharray .6s ease"/>
    <text x="${cx}" y="${cy+5}" text-anchor="middle" font-size="18" font-weight="800"
      fill="${color}" font-family="var(--font-head)">${done?'🎯':state.todayCount}</text>
  </svg>`;
}

// ── RENDER: HOME (Pond Map) ────────────────────────────────
function currentLevelId(){
  if(state.lastStoryId){const s=findStory(state.lastStoryId); if(s) return s.levelId;}
  for(const lv of LEVELS){ if(levelDoneCount(lv.id)<10) return lv.id; }
  return LEVELS[LEVELS.length-1].id;
}
function frogGreeting(){
  if(state.todayCount>=state.dailyGoal) return 'すごい！今日の目標を達成したよ。もう1話読む？🎉';
  if(state.lastStoryId){const s=findStory(state.lastStoryId); if(s&&!storyDone(s.id)) return `「${s.title}」の続きを読もう！`;}
  if(state.streak>1) return `${state.streak}日連続！今日も一緒に読もう。`;
  return 'ようこそ！リリーパッドをタップして読み始めよう。';
}
function renderPondMap(lv){
  const PAD_R=26, W=360, GAP=74, PADS=10;
  const H=PADS*GAP+50;
  // First pad that's available but not done = the frog's pad
  let curIdx=0;
  for(let i=0;i<PADS;i++){ if(subLevelAvailable(lv,i)&&!subLevelDone(lv,i)){curIdx=i;break;} if(subLevelDone(lv,i)) curIdx=Math.min(i+1,PADS-1); }
  const pts=Array.from({length:PADS},(_,i)=>({
    x:Math.round(180+105*Math.sin(i*1.25+0.6)),
    y:H-40-i*GAP
  }));
  const path=pts.map((p,i)=>`${i?'L':'M'}${p.x} ${p.y}`).join(' ');
  const pads=pts.map((p,i)=>{
    const done=subLevelDone(lv,i), avail=subLevelAvailable(lv,i), hasSt=hasStoriesFor(lv,i);
    const isCur=i===curIdx&&avail&&hasSt;
    const locked=(!avail&&!done)||!hasSt;
    const stories=STORIES[lv]&&STORIES[lv][i]||[];
    const dc=stories.filter(s=>storyDone(s.id)).length;
    const fill=done?'#bada55':isCur?'#ffffff':locked?'#e6e8de':'#f0f7d0';
    const stroke=done?'#9bc42a':isCur?'#f9ad3b':locked?'#c9ccc0':'#d4ec96';
    const strokeW=isCur?4:3;
    const txt=done?'#ffffff':isCur?'#151515':locked?'#9aa093':'#5e6648';
    const r=isCur?PAD_R+7:PAD_R;
    const click=locked?'':`onclick="navigate('stories',{levelId:${lv},subLevel:${i}})"`;
    return `<g class="pad-group${locked?' locked':''}${isCur?' current':''}" ${click} role="button" aria-label="サブレベル${i+1}${locked?'（ロック中）':''}">
      <ellipse cx="${p.x}" cy="${p.y+r-4}" rx="${r*1.15}" ry="7" fill="rgba(143,184,50,.18)"/>
      ${isCur?`<circle class="pulse-ring pulse-ring-1" cx="${p.x}" cy="${p.y}" r="${r}" fill="none" stroke="rgba(249,173,59,.4)" stroke-width="4"/>
      <circle class="pulse-ring pulse-ring-2" cx="${p.x}" cy="${p.y}" r="${r}" fill="none" stroke="rgba(249,173,59,.25)" stroke-width="4"/>`:''}
      <circle class="pad" cx="${p.x}" cy="${p.y}" r="${r}" fill="${fill}" stroke="${stroke}" stroke-width="${strokeW}"/>
      ${isCur?`<image href="OOSH_Logo_Square.png" x="${p.x-22}" y="${p.y-44}" width="44" height="44"/>`:''}
      <text x="${p.x}" y="${p.y+(isCur?14:6)}" text-anchor="middle" font-size="${isCur?13:15}" font-weight="800" fill="${txt}" font-family="var(--font-head)">${done?'✓':i+1}</text>
      ${isCur?`<text x="${p.x}" y="${p.y+r+18}" text-anchor="middle" font-size="11" font-weight="800" fill="#6b9e3a" font-family="var(--font-head)">いまここ</text>`:''}
      ${!done&&!locked&&!isCur&&dc>0?`<text x="${p.x}" y="${p.y+r+18}" text-anchor="middle" font-size="11" fill="#5e6648">${dc}/5</text>`:''}
      ${locked?`<text x="${p.x}" y="${p.y-r-6}" text-anchor="middle" font-size="12">🔒</text>`:''}
    </g>`;
  }).join('');
  return `<svg class="pond-map" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="レベル${lv}の進行マップ">
    <path d="${path}" fill="none" stroke="#d4ec96" stroke-width="9" stroke-linecap="round" stroke-dasharray="1 16"/>
    ${pads}
  </svg>`;
}

// Fallback handler for story images that fail to load
function imgLoadError(el, emoji){
  el.parentNode.innerHTML='<div class="story-image-placeholder">'+(emoji||'📖')+'</div>';

// Split a paragraph text into individual sentences for sentence-by-sentence mode
function splitSentences(text){
  // Protect abbreviations and decimals so they don't cause false splits
  const PLACEHOLDER='\x01';
  let safe=text
    // Common titles / abbreviations
    .replace(/\b(Mr|Mrs|Ms|Dr|Prof|St|Ave|Rd|Blvd|Jr|Sr|vs|etc|approx|inc|ltd|govt|dept)\./gi, m=>m.replace('.',PLACEHOLDER))
    // Initials like A. B. Smith or U.S.A.
    .replace(/\b([A-Z])\./g, (_,c)=>c+PLACEHOLDER)
    // Decimal numbers  3.14  £1.50
    .replace(/(\d+)\.(\d+)/g, (_,a,b)=>a+PLACEHOLDER+b)
    // Ellipsis — treat as single pause, not a split
    .replace(/\.{2,}/g, m=>m.replace(/\./g,PLACEHOLDER));

  // Split on sentence-ending punctuation followed by whitespace/end
  const raw=safe.match(/[^.!?]*[.!?]+["']?(?=\s|$)/g)||[safe];

  return raw
    .map(s=>s.replace(new RegExp(PLACEHOLDER,'g'),'.').trim())
    .filter(s=>s.length>2);
}

// ── TTS — Text-to-Speech Engine ──────────────────────────────────────────────
const tts={active:false,paused:false,rate:1.0,utterance:null};
const TTS_RATES=[0.75,1,1.5,2];
function buildTTSRateSlider(){
  const idx=Math.max(0,TTS_RATES.indexOf(tts.rate));
  const fill=(idx/(TTS_RATES.length-1)*100)+'%';
  return `<div class="tts-rate-slider-wrap">
    <span class="tts-rate-emoji">🐢</span>
    <input type="range" class="tts-rate-slider" id="ttsRateSlider" min="0" max="${TTS_RATES.length-1}" step="1" value="${idx}" style="--fill:${fill}" oninput="ttsSetRate(TTS_RATES[this.value])" aria-label="再生速度">
    <span class="tts-rate-emoji">🐇</span>
    <span class="tts-rate-readout" id="ttsRateReadout">${tts.rate}×</span>
  </div>`;
}

function ttsSupported(){ return 'speechSynthesis' in window; }

function ttsGetPlainText(){
  const el=document.getElementById('rbody');
  if(!el) return '';
  return (el.innerText||el.textContent||'').replace(/\s+/g,' ').trim();
}

// After renderReader(), walk DOM in #rbody and tag every word span with its
// character offset in the plain text — used by onboundary for highlighting.
function addTTSWordSpans(){
  const rbody=document.getElementById('rbody');
  if(!rbody) return;
  const walker=document.createTreeWalker(rbody,NodeFilter.SHOW_TEXT,null,false);
  const nodes=[];
  let n; while((n=walker.nextNode())) nodes.push(n);
  let charOffset=0;
  nodes.forEach(textNode=>{
    const text=textNode.nodeValue;
    const frag=document.createDocumentFragment();
    const re=/(\s+|[^\s]+)/g; let m;
    while((m=re.exec(text))!==null){
      const tok=m[0];
      if(/\s/.test(tok)){
        frag.appendChild(document.createTextNode(tok));
      } else {
        const sp=document.createElement('span');
        sp.className='tts-w';
        sp.dataset.tts=charOffset;
        sp.textContent=tok;
        frag.appendChild(sp);
      }
      charOffset+=tok.length;
    }
    textNode.parentNode.replaceChild(frag,textNode);
  });
}

function ttsClearHL(){
  document.querySelectorAll('.tts-word-hl').forEach(el=>el.classList.remove('tts-word-hl'));
}

function updateTTSUI(){
  const btn=document.getElementById('tts-play-btn');
  const spkBtn=document.getElementById('tts-icon-btn');
  const bar=document.getElementById('tts-bar');
  if(bar&&bar.classList.contains('tts-collapsible')) bar.style.display=tts.active?'flex':'none';
  if(btn){
    if(tts.active && !tts.paused){ btn.textContent='⏸'; btn.classList.add('paused'); }
    else { btn.textContent='▶'; btn.classList.remove('paused'); }
  }
  if(spkBtn){
    if(tts.active) spkBtn.classList.add('tts-active');
    else spkBtn.classList.remove('tts-active');
  }
  const slider=document.getElementById('ttsRateSlider');
  if(slider){
    const idx=Math.max(0,TTS_RATES.indexOf(tts.rate));
    slider.value=idx;
    slider.style.setProperty('--fill',(idx/(TTS_RATES.length-1)*100)+'%');
  }
  const readout=document.getElementById('ttsRateReadout');
  if(readout) readout.textContent=tts.rate+'×';
}

function ttsSpeak(){
  if(!ttsSupported()) return;
  speechSynthesis.cancel();
  const text=ttsGetPlainText();
  if(!text) return;
  const u=new SpeechSynthesisUtterance(text);
  u.lang='en-GB'; u.rate=tts.rate;

  u.onboundary=function(e){
    if(e.name!=='word') return;
    ttsClearHL();
    const ci=e.charIndex;
    const spans=document.querySelectorAll('#rbody span[data-tts]');
    let best=null, bestStart=-1;
    spans.forEach(sp=>{
      const s=parseInt(sp.dataset.tts);
      if(s<=ci && s>bestStart){ bestStart=s; best=sp; }
    });
    if(best) best.classList.add('tts-word-hl');
  };

  u.onend=function(){
    tts.active=false; tts.paused=false;
    ttsClearHL(); updateTTSUI();
    // Auto-advance to next step
    const story=getStory(); if(!story) return;
    const steps=getReaderSteps(story);
    if(state.readerStep<steps.length-1){
      state.readerStep++; renderReader();
      setTimeout(ttsSpeak,500);
    }
  };

  u.onerror=function(){ tts.active=false; tts.paused=false; ttsClearHL(); updateTTSUI(); };

  tts.utterance=u; tts.active=true; tts.paused=false;
  speechSynthesis.speak(u);
  updateTTSUI();
}

function ttsToggle(){
  if(!ttsSupported()){ alert('Sorry, your browser does not support text-to-speech.'); return; }
  if(!tts.active) ttsSpeak();
  else if(tts.paused){ speechSynthesis.resume(); tts.paused=false; updateTTSUI(); }
  else { speechSynthesis.pause(); tts.paused=true; updateTTSUI(); }
}

// Header speaker button: reveal the TTS bar and start reading; tap again to stop
function ttsHeaderToggle(){
  if(!ttsSupported()){ alert('Sorry, your browser does not support text-to-speech.'); return; }
  if(tts.active){ ttsStop(); }
  else { ttsSpeak(); }
}

function ttsStop(){
  if(!ttsSupported()) return;
  speechSynthesis.cancel();
  tts.active=false; tts.paused=false;
  ttsClearHL(); updateTTSUI();
}

function ttsSetRate(r){
  tts.rate=r;
  const wasActive=tts.active;
  if(wasActive){ speechSynthesis.cancel(); tts.active=false; }
  updateTTSUI();
  if(wasActive) setTimeout(ttsSpeak,100);
}
