// Build the flat list of "steps" for a story depending on level
function getReaderSteps(story){
  // Merge only genuine fragments — 1–2 words, which are always bad splits
  // Short but complete sentences (3+ words with end punctuation) stay as-is
  const FRAG_WORDS=3;

  function mergeFragments(arr){
    const out=[];
    arr.forEach(s=>{
      const wc=s.trim().split(/\s+/).length;
      if(out.length>0 && wc<FRAG_WORDS){
        // Clearly a fragment — attach to the previous step
        out[out.length-1]+=' '+s;
      } else {
        out.push(s);
      }
    });
    // Final item still a fragment? Fold into previous
    if(out.length>1 && out[out.length-1].trim().split(/\s+/).length<FRAG_WORDS){
      const last=out.pop();
      out[out.length-1]+=' '+last;
    }
    return out.filter(s=>s.trim().length>0);
  }

  if(story.levelId<=2){
    // Adaptive chunked-sentence mode for Beginner / Elementary.
    // Flattens all sentences across paragraphs, then groups them uniformly
    // to target exactly 5 steps per story (chunk = ceil(total ÷ 5), min 2).
    // Paragraph boundaries are intentionally crossed — at L1–L2 they are
    // short, simple, and don't carry strong thematic separation.
    const allSents=[];
    story.paragraphs.forEach(p=>splitSentences(p).filter(s=>s.trim()).forEach(s=>allSents.push(s)));
    const CHUNK=Math.max(2,Math.ceil(allSents.length/5));
    const raw=[];
    for(let i=0;i<allSents.length;i+=CHUNK){
      raw.push(allSents.slice(i,i+CHUNK).join(' '));
    }
    return mergeFragments(raw);

  } else {
    // Paragraph-by-paragraph for levels 3–6
    const raw=story.paragraphs.filter(p=>p&&p.trim().length>0);
    return mergeFragments(raw);
  }
}

// Rough estimated time remaining in a story — ESL reading pace, not native WPM
const READING_WPM=90;
function estReadingMinutes(steps,fromStep){
  const remainingText=steps.slice(fromStep).join(' ');
  const wordCount=remainingText.split(/\s+/).filter(Boolean).length;
  return Math.max(1,Math.ceil(wordCount/READING_WPM));
}

function renderReader(){
  const story=getStory(); if(!story){navigate('home');return;}
  const lv=LEVELS.find(l=>l.id===story.levelId);
  const steps=getReaderSteps(story);
  const step=Math.min(state.readerStep, steps.length-1);
  const pct=Math.round((step+1)/steps.length*100);
  const isLast=(step>=steps.length-1);

  // Vocab review chips — final step only (pre-quiz review).
  // During reading, vocab words are tappable inline in the step text instead.
  const chips=Object.keys(story.vocabulary).map(w=>`<button class="vocab-chip" onclick="showPopup('${w}')">${w}</button>`).join('');
  const vocabSection=isLast?`<div class="vocab-section"><h4>📘 重要な言葉 — クイズの前に確認しよう</h4><div class="vocab-chips">${chips}</div></div>`:'';

  const cls=story.levelId<=2?'reader-sentence step-new':'step-new';
  const revealedHTML=`<p class="${cls}">${makeWordTappable(steps[step],story.vocabulary)}</p>`;

  // Story illustration — lazy loaded, only for current step
  const imgIndex=story.images?Math.min(step,story.images.length-1):-1;
  const imageHTML=imgIndex>=0
    ?`<div class="story-image-wrap step-new"><img src="${story.images[imgIndex]}" alt="" loading="lazy" onerror="imgLoadError(this,'${story.emoji||'📖'}')"></div>`
    :'';

  // Bottom bar — single primary CTA, step dots, back demoted to text link
  const dots=steps.map((_,i)=>`<span class="sdot${i<step?' done':i===step?' cur':''}"></span>`).join('');
  const backLink=step>0?`<button class="reader-back-link" onclick="stepBack()">← 戻る</button>`:'';
  const bottomHTML=`${vocabSection}
    <div class="reader-bottom">
      <div class="step-dots">${dots}</div>
      ${isLast
        ?`<button class="finish-btn" onclick="startQuiz()">クイズへ →</button>`
        :`<button class="finish-btn" onclick="advanceReader()">次へ →</button>`}
      ${backLink}
    </div>`;

  // TTS bar — hidden until the learner taps the speaker (progressive disclosure)
  const ttsBar=`
    <div class="tts-bar tts-collapsible" id="tts-bar" style="display:${tts.active?'flex':'none'}">
      <button id="tts-play-btn" class="tts-play-btn${tts.active&&!tts.paused?' paused':''}" onclick="ttsToggle()" title="${tts.active&&!tts.paused?'Pause':'Play'}">${tts.active&&!tts.paused?'⏸':'▶'}</button>
      <button class="tts-stop-btn" onclick="ttsStop()" title="Stop">■</button>
      <span class="tts-label">🔊 聴く</span>
      ${buildTTSRateSlider()}
    </div>`;

  document.getElementById('app').innerHTML=`
  <div class="screen reader-screen">
    <div class="reader-prog-bar"><div class="reader-prog-fill" id="rpf" style="width:${pct}%"></div></div>
    <div class="reader-time-est">残り ${estReadingMinutes(steps,step)}分</div>
    <div class="reader-header">
      <button class="back-btn" onclick="ttsStop();navigate('stories',{levelId:${story.levelId},subLevel:${story.subLevel}})">←</button>
      <h3>${story.title}</h3>
      <button id="tts-icon-btn" class="icon-btn${tts.active?' tts-active':''}" onclick="ttsHeaderToggle()" aria-label="聴く">🔊</button>
    </div>
    ${ttsBar}
    <div class="reader-body" id="rbody">${imageHTML}${revealedHTML}</div>
    ${bottomHTML}
  </div>`;
  document.querySelectorAll('.tappable').forEach(el=>{
    el.addEventListener('click',function(e){
      if(this.dataset.challenge) showChallengePopup(this.dataset.word, this.dataset.challenge, e, this);
      else showPopup(this.dataset.word,e,this);
    });
  });
  // Tag every word in the current step for TTS boundary highlighting
  addTTSWordSpans();
}

function advanceReader(){
  const story=getStory(); if(!story) return;
  const steps=getReaderSteps(story);
  if(state.readerStep<steps.length-1){
    speechSynthesis.cancel(); tts.active=false; tts.paused=false;
    state.readerStep++; renderReader();
  }
}
function stepBack(){
  if(state.readerStep>0){
    speechSynthesis.cancel(); tts.active=false; tts.paused=false;
    state.readerStep--; renderReader();
  }
}


// ── WORD POPUP (hardcoded Japanese translations) ─────────────────────────────
function showPopup(word, e, el){
  const story=getStory(); if(!story) return;
  const def=story.vocabulary[word]; if(!def) return;
  document.getElementById('wp')?.remove();
  document.querySelectorAll('.tappable.hl').forEach(x=>x.classList.remove('hl'));
  if(el) el.classList.add('hl');

  const inDeck=!!state.flashCards[word];
  const jaData=JA_TRANSLATIONS[word]||{};
  const jaWord=jaData.w||'';
  const jaDef=jaData.d||'';

  // Find English example sentence from story paragraphs
  let exEn='';
  if(story.paragraphs){
    for(const para of story.paragraphs){
      const sentences=para.match(/[^.!?]+[.!?]+/g)||[para];
      for(const s of sentences){
        if(s.toLowerCase().includes(word.toLowerCase())){ exEn=s.trim(); break; }
      }
      if(exEn) break;
    }
  }

  const d=document.createElement('div');
  d.id='wp'; d.className='word-popup';
  d.innerHTML=`
    <div class="wp-header">
      <div>
        <span class="wp-word">${word}</span>
        <span class="wp-pos">${def.pos}</span>
        ${jaWord?`<span class="wp-ja-word">${jaWord}</span>`:''}
      </div>
      <button class="wp-close" onclick="closePopup()">✕</button>
    </div>
    ${jaDef?`<div class="wp-section-label">日本語の意味</div><div class="wp-ja-def">${jaDef}</div>`:''}
    <div class="wp-section-label">意味（英語）</div>
    <div class="wp-def">${def.def}</div>
    ${exEn?`<div class="wp-section-label">例文</div><div class="wp-example">"${exEn}"</div>`:''}
    <div class="wp-actions">
      <button class="wp-fc-btn${inDeck?' in-deck':''}" id="wps" onclick="toggleFlashCard('${word}','${def.def.replace(/'/g,"\'")}','${def.pos}')">
        ${inDeck?'✓ カードに追加済み':'＋ カードに追加'}
      </button>
    </div>`;
  document.body.appendChild(d);
  setTimeout(()=>document.addEventListener('click',popupOutside),100);
}

function popupOutside(e){
  const p=document.getElementById('wp');
  if(p&&!p.contains(e.target)&&!e.target.classList.contains('tappable')&&!e.target.classList.contains('vocab-chip')){
    closePopup(); document.removeEventListener('click',popupOutside);
  }
}
function closePopup(){
  const p=document.getElementById('wp');
  if(p){p.classList.add('hiding');setTimeout(()=>p.remove(),200);}
  document.querySelectorAll('.tappable.hl').forEach(x=>x.classList.remove('hl'));
}
function toggleFlashCard(word, def, pos){
  if(state.flashCards[word]){
    delete state.flashCards[word];
  } else {
    const jaWord=(JA_TRANSLATIONS[word]||{}).w||null;
    state.flashCards[word]={def, pos, jaWord};
  }
  save();
  const b=document.getElementById('wps');
  if(b){
    const inDeck=!!state.flashCards[word];
    b.textContent=inDeck?'✓ カードに追加済み':'＋ カードに追加';
    b.classList.toggle('in-deck',inDeck);
  }
}

// ── RENDER: QUIZ ───────────────────────────────────────────
function startQuiz(){ ttsStop(); updateStreak(); navigate('quiz',{quizIndex:0,quizAnswers:[],comboStreak:0,lastRoundPoints:0,quizStartTime:Date.now(),_quizBusy:false}); }

// ── Quiz type helpers ──────────────────────────────────────
// Each story has hand-written MC questions in quiz[]. Other types are derived
// from story paragraphs + vocab on the fly, gated by level:
//   L1–2 (Pre-A1/A1): mc, dndblank            — recognition only
//   L3–4 (A2/B1):     + fitb, dndsent
//   L5–6 (B2/C1):     + type, dndmatch        — all six types
// Type order is shuffled deterministically per story (seeded by story id),
// so each story has its own rhythm but is stable across replays.
function storySeed(id){ let h=2166136261; for(let i=0;i<id.length;i++){ h^=id.charCodeAt(i); h=Math.imul(h,16777619); } return h>>>0; }
function seededRand(seed){ return function(){ seed|=0; seed=seed+0x6D2B79F5|0; let t=Math.imul(seed^seed>>>15,1|seed); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
function seededShuffle(arr,seed){ const a=arr.slice(), rnd=seededRand(seed); for(let i=a.length-1;i>0;i--){ const j=Math.floor(rnd()*(i+1)); const tmp=a[i]; a[i]=a[j]; a[j]=tmp; } return a; }
function getQuizType(story,qIndex){
  const lvl=story.levelId||1;
  let pool;
  if(lvl<=2) pool=['mc','dndblank'];
  else if(lvl<=4) pool=['mc','fitb','dndblank','dndsent'];
  else pool=['mc','fitb','type','dndblank','dndsent','dndmatch'];
  const order=seededShuffle(pool,storySeed(story.id));
  return order[qIndex % order.length];
}
function storySentences(story){
  const out=[];
  for(const p of (story.paragraphs||[])){
    for(const s of p.split(/(?<=[.!?])\s+/)){ const t=s.trim(); if(t) out.push(t); }
  }
  return out;
}

function buildFITB(story, qIndex){
  // Pick a vocab word that appears in a paragraph
  const words=Object.keys(story.vocabulary);
  const word=words[qIndex % words.length];
  for(const para of (story.paragraphs||[])){
    if(para.toLowerCase().includes(word.toLowerCase())){
      const blank=para.replace(new RegExp(word,'i'),'______');
      return {type:'fitb', question:blank, answer:word, feedback:`正解は "${word}" です。`};
    }
  }
  return null;
}

function buildTypeWord(story, qIndex){
  const words=Object.keys(story.vocabulary);
  const word=words[(qIndex+1) % words.length];
  const def=story.vocabulary[word]?.def||'';
  return {type:'type', question:def, answer:word, feedback:`正解は "${word}" です。`};
}

// ── Drag-and-drop builders ─────────────────────────────────
function buildDndBlank(story,qIndex){
  // Drag the right word into a blank in a story sentence (recognition — OK from L1)
  const words=Object.keys(story.vocabulary||{});
  if(words.length<3) return null;
  const sents=storySentences(story);
  for(let k=0;k<words.length;k++){
    const word=words[(qIndex+k)%words.length];
    const sent=sents.find(s=>s.toLowerCase().includes(word.toLowerCase()));
    if(!sent) continue;
    const esc=word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    const blank=sent.replace(new RegExp(esc,'i'),'______');
    const distractors=words.filter(w=>w.toLowerCase()!==word.toLowerCase()).slice(0,3);
    const tiles=seededShuffle([word].concat(distractors),storySeed(story.id)+qIndex);
    return {type:'dndblank',question:blank,answer:word,tiles,feedback:`正解は "${word}" です。`};
  }
  return null;
}
function buildDndSent(story,qIndex){
  // Rebuild a story sentence from shuffled word tiles
  const sents=storySentences(story).map(s=>s.replace(/["“”]/g,'').trim())
    .filter(s=>{const n=s.split(/\s+/).length;return n>=4&&n<=9;});
  if(!sents.length) return null;
  const sent=sents[qIndex%sents.length];
  const wordsArr=sent.split(/\s+/);
  let tiles=seededShuffle(wordsArr,storySeed(story.id)+qIndex+7);
  if(tiles.join(' ')===sent) tiles=tiles.slice().reverse();
  return {type:'dndsent',answer:sent,tiles,feedback:`正解: "${sent}"`};
}
function buildDndMatch(story,qIndex){
  // Drag vocab words onto their English definitions (L5–6 only)
  const entries=Object.entries(story.vocabulary||{}).filter(e=>e[1]&&e[1].def);
  if(entries.length<3) return null;
  const seen=new Set(), pairs=[];
  for(let k=0;k<entries.length&&pairs.length<3;k++){
    const e=entries[(qIndex+k)%entries.length];
    if(!seen.has(e[0])){ seen.add(e[0]); pairs.push({word:e[0],def:e[1].def}); }
  }
  if(pairs.length<3) return null;
  const tiles=seededShuffle(pairs.map(p=>p.word),storySeed(story.id)+qIndex+13);
  const rows=seededShuffle(pairs,storySeed(story.id)+qIndex+29);
  return {type:'dndmatch',pairs:rows,tiles,feedback:''};
}

function renderQuiz(){
  const story=getStory(); if(!story){navigate('home');return;}
  const qIdx=state.quizIndex;
  const total=story.quiz.length;
  const dots=story.quiz.map((_,i)=>`<div class="q-dot${i<qIdx?(state.quizAnswers[i]?.correct?' ok':' bad'):i===qIdx?' cur':''}"></div>`).join('');
  const qtype=getQuizType(story,qIdx);
  let qBody='';

  if(qtype==='fitb'){
    // Fill in the blank
    const fitb=buildFITB(story,qIdx);
    if(fitb){
      state._currentQ=fitb;
      qBody=`
        <div class="quiz-qnum">穴埋め問題</div>
        <div class="quiz-question">${fitb.question}</div>
        <div class="quiz-fitb-wrap">
          <input id="fitb-input" class="quiz-fitb-input" type="text" placeholder="答えを入力…" autocomplete="off" autocorrect="off" spellcheck="false">
          <button class="quiz-fitb-btn" onclick="checkFITB()">確認</button>
        </div>`;
    }
  } else if(qtype==='type'){
    // Type the word from definition — letter-slot UI
    const tw=buildTypeWord(story,qIdx);
    state._currentQ=tw;
    const slots=tw.answer.split('').map((_,i)=>`<div class="type-slot" id="tslot-${i}"></div>`).join('');
    qBody=`
      <div class="quiz-qnum">単語を答えよう</div>
      <div class="quiz-question">「${tw.question}」<br><small style="color:var(--text-muted)">この意味の英単語は？</small></div>
      <div class="type-slots-wrap">
        <div class="type-slots" id="typeSlots" onclick="document.getElementById('type-hidden-input').focus()">${slots}</div>
        <div class="type-hint">ヒント: ${tw.answer.length}文字</div>
        <input id="type-hidden-input" class="type-hidden-input" type="text" maxlength="${tw.answer.length}" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" oninput="updateTypeSlots(${tw.answer.length})">
        <button class="quiz-fitb-btn" id="type-submit-btn" onclick="checkTypeWord()" disabled>確認</button>
      </div>`;
  } else if(qtype==='dndblank'){
    const q=buildDndBlank(story,qIdx);
    if(q){
      state._currentQ=q;
      const qHtml=q.question.replace('______','<span id="dnd-blank-zone" class="dnd-blank-zone" ondragover="dndAllowDrop(event)" ondrop="dndDropBlank(event)">＿＿＿</span>');
      qBody=`
        <div class="quiz-qnum">単語をドラッグしよう</div>
        <div class="quiz-question">${qHtml}</div>
        <div class="dnd-bank">${q.tiles.map((w,i)=>`<button class="dnd-tile" draggable="true" ondragstart="dndDragStart(event,${i})" onclick="dndBlankPick(${i})">${w}</button>`).join('')}</div>`;
    }
  } else if(qtype==='dndsent'){
    const q=buildDndSent(story,qIdx);
    if(q){
      q._placed=[]; state._currentQ=q;
      qBody=`
        <div class="quiz-qnum">文を作ろう</div>
        <div class="quiz-question">単語を正しい順番に並べよう</div>
        <div class="dnd-zone" id="dnd-sent-row" ondragover="dndAllowDrop(event)" ondrop="dndDropSent(event)"></div>
        <div class="dnd-bank" id="dnd-sent-bank"></div>
        <button class="dnd-check-btn" id="dnd-check" onclick="checkDndSent()" disabled>確認</button>`;
    }
  } else if(qtype==='dndmatch'){
    const q=buildDndMatch(story,qIdx);
    if(q){
      q._slots={}; q._sel=null; state._currentQ=q;
      qBody=`
        <div class="quiz-qnum">単語と意味を合わせよう</div>
        ${q.pairs.map((p,s)=>`<div class="dnd-match-row"><div class="dnd-slot" id="dnd-slot-${s}" onclick="dndMatchSlotClick(${s})" ondragover="dndAllowDrop(event)" ondrop="dndDropMatch(event,${s})">＿＿＿</div><div class="dnd-match-def">${p.def}</div></div>`).join('')}
        <div class="dnd-bank" id="dnd-match-bank"></div>
        <button class="dnd-check-btn" id="dnd-check" onclick="checkDndMatch()" disabled>確認</button>`;
    }
  }

  if(qtype==='mc' || !qBody){
    // Standard MC
    const q=story.quiz[qIdx];
    state._currentQ={type:'mc', ...q};
    const opts=q.options.map((o,i)=>`<button class="q-opt" data-i="${i}" onclick="pick(${i})">
      <span class="opt-letter">${'ABCD'[i]}</span>${o}</button>`).join('');
    qBody=`
      <div class="quiz-qnum">問題 ${qIdx+1}</div>
      <div class="quiz-question">${q.question}</div>
      <div class="quiz-options">${opts}</div>`;
  }

  document.getElementById('app').innerHTML=`
  <div class="screen">
    <div class="nav-bar"><button class="back-btn" onclick="navigate('reader',{storyId:'${story.id}'})">←</button><h2>クイズ</h2></div>
    <div class="quiz-progress"><span class="q-label">Q${qIdx+1}/${total}</span><div class="q-dots">${dots}</div><span class="combo-pill${(state.comboStreak||0)>=2?' show':''}" id="comboPill">🔥 ×${state.comboStreak||0} コンボ</span></div>
    <div class="quiz-body">
      ${qBody}
      <div class="quiz-fb" id="qfb"></div>
      <button class="quiz-next" id="qnxt" onclick="nextQ()">${qIdx+1<total?'次へ →':'結果を見る →'}</button>
    </div>
  </div>`;
  // Populate dynamic DnD areas
  if(state._currentQ?.type==='dndsent') renderDndSent();
  if(state._currentQ?.type==='dndmatch') renderDndMatch();
  // Focus text input if present
  setTimeout(()=>(document.getElementById('fitb-input')||document.getElementById('type-hidden-input'))?.focus(),100);
  // Record when this question was shown (for speed bonus)
  state._questionStartTime = Date.now();
}

// ── Drag-and-drop interaction ──────────────────────────────
let _dragTile=null;
function dndDragStart(e,i){ _dragTile=i; if(e.dataTransfer) e.dataTransfer.setData('text/plain',String(i)); }
function dndAllowDrop(e){ e.preventDefault(); }
function dndDropBlank(e){ e.preventDefault(); if(_dragTile!=null) dndBlankPick(_dragTile); _dragTile=null; }
function dndDropSent(e){ e.preventDefault(); if(_dragTile!=null) dndSentPick(_dragTile); _dragTile=null; }
function dndDropMatch(e,slot){ e.preventDefault(); if(_dragTile!=null) dndMatchPlace(_dragTile,slot); _dragTile=null; }

function finishDnd(ok,selected,q){
  state._answerTime=Date.now();
  state.quizAnswers.push({selected,correct:ok});
  const fb=document.getElementById('qfb');
  fb.style.display='block'; fb.className='quiz-fb '+(ok?'ok':'bad');
  fb.innerHTML=(ok?'<strong>✓ 正解！</strong> ':'<strong>✗ 不正解</strong> ')+q.feedback;
  const n=document.getElementById('qnxt'); if(n) n.classList.add('vis');
}

// dndblank: tap or drop a word into the blank — answers immediately
function dndBlankPick(i){
  const q=state._currentQ; if(!q||q._done) return; q._done=true;
  const pickWord=q.tiles[i];
  const ok=pickWord.toLowerCase()===q.answer.toLowerCase();
  const zone=document.getElementById('dnd-blank-zone');
  if(zone){ zone.textContent=pickWord; zone.classList.add(ok?'ok':'bad'); }
  document.querySelectorAll('.dnd-tile').forEach(b=>b.disabled=true);
  finishDnd(ok,pickWord,q);
}

// dndsent: build the sentence tile by tile
function dndSentPick(i){
  const q=state._currentQ; if(!q||q._done||q._placed.includes(i)) return;
  q._placed.push(i); renderDndSent();
}
function dndSentRemove(pos){
  const q=state._currentQ; if(!q||q._done) return;
  q._placed.splice(pos,1); renderDndSent();
}
function renderDndSent(){
  const q=state._currentQ;
  const row=document.getElementById('dnd-sent-row');
  const bank=document.getElementById('dnd-sent-bank');
  if(!q||!row||!bank) return;
  row.innerHTML=q._placed.map((ti,pos)=>`<button class="dnd-tile placed" onclick="dndSentRemove(${pos})">${q.tiles[ti]}</button>`).join('')||'<span class="dnd-hint">ここに単語を並べよう（タップでもOK）</span>';
  bank.innerHTML=q.tiles.map((w,i)=>q._placed.includes(i)?'':`<button class="dnd-tile" draggable="true" ondragstart="dndDragStart(event,${i})" onclick="dndSentPick(${i})">${w}</button>`).join('');
  const btn=document.getElementById('dnd-check'); if(btn) btn.disabled=q._placed.length!==q.tiles.length;
}
function checkDndSent(){
  const q=state._currentQ; if(!q||q._done) return; q._done=true;
  const built=q._placed.map(ti=>q.tiles[ti]).join(' ');
  const norm=s=>s.toLowerCase().replace(/[.,!?'"]/g,'').replace(/\s+/g,' ').trim();
  const ok=norm(built)===norm(q.answer);
  const btn=document.getElementById('dnd-check'); if(btn) btn.disabled=true;
  document.querySelectorAll('.dnd-tile').forEach(b=>b.disabled=true);
  finishDnd(ok,built,q);
}

// dndmatch: drag (or tap-select then tap-slot) words onto definitions
function dndMatchSelect(i){
  const q=state._currentQ; if(!q||q._done) return;
  q._sel=(q._sel===i?null:i); renderDndMatch();
}
function dndMatchPlace(tileIdx,slot){
  const q=state._currentQ; if(!q||q._done) return;
  for(const k in q._slots){ if(q._slots[k]===tileIdx) delete q._slots[k]; }
  q._slots[slot]=tileIdx; q._sel=null; renderDndMatch();
}
function dndMatchSlotClick(slot){
  const q=state._currentQ; if(!q||q._done) return;
  if(q._sel!=null) dndMatchPlace(q._sel,slot);
  else if(q._slots[slot]!=null){ delete q._slots[slot]; renderDndMatch(); }
}
function renderDndMatch(){
  const q=state._currentQ;
  const bank=document.getElementById('dnd-match-bank');
  if(!q||!bank) return;
  const used=Object.values(q._slots);
  bank.innerHTML=q.tiles.map((w,i)=>used.includes(i)?'':`<button class="dnd-tile${q._sel===i?' sel':''}" draggable="true" ondragstart="dndDragStart(event,${i})" onclick="dndMatchSelect(${i})">${w}</button>`).join('');
  q.pairs.forEach((p,s)=>{
    const z=document.getElementById('dnd-slot-'+s); if(!z) return;
    z.textContent=q._slots[s]!=null?q.tiles[q._slots[s]]:'＿＿＿';
    z.classList.toggle('filled',q._slots[s]!=null);
  });
  const btn=document.getElementById('dnd-check'); if(btn) btn.disabled=Object.keys(q._slots).length!==q.pairs.length;
}
function checkDndMatch(){
  const q=state._currentQ; if(!q||q._done) return; q._done=true;
  let allOk=true;
  q.pairs.forEach((p,s)=>{
    const ok=q.tiles[q._slots[s]]===p.word;
    if(!ok) allOk=false;
    const z=document.getElementById('dnd-slot-'+s); if(z) z.classList.add(ok?'ok':'bad');
  });
  const btn=document.getElementById('dnd-check'); if(btn) btn.disabled=true;
  document.querySelectorAll('.dnd-tile').forEach(b=>b.disabled=true);
  q.feedback=q.pairs.map(p=>`${p.word} = ${p.def}`).join('<br>');
  const ansStr=q.pairs.map((p,s)=>q.tiles[q._slots[s]]).join(',');
  finishDnd(allOk,ansStr,q);
}

function pick(i){
  const story=getStory(); const q=story.quiz[state.quizIndex];
  document.querySelectorAll('.q-opt').forEach(b=>b.disabled=true);
  const ok=i===q.correct;
  document.querySelectorAll('.q-opt')[i].classList.add(ok?'ok':'bad');
  if(!ok) document.querySelectorAll('.q-opt')[q.correct].classList.add('ok');
  state._answerTime = Date.now();
  state.quizAnswers.push({selected:i,correct:ok});
  const fb=document.getElementById('qfb');
  fb.style.display='block'; fb.className='quiz-fb '+(ok?'ok':'bad');
  fb.innerHTML=(ok?'<strong>✓ 正解！</strong> ':'<strong>💡 惜しい！もう一度見てみよう。</strong> ')+q.feedback;
  const n=document.getElementById('qnxt'); if(n) n.classList.add('vis');
}

function checkFITB(){
  const input=document.getElementById('fitb-input');
  if(!input) return;
  const q=state._currentQ;
  const answer=input.value.trim().toLowerCase();
  const ok=answer===q.answer.toLowerCase();
  input.disabled=true;
  document.querySelector('.quiz-fitb-btn').disabled=true;
  state._answerTime = Date.now();
  state.quizAnswers.push({selected:answer,correct:ok});
  const fb=document.getElementById('qfb');
  fb.style.display='block'; fb.className='quiz-fb '+(ok?'ok':'bad');
  fb.innerHTML=(ok?'<strong>✓ 正解！</strong>':'<strong>✗ 不正解</strong> ')+q.feedback;
  const n=document.getElementById('qnxt'); if(n) n.classList.add('vis');
}

function updateTypeSlots(len){
  const input=document.getElementById('type-hidden-input');
  if(!input) return;
  const val=input.value.replace(/[^a-zA-Z]/g,'').slice(0,len).toLowerCase();
  input.value=val;
  for(let i=0;i<len;i++){
    const slot=document.getElementById('tslot-'+i);
    if(!slot) continue;
    slot.textContent=val[i]?val[i].toUpperCase():'';
    slot.classList.toggle('filled',!!val[i]);
    slot.classList.toggle('cursor',i===val.length);
  }
  const btn=document.getElementById('type-submit-btn');
  if(btn) btn.disabled = val.length!==len;
}

function checkTypeWord(){
  const input=document.getElementById('type-hidden-input');
  if(!input) return;
  const q=state._currentQ;
  const answer=input.value.trim().toLowerCase();
  const ok=answer===q.answer.toLowerCase();
  input.disabled=true;
  document.getElementById('type-submit-btn').disabled=true;
  state._answerTime = Date.now();
  state.quizAnswers.push({selected:answer,correct:ok});
  const fb=document.getElementById('qfb');
  fb.style.display='block'; fb.className='quiz-fb '+(ok?'ok':'bad');
  fb.innerHTML=(ok?'<strong>✓ 正解！</strong>':'<strong>✗ 不正解</strong> ')+q.feedback;
  const slotsWrap=document.getElementById('typeSlots');
  if(slotsWrap) slotsWrap.classList.add(ok?'slots-ok':'slots-bad');
  const n=document.getElementById('qnxt'); if(n) n.classList.add('vis');
}

function nextQ(){
  if(state._quizBusy) return;
  state._quizBusy=true;
  const story=getStory();
  const lastAnswer=state.quizAnswers[state.quizAnswers.length-1];
  const correct=lastAnswer?.correct||false;

  // Update combo streak
  if(correct){ state.comboStreak=(state.comboStreak||0)+1; }
  else { state.comboStreak=0; }

  // Calculate points for this question
  const elapsed=(state._answerTime||Date.now())-(state._questionStartTime||Date.now());
  const multiplier=Math.min(Math.max(state.comboStreak,1),5);
  let pts=0;
  if(correct){
    pts=10*multiplier;
    if(elapsed<4000) pts+=5; // speed bonus: answered within 4 seconds
  }
  state.lastRoundPoints=(state.lastRoundPoints||0)+pts;

  const isLast=state.quizIndex+1>=story.quiz.length;

  // Show combo overlay, then proceed
  showComboOverlay(correct, pts, state.comboStreak, ()=>{
    state._quizBusy=false;
    if(isLast) finishQuiz();
    else{ state.quizIndex++; renderQuiz(); }
  });
}

// ── COMBO OVERLAY ──────────────────────────────────────────
function showComboOverlay(correct, pts, streak, callback){
  const app=document.getElementById('app');
  const overlay=document.createElement('div');
  overlay.className='combo-overlay';
  const isCombo=correct && streak>=2;
  const multiplier=Math.min(streak,5);

  let label;
  if(isCombo) label=`×${multiplier} COMBO!`;
  else if(correct) label='CORRECT!';
  else label='WRONG!';

  const frogEmoji=correct?(streak>=3?'🐸✨':'🐸'):'😔';
  const ptsHtml=pts>0
    ?`<div class="combo-pts-pill">+${pts} pts</div>` : '';
  const streakHtml=isCombo
    ?`<div class="combo-streak-line">🔥 ${streak} in a row!</div>` : '';

  overlay.innerHTML=`
    <div class="combo-inner">
      <span class="combo-frog-em">${frogEmoji}</span>
      <div class="combo-label ${correct?'is-correct':'is-wrong'}">${label}</div>
      ${ptsHtml}
      ${streakHtml}
    </div>`;

  app.appendChild(overlay);
  let gone=false;
  const dismiss=()=>{
    if(gone) return; gone=true;
    const inner=overlay.querySelector('.combo-inner');
    if(inner) inner.classList.add('combo-exit');
    setTimeout(()=>{ overlay.remove(); callback(); }, 240);
  };
  overlay.addEventListener('click', dismiss);
  // Auto-dismiss: shorter since it's no longer blocking
  setTimeout(dismiss, isCombo ? 1400 : 1000);
}

function finishQuiz(){
  const story=getStory();
  const correct=state.quizAnswers.filter(a=>a.correct).length;
  const total=story.quiz.length; const score=correct/total;
  const earned=storyXP(story,score);
  const wasNew=!state.progress[story.id];

  // Previous best points for this story (0 if never played)
  const prevBestPts=state.progress[story.id]?.pts||0;

  if((state.progress[story.id]?.score||0)<score)
    state.progress[story.id]={...(state.progress[story.id]||{}),score,at:new Date().toISOString()};
  state.xp+=earned;

  // Perfect round bonus
  const perfect=correct===total;
  if(perfect) state.lastRoundPoints=(state.lastRoundPoints||0)+25;

  // Super Fast bonus: avg under 10s per question
  const elapsed=Date.now()-(state.quizStartTime||Date.now());
  const fast=elapsed/total<10000;
  if(fast) state.lastRoundPoints=(state.lastRoundPoints||0)+15;

  const roundPts=state.lastRoundPoints||0;

  // Only add the improvement delta — retries can't re-earn already-banked points
  const pointsToAdd=Math.max(0, roundPts-prevBestPts);
  state.points=(state.points||0)+pointsToAdd;

  // Save new best if improved
  if(roundPts>prevBestPts)
    state.progress[story.id]={...(state.progress[story.id]||{}),pts:roundPts};

  state.comboStreak=0;
  calcTodayCount();
  // Check if this story completion finishes a sub-level for the first time
  const sl=story.levelId===6 ? story.subLevel-1 : story.subLevel;
  const justUnlocked=wasNew && subLevelDone(story.levelId, sl);
  // Award a travel ticket for each newly completed sub-level
  const earnedTicket=justUnlocked && story.levelId>=3;
  if(earnedTicket) state.tickets=(state.tickets||0)+1;
  save();
  navigate('results',{lastScore:score,lastCorrect:correct,lastTotal:total,lastXP:earned,
    lastSubLevelUnlocked:justUnlocked?sl:null,lastLevelId:story.levelId,
    lastTicketEarned:earnedTicket,
    lastRoundPoints:roundPts,lastPointsAdded:pointsToAdd,lastWasPerfect:perfect,lastWasFast:fast});
}

// ── FROG GROWTH PANEL (overall account-level progression) ──
function buildFrogGrowthPanel(levelId){
  const stages=[{label:'たまご',emoji:'🥚'},{label:'おたまじゃくし',emoji:'🐸'},{label:'こがえる',emoji:'🐸'},{label:'かえる',emoji:'🐸'}];
  const lv=levelId||1;
  const stageOf=l=>l<=1?0:l<=3?1:l<=5?2:3;
  const cur=stageOf(lv);
  const nextLv=cur===0?2:cur===1?4:cur===2?6:null;
  const footNote=nextLv ? `あと${nextLv-lv}レベルで${stages[cur+1].label}に成長！` : 'さいごのステージまで成長した！🎉';
  const stagesHtml=stages.map((s,i)=>{
    const st=i<cur?'past':i===cur?'current':'future';
    return `<div class="frog-stage ${st}">
      <div class="frog-stage-circle">${s.emoji}</div>
      <div class="frog-stage-label">${s.label}</div>
      ${i===cur?'<div class="frog-stage-here">いまここ！</div>':''}
    </div>`;
  }).join('<div class="frog-stage-divider"></div>');
  return `<div class="frog-growth-panel">
    <div class="frog-growth-label">カエルのせいちょう</div>
    <div class="frog-growth-track">${stagesHtml}</div>
    <div class="frog-growth-note">${footNote}</div>
  </div>`;
}

// ── POINTS GAUGE helpers ───────────────────────────────────
function buildPointsGauge(roundPts, perfect, fast){
  const perfectBadge=perfect?`<div class="pts-perfect-badge">⭐ Perfect Round +25</div>`:'';
  const fastBadge=fast?`<div class="pts-fast-badge">⚡ Speedy +15</div>`:'';
  const badgesHtml=(perfect||fast)?`<div class="pts-badges">${perfectBadge}${fastBadge}</div>`:'';
  // Life-cycle stages: eggs → tadpole → froglet → juvenile → adult (bottom→top order, rendered top→bottom)
  const stages=['🐸','🐸','🦎','🐟','🫧'];
  const stagesHtml=stages.map((s,i)=>`<div class="pts-life-stage" id="life-stage-${4-i}">${s}</div>`).join('');
  return `<div class="pts-gauge-wrap" id="pts-gauge">
    <div class="pts-gauge-top">
      <div class="pts-life-track">${stagesHtml}</div>
      <div class="pts-gauge-right">
        <div class="pts-round-line">
          <span class="pts-round-prefix">+</span><span class="pts-round-num" id="pts-num">0</span>
          <span class="pts-round-pts-label">Points</span>
        </div>
        <div class="pts-total-label">Total Points Earned:</div>
        <div class="pts-total-num" id="pts-total-disp">${state.points - (state.lastPointsAdded||0)}</div>
        ${badgesHtml}
      </div>
    </div>
    <div class="pts-stat-cards">
      <div class="res-card"><div class="rc-icon">⚡</div><div class="rc-val">+${state.lastXP}</div><div class="rc-label">XP</div></div>
      <div class="res-card"><div class="rc-icon">🔥</div><div class="rc-val">${state.streak}</div><div class="rc-label">連続</div></div>
      <div class="res-card"><div class="rc-icon">🟢</div><div class="rc-val">${state.points}</div><div class="rc-label">合計</div></div>
    </div>
  </div>`;
}

function animatePointsGauge(roundPts, totalQ, perfect, fast){
  const ptsNum=document.getElementById('pts-num');
  const ptsTotalDisp=document.getElementById('pts-total-disp');
  const lifeStages=[0,1,2,3,4].map(i=>document.getElementById('life-stage-'+i));
  if(!ptsNum) return;

  // Which life stages to light up (0=eggs … 4=adult frog)
  const maxPts=(10*5+5)*totalQ+25;
  const ratio=Math.min(roundPts/Math.max(maxPts*0.75,1),1);
  const activeStage=Math.min(Math.floor(ratio*5),4);

  setTimeout(()=>{
    // Light up stages bottom→top, staggered
    for(let i=0;i<=activeStage;i++){
      setTimeout(()=>{ lifeStages[i]?.classList.add('lit'); },i*200);
    }
    // Count up round points over 3 seconds (ease-out cubic)
    const duration=3000;
    const startTime=performance.now();
    const tick=setInterval(()=>{
      const elapsed=performance.now()-startTime;
      const progress=Math.min(elapsed/duration,1);
      const eased=1-Math.pow(1-progress,3);
      if(ptsNum) ptsNum.textContent=Math.round(eased*roundPts);
      if(progress>=1){
        clearInterval(tick);
        if(ptsNum) ptsNum.textContent=roundPts;
        // Count up total (only by the delta actually added)
        if(ptsTotalDisp){
          const pointsAdded=state.lastPointsAdded||0;
          const startTotal=state.points-pointsAdded;
          let ct=startTotal;
          const inc=Math.max(pointsAdded/20,0.1);
          const totalTick=setInterval(()=>{
            ct=Math.min(ct+inc,state.points);
            ptsTotalDisp.textContent=Math.round(ct);
            if(ct>=state.points){ clearInterval(totalTick); ptsTotalDisp.textContent=state.points; }
          },40);
        }
        // Burst stat cards one by one
        document.querySelectorAll('.res-card').forEach((card,i)=>{
          setTimeout(()=>{ card.classList.add('burst'); },i*180+200);
        });
      }
    },40);
  },350);
}

// ── FLASH CARD PLAY MODE ───────────────────────────────────
function startFlashCardPlay(hardOnly=false){
  const keys=hardOnly && state.fcHard?.length ? [...state.fcHard] : Object.keys(state.flashCards);
  if(!keys.length) return;
  // Fisher-Yates shuffle
  const order=[...keys];
  for(let i=order.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [order[i],order[j]]=[order[j],order[i]];
  }
  navigate('fcplay',{fcOrder:order,fcStudyIndex:0,fcHard:[]});
}

function flipCard(){
  const inner=document.getElementById('fc-card-inner');
  if(!inner) return;
  if(!inner.classList.contains('flipped')){
    inner.classList.add('flipped');
    const nav=document.getElementById('fc-nav');
    if(nav) nav.style.display='flex';
  }
}

function fcMark(result){
  if(!state.fcHard) state.fcHard=[];
  const word=state.fcOrder[state.fcStudyIndex];
  if(result==='hard' && !state.fcHard.includes(word)) state.fcHard.push(word);
  state.fcStudyIndex++;
  renderFlashCardPlay();
}

function fcStep(dir){
  const next=state.fcStudyIndex+dir;
  if(next<0||next>=state.fcOrder.length) return;
  state.fcStudyIndex=next;
  renderFlashCardPlay();
}

async function fetchCardTranslation(word, e){
  if(e) e.stopPropagation(); // don't flip card
  const btn=document.getElementById('fc-tl-btn');
  if(btn){ btn.textContent='翻訳中…'; btn.disabled=true; }
  const lang='ja';
  const tr=await translateWord(word, lang);
  if(state.flashCards[word]){
    state.flashCards[word].translation = tr||'';
    state.flashCards[word].lang = lang;
    save();
  }
  // Replace the button with the translation display
  const container=btn?.parentElement;
  if(container && tr){
    const div=document.createElement('div');
    div.className='fc-back-tl-block';
    div.innerHTML=`<span class="fc-back-tl-lang">${lang.toUpperCase()}</span><span class="fc-back-tl-text">${tr}</span>`;
    container.replaceChild(div, btn);
  } else if(btn){
    btn.textContent='';
    btn.disabled=false;
  }
}

  for(let i=0;i<60;i++){
    const d=document.createElement('div'); d.className='confetti-dot';
    d.style.cssText=`left:${Math.random()*100}%;top:-10px;background:${cols[i%4]};
      animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*.8}s;
      width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:50%`;
    c.appendChild(d);
  }
  setTimeout(()=>c.remove(),4000);
}

function hasAvailableDeparture(){
  if((state.tickets||0)<1) return false;
  for(let i=1;i<DESTINATIONS.length;i++){
    const dest=DESTINATIONS[i];
    const prev=DESTINATIONS[i-1];
    const js=getJourneyState(dest.id);
    if(js.departed) continue;                          // already open
    const prevJs=getJourneyState(prev.id);
    if(prevJs.stamped) return true;                    // prev stamped → depart available
  }
  return false;
}

    if(!state.flashCards[w]) state.flashCards[w]={def:'A bonus word from '+dest.name+'.',pos:'noun',lang:null,translation:null};
  });
  save();
}

function learnJourneyWord(destId, word){

// ── JOURNEY CULTURE QUIZ ────────────────────────────────────
function renderJourneyQuiz(){
  const dest=DESTINATIONS.find(d=>d.id===state.destId);
  if(!dest){navigate('journey');return;}
  if(!journeyAllStoriesDone(dest.id)||!journeyAllWordsDone(dest.id)){
    navigate('destination',{destId:dest.id}); return;
  }
  const qIdx=state.journeyQuizIndex||0;
  const q=dest.cultureQuiz[qIdx];
  const answered=state.journeyQuizAnswer!==undefined && state.journeyQuizAnswer!==null;
  const correct=answered && state.journeyQuizAnswer===q.correct;

  const opts=q.options.map((o,i)=>{
    let cls='q-opt';
    if(answered){
      if(i===q.correct) cls+=' ok';
      else if(i===state.journeyQuizAnswer) cls+=' bad';
    }
    return `<button class="${cls}" ${answered?'disabled':''} onclick="answerJourneyQuiz(${i})">
      <span class="opt-letter">${String.fromCharCode(65+i)}</span>${o}
    </button>`;
  }).join('');

  const isLast=qIdx>=dest.cultureQuiz.length-1;

  document.getElementById('app').innerHTML=`
  <div class="screen">
    <div class="nav-bar">
      <button class="back-btn" onclick="navigate('destination',{destId:'${dest.id}'})">←</button>
      <h2>🧠 Culture Quiz</h2>
    </div>
    <div class="quiz-body">
      <div class="quiz-qnum">問題 ${qIdx+1} / ${dest.cultureQuiz.length}</div>
      <div class="quiz-question">${q.question}</div>
      <div class="quiz-options">${opts}</div>
      ${answered?`<div class="quiz-fb ${correct?'ok':'bad'}" style="display:block">${correct?'✓ 正解！':'✗ 惜しい！ステップ'+(state.journeyQuizIndex+1)+'を読み直して、もう一度試してみよう。'} ${q.feedback}</div>`:''}
      ${answered?`<button class="quiz-next vis" onclick="${isLast?`finishJourneyQuiz()`:`nextJourneyQuestion()`}">${isLast?'結果を見る →':'次へ →'}</button>`:''}
    </div>
  </div>`;
}

function answerJourneyQuiz(idx){
  state.journeyQuizAnswer=idx;
  if(!state.journeyQuizCorrect) state.journeyQuizCorrect=0;
  const dest=DESTINATIONS.find(d=>d.id===state.destId);
  if(idx===dest.cultureQuiz[state.journeyQuizIndex||0].correct) state.journeyQuizCorrect++;
  renderJourneyQuiz();
}

function nextJourneyQuestion(){
  state.journeyQuizIndex=(state.journeyQuizIndex||0)+1;
  state.journeyQuizAnswer=null;
  renderJourneyQuiz();
}

function finishJourneyQuiz(){
  const score=state.journeyQuizCorrect||0;
  const js=getJourneyState(state.destId);
  js.quizScore=score;
  save();
  // Reset temp state
  state.journeyQuizIndex=0; state.journeyQuizAnswer=null; state.journeyQuizCorrect=0;
  navigate('destination',{destId:state.destId});
}

// ── JOURNEY STORY READER ───────────────────────────────────
function renderJourneyReader(){
  const dest=DESTINATIONS.find(d=>d.id===state.destId);
  if(!dest){navigate('journey');return;}
  const stories=JOURNEY_STORIES[dest.id]||[];
  const js=getJourneyState(dest.id);

  const cards=stories.map((story,i)=>{
    const done=js.storiesDone.includes(story.id);
    // Sequential unlock: story unlocks when previous is done (or it's first)
    const locked=i>0 && !js.storiesDone.includes(stories[i-1].id);
    return `<div class="story-card${done?' done':''}${locked?' locked-story':''}"
      ${locked?'':` onclick="navigate('journeyreaderpage',{destId:'${dest.id}',journeyStoryId:'${story.id}'})"`}>
      <div class="story-emoji">${story.emoji}</div>
      <div class="story-info">
        <h3>${story.title}</h3>
        <p>${story.blurb}</p>
        <div class="story-meta">
          <span class="meta-chip">📖 ${story.wordCount}w</span>
          <span class="meta-chip">⏱ ~${story.readMins}m</span>
          ${done?'<span class="meta-chip" style="color:var(--primary);font-weight:700">✓ 完了</span>':''}
          ${locked?'<span class="meta-chip">🔒 先に${i}話を読もう</span>':''}
        </div>
      </div>
      ${!locked?`<div class="story-action">
        <button class="read-btn" onclick="event.stopPropagation();navigate('journeyreaderpage',{destId:'${dest.id}',journeyStoryId:'${story.id}'})">${done?'もう一度読む':'読む'}</button>
      </div>`:''}
    </div>`;
  }).join('');

  document.getElementById('app').innerHTML=`
  <div class="screen has-tab-bar">
    <div class="nav-bar">
      <button class="back-btn" onclick="navigate('destination',{destId:'${dest.id}'})">←</button>
      <h2>📖 ${dest.name}のお話</h2>
    </div>
    <div class="stories-list">${cards}</div>
  </div>
  ${tabBar()}`;
}

// ── JOURNEY STORY PAGE (reader) ─────────────────────────────
function renderJourneyReaderPage(){
  // Uses the same reader engine — we just swap in the journey story object
  const story=JOURNEY_STORIES[state.destId]?.find(s=>s.id===state.journeyStoryId);
  if(!story){navigate('journeyreader',{destId:state.destId});return;}

  const steps=story.paragraphs; // always paragraph mode for journey stories
  const step=Math.min(state.readerStep||0, steps.length-1);
  const pct=Math.round((step+1)/steps.length*100);
  const isLast=step>=steps.length-1;
  const chips=Object.keys(story.vocabulary).map(w=>`<button class="vocab-chip" onclick="showPopup('${w}',null,null)">${w}</button>`).join('');
  const backBtn=step>0?`<button class="reader-back-btn" onclick="journeyStepBack()">← 戻る</button>`:'';

  const bottomHTML=isLast
    ?`<div class="vocab-section"><h4>📘 重要な言葉 — タップして確認</h4><div class="vocab-chips">${chips}</div></div>
      <div class="reader-bottom">
        ${backBtn?`<div class="reader-bottom-row">${backBtn}<button class="finish-btn reader-next-btn" onclick="finishJourneyStory()">Done ✓</button></div>`
        :`<button class="finish-btn" onclick="finishJourneyStory()">Done ✓</button>`}
      </div>`
    :`<div class="reader-bottom">
        ${backBtn?`<div class="reader-bottom-row">${backBtn}<button class="finish-btn reader-next-btn" onclick="journeyStepNext()">次へ →</button></div>`
        :`<button class="finish-btn" onclick="journeyStepNext()">次へ →</button>`}
        <div class="step-counter">${step+1} / ${steps.length}</div>
      </div>`;

  const ttsBar=`<div class="tts-bar" id="tts-bar">
    <button id="tts-play-btn" class="tts-play-btn${tts.active&&!tts.paused?' paused':''}" onclick="ttsToggle()">${tts.active&&!tts.paused?'⏸':'▶'}</button>
    <button class="tts-stop-btn" onclick="ttsStop()">■</button>
    <span class="tts-label">🔊 聴く</span>
    ${buildTTSRateSlider()}
  </div>`;

  document.getElementById('app').innerHTML=`
  <div class="screen reader-screen">
    <div class="reader-prog-bar"><div class="reader-prog-fill" style="width:${pct}%"></div></div>
    <div class="reader-time-est">残り ${estReadingMinutes(steps,step)}分</div>
    <div class="reader-header">
      <button class="back-btn" onclick="ttsStop();navigate('journeyreader',{destId:'${state.destId}'})">←</button>
      <h3>${story.title}</h3>
      <button id="tts-icon-btn" class="icon-btn${tts.active?' tts-active':''}" onclick="ttsToggle()">🔊</button>
    </div>
    ${ttsBar}
    <div class="reader-body" id="rbody"><p class="step-new">${text}</p></div>
    ${bottomHTML}
  </div>`;
  document.querySelectorAll('.tappable').forEach(el=>{
    el.addEventListener('click',function(e){
      if(this.dataset.challenge) showChallengePopup(this.dataset.word,this.dataset.challenge,e,this);
      else showPopup(this.dataset.word,e,this);
    });
  });
  addTTSWordSpans();
}
function journeyStepNext(){
  const story=JOURNEY_STORIES[state.destId]?.find(s=>s.id===state.journeyStoryId);
  if(!story) return;
  if((state.readerStep||0)<story.paragraphs.length-1){
    speechSynthesis.cancel(); tts.active=false; tts.paused=false;
    state.readerStep=(state.readerStep||0)+1; renderJourneyReaderPage();
  }
}
function journeyStepBack(){
  if((state.readerStep||0)>0){
    speechSynthesis.cancel(); tts.active=false; tts.paused=false;
    state.readerStep=(state.readerStep||0)-1; renderJourneyReaderPage();
  }
}
function finishJourneyStory(){
  ttsStop();
  markJourneyStoryDone(state.destId, state.journeyStoryId);
  navigate('journeyreader',{destId:state.destId});
}

// ── WORLD JOURNEY HUB ──────────────────────────────────────
function renderJourneyHub(){
  const tickets=state.tickets||0;
  const cards=DESTINATIONS.map((dest,i)=>{
    const js=getJourneyState(dest.id);
    const stories=JOURNEY_STORIES[dest.id]||[];
    const totalTasks=stories.length + dest.localWords.length + 1;
    const doneTasks=js.storiesDone.length + js.wordsDone.length + (js.quizScore!==null?1:0);
    const pct=totalTasks?Math.round(doneTasks/totalTasks*100):0;
    const stamped=js.stamped;

    // Three-state lock logic
    const prevDest=i>0?DESTINATIONS[i-1]:null;
    const prevStamped=!prevDest||getJourneyState(prevDest.id).stamped;
    const departed=i===0||js.departed;           // first dest always open
    const canDepart=!departed&&prevStamped;       // ticket gate available
    const fullyLocked=!departed&&!prevStamped;    // previous not finished yet

    let cls, badge, onclick='', extraContent='';
    if(stamped){
      cls='stamped-dest';
      badge=`<span class="dest-hub-badge dhb-stamped">✓ スタンプ済み</span>`;
      extraContent=`<div class="dest-stamp" title="スタンプ済み">✓</div>`;
    } else if(departed){
      cls='active-dest';
      badge=`<span class="dest-hub-badge dhb-open">開放中</span>`;
      onclick=`onclick="navigate('destination',{destId:'${dest.id}'})"`;
    } else if(canDepart){
      cls='depart-dest';
      badge=`<span class="dest-hub-badge" style="background:#fff3cc;color:#7a4800;border:1px solid #f9ad3b">✈️ 出発できる</span>`;
      extraContent=`<button class="depart-btn" ${tickets>0?`onclick="departTo('${dest.id}')"`:' disabled'}>
        ${tickets>0?`✈️ Depart &nbsp;🎫×1`:`🎫 No tickets yet`}
      </button>`;
    } else {
      cls='locked-dest';
      badge=`<span class="dest-hub-badge dhb-locked">🔒 ロック中</span>`;
    }

    return `<div class="dest-hub-card ${cls}" ${onclick}>
      <span class="dest-emoji">${dest.emoji}</span>
      <div class="dest-hub-info" style="flex:1">
        <h3>${dest.name}</h3>
        <div class="dest-country">${dest.country}</div>
        ${departed&&!stamped?`<div class="dest-hub-prog"><div class="dest-hub-prog-fill" style="width:${pct}%"></div></div>
        <div style="font-size:.72rem;color:var(--text-muted);margin-top:3px">${doneTasks} / ${totalTasks} タスク</div>`:''}
        ${canDepart?extraContent:''}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
        ${badge}
        ${stamped?extraContent:''}
      </div>
    </div>`;
  }).join('');

  const ticketDisplay=tickets>0
    ?`<div class="journey-ticket-count">🎫 ${tickets} ticket${tickets===1?'':'s'}</div>`
    :`<div class="journey-ticket-count" style="opacity:.55">🎫 No tickets yet — finish a sub-level to earn one</div>`;

  document.getElementById('app').innerHTML=`
  <div class="screen has-tab-bar journey-hub-screen">
    <div class="journey-hero">
      <h2>🌍 世界の旅</h2>
      <p>読んで、単語を学び、文化クイズに挑戦してパスポートスタンプをゲットしよう。</p>
      ${ticketDisplay}
    </div>
    <div class="dest-card-row">${cards}</div>
  </div>
  ${tabBar()}`;
}

function departTo(destId){
  if((state.tickets||0)<1) return;
  const dest=DESTINATIONS.find(d=>d.id===destId);
  if(!dest) return;
  state.tickets=(state.tickets||0)-1;
  getJourneyState(destId).departed=true;
  save();
  runDepartureAnimation(dest,()=>{ renderJourneyHub(); });
}

function runDepartureAnimation(dest, callback){
  const overlay=document.createElement('div');
  overlay.className='depart-overlay';
  overlay.innerHTML=`
    <div class="boarding-pass">
      <div class="bp-airline">RIBBIT AIR</div>
      <div class="bp-dest-emoji">${dest.emoji}</div>
      <div class="bp-dest-name">${dest.name}</div>
      <div class="bp-dest-country">${dest.country}</div>
      <hr class="bp-divider">
      <div class="bp-row">
        <div><div style="font-size:.6rem;color:#bbb;text-transform:uppercase;letter-spacing:.1em">From</div><div class="bp-gate">🏠 Home</div></div>
        <div style="font-size:1rem;color:#bbb">— ✈️ —</div>
        <div><div style="font-size:.6rem;color:#bbb;text-transform:uppercase;letter-spacing:.1em">To</div><div class="bp-gate">${dest.name.toUpperCase()}</div></div>
      </div>
    </div>
    <div class="bp-plane-row"><span class="bp-plane-fly">✈️</span></div>`;
  document.body.appendChild(overlay);
  setTimeout(()=>{
    overlay.style.transition='opacity .45s ease';
    overlay.style.opacity='0';
    setTimeout(()=>{ overlay.remove(); if(callback) callback(); },450);
  },2800);
}

    </div>`).join('');

  // Streak display
  const streakTxt=state.streak>0?`🔥 ${state.streak}-day streak`:'まだ連続なし — 今日読もう！';

  document.getElementById('app').innerHTML=`
  <div class="screen has-tab-bar">
    <div class="profile-hero">
      <div class="profile-avatar" aria-hidden="true"></div>
      <div class="profile-name">マイ進捗</div>
      <div class="profile-sub">${streakTxt}</div>
    </div>

    <div class="profile-pts-banner">
      <div class="ppb-left">
        <div class="ppb-label">Total Points</div>
        <div class="ppb-val">${(state.points||0).toLocaleString()}</div>
      </div>
      <div class="ppb-right">🐸</div>
    </div>

    <div class="profile-stats">
      <div class="pstat">
        <div class="pval">${doneCount}</div>
        <div class="plabel">読んだ話</div>
      </div>
      <div class="pstat">
        <div class="pval">${state.xp||0}</div>
        <div class="plabel">合計XP</div>
      </div>
      <div class="pstat">
        <div class="pval">${pct}%</div>
        <div class="plabel">完了</div>
      </div>
    </div>

    <div class="profile-section">
      <div class="profile-section-title">レベル進捗</div>
      ${lvRows}
    </div>

    <div class="profile-section">
      <div class="profile-section-title">バッジ</div>
      <div class="badge-grid">${badgeGrid}</div>
    </div>

    <div class="profile-section">
      <div class="profile-section-title">フラッシュカード</div>
      <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;justify-content:space-between">
        <div>
          <div style="font-size:1rem;font-weight:700;color:var(--text)">保存した単語</div>
          <div style="font-size:.82rem;color:var(--text-muted);margin-top:2px">${Object.keys(state.flashCards||{}).length}個の単語がデッキにあります</div>
        </div>
        <button onclick="navigate('flashcards')" style="padding:10px 16px;background:var(--primary);color:white;border-radius:99px;font-size:.85rem;font-weight:700;border:none;cursor:pointer">学習 →</button>
      </div>
    </div>

    <div class="profile-section">
      <div class="profile-section-title">パスポートスタンプ</div>
      ${DESTINATIONS.some(d=>getJourneyState(d.id).stamped)
        ? `<div class="badge-grid">
            ${DESTINATIONS.map(d=>{
              const stamped=getJourneyState(d.id).stamped;
              return `<div class="badge-item" onclick="${stamped?`navigate('destination',{destId:'${d.id}'})`:''}" style="${stamped?'cursor:pointer':''}">
                <div class="badge-circle ${stamped?'earned':'locked'}">${d.emoji}</div>
                <span class="badge-name">${d.name}${stamped?' ✓':''}</span>
              </div>`;
            }).join('')}
          </div>`
        : `<div style="background:var(--primary-light);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:12px">
            <span style="font-size:1.8rem">🌍</span>
            <div>
              <div style="font-size:.9rem;font-weight:700;color:var(--text)">まだスタンプなし</div>
              <div style="font-size:.82rem;color:var(--text-muted)">世界の旅で目的地を完了して最初のパスポートスタンプをゲットしよう。</div>
            </div>
          </div>
          <button onclick="navigate('journey')" style="width:100%;margin-top:10px;padding:12px;background:var(--primary);color:white;border-radius:var(--radius);font-size:.9rem;font-weight:700;border:none;cursor:pointer">世界の旅へ 🌍</button>`
      }
    </div>
  </div>
  ${tabBar()}`;
}

// ── ROUTER ─────────────────────────────────────────────────
function render(){
  // On first launch (no saved language), auto-detect from device and save.
  // This eliminates any first-launch language picker — detection is silent and immediate.
  if(!state.nativeLang){
    const full=(navigator.language||navigator.userLanguage||'en').toLowerCase();
    let detected='en';
    if(full.startsWith('zh-tw')||full.startsWith('zh-hk')) detected='zh-TW';
    else if(full.startsWith('zh')) detected='zh';
    else {
      const base=full.split('-')[0];
      const match=LANGUAGES.find(l=>l.code.split('-')[0]===base);
      if(match) detected=match.code;
    }
    state.nativeLang=detected;
    save();
  }
  switch(state.screen){
    case'landing':   renderLanding();   break;
    case'home':      renderHome();      break;
    case'levels':    renderLevels();    break;
    case'sublevels': renderSubLevels(); break;
    case'stories':   renderStories();   break;
    case'reader':    renderReader();    break;
    case'quiz':      renderQuiz();      break;
    case'results':    renderResults();       break;
    case'flashcards': renderFlashCards();        break;
    case'fcplay':     renderFlashCardPlay();     break;
    case'settings':   renderLangPicker(true);    break;
    case'profile':          renderProfile();              break;
    case'journey':          renderJourneyHub();           break;
    case'destination':      renderDestination();          break;
    case'journeyreader':    renderJourneyReader();        break;
    case'journeyreaderpage':renderJourneyReaderPage();    break;
    case'journeywords':     renderJourneyWords();         break;
    case'journeyquiz':      renderJourneyQuiz();          break;
    case'journeydone':      renderJourneyDone();          break;
    default:          renderHome();
  }
}
applyFontSize();
applyVocabHighlight();
render();
</script>
</body>
</html>
