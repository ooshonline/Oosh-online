    <div class="nav-bar">
      <button class="back-btn" onclick="navigate('destination',{destId:'${dest.id}'})">←</button>
      <h2>📖 ${dest.name} Stories</h2>
    </div>
    <div class="stories-list">${cards}</div>
  </div>
  ${tabBar()}`;
}

// ── JOURNEY STORY PAGE (reader) ─────────────────────────────
function renderJourneyReaderPage(){
  // Uses the same reader engine — we just swap in the journey story object
  const story=JOURNEY_STORIES[state.destId]?.find(s=>s.id===state.journeyStoryId);
  if(!story){navigate('journeyreader',{destId:state.destId});return;}

  const steps=story.paragraphs; // always paragraph mode for journey stories
  const step=Math.min(state.readerStep||0, steps.length-1);
  const pct=Math.round((step+1)/steps.length*100);
  const isLast=step>=steps.length-1;
  const text=makeWordTappable(steps[step],story.vocabulary);
  const chips=Object.keys(story.vocabulary).map(w=>`<button class="vocab-chip" onclick="showPopup('${w}',null,null)">${w}</button>`).join('');
  const backBtn=step>0?`<button class="reader-back-btn" onclick="journeyStepBack()">← Back</button>`:'';

  const bottomHTML=isLast
    ?`<div class="vocab-section"><h4>${t('keyWords')}</h4><div class="vocab-chips">${chips}</div></div>
      <div class="reader-bottom">
        ${backBtn?`<div class="reader-bottom-row">${backBtn}<button class="finish-btn reader-next-btn" onclick="finishJourneyStory()">Done ✓</button></div>`
        :`<button class="finish-btn" onclick="finishJourneyStory()">Done ✓</button>`}
      </div>`
    :`<div class="reader-bottom">
        ${backBtn?`<div class="reader-bottom-row">${backBtn}<button class="finish-btn reader-next-btn" onclick="journeyStepNext()">Next →</button></div>`
        :`<button class="finish-btn" onclick="journeyStepNext()">Next →</button>`}
        <div class="step-counter">${step+1} / ${steps.length}</div>
      </div>`;

  const ttsBar=`<div class="tts-bar" id="tts-bar">
    <button id="tts-play-btn" class="tts-play-btn${tts.active&&!tts.paused?' paused':''}" onclick="ttsToggle()">${tts.active&&!tts.paused?'⏸':'▶'}</button>
    <button class="tts-stop-btn" onclick="ttsStop()">■</button>
    <span class="tts-label">🔊 Listen</span>
    <div class="tts-rate-group">
      <button class="tts-rate-btn${tts.rate===0.75?' tts-rate-active':''}" data-rate="0.75" onclick="ttsSetRate(0.75)">0.75×</button>
      <button class="tts-rate-btn${tts.rate===1?' tts-rate-active':''}" data-rate="1" onclick="ttsSetRate(1)">1×</button>
      <button class="tts-rate-btn${tts.rate===1.5?' tts-rate-active':''}" data-rate="1.5" onclick="ttsSetRate(1.5)">1.5×</button>
      <button class="tts-rate-btn${tts.rate===2?' tts-rate-active':''}" data-rate="2" onclick="ttsSetRate(2)">2×</button>
    </div>
  </div>`;

  document.getElementById('app').innerHTML=`
  <div class="screen reader-screen">
    <div class="reader-prog-bar"><div class="reader-prog-fill" style="width:${pct}%"></div></div>
    <div class="reader-header">
      <button class="back-btn" onclick="ttsStop();navigate('journeyreader',{destId:'${state.destId}'})">←</button>
      <h3>${story.title}</h3>
      <button id="tts-icon-btn" class="icon-btn${tts.active?' tts-active':''}" onclick="ttsToggle()">🔊</button>
    </div>
    ${ttsBar}
    <div class="reader-body" id="rbody"><p class="step-new">${text}</p></div>
    ${bottomHTML}
  </div>`;
  document.querySelectorAll('.tappable').forEach(el=>{
    el.addEventListener('click',function(e){
      if(this.dataset.challenge) showChallengePopup(this.dataset.word,this.dataset.challenge,e,this);
      else showPopup(this.dataset.word,e,this);
    });
  });
  addTTSWordSpans();
}
function journeyStepNext(){
  const story=JOURNEY_STORIES[state.destId]?.find(s=>s.id===state.journeyStoryId);
  if(!story) return;
  if((state.readerStep||0)<story.paragraphs.length-1){
    speechSynthesis.cancel(); tts.active=false; tts.paused=false;
    state.readerStep=(state.readerStep||0)+1; renderJourneyReaderPage();
  }
}
function journeyStepBack(){
  if((state.readerStep||0)>0){
    speechSynthesis.cancel(); tts.active=false; tts.paused=false;
    state.readerStep=(state.readerStep||0)-1; renderJourneyReaderPage();
  }
}
function finishJourneyStory(){
  ttsStop();
  markJourneyStoryDone(state.destId, state.journeyStoryId);
  navigate('journeyreader',{destId:state.destId});
}

// ── WORLD JOURNEY HUB ──────────────────────────────────────
function renderJourneyHub(){
  const cards=DESTINATIONS.map((dest,i)=>{
    const js=getJourneyState(dest.id);
    const stories=JOURNEY_STORIES[dest.id]||[];
    const totalTasks=stories.length + dest.localWords.length + 1; // +1 for quiz
    const doneTasks=js.storiesDone.length + js.wordsDone.length + (js.quizScore!==null?1:0);
    const pct=totalTasks?Math.round(doneTasks/totalTasks*100):0;

    // Unlock logic: locked if previous destination not stamped
    const prevDest=i>0?DESTINATIONS[i-1]:null;
    const locked=prevDest && !getJourneyState(prevDest.id).stamped;
    const stamped=js.stamped;

    const cls=stamped?'stamped-dest':locked?'locked-dest':'active-dest';
    const badge=stamped
      ?`<span class="dest-hub-badge dhb-stamped">✓ Stamped</span>`
      :locked
        ?`<span class="dest-hub-badge dhb-locked">🔒 Locked</span>`
        :`<span class="dest-hub-badge dhb-open">Open</span>`;
    const onclick=locked||stamped?'':`onclick="navigate('destination',{destId:'${dest.id}'})"`;

    return `<div class="dest-hub-card ${cls}" ${onclick}>
      <span class="dest-emoji">${dest.emoji}</span>
      <div class="dest-hub-info">
        <h3>${dest.name}</h3>
        <div class="dest-country">${dest.country}</div>
        <div class="dest-hub-prog"><div class="dest-hub-prog-fill" style="width:${pct}%"></div></div>
        <div style="font-size:.72rem;color:var(--text-muted);margin-top:3px">${doneTasks} / ${totalTasks} tasks</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
        ${badge}
        ${stamped?`<span style="font-size:1.4rem">🪪</span>`:''}
      </div>
    </div>`;
  }).join('');

  document.getElementById('app').innerHTML=`
  <div class="screen has-tab-bar">
    <div class="journey-hero">
      <h2>🌍 World Journey</h2>
      <p>Read, learn words, and take the culture quiz to earn your passport stamp.</p>
    </div>
    <div class="dest-card-row">${cards}</div>
  </div>
  ${tabBar()}`;
}

// ── DESTINATION DETAIL ──────────────────────────────────────
function renderDestination(){
  const dest=DESTINATIONS.find(d=>d.id===state.destId);
  if(!dest){navigate('journey');return;}
  const js=getJourneyState(dest.id);
  const stories=JOURNEY_STORIES[dest.id]||[];

  // Stories track
  const storiesDone=js.storiesDone.length;
  const storiesPct=Math.round(storiesDone/stories.length*100);

  // Words track
  const wordsDone=js.wordsDone.length;
  const wordsPct=Math.round(wordsDone/dest.localWords.length*100);

  // Quiz track — locked until stories and words complete
  const quizUnlocked=journeyAllStoriesDone(dest.id) && journeyAllWordsDone(dest.id);
  const quizDone=js.quizScore!==null;
  const quizSub=quizDone?`Score: ${js.quizScore}/5`:quizUnlocked?'Ready to take':'Complete stories and words first';

  document.getElementById('app').innerHTML=`
  <div class="screen has-tab-bar">
    <div class="nav-bar">
      <button class="back-btn" onclick="navigate('journey')">←</button>
      <h2>${dest.emoji} ${dest.name}</h2>
    </div>
    <div class="dest-detail-hero">
      <h2>${dest.name}, ${dest.country}</h2>
      <p>${dest.description}</p>
    </div>
    <div style="padding:14px 0 0">
      <div class="activity-track${storiesDone===stories.length?' done-track':''}"
           onclick="navigate('journeyreader',{destId:'${dest.id}'})">
        <span class="at-icon">📖</span>
        <div class="at-info">
          <h3>Stories</h3>
          <div class="at-sub">${stories.length} stories set in ${dest.name}</div>
          <div class="at-prog"><div class="at-prog-fill" style="width:${storiesPct}%"></div></div>
        </div>
        <span class="at-count">${storiesDone}/${stories.length}</span>
      </div>
      <div class="activity-track${wordsDone===dest.localWords.length?' done-track':''}"
           onclick="navigate('journeywords',{destId:'${dest.id}'})">
        <span class="at-icon">🃏</span>
        <div class="at-info">
          <h3>Local words</h3>
          <div class="at-sub">${dest.localWords.length} words from ${dest.name}</div>
          <div class="at-prog"><div class="at-prog-fill" style="width:${wordsPct}%"></div></div>
        </div>
        <span class="at-count">${wordsDone}/${dest.localWords.length}</span>
      </div>
      <div class="activity-track${quizDone?' done-track':quizUnlocked?'':' locked-track'}"
           ${quizUnlocked&&!quizDone?`onclick="navigate('journeyquiz',{destId:'${dest.id}'})"`:''}">
        <span class="at-icon">🧠</span>
        <div class="at-info">
          <h3>Culture quiz</h3>
          <div class="at-sub">${quizSub}</div>
          ${quizDone?`<div class="at-prog"><div class="at-prog-fill" style="width:100%"></div></div>`:''}
        </div>
        <span class="at-count">${quizDone?'✓':'5 Qs'}</span>
      </div>
    </div>
    ${journeyComplete(dest.id)&&!js.stamped?`
      <div style="padding:16px">
        <button onclick="navigate('journeydone',{destId:'${dest.id}'})"
          style="width:100%;padding:16px;background:linear-gradient(135deg,var(--accent),var(--accent-dark));color:var(--text);border-radius:var(--radius);font-size:1rem;font-weight:700;border:none;cursor:pointer">
          🪪 Claim your stamp!
        </button>
      </div>`:''}
    ${js.stamped?`
      <div style="padding:16px;text-align:center">
        <div style="background:var(--accent-light);border:1px solid var(--accent);border-radius:var(--radius);padding:14px">
          <div style="font-size:2rem;margin-bottom:4px">🪪</div>
          <div style="font-weight:700;color:var(--accent-dark)">Passport stamped!</div>
          <div style="font-size:.82rem;color:var(--text-muted);margin-top:4px">${dest.name} complete</div>
        </div>
      </div>`:''}
  </div>
  ${tabBar()}`;
}

// ── PROFILE ────────────────────────────────────────────────
function renderProfile(){
  // Totals
  const totalStories=Object.values(STORIES).reduce((a,lv)=>a+Object.values(lv).reduce((b,sl)=>b+sl.length,0),0);
  const doneCount=Object.keys(state.progress||{}).length;
  const pct=Math.round(doneCount/totalStories*100);

  // Per-level progress
  const lvRows=LEVELS.map(lv=>{
    const lvStories=Object.values(STORIES[lv.id]||{}).reduce((a,sl)=>a+sl.length,0);
    const lvDone=Object.values(STORIES[lv.id]||{}).reduce((a,sl)=>
      a+sl.filter(s=>storyDone(s.id)).length,0);
    const lvPct=lvStories?Math.round(lvDone/lvStories*100):0;
    const badges=[
      {bg:'#f0f7d0',color:'#6b8a1e'},{bg:'#e4f3a8',color:'#6b8a1e'},
      {bg:'#d4ec96',color:'#5a7218'},{bg:'#fef3d6',color:'#d4831a'},
      {bg:'#fde8c0',color:'#a0580e'},{bg:'#e8e8e8',color:'#151515'}
    ];
    const b=badges[lv.id-1]||badges[0];
    return `<div class="lv-prog-row">
      <div class="lv-prog-badge" style="background:${b.bg};color:${b.color}">${lv.id}</div>
      <div class="lv-prog-info">
        <div class="lv-prog-name">${lv.name}</div>
        <div class="lv-prog-bar-wrap"><div class="lv-prog-bar-fill" style="width:${lvPct}%"></div></div>
      </div>
      <div class="lv-prog-count">${lvDone}/${lvStories}</div>
    </div>`;
  }).join('');

  // Badges — earned vs locked placeholders
  const earnedBadges=[
    {e:'🔥',name:'Streak starter',earned:state.streak>=3},
    {e:'📖',name:'First story',earned:doneCount>=1},
    {e:'⭐',name:'Quiz ace',earned:false},
    {e:'🃏',name:'Word collector',earned:Object.keys(state.flashCards||{}).length>=10},
    {e:'🌟',name:'10 stories',earned:doneCount>=10},
    {e:'🏆',name:'50 stories',earned:doneCount>=50},
    {e:'🌍',name:'World traveller',earned:false},
    {e:'🎓',name:'Level complete',earned:false},
  ];
  const badgeGrid=earnedBadges.map(b=>`
    <div class="badge-item">
      <div class="badge-circle ${b.earned?'earned':'locked'}">${b.e}</div>
      <span class="badge-name">${b.name}</span>
    </div>`).join('');

  // Streak display
  const streakTxt=state.streak>0?`🔥 ${state.streak}-day streak`:'No streak yet — read today!';

  document.getElementById('app').innerHTML=`
  <div class="screen has-tab-bar">
    <div class="profile-hero">
      <div class="profile-avatar" aria-hidden="true"></div>
      <div class="profile-name">My Progress</div>
      <div class="profile-sub">${streakTxt}</div>
    </div>

    <div class="profile-stats">
      <div class="pstat">
        <div class="pval">${doneCount}</div>
        <div class="plabel">Stories read</div>
      </div>
      <div class="pstat">
        <div class="pval">${state.totalXP||0}</div>
        <div class="plabel">Total XP</div>
      </div>
      <div class="pstat">
        <div class="pval">${pct}%</div>
        <div class="plabel">Complete</div>
      </div>
    </div>

    <div class="profile-section">
      <div class="profile-section-title">Level progress</div>
      ${lvRows}
    </div>

    <div class="profile-section">
      <div class="profile-section-title">Badges</div>
      <div class="badge-grid">${badgeGrid}</div>
    </div>

    <div class="profile-section">
      <div class="profile-section-title">Flash cards</div>
      <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;justify-content:space-between">
        <div>
          <div style="font-size:1rem;font-weight:700;color:var(--text)">Saved words</div>
          <div style="font-size:.82rem;color:var(--text-muted);margin-top:2px">${Object.keys(state.flashCards||{}).length} words in your deck</div>
        </div>
        <button onclick="navigate('flashcards')" style="padding:10px 16px;background:var(--primary);color:white;border-radius:99px;font-size:.85rem;font-weight:700;border:none;cursor:pointer">Study →</button>
      </div>
    </div>

    <div class="profile-section">
      <div class="profile-section-title">Passport stamps</div>
      ${DESTINATIONS.some(d=>getJourneyState(d.id).stamped)
        ? `<div class="badge-grid">
            ${DESTINATIONS.map(d=>{
              const stamped=getJourneyState(d.id).stamped;
              return `<div class="badge-item" onclick="${stamped?`navigate('destination',{destId:'${d.id}'})`:''}" style="${stamped?'cursor:pointer':''}">
                <div class="badge-circle ${stamped?'earned':'locked'}">${d.emoji}</div>
                <span class="badge-name">${d.name}${stamped?' ✓':''}</span>
              </div>`;
            }).join('')}
          </div>`
        : `<div style="background:var(--primary-light);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:12px">
            <span style="font-size:1.8rem">🌍</span>
            <div>
              <div style="font-size:.9rem;font-weight:700;color:var(--text)">No stamps yet</div>
              <div style="font-size:.82rem;color:var(--text-muted)">Complete a destination in World Journey to earn your first passport stamp.</div>
            </div>
          </div>
          <button onclick="navigate('journey')" style="width:100%;margin-top:10px;padding:12px;background:var(--primary);color:white;border-radius:var(--radius);font-size:.9rem;font-weight:700;border:none;cursor:pointer">Go to World Journey 🌍</button>`
      }
    </div>
  </div>
  ${tabBar()}`;
}

// ── ROUTER ─────────────────────────────────────────────────
function render(){
  // On first launch (no saved language), auto-detect from device and save.
  // This eliminates any first-launch language picker — detection is silent and immediate.
  if(!state.nativeLang){
    const full=(navigator.language||navigator.userLanguage||'en').toLowerCase();
    let detected='en';
    if(full.startsWith('zh-tw')||full.startsWith('zh-hk')) detected='zh-TW';
    else if(full.startsWith('zh')) detected='zh';
    else {
      const base=full.split('-')[0];
      const match=LANGUAGES.find(l=>l.code.split('-')[0]===base);
      if(match) detected=match.code;
    }
    state.nativeLang=detected;
    save();
  }
  switch(state.screen){
    case'home':      renderHome();      break;
    case'levels':    renderLevels();    break;
    case'sublevels': renderSubLevels(); break;
    case'stories':   renderStories();   break;
    case'reader':    renderReader();    break;
    case'quiz':      renderQuiz();      break;
    case'results':    renderResults();       break;
    case'flashcards': renderFlashCards();        break;
    case'fcplay':     renderFlashCardPlay();     break;
    case'settings':   renderLangPicker(true);    break;
    case'profile':          renderProfile();              break;
    case'journey':          renderJourneyHub();           break;
    case'destination':      renderDestination();          break;
    case'journeyreader':    renderJourneyReader();        break;
    case'journeyreaderpage':renderJourneyReaderPage();    break;
    case'journeywords':     renderJourneyWords();         break;
    case'journeyquiz':      renderJourneyQuiz();          break;
    case'journeydone':      renderJourneyDone();          break;
    default:          renderHome();
  }
}
applyFontSize();
applyVocabHighlight();
render();
</script>
</body>
