    .rs-current{font-family:var(--font-body);font-size:16px;background:#f0fce4;border-left:4px solid #bada55;padding:14px 16px;border-radius:0 14px 14px 0;margin-bottom:1.2em;line-height:1.8;animation:stepIn .35s ease both;color:#151515}
    .rs-future{font-family:var(--font-body);font-size:16px;color:#e5e7eb;line-height:1.8;margin-bottom:1em}

    /* ── WORLD HUB GRID — v2 handoff spec ── */
    .dest-hub-grid{padding:14px 16px 32px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .dest-grid-card{border-radius:18px;border:2px solid transparent;padding:14px 12px 12px;cursor:pointer;transition:border-color .2s,transform .15s,box-shadow .2s;position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:flex-start;gap:6px;min-height:130px}
    .dest-grid-card:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,.3)}
    .dest-grid-card.dgc-active{border-color:var(--primary);box-shadow:0 0 0 3px rgba(186,218,85,.18)}
    .dest-grid-card.dgc-stamped{border-color:var(--accent);box-shadow:0 0 0 3px rgba(249,173,59,.18)}
    .dest-grid-card.dgc-locked{opacity:.6;cursor:default}
    .dest-grid-card.dgc-depart{border-color:var(--accent);cursor:default}
    /* Big background emoji watermark */
    .dest-grid-card .dgc-bg-emoji{position:absolute;font-size:64px;opacity:.25;right:-8px;bottom:-8px;pointer-events:none;line-height:1}
    .dgc-emoji{font-size:1.8rem;line-height:1;position:relative;z-index:1}
    .dgc-name{font-family:var(--font-head);font-size:15px;font-weight:900;color:white;line-height:1.2;position:relative;z-index:1}
    .dgc-country{font-family:var(--font-body);font-size:10px;color:rgba(255,255,255,.7);margin-top:1px;position:relative;z-index:1}
    .dgc-badge{font-family:var(--font-head);font-size:9px;font-weight:900;padding:3px 8px;border-radius:99px;margin-top:auto;position:relative;z-index:1}
    .dgc-badge-open{background:rgba(186,218,85,.18);color:#bada55}
    .dgc-badge-locked{background:rgba(0,0,0,.3);color:rgba(255,255,255,.5)}
    .dgc-badge-stamped{background:rgba(249,173,59,.18);color:var(--accent)}
    /* Passport stamp badge — v2 spec: green circle, rotated, checkmark */

};

function save(){
  if(state.nativeLang)   localStorage.setItem('rbt_lang',       state.nativeLang);
  if(state.lastStoryId)  localStorage.setItem('rbt_laststory',  state.lastStoryId);
  localStorage.setItem('rbt_fontsize',  state.fontSize);
  localStorage.setItem('rbt_highlight', state.vocabHighlight ? 'on' : 'off');
  localStorage.setItem('rbt_goal',      state.dailyGoal);
  localStorage.setItem('rbt_words',    JSON.stringify(state.savedWords));
  localStorage.setItem('rbt_fc',       JSON.stringify(state.flashCards));
  localStorage.setItem('rbt_prog',     JSON.stringify(state.progress));
  localStorage.setItem('rbt_xp',       state.xp);
  localStorage.setItem('rbt_streak',   state.streak);
  localStorage.setItem('rbt_lastread', state.lastRead||'');
  localStorage.setItem('rbt_points',   state.points);
  localStorage.setItem('rbt_tickets',  state.tickets||0);
  localStorage.setItem('rbt_journey',  JSON.stringify(state.journey||{}));
  localStorage.setItem('rbt_qp',       JSON.stringify(state.questProgress||{}));
  localStorage.setItem('rbt_wqp',      JSON.stringify(state.weekQuestProgress||{}));
  if(state.ttsVoice) localStorage.setItem('rbt_ttsvoice', state.ttsVoice);
  localStorage.setItem('rbt_perfectcount', state.perfectCount||0);
  if(Object.keys(state.translCache||{}).length) localStorage.setItem('rbt_tc', JSON.stringify(state.translCache));
}
// Safety net — save whenever the user closes or navigates away
window.addEventListener('beforeunload', save);

function calcTodayCount(){
  const today=new Date().toDateString();
  state.todayCount=Object.values(state.progress).filter(p=>new Date(p.at).toDateString()===today).length;
}

function updateStreak(){
  const today=new Date().toDateString();
  const yesterday=new Date(Date.now()-86400000).toDateString();
  if(state.lastRead===today) return;
  state.streak = state.lastRead===yesterday ? state.streak+1 : 1;
  state.lastRead=today; save();
}

// ── WORLD JOURNEY STATE HELPERS ──────────────────────────────────────────────
function getJourneyState(destId){
  if(!state.journey) state.journey={};
  if(!state.journey[destId]) state.journey[destId]={
    storiesDone:[],     // array of story ids completed
    wordsDone:[],       // array of words marked learned
    quizScore:null,     // null = not attempted; number = score out of 5
    stamped:false,      // true when all three tracks complete
    departed:false,     // true when player has spent a ticket to unlock this destination
  };
  const js=state.journey[destId];
  // Add departed flag if missing (older saved data)
  if(!js.hasOwnProperty('departed')) js.departed=false;
  // Migration: if a destination already has progress, treat it as departed
  if(!js.departed && (js.stamped || js.storiesDone.length>0 || js.wordsDone.length>0 || js.quizScore!==null)){
    js.departed=true;
  }
  return js;
}

function journeyStoryDone(destId, storyId){
  return getJourneyState(destId).storiesDone.includes(storyId);
}

function journeyWordDone(destId, word){
  return getJourneyState(destId).wordsDone.includes(word);
}

function journeyAllStoriesDone(destId){
  const dest=DESTINATIONS.find(d=>d.id===destId);
  if(!dest) return false;
  const js=getJourneyState(destId);
  return (JOURNEY_STORIES[destId]||[]).every(s=>js.storiesDone.includes(s.id));
}

function journeyAllWordsDone(destId){
  const dest=DESTINATIONS.find(d=>d.id===destId);
  if(!dest) return false;
  const js=getJourneyState(destId);
  return dest.localWords.every(w=>js.wordsDone.includes(w.word));
}

function journeyQuizDone(destId){
  return getJourneyState(destId).quizScore !== null;
}

function journeyComplete(destId){
  return journeyAllStoriesDone(destId) && journeyAllWordsDone(destId) && journeyQuizDone(destId);
}

function markJourneyStoryDone(destId, storyId){
  const js=getJourneyState(destId);
  if(!js.storiesDone.includes(storyId)) js.storiesDone.push(storyId);
  save();
}

function markJourneyWordDone(destId, word){
  const dest=DESTINATIONS.find(d=>d.id===destId);
  const js=getJourneyState(destId);
  if(!js.wordsDone.includes(word)) js.wordsDone.push(word);
  // Auto-add to flash card deck
  const wObj=dest.localWords.find(w=>w.word===word);
  if(wObj && !state.flashCards[word]){
    const jaEntry=JA_TRANSLATIONS[(word||'').toLowerCase()];
    state.flashCards[word]={def:wObj.def, pos:wObj.pos, lang:jaEntry?'ja':null, translation:jaEntry?jaEntry.w:null};
    showToast('🃏 カードに追加しました！');
  }
  save();
  checkBadgesAndNotify();
}

// ── HELPERS ────────────────────────────────────────────────
function navigate(screen,data={}){
  // Stop TTS when leaving the reader
  if(state.screen==='reader' && screen!=='reader' && typeof speechSynthesis!=='undefined'){
    speechSynthesis.cancel(); tts.active=false; tts.paused=false;
  }
  // Reset reader step whenever navigating to a new story
  if(screen==='reader' && data.storyId && data.storyId!==state.storyId) data.readerStep=0;
  if(screen==='journeyreaderpage' && data.journeyStoryId && data.journeyStoryId!==state.journeyStoryId) data.readerStep=0;
  // Track last story opened
  if(data.storyId) state.lastStoryId=data.storyId;
  Object.assign(state,data,{screen});
  applyFontSize();
  applyVocabHighlight();
  render(); window.scrollTo(0,0);
}
function applyFontSize(){
  document.body.classList.toggle('font-large', state.fontSize==='large');
  document.body.classList.toggle('level-early', !!(state.levelId && state.levelId<=2));
}
function applyVocabHighlight(){
  document.body.classList.toggle('vocab-highlight', state.vocabHighlight);
}

function getStory(){ return findStory(state.storyId); }
function findStory(id){
  for(const lv in STORIES) for(const sl in STORIES[lv]){
    const f=STORIES[lv][sl].find(s=>s.id===id); if(f) return f;
  }
  return null;
}

function storyDone(id){ return !!state.progress[id]; }
function subLevelDone(lv,sl){
  const stories=STORIES[lv]&&STORIES[lv][sl]||[];
  return stories.length>0 && stories.every(s=>storyDone(s.id));
}
function levelDoneCount(lv){
  let c=0;
  for(let sl=0;sl<10;sl++) if(subLevelDone(lv,sl)) c++;
  return c;
}
function subLevelAvailable(lv,sl){
  if(sl===0) return true;
  return subLevelDone(lv,sl-1);
}
function hasStoriesFor(lv,sl){ return !!(STORIES[lv]&&STORIES[lv][sl]&&STORIES[lv][sl].length); }

function storyXP(story,score){ const sl=story.levelId===6?story.subLevel:story.subLevel+1; return Math.round(story.levelId*5*sl*score); }

function makeWordTappable(text,vocab){
  return text.split(/(\s+)/).map(part=>{
    const clean=part.replace(/[^a-zA-Z'-]/g,'').toLowerCase();
    if(!clean) return part;
    // Story vocabulary word — green highlight
    if(vocab[clean]){
      return `<span class="tappable${state.vocabHighlight?' tappable-hl':''}" data-word="${clean}">${part}</span>`;
    }
    // Above-level word from CEFR word lists — blue highlight
    if(state.vocabHighlight && typeof getChallengeLevel==='function'){
      const lvl=getChallengeLevel(clean, state.levelId||1);
      if(lvl) return `<span class="tappable tappable-challenge" data-challenge="${lvl}" data-word="${clean}">${part}</span>`;
    }
    return part;
  }).join('');
}

function starsFor(storyId){
  const p=state.progress[storyId]; if(!p) return '☆☆☆';
  return p.score>=.9?'★★★':p.score>=.6?'★★☆':'★☆☆';
}

function renderGoalRing(){
  const pct=Math.min(1, state.todayCount/state.dailyGoal);
  const r=30, cx=40, cy=40;
  const circ=2*Math.PI*r;
  const dash=circ*pct;
  const done=state.todayCount>=state.dailyGoal;
  const color=done?'#f9ad3b':'#bada55';
  return `<svg class="goal-ring" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="7"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="7"
      stroke-dasharray="${dash} ${circ}" stroke-dashoffset="${circ/4}"
      stroke-linecap="round" style="transition:stroke-dasharray .6s ease"/>
    <text x="${cx}" y="${cy+5}" text-anchor="middle" font-size="18" font-weight="800"
      fill="${color}" font-family="var(--font-head)">${done?'🎯':state.todayCount}</text>
  </svg>`;
}

// ── DAILY QUESTS ───────────────────────────────────────────
function getTodayQuestKey(){ return new Date().toDateString(); }

function getTodayQuests(){
  const key=getTodayQuestKey();
  if(!state.questProgress) state.questProgress={};
  // New day: reset slot
  if(!state.questProgress[key])
    state.questProgress[key]={stories:false,perfect:false,fc:false,bonus:false};
  // Prune old entries — keep only the last 10 days
  const keys=Object.keys(state.questProgress);
  if(keys.length>10) keys.sort().slice(0,-10).forEach(k=>delete state.questProgress[k]);
  return state.questProgress[key];
}

// ── WEEKLY QUESTS ──────────────────────────────────────────
function getWeekQuestKey(){
  const d=new Date();
  // Monday of current week
  const day=(d.getDay()+6)%7; // 0=Mon … 6=Sun
  const mon=new Date(d.getTime()-day*86400000);
  return mon.toDateString();
}

function getWeekQuests(){
  const key=getWeekQuestKey();
  if(!state.weekQuestProgress) state.weekQuestProgress={};
  if(!state.weekQuestProgress[key])
    state.weekQuestProgress[key]={levels3:false,journey1:false,fc10:false,bonus:false};
  // Prune — keep last 5 weeks
  const keys=Object.keys(state.weekQuestProgress);
  if(keys.length>5) keys.sort().slice(0,-5).forEach(k=>delete state.weekQuestProgress[k]);
  return state.weekQuestProgress[key];
}

function markWeekQuestDone(type){
  const q=getWeekQuests();

  state.xp=(state.xp||0)+30;

}

// ── RENDER: HOME (Pond Map) ────────────────────────────────
function currentLevelId(){
  if(state.lastStoryId){const s=findStory(state.lastStoryId); if(s) return s.levelId;}
  for(const lv of LEVELS){ if(levelDoneCount(lv.id)<10) return lv.id; }
  return LEVELS[LEVELS.length-1].id;
}
function frogGreeting(){
  if(state.todayCount>=state.dailyGoal) return 'すごい！今日の目標を達成したよ。もう1話読む？🎉';
  if(state.lastStoryId){const s=findStory(state.lastStoryId); if(s&&!storyDone(s.id)) return `「${s.title}」の続きを読もう！`;}
  if(state.streak>1) return `${state.streak}日連続！今日も一緒に読もう。`;
  return 'ようこそ！リリーパッドをタップして読み始めよう。';
}
function renderPondMap(lv){
  const PAD_R=26, W=360, GAP=74, PADS=10;
  const H=PADS*GAP+50;
  // First pad that's available but not done = the frog's pad
  let curIdx=0;
  for(let i=0;i<PADS;i++){ if(subLevelAvailable(lv,i)&&!subLevelDone(lv,i)){curIdx=i;break;} if(subLevelDone(lv,i)) curIdx=Math.min(i+1,PADS-1); }
  const pts=Array.from({length:PADS},(_,i)=>({
    x:Math.round(180+105*Math.sin(i*1.25+0.6)),
    y:H-40-i*GAP
  }));
  const path=pts.map((p,i)=>`${i?'L':'M'}${p.x} ${p.y}`).join(' ');
  const pads=pts.map((p,i)=>{
    const done=subLevelDone(lv,i), avail=subLevelAvailable(lv,i), hasSt=hasStoriesFor(lv,i);
    const isCur=i===curIdx&&avail&&hasSt;
    const locked=(!avail&&!done)||!hasSt;
    const stories=STORIES[lv]&&STORIES[lv][i]||[];
    const dc=stories.filter(s=>storyDone(s.id)).length;
    const fill=done?'#bada55':isCur?'#ffffff':locked?'rgba(255,255,255,.08)':'rgba(186,218,85,.18)';
    const stroke=done?'#9bc42a':isCur?'#f9ad3b':locked?'rgba(255,255,255,.15)':'rgba(186,218,85,.5)';
    const strokeW=isCur?4:3;
    const txt=done?'#0f1a10':isCur?'#151515':locked?'rgba(255,255,255,.3)':'#bada55';
    const r=isCur?PAD_R+7:PAD_R;
    const click=locked?'':`onclick="navigate('stories',{levelId:${lv},subLevel:${i}})"`;
    return `<g class="pad-group${locked?' locked':''}${isCur?' current':''}" ${click} role="button" aria-label="サブレベル${i+1}${locked?'（ロック中）':''}">
      <ellipse cx="${p.x}" cy="${p.y+r-4}" rx="${r*1.15}" ry="7" fill="rgba(143,184,50,.18)"/>
      ${isCur?`<circle class="pulse-ring pulse-ring-1" cx="${p.x}" cy="${p.y}" r="${r}" fill="none" stroke="rgba(249,173,59,.4)" stroke-width="4"/>
      <circle class="pulse-ring pulse-ring-2" cx="${p.x}" cy="${p.y}" r="${r}" fill="none" stroke="rgba(249,173,59,.25)" stroke-width="4"/>`:''}
      <circle class="pad" cx="${p.x}" cy="${p.y}" r="${r}" fill="${fill}" stroke="${stroke}" stroke-width="${strokeW}"/>
      ${isCur?`<image href="OOSH_Logo_Square.png" x="${p.x-22}" y="${p.y-44}" width="44" height="44"/>`:''}
      <text x="${p.x}" y="${p.y+(isCur?14:6)}" text-anchor="middle" font-size="${isCur?13:15}" font-weight="800" fill="${txt}" font-family="var(--font-head)">${done?'✓':i+1}</text>
      ${isCur?`<text x="${p.x}" y="${p.y+r+18}" text-anchor="middle" font-size="11" font-weight="800" fill="#6b9e3a" font-family="var(--font-head)">いまここ</text>`:''}
      ${!done&&!locked&&!isCur&&dc>0?`<text x="${p.x}" y="${p.y+r+18}" text-anchor="middle" font-size="11" fill="#5e6648">${dc}/5</text>`:''}
      ${locked?`<text x="${p.x}" y="${p.y-r-6}" text-anchor="middle" font-size="12">🔒</text>`:''}

// Returns an inline card showing the unearned badge closest to completion.
// Only shows badges with measurable progress (streak, story count, flash cards, perfect rounds).
function renderNextBadgeHint(){
  const earned=new Set(JSON.parse(localStorage.getItem('rbt_earned_badges')||'[]'));
  const doneCount=Object.keys(state.progress||{}).length;
  const fcCount=Object.keys(state.flashCards||{}).length;
  const progressFor=key=>{
    if(key==='first_story')   return {cur:doneCount,max:1};
    if(key==='ten_stories')   return {cur:doneCount,max:10};
    if(key==='fifty_stories') return {cur:doneCount,max:50};
    if(key==='streak3')  return {cur:state.streak||0,max:3};
    if(key==='streak7')  return {cur:state.streak||0,max:7};
    if(key==='streak14') return {cur:state.streak||0,max:14};
    if(key==='streak30') return {cur:state.streak||0,max:30};
    if(key==='word_coll')    return {cur:fcCount,max:10};
    if(key==='flash_master') return {cur:fcCount,max:50};
    if(key==='quiz_master')  return {cur:state.perfectCount||0,max:5};
    return null;
  };
  let best=null, bestRatio=-1;
  BADGE_DEFS.forEach(b=>{
    if(earned.has(b.key)) return;
    const p=progressFor(b.key);
    if(!p||p.cur>=p.max) return;
    const ratio=p.cur/p.max;
    if(ratio>bestRatio){ bestRatio=ratio; best={b,p}; }
  });
  if(!best) return '';
  const {b,p}=best;
  const pct=Math.min(100,Math.round(p.cur/p.max*100));
  return `<div onclick="navigate('profile')" style="margin:0 0 10px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;cursor:pointer">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px">
      <span style="font-size:.72rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em">🎯 次のバッジ</span>
      <span style="font-size:.78rem;font-weight:700;color:var(--text)">${b.e} ${b.name}</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div style="flex:1;height:6px;background:var(--primary-light);border-radius:99px;overflow:hidden">
        <div style="width:${pct}%;height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:99px;transition:width .6s ease"></div>
      </div>
      <span style="font-size:.75rem;font-weight:700;color:var(--text-muted);white-space:nowrap">${p.cur} / ${p.max}</span>
    </div>
  </div>`;
}

// Split a paragraph text into individual sentences for sentence-by-sentence mode
function splitSentences(text){
  // Protect abbreviations and decimals so they don't cause false splits
  const PLACEHOLDER='\x01';
  let safe=text
    // Common titles / abbreviations
    .replace(/\b(Mr|Mrs|Ms|Dr|Prof|St|Ave|Rd|Blvd|Jr|Sr|vs|etc|approx|inc|ltd|govt|dept)\./gi, m=>m.replace('.',PLACEHOLDER))
    // Initials like A. B. Smith or U.S.A.
    .replace(/\b([A-Z])\./g, (_,c)=>c+PLACEHOLDER)
    // Decimal numbers  3.14  £1.50
    .replace(/(\d+)\.(\d+)/g, (_,a,b)=>a+PLACEHOLDER+b)
    // Ellipsis — treat as single pause, not a split
    .replace(/\.{2,}/g, m=>m.replace(/\./g,PLACEHOLDER));

  // Split on sentence-ending punctuation followed by whitespace/end
  const raw=safe.match(/[^.!?]*[.!?]+["']?(?=\s|$)/g)||[safe];

  return raw
    .map(s=>s.replace(new RegExp(PLACEHOLDER,'g'),'.').trim())
    .filter(s=>s.length>2);
}

// ── TTS — Text-to-Speech Engine ──────────────────────────────────────────────
const tts={active:false,paused:false,rate:1.0,utterance:null};
const TTS_RATES=[0.75,1,1.5,2];
function buildTTSRateSlider(){
  const idx=Math.max(0,TTS_RATES.indexOf(tts.rate));
  const fill=(idx/(TTS_RATES.length-1)*100)+'%';
  return `<div class="tts-rate-slider-wrap">
    <span class="tts-rate-emoji">🐢</span>
    <input type="range" class="tts-rate-slider" id="ttsRateSlider" min="0" max="${TTS_RATES.length-1}" step="1" value="${idx}" style="--fill:${fill}" oninput="ttsSetRate(TTS_RATES[this.value])" aria-label="再生速度">
    <span class="tts-rate-emoji">🐇</span>
    <span class="tts-rate-readout" id="ttsRateReadout">${tts.rate}×</span>
  </div>`;
}

function ttsSupported(){ return 'speechSynthesis' in window; }

function ttsGetPlainText(){
  const el=document.getElementById('rbody');
  if(!el) return '';
  return (el.innerText||el.textContent||'').replace(/\s+/g,' ').trim();
}

// After renderReader(), walk DOM in #rbody and tag every word span with its
// character offset in the plain text — used by onboundary for highlighting.
function addTTSWordSpans(){
  const rbody=document.getElementById('rbody');
  if(!rbody) return;
  const walker=document.createTreeWalker(rbody,NodeFilter.SHOW_TEXT,null,false);
  const nodes=[];
  let n; while((n=walker.nextNode())) nodes.push(n);
  let charOffset=0;
  nodes.forEach(textNode=>{
    const text=textNode.nodeValue;
    const frag=document.createDocumentFragment();
    const re=/(\s+|[^\s]+)/g; let m;
    while((m=re.exec(text))!==null){
      const tok=m[0];
      if(/\s/.test(tok)){
        frag.appendChild(document.createTextNode(tok));
      } else {
        const sp=document.createElement('span');
        sp.className='tts-w';
        sp.dataset.tts=charOffset;
        sp.textContent=tok;
        frag.appendChild(sp);
      }
      charOffset+=tok.length;
    }
    textNode.parentNode.replaceChild(frag,textNode);
  });
}

function ttsClearHL(){
  document.querySelectorAll('.tts-word-hl').forEach(el=>el.classList.remove('tts-word-hl'));
}

function updateTTSUI(){
  const btn=document.getElementById('tts-play-btn');
  const spkBtn=document.getElementById('tts-icon-btn');
  const bar=document.getElementById('tts-bar');
  if(bar&&bar.classList.contains('tts-collapsible')) bar.style.display=tts.active?'flex':'none';
  if(btn){
    if(tts.active && !tts.paused){ btn.textContent='⏸'; btn.classList.add('paused'); }
    else { btn.textContent='▶'; btn.classList.remove('paused'); }
  }
  if(spkBtn){
    if(tts.active) spkBtn.classList.add('tts-active');
    else spkBtn.classList.remove('tts-active');
  }
  const slider=document.getElementById('ttsRateSlider');
  if(slider){
    const idx=Math.max(0,TTS_RATES.indexOf(tts.rate));
    slider.value=idx;
    slider.style.setProperty('--fill',(idx/(TTS_RATES.length-1)*100)+'%');
  }
  const readout=document.getElementById('ttsRateReadout');
  if(readout) readout.textContent=tts.rate+'×';
}

function ttsSpeak(){
  if(!ttsSupported()) return;
  speechSynthesis.cancel();
  const text=ttsGetPlainText();
  if(!text) return;
  const u=new SpeechSynthesisUtterance(text);
  u.lang='en-GB'; u.rate=tts.rate;
  if(state.ttsVoice){const v=speechSynthesis.getVoices().find(v=>v.voiceURI===state.ttsVoice);if(v) u.voice=v;}

  // Firefox fallback: word-boundary events don't fire in Firefox.
  // If no word event arrives within 900ms of speech starting, fall back to
  // highlighting the whole text block (sentence mode) so users still get visual feedback.
  let wordBoundaryFired=false;
  let ffFallbackTimer=null;
  function clearSentenceHL(){
    const rb=document.getElementById('rbody');
    if(rb) rb.classList.remove('tts-sentence-hl');
  }

  u.onstart=function(){
    ffFallbackTimer=setTimeout(function(){
      if(!wordBoundaryFired && tts.active){
        const rb=document.getElementById('rbody');
        if(rb) rb.classList.add('tts-sentence-hl');
      }
    },900);
  };

  u.onboundary=function(e){
    if(e.name!=='word') return;
    if(!wordBoundaryFired){
      wordBoundaryFired=true;
      clearTimeout(ffFallbackTimer);
      clearSentenceHL();
    }
    ttsClearHL();
    const ci=e.charIndex;
    const spans=document.querySelectorAll('#rbody span[data-tts]');
    let best=null, bestStart=-1;
    spans.forEach(sp=>{
      const s=parseInt(sp.dataset.tts);
      if(s<=ci && s>bestStart){ bestStart=s; best=sp; }
    });
    if(best) best.classList.add('tts-word-hl');
  };

  u.onend=function(){
    clearTimeout(ffFallbackTimer);
    clearSentenceHL();
    tts.active=false; tts.paused=false;
    ttsClearHL(); updateTTSUI();
    // Auto-advance to next step
    const story=getStory(); if(!story) return;
    const steps=getReaderSteps(story);
    if(state.readerStep<steps.length-1){
      state.readerStep++; renderReader();
      setTimeout(ttsSpeak,500);
    }
  };

  u.onerror=function(){
    clearTimeout(ffFallbackTimer);
    clearSentenceHL();
    tts.active=false; tts.paused=false; ttsClearHL(); updateTTSUI();
  };

  tts.utterance=u; tts.active=true; tts.paused=false;
  speechSynthesis.speak(u);
  updateTTSUI();
}

function ttsToggle(){
  if(!ttsSupported()){ alert('Sorry, your browser does not support text-to-speech.'); return; }
  if(!tts.active) ttsSpeak();
  else if(tts.paused){ speechSynthesis.resume(); tts.paused=false; updateTTSUI(); }
  else { speechSynthesis.pause(); tts.paused=true; updateTTSUI(); }
}

// Header speaker button: reveal the TTS bar and start reading; tap again to stop
function ttsHeaderToggle(){
  if(!ttsSupported()){ alert('Sorry, your browser does not support text-to-speech.'); return; }
  if(tts.active){ ttsStop(); }
  else { ttsSpeak(); }
}

function ttsStop(){
  if(!ttsSupported()) return;
  speechSynthesis.cancel();
  tts.active=false; tts.paused=false;
  ttsClearHL();
  const rb=document.getElementById('rbody');
  if(rb) rb.classList.remove('tts-sentence-hl');
  updateTTSUI();
}

function ttsSetRate(r){
  tts.rate=r;
  const wasActive=tts.active;
  if(wasActive){ speechSynthesis.cancel(); tts.active=false; }
  updateTTSUI();
  if(wasActive) setTimeout(ttsSpeak,100);
}

function populateTTSVoices(){

// Build the flat list of "steps" for a story depending on level
function getReaderSteps(story){
  // Merge only genuine fragments — 1–2 words, which are always bad splits
  // Short but complete sentences (3+ words with end punctuation) stay as-is
  const FRAG_WORDS=3;

  function mergeFragments(arr){
    const out=[];
    arr.forEach(s=>{
      const wc=s.trim().split(/\s+/).length;
      if(out.length>0 && wc<FRAG_WORDS){
        // Clearly a fragment — attach to the previous step
        out[out.length-1]+=' '+s;
      } else {
        out.push(s);
      }
    });
    // Final item still a fragment? Fold into previous
    if(out.length>1 && out[out.length-1].trim().split(/\s+/).length<FRAG_WORDS){
      const last=out.pop();
      out[out.length-1]+=' '+last;
    }
    return out.filter(s=>s.trim().length>0);
  }

  if(story.levelId<=2){
    // Adaptive chunked-sentence mode for Beginner / Elementary.
    // Flattens all sentences across paragraphs, then groups them uniformly
    // to target exactly 5 steps per story (chunk = ceil(total ÷ 5), min 2).
    // Paragraph boundaries are intentionally crossed — at L1–L2 they are
    // short, simple, and don't carry strong thematic separation.
    const allSents=[];
    story.paragraphs.forEach(p=>splitSentences(p).filter(s=>s.trim()).forEach(s=>allSents.push(s)));
    const CHUNK=Math.max(2,Math.ceil(allSents.length/5));
    const raw=[];
    for(let i=0;i<allSents.length;i+=CHUNK){
      raw.push(allSents.slice(i,i+CHUNK).join(' '));
    }
    return mergeFragments(raw);

  } else {
    // Paragraph-by-paragraph for levels 3–6
    const raw=story.paragraphs.filter(p=>p&&p.trim().length>0);
    return mergeFragments(raw);
  }
}

// Rough estimated time remaining in a story — ESL reading pace, not native WPM
const READING_WPM=90;
function estReadingMinutes(steps,fromStep){
  const remainingText=steps.slice(fromStep).join(' ');
  const wordCount=remainingText.split(/\s+/).filter(Boolean).length;
  return Math.max(1,Math.ceil(wordCount/READING_WPM));
}

function renderReader(){
  const story=getStory(); if(!story){navigate('home');return;}
  const lv=LEVELS.find(l=>l.id===story.levelId);
  const steps=getReaderSteps(story);
  const step=Math.min(state.readerStep, steps.length-1);
  const pct=Math.round((step+1)/steps.length*100);
  const isLast=(step>=steps.length-1);

  // Vocab review chips — final step only (pre-quiz review)
  const chips=Object.keys(story.vocabulary).map(w=>`<button class="vocab-chip" onclick="showPopup('${w}')">${w}</button>`).join('');
  const vocabSection=isLast?`<div class="vocab-section"><h4>📘 重要な言葉 — クイズの前に確認しよう</h4><div class="vocab-chips">${chips}</div></div>`:'';

  // All-sentences view: past (grayed), current (highlighted card), future (barely visible)
  const sentenceHTML=steps.map((text,i)=>{
    if(i<step){
      return `<p class="rs-past">${text}</p>`;
    } else if(i===step){
      return `<p class="rs-current" id="rs-cur">${makeWordTappable(text,story.vocabulary)}</p>`;
    } else {
      return `<p class="rs-future">${text}</p>`;
    }
  }).join('');

  // Story illustration — one per step (path remapped from v1 images/bN/ to assets/images/beginner N/)
  function resolveImgPath(p){
    return p ? p.replace(/^images\/b(\d+)\//,(_,n)=>`assets/images/beginner%20${n}/`) : p;
  }
  const stepImg=story.images&&story.images[step] ? resolveImgPath(story.images[step]) : null;
  const imageHTML=stepImg
    ?`<div class="story-image-wrap"><img src="${stepImg}" alt="" loading="lazy" onerror="imgLoadError(this,'${story.emoji||'📖'}')"></div>`
    :'';

  // Progress dots
  const dots=steps.map((_,i)=>`<span class="sdot${i<step?' done':i===step?' cur':''}"></span>`).join('');
  const backLink=step>0?`<button class="reader-back-link" onclick="stepBack()">← 戻る</button>`:'';

  const bottomHTML=`${vocabSection}
    <div class="reader-bottom">
      <div class="step-dots">${dots}</div>
      ${isLast
        ?`<button class="finish-btn" onclick="startQuiz()">クイズへ →</button>`
        :`<button class="finish-btn" onclick="advanceReader()">次へ →</button>`}
      ${backLink}
    </div>`;

  // TTS bar — shown/hidden via speaker toggle
  const ttsBar=`
    <div class="tts-bar tts-collapsible" id="tts-bar" style="display:${tts.active?'flex':'none'}">
      <button id="tts-play-btn" class="tts-play-btn${tts.active&&!tts.paused?' paused':''}" onclick="ttsToggle()" title="${tts.active&&!tts.paused?'Pause':'Play'}">${tts.active&&!tts.paused?'⏸':'▶'}</button>
      <button class="tts-stop-btn" onclick="ttsStop()" title="Stop">■</button>
      <span class="tts-label">🔊 聴く</span>
      ${buildTTSRateSlider()}
    </div>`;

  document.getElementById('app').innerHTML=`
  <div class="screen reader-screen" style="background:white">
    <div class="reader-prog-bar"><div class="reader-prog-fill" id="rpf" style="width:${pct}%"></div></div>
    <div class="reader-time-est" style="background:white">残り ${estReadingMinutes(steps,step)}分</div>
    <div class="reader-header" style="background:white;border-bottom:1px solid rgba(0,0,0,.06)">
      <button class="back-btn" onclick="ttsStop();navigate('stories',{levelId:${story.levelId},subLevel:${story.subLevel}})">←</button>
      <h3>${story.title}</h3>
      <button id="tts-icon-btn" class="icon-btn${tts.active?' tts-active':''}" onclick="ttsHeaderToggle()" aria-label="聴く">🔊</button>
    </div>
    ${ttsBar}
    <div class="reader-body" id="rbody" style="background:white">${imageHTML}${sentenceHTML}</div>
    ${bottomHTML}
  </div>`;

  // Scroll current sentence into view smoothly
  requestAnimationFrame(()=>{
    const cur=document.getElementById('rs-cur');
    if(cur) cur.scrollIntoView({behavior:'smooth',block:'center'});
  });

  document.querySelectorAll('.tappable').forEach(el=>{
    el.addEventListener('click',function(e){
      if(this.dataset.challenge) showChallengePopup(this.dataset.word, this.dataset.challenge, e, this);
      else showPopup(this.dataset.word,e,this);
    });
  });
  // Tag every word in the current step for TTS boundary highlighting
  addTTSWordSpans();
}

function advanceReader(){
  const story=getStory(); if(!story) return;
  const steps=getReaderSteps(story);
  if(state.readerStep<steps.length-1){
    speechSynthesis.cancel(); tts.active=false; tts.paused=false;
    state.readerStep++; renderReader();
  } else {
    startQuiz(); // Last step — flow straight to quiz (enables keyboard-only reading)
  }
}
function stepBack(){
  if(state.readerStep>0){
    speechSynthesis.cancel(); tts.active=false; tts.paused=false;
    state.readerStep--; renderReader();
  }
}


// ── WORD POPUP (hardcoded Japanese translations) ─────────────────────────────
function showPopup(word, e, el){
  const story=getStory(); if(!story) return;
  const def=story.vocabulary[word]; if(!def) return;
  document.getElementById('wp')?.remove();
  document.querySelectorAll('.tappable.hl').forEach(x=>x.classList.remove('hl'));
  if(el) el.classList.add('hl');

  const inDeck=!!state.flashCards[word];
  const jaData=JA_TRANSLATIONS[word]||{};
  const jaWord=jaData.w||'';
  const jaDef=jaData.d||'';

  // Find English example sentence from story paragraphs
  let exEn='';
  if(story.paragraphs){
    for(const para of story.paragraphs){
      const sentences=para.match(/[^.!?]+[.!?]+/g)||[para];
      for(const s of sentences){
        if(s.toLowerCase().includes(word.toLowerCase())){ exEn=s.trim(); break; }
      }
      if(exEn) break;
    }
  }

  const d=document.createElement('div');
  d.id='wp'; d.className='word-popup';
  d.innerHTML=`
    <div class="wp-header">
      <div>
        <span class="wp-word">${word}</span>
        <span class="wp-pos">${def.pos}</span>
        ${jaWord?`<span class="wp-ja-word">${jaWord}</span>`:''}
      </div>
      <button class="wp-close" onclick="closePopup()">✕</button>
    </div>
    ${jaDef?`<div class="wp-section-label">日本語の意味</div><div class="wp-ja-def">${jaDef}</div>`:''}
    <div class="wp-section-label">意味（英語）</div>
    <div class="wp-def">${def.def}</div>
    ${exEn?`<div class="wp-section-label">例文</div><div class="wp-example">"${exEn}"</div>`:''}
    <div class="wp-actions">
      <button class="wp-fc-btn${inDeck?' in-deck':''}" id="wps" onclick="toggleFlashCard('${word}','${def.def.replace(/'/g,"\'")}','${def.pos}')">
        ${inDeck?'✓ カードに追加済み':'＋ カードに追加'}
      </button>
    </div>`;
  document.body.appendChild(d);
  setTimeout(()=>document.addEventListener('click',popupOutside),100);
}

function popupOutside(e){
  const p=document.getElementById('wp');
  if(p&&!p.contains(e.target)&&!e.target.classList.contains('tappable')&&!e.target.classList.contains('vocab-chip')){
    closePopup(); document.removeEventListener('click',popupOutside);
  }
}
function closePopup(){
  const p=document.getElementById('wp');
  if(p){p.classList.add('hiding');setTimeout(()=>p.remove(),200);}
  document.querySelectorAll('.tappable.hl').forEach(x=>x.classList.remove('hl'));
}
function toggleFlashCard(word, def, pos){
  if(state.flashCards[word]){
    delete state.flashCards[word];
  } else {
    const jaWord=(JA_TRANSLATIONS[word]||{}).w||null;
    state.flashCards[word]={def, pos, jaWord};
    showToast('🃏 カードに追加しました！');
    checkBadgesAndNotify();
  }
  save();
  const b=document.getElementById('wps');
  if(b){
    const inDeck=!!state.flashCards[word];
    b.textContent=inDeck?'✓ カードに追加済み':'＋ カードに追加';
    b.classList.toggle('in-deck',inDeck);
  }
}

// ── RENDER: QUIZ ───────────────────────────────────────────
function startQuiz(){ ttsStop(); updateStreak(); navigate('quiz',{quizIndex:0,quizAnswers:[],comboStreak:0,lastRoundPoints:0,quizStartTime:Date.now(),_quizBusy:false}); }

// ── Quiz type helpers ──────────────────────────────────────
// Each story has hand-written MC questions in quiz[]. Other types are derived
// from story paragraphs + vocab on the fly, gated by level:
//   L1–2 (Pre-A1/A1): mc, dndblank            — recognition only
//   L3–4 (A2/B1):     + fitb, dndsent
//   L5–6 (B2/C1):     + type, dndmatch        — all six types
// Type order is shuffled deterministically per story (seeded by story id),
// so each story has its own rhythm but is stable across replays.
function storySeed(id){ let h=2166136261; for(let i=0;i<id.length;i++){ h^=id.charCodeAt(i); h=Math.imul(h,16777619); } return h>>>0; }
function seededRand(seed){ return function(){ seed|=0; seed=seed+0x6D2B79F5|0; let t=Math.imul(seed^seed>>>15,1|seed); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
function seededShuffle(arr,seed){ const a=arr.slice(), rnd=seededRand(seed); for(let i=a.length-1;i>0;i--){ const j=Math.floor(rnd()*(i+1)); const tmp=a[i]; a[i]=a[j]; a[j]=tmp; } return a; }
function getQuizType(story,qIndex){
  const lvl=story.levelId||1;
  let pool;
  if(lvl<=2) pool=['mc','dndblank'];
  else if(lvl<=4) pool=['mc','fitb','dndblank','dndsent'];
  else pool=['mc','fitb','type','dndblank','dndsent','dndmatch'];
  const order=seededShuffle(pool,storySeed(story.id));
  return order[qIndex % order.length];
}
function storySentences(story){
  const out=[];
  for(const p of (story.paragraphs||[])){
    for(const s of p.split(/(?<=[.!?])\s+/)){ const t=s.trim(); if(t) out.push(t); }
  }
  return out;
}

function buildFITB(story, qIndex){
  // Pick a vocab word that appears in a paragraph
  const words=Object.keys(story.vocabulary);
  const word=words[qIndex % words.length];
  for(const para of (story.paragraphs||[])){
    if(para.toLowerCase().includes(word.toLowerCase())){
      const blank=para.replace(new RegExp(word,'i'),'______');
      return {type:'fitb', question:blank, answer:word, feedback:`正解は "${word}" です。`};
    }
  }
  return null;
}

function buildTypeWord(story, qIndex){
  const words=Object.keys(story.vocabulary);
  const word=words[(qIndex+1) % words.length];
  const def=story.vocabulary[word]?.def||'';
  return {type:'type', question:def, answer:word, feedback:`正解は "${word}" です。`};
}

// ── Drag-and-drop builders ─────────────────────────────────
function buildDndBlank(story,qIndex){
  // Drag the right word into a blank in a story sentence (recognition — OK from L1)
  const words=Object.keys(story.vocabulary||{});
  if(words.length<3) return null;
  const sents=storySentences(story);
  for(let k=0;k<words.length;k++){
    const word=words[(qIndex+k)%words.length];
    const sent=sents.find(s=>s.toLowerCase().includes(word.toLowerCase()));
    if(!sent) continue;
    const esc=word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    const blank=sent.replace(new RegExp(esc,'i'),'______');
    const distractors=words.filter(w=>w.toLowerCase()!==word.toLowerCase()).slice(0,3);
    const tiles=seededShuffle([word].concat(distractors),storySeed(story.id)+qIndex);
    return {type:'dndblank',question:blank,answer:word,tiles,feedback:`正解は "${word}" です。`};
  }
  return null;
}
function buildDndSent(story,qIndex){
  // Rebuild a story sentence from shuffled word tiles
  const sents=storySentences(story).map(s=>s.replace(/["“”]/g,'').trim())
    .filter(s=>{const n=s.split(/\s+/).length;return n>=4&&n<=9;});
  if(!sents.length) return null;
  const sent=sents[qIndex%sents.length];
  const wordsArr=sent.split(/\s+/);
  let tiles=seededShuffle(wordsArr,storySeed(story.id)+qIndex+7);
  if(tiles.join(' ')===sent) tiles=tiles.slice().reverse();
  return {type:'dndsent',answer:sent,tiles,feedback:`正解: "${sent}"`};
}
function buildDndMatch(story,qIndex){
  // Drag vocab words onto their English definitions (L5–6 only)
  const entries=Object.entries(story.vocabulary||{}).filter(e=>e[1]&&e[1].def);
  if(entries.length<3) return null;
  const seen=new Set(), pairs=[];
  for(let k=0;k<entries.length&&pairs.length<3;k++){
    const e=entries[(qIndex+k)%entries.length];
    if(!seen.has(e[0])){ seen.add(e[0]); pairs.push({word:e[0],def:e[1].def}); }
  }
  if(pairs.length<3) return null;
  const tiles=seededShuffle(pairs.map(p=>p.word),storySeed(story.id)+qIndex+13);
  const rows=seededShuffle(pairs,storySeed(story.id)+qIndex+29);
  return {type:'dndmatch',pairs:rows,tiles,feedback:''};
}

      <div class="quiz-qcard">

        <div class="dnd-bank">${q.tiles.map((w,i)=>`<button class="dnd-tile" draggable="true" ondragstart="dndDragStart(event,${i})" onclick="dndBlankPick(${i})">${w}</button>`).join('')}</div>`;
    }
  } else if(qtype==='dndsent'){

      ${qBody}

      <button class="quiz-next" id="qnxt" onclick="nextQ()">${qIdx+1<total?'次へ →':'結果を見る →'}</button>

// ── Drag-and-drop interaction ──────────────────────────────
let _dragTile=null;
function dndDragStart(e,i){ _dragTile=i; if(e.dataTransfer) e.dataTransfer.setData('text/plain',String(i)); }
function dndAllowDrop(e){ e.preventDefault(); }
function dndDropBlank(e){ e.preventDefault(); if(_dragTile!=null) dndBlankPick(_dragTile); _dragTile=null; }
function dndDropSent(e){ e.preventDefault(); if(_dragTile!=null) dndSentPick(_dragTile); _dragTile=null; }
function dndDropMatch(e,slot){ e.preventDefault(); if(_dragTile!=null) dndMatchPlace(_dragTile,slot); _dragTile=null; }

function finishDnd(ok,selected,q){
  state._answerTime=Date.now();
  state.quizAnswers.push({selected,correct:ok});
  const fb=document.getElementById('qfb');
  fb.style.display='block'; fb.className='quiz-fb '+(ok?'ok':'bad');
  fb.innerHTML=(ok?'<strong>✓ 正解！</strong> ':'<strong>✗ 不正解</strong> ')+q.feedback;
  if(ok){ const m=Math.min(Math.max((state.comboStreak||0)+1,1),5); showXpFloat(fb,10*m); }
  const n=document.getElementById('qnxt'); if(n) n.classList.add('vis');
}

// dndblank: tap or drop a word into the blank — answers immediately
function dndBlankPick(i){
  const q=state._currentQ; if(!q||q._done) return; q._done=true;
  const pickWord=q.tiles[i];
  const ok=pickWord.toLowerCase()===q.answer.toLowerCase();
  const zone=document.getElementById('dnd-blank-zone');
  if(zone){ zone.textContent=pickWord; zone.classList.add(ok?'ok':'bad'); }
  document.querySelectorAll('.dnd-tile').forEach(b=>b.disabled=true);
  finishDnd(ok,pickWord,q);
}

// dndsent: build the sentence tile by tile
function dndSentPick(i){
  const q=state._currentQ; if(!q||q._done||q._placed.includes(i)) return;
  q._placed.push(i); renderDndSent();
}
function dndSentRemove(pos){
  const q=state._currentQ; if(!q||q._done) return;
  q._placed.splice(pos,1); renderDndSent();
}
function renderDndSent(){
  const q=state._currentQ;
  const row=document.getElementById('dnd-sent-row');
  const bank=document.getElementById('dnd-sent-bank');
  if(!q||!row||!bank) return;
  row.innerHTML=q._placed.map((ti,pos)=>`<button class="dnd-tile placed" onclick="dndSentRemove(${pos})">${q.tiles[ti]}</button>`).join('')||'<span class="dnd-hint">ここに単語を並べよう（タップでもOK）</span>';
  bank.innerHTML=q.tiles.map((w,i)=>q._placed.includes(i)?'':`<button class="dnd-tile" draggable="true" ondragstart="dndDragStart(event,${i})" onclick="dndSentPick(${i})">${w}</button>`).join('');
  const btn=document.getElementById('dnd-check'); if(btn) btn.disabled=q._placed.length!==q.tiles.length;
}
function checkDndSent(){
  const q=state._currentQ; if(!q||q._done) return; q._done=true;
  const built=q._placed.map(ti=>q.tiles[ti]).join(' ');
  const norm=s=>s.toLowerCase().replace(/[.,!?'"]/g,'').replace(/\s+/g,' ').trim();
  const ok=norm(built)===norm(q.answer);
  const btn=document.getElementById('dnd-check'); if(btn) btn.disabled=true;
  document.querySelectorAll('.dnd-tile').forEach(b=>b.disabled=true);
  finishDnd(ok,built,q);
}

// dndmatch: drag (or tap-select then tap-slot) words onto definitions
function dndMatchSelect(i){
  const q=state._currentQ; if(!q||q._done) return;
  q._sel=(q._sel===i?null:i); renderDndMatch();
}
function dndMatchPlace(tileIdx,slot){
  const q=state._currentQ; if(!q||q._done) return;
  for(const k in q._slots){ if(q._slots[k]===tileIdx) delete q._slots[k]; }
  q._slots[slot]=tileIdx; q._sel=null; renderDndMatch();
}
function dndMatchSlotClick(slot){
  const q=state._currentQ; if(!q||q._done) return;
  if(q._sel!=null) dndMatchPlace(q._sel,slot);
  else if(q._slots[slot]!=null){ delete q._slots[slot]; renderDndMatch(); }
}
function renderDndMatch(){
  const q=state._currentQ;
  const bank=document.getElementById('dnd-match-bank');
  if(!q||!bank) return;
  const used=Object.values(q._slots);
  bank.innerHTML=q.tiles.map((w,i)=>used.includes(i)?'':`<button class="dnd-tile${q._sel===i?' sel':''}" draggable="true" ondragstart="dndDragStart(event,${i})" onclick="dndMatchSelect(${i})">${w}</button>`).join('');
  q.pairs.forEach((p,s)=>{
    const z=document.getElementById('dnd-slot-'+s); if(!z) return;
    z.textContent=q._slots[s]!=null?q.tiles[q._slots[s]]:'＿＿＿';
    z.classList.toggle('filled',q._slots[s]!=null);
  });
  const btn=document.getElementById('dnd-check'); if(btn) btn.disabled=Object.keys(q._slots).length!==q.pairs.length;
}
function checkDndMatch(){
  const q=state._currentQ; if(!q||q._done) return; q._done=true;
  let allOk=true;
  q.pairs.forEach((p,s)=>{
    const ok=q.tiles[q._slots[s]]===p.word;
    if(!ok) allOk=false;
    const z=document.getElementById('dnd-slot-'+s); if(z) z.classList.add(ok?'ok':'bad');
  });
  const btn=document.getElementById('dnd-check'); if(btn) btn.disabled=true;
  document.querySelectorAll('.dnd-tile').forEach(b=>b.disabled=true);
  q.feedback=q.pairs.map(p=>`${p.word} = ${p.def}`).join('<br>');
  const ansStr=q.pairs.map((p,s)=>q.tiles[q._slots[s]]).join(',');
  finishDnd(allOk,ansStr,q);
}

function showXpFloat(el, pts){
  if(!el) return;
  const r=el.getBoundingClientRect();
  const f=document.createElement('div');
  f.className='xp-float'; f.textContent=`+${pts||10}pt`;
  f.style.left=(r.left+r.width/2-30)+'px';
  f.style.top=(r.top-10)+'px';
  document.body.appendChild(f);
  setTimeout(()=>f.remove(),2000);
}
function pick(i){
  const story=getStory(); const q=story.quiz[state.quizIndex];
  document.querySelectorAll('.q-opt').forEach(b=>b.disabled=true);
  const ok=i===q.correct;
  const btn=document.querySelectorAll('.q-opt')[i];
  btn.classList.add(ok?'ok':'bad');
  if(!ok) document.querySelectorAll('.q-opt')[q.correct].classList.add('ok');
  // Estimate points: base 10 × next combo multiplier (streak hasn't incremented yet)
  if(ok){ const m=Math.min(Math.max((state.comboStreak||0)+1,1),5); showXpFloat(btn,10*m); }
  state._answerTime = Date.now();
  state.quizAnswers.push({selected:i,correct:ok});
  const fb=document.getElementById('qfb');
  fb.style.display='block'; fb.className='quiz-fb '+(ok?'ok':'bad');

function nextQ(){
  if(state._quizBusy) return;
  state._quizBusy=true;
  const story=getStory();
  const lastAnswer=state.quizAnswers[state.quizAnswers.length-1];
  const correct=lastAnswer?.correct||false;

  // Update combo streak
  if(correct){ state.comboStreak=(state.comboStreak||0)+1; }
  else { state.comboStreak=0; }

  // Calculate points for this question
  const elapsed=(state._answerTime||Date.now())-(state._questionStartTime||Date.now());
  const multiplier=Math.min(Math.max(state.comboStreak,1),5);
  let pts=0;
  if(correct){
    pts=10*multiplier;
    if(elapsed<4000) pts+=5; // speed bonus: answered within 4 seconds
  }
  state.lastRoundPoints=(state.lastRoundPoints||0)+pts;

  const isLast=state.quizIndex+1>=story.quiz.length;

  // Show combo overlay, then proceed
  showComboOverlay(correct, pts, state.comboStreak, ()=>{
    state._quizBusy=false;
    if(isLast) finishQuiz();
    else{ state.quizIndex++; renderQuiz(); }
  });
}

// ── COMBO OVERLAY ──────────────────────────────────────────
function showComboOverlay(correct, pts, streak, callback){
  const app=document.getElementById('app');
  const overlay=document.createElement('div');
  overlay.className='combo-overlay';
  const isCombo=correct && streak>=2;
  const multiplier=Math.min(streak,5);

  let label;
  if(isCombo) label=`×${multiplier} COMBO!`;
  else if(correct) label='CORRECT!';
  else label='WRONG!';

  const frogEmoji=correct?(streak>=3?'🐸✨':'🐸'):'😔';
  const ptsHtml=pts>0
    ?`<div class="combo-pts-pill">+${pts} pts</div>` : '';
  const streakHtml=isCombo
    ?`<div class="combo-streak-line">🔥 ${streak} in a row!</div>` : '';

  overlay.innerHTML=`
    <div class="combo-inner">
      <span class="combo-frog-em">${frogEmoji}</span>
      <div class="combo-label ${correct?'is-correct':'is-wrong'}">${label}</div>
      ${ptsHtml}
      ${streakHtml}
    </div>`;

  app.appendChild(overlay);
  let gone=false;
  const dismiss=()=>{
    if(gone) return; gone=true;
    const inner=overlay.querySelector('.combo-inner');
    if(inner) inner.classList.add('combo-exit');
    setTimeout(()=>{ overlay.remove(); callback(); }, 240);
  };
  overlay.addEventListener('click', dismiss);
  // Auto-dismiss: shorter since it's no longer blocking
  setTimeout(dismiss, isCombo ? 1400 : 1000);
}

function finishQuiz(){
  const story=getStory();
  const correct=state.quizAnswers.filter(a=>a.correct).length;
  const total=story.quiz.length; const score=correct/total;
  const earned=storyXP(story,score);
  const wasNew=!state.progress[story.id];
  const prevXP=state.xp||0;  // capture before adding — used for milestone check

  // Previous best points for this story (0 if never played)
  const prevBestPts=state.progress[story.id]?.pts||0;

  if((state.progress[story.id]?.score||0)<score)
    state.progress[story.id]={...(state.progress[story.id]||{}),score,at:new Date().toISOString()};
  state.xp+=earned;

  // Perfect round bonus
  const perfect=correct===total;
  if(perfect) state.lastRoundPoints=(state.lastRoundPoints||0)+25;

  // Super Fast bonus: avg under 10s per question
  const elapsed=Date.now()-(state.quizStartTime||Date.now());
  const fast=elapsed/total<10000;
  if(fast) state.lastRoundPoints=(state.lastRoundPoints||0)+15;

  const roundPts=state.lastRoundPoints||0;

  // Only add the improvement delta — retries can't re-earn already-banked points
  const pointsToAdd=Math.max(0, roundPts-prevBestPts);
  state.points=(state.points||0)+pointsToAdd;

  // Save new best if improved
  if(roundPts>prevBestPts)
    state.progress[story.id]={...(state.progress[story.id]||{}),pts:roundPts};

  state.comboStreak=0;
  calcTodayCount();
  checkStoriesQuest();
  if(score===1){ markQuestDone('perfect'); state.perfectCount=(state.perfectCount||0)+1; }
  // Check if this story completion finishes a sub-level for the first time
  const sl=story.levelId===6 ? story.subLevel-1 : story.subLevel;
  const justUnlocked=wasNew && subLevelDone(story.levelId, sl);
  // Award a travel ticket for each newly completed sub-level
  const earnedTicket=justUnlocked && story.levelId>=3;
  if(earnedTicket) state.tickets=(state.tickets||0)+1;
  save();
  checkBadgesAndNotify();
  checkXPMilestone(prevXP);
  navigate('results',{lastScore:score,lastCorrect:correct,lastTotal:total,lastXP:earned,
    lastSubLevelUnlocked:justUnlocked?sl:null,lastLevelId:story.levelId,
    lastTicketEarned:earnedTicket,
    lastRoundPoints:roundPts,lastPointsAdded:pointsToAdd,lastWasPerfect:perfect,lastWasFast:fast});
}

// ── FROG GROWTH PANEL (overall account-level progression) ──
function buildFrogGrowthPanel(levelId){

  const footNote=nextLv ? `あと${nextLv-lv}レベルで${stages[cur+1].label}に成長！` : 'さいごのステージまで成長した！🎉';
  const stagesHtml=stages.map((s,i)=>{

    return `<div class="frog-stage ${st}">
      <div class="frog-stage-circle">${s.emoji}</div>
      <div class="frog-stage-label">${s.label}</div>
      ${i===cur?'<div class="frog-stage-here">いまここ！</div>':''}
    </div>`;
  }).join('<div class="frog-stage-divider"></div>');
  return `<div class="frog-growth-panel">

    <div class="frog-growth-track">${stagesHtml}</div>

function buildPointsGauge(roundPts, perfect, fast){
  const perfectBadge=perfect?`<div class="pts-perfect-badge">⭐ Perfect Round +25</div>`:'';
  const fastBadge=fast?`<div class="pts-fast-badge">⚡ Speedy +15</div>`:'';
  const badgesHtml=(perfect||fast)?`<div class="pts-badges">${perfectBadge}${fastBadge}</div>`:'';
  // Life-cycle stages: eggs → tadpole → froglet → juvenile → adult (bottom→top order, rendered top→bottom)
  const stages=['🐸','🐸','🦎','🐟','🫧'];
  const stagesHtml=stages.map((s,i)=>`<div class="pts-life-stage" id="life-stage-${4-i}">${s}</div>`).join('');
  return `<div class="pts-gauge-wrap" id="pts-gauge">
    <div class="pts-gauge-top">
      <div class="pts-life-track">${stagesHtml}</div>
      <div class="pts-gauge-right">
        <div class="pts-round-line">
          <span class="pts-round-prefix">+</span><span class="pts-round-num" id="pts-num">0</span>
          <span class="pts-round-pts-label">Points</span>
        </div>
        <div class="pts-total-label">Total Points Earned:</div>
        <div class="pts-total-num" id="pts-total-disp">${state.points - (state.lastPointsAdded||0)}</div>
        ${badgesHtml}

      <div class="res-card"><div class="rc-icon">🟢</div><div class="rc-val">${state.points}</div><div class="rc-label">合計</div></div>
    </div>
  </div>`;
}

function animatePointsGauge(roundPts, totalQ, perfect, fast){
  const ptsNum=document.getElementById('pts-num');
  const ptsTotalDisp=document.getElementById('pts-total-disp');
  const lifeStages=[0,1,2,3,4].map(i=>document.getElementById('life-stage-'+i));
  if(!ptsNum) return;

  // Which life stages to light up (0=eggs … 4=adult frog)
  const maxPts=(10*5+5)*totalQ+25;
  const ratio=Math.min(roundPts/Math.max(maxPts*0.75,1),1);
  const activeStage=Math.min(Math.floor(ratio*5),4);

  setTimeout(()=>{
    // Light up stages bottom→top, staggered
    for(let i=0;i<=activeStage;i++){
      setTimeout(()=>{ lifeStages[i]?.classList.add('lit'); },i*200);
    }
    // Count up round points over 3 seconds (ease-out cubic)
    const duration=3000;
    const startTime=performance.now();
    const tick=setInterval(()=>{
      const elapsed=performance.now()-startTime;
      const progress=Math.min(elapsed/duration,1);
      const eased=1-Math.pow(1-progress,3);
      if(ptsNum) ptsNum.textContent=Math.round(eased*roundPts);
      if(progress>=1){
        clearInterval(tick);
        if(ptsNum) ptsNum.textContent=roundPts;
        // Count up total (only by the delta actually added)
        if(ptsTotalDisp){
          const pointsAdded=state.lastPointsAdded||0;
          const startTotal=state.points-pointsAdded;
          let ct=startTotal;
          const inc=Math.max(pointsAdded/20,0.1);
          const totalTick=setInterval(()=>{
            ct=Math.min(ct+inc,state.points);
            ptsTotalDisp.textContent=Math.round(ct);
            if(ct>=state.points){ clearInterval(totalTick); ptsTotalDisp.textContent=state.points; }
          },40);
        }
        // Burst stat cards one by one
        document.querySelectorAll('.res-card').forEach((card,i)=>{
          setTimeout(()=>{ card.classList.add('burst'); },i*180+200);
        });
      }
    },40);
  },350);
}

function startFlashCardPlay(hardOnly=false){
  const keys=hardOnly && state.fcHard?.length ? [...state.fcHard] : Object.keys(state.flashCards);
  if(!keys.length) return;
  // Fisher-Yates shuffle
  const order=[...keys];
  for(let i=order.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [order[i],order[j]]=[order[j],order[i]];
  }
  markQuestDone('fc');
  navigate('fcplay',{fcOrder:order,fcStudyIndex:0,fcHard:[]});
}

function initFCSwipe(){
  const card=document.getElementById('fc-card');
  if(!card) return;
  let startX=0, active=false, moved=false;
  const THRESHOLD=65;

  card.addEventListener('pointerdown',function(e){
    startX=e.clientX; active=true; moved=false;
    card.setPointerCapture(e.pointerId);
    card.style.transition='none';
  });

  card.addEventListener('pointermove',function(e){
    if(!active) return;
    const dx=e.clientX-startX;
    if(Math.abs(dx)<8) return;
    moved=true;
    card.style.transform='rotate('+dx*.04+'deg) translateX('+dx*.25+'px)';
    card.classList.toggle('swiping-right',dx>30);
    card.classList.toggle('swiping-left',dx<-30);
  });

  function endDrag(clientX){
    if(!active) return;
    active=false;
    const dx=clientX-startX;
    card.style.transition='transform .35s cubic-bezier(.22,.68,0,1.2)';
    card.style.transform='';
    card.classList.remove('swiping-right','swiping-left');
    if(moved && Math.abs(dx)>=THRESHOLD){
      if(dx>0) fcMark('got'); else fcMark('hard');
    }
  }

  card.addEventListener('pointerup',function(e){ endDrag(e.clientX); });
  card.addEventListener('pointercancel',function(){
    active=false;
    card.style.transition='transform .35s';
    card.style.transform='';
    card.classList.remove('swiping-right','swiping-left');
  });
}

function flipCard(){
  const inner=document.getElementById('fc-card-inner');
  if(!inner) return;
  if(!inner.classList.contains('flipped')){
    inner.classList.add('flipped');
    const nav=document.getElementById('fc-nav');
    if(nav) nav.style.display='flex';

}

function fcMark(result){
  if(!state.fcHard) state.fcHard=[];
  const word=state.fcOrder[state.fcStudyIndex];
  if(result==='hard' && !state.fcHard.includes(word)) state.fcHard.push(word);
  state.fcStudyIndex++;
  renderFlashCardPlay();
}

function fcStep(dir){
  const next=state.fcStudyIndex+dir;
  if(next<0||next>=state.fcOrder.length) return;
  state.fcStudyIndex=next;
  renderFlashCardPlay();

// Look up a Japanese translation for a word.
// Tier 1: static JA_TRANSLATIONS (includes baked-in destination words).
// Tier 2: cached API results from previous sessions.
// Tier 3: live MyMemory API fetch — result is cached for next time.
async function translateWord(word, lang){
  if(lang==='ja'){
    const key=(word||'').toLowerCase();
    const entry=JA_TRANSLATIONS[key];
    if(entry && entry.w) return entry.w;
    const cached=(state.translCache||{})[key];
    if(cached) return cached;
    try {
      const r=await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(word)}&langpair=en|ja`);
      const data=await r.json();
      const tr=data?.responseData?.translatedText;
      if(tr && tr!==word && !/^MYMEMORY/.test(tr)){
        if(!state.translCache) state.translCache={};
        state.translCache[key]=tr;
        save();
        return tr;
      }
    } catch(_){}
  }
  return null;
}

async function fetchCardTranslation(word, e){
  if(e) e.stopPropagation(); // don't flip card
  const btn=document.getElementById('fc-tl-btn');
  if(btn){ btn.textContent='翻訳中…'; btn.disabled=true; }
  const lang='ja';
  const tr=await translateWord(word, lang);
  if(state.flashCards[word] && tr){
    state.flashCards[word].translation = tr;
    state.flashCards[word].lang = lang;
    save();
  }
  // Replace the button with the translation display
  const container=btn?.parentElement;
  if(container && tr){
    const div=document.createElement('div');
    div.className='fc-back-tl-block';
    div.innerHTML=`<span class="fc-back-tl-lang">${lang.toUpperCase()}</span><span class="fc-back-tl-text">${tr}</span>`;
    container.replaceChild(div, btn);
  } else if(btn){
    btn.textContent='翻訳が見つかりません';
    btn.style.opacity='.5';
    btn.disabled=true;
  }
}

  for(let i=0;i<60;i++){

    d.style.cssText=`left:${Math.random()*100}%;top:-10px;background:${cols[i%4]};

function hasAvailableDeparture(){
  if((state.tickets||0)<1) return false;
  for(let i=1;i<DESTINATIONS.length;i++){
    const dest=DESTINATIONS[i];
    const prev=DESTINATIONS[i-1];
    const js=getJourneyState(dest.id);
    if(js.departed) continue;                          // already open
    const prevJs=getJourneyState(prev.id);
    if(prevJs.stamped) return true;                    // prev stamped → depart available
  }
  return false;
}

function renderJourneyQuiz(){

  if(!journeyAllStoriesDone(dest.id)||!journeyAllWordsDone(dest.id)){

  const qIdx=state.journeyQuizIndex||0;
  const q=dest.cultureQuiz[qIdx];
  const answered=state.journeyQuizAnswer!==undefined && state.journeyQuizAnswer!==null;
  const correct=answered && state.journeyQuizAnswer===q.correct;

  const opts=q.options.map((o,i)=>{
    let cls='q-opt';
    if(answered){
      if(i===q.correct) cls+=' ok';
      else if(i===state.journeyQuizAnswer) cls+=' bad';
    }
    return `<button class="${cls}" ${answered?'disabled':''} onclick="answerJourneyQuiz(${i})">
      <span class="opt-letter">${String.fromCharCode(65+i)}</span>${o}

      ${answered?`<button class="quiz-next vis" onclick="${isLast?`finishJourneyQuiz()`:`nextJourneyQuestion()`}">${isLast?'結果を見る →':'次へ →'}</button>`:''}

function answerJourneyQuiz(idx){
  state.journeyQuizAnswer=idx;
  if(!state.journeyQuizCorrect) state.journeyQuizCorrect=0;
  const dest=DESTINATIONS.find(d=>d.id===state.destId);
  if(idx===dest.cultureQuiz[state.journeyQuizIndex||0].correct) state.journeyQuizCorrect++;
  renderJourneyQuiz();
}

function nextJourneyQuestion(){
  state.journeyQuizIndex=(state.journeyQuizIndex||0)+1;
  state.journeyQuizAnswer=null;
  renderJourneyQuiz();
}

function finishJourneyQuiz(){
  const score=state.journeyQuizCorrect||0;
  const js=getJourneyState(state.destId);
  js.quizScore=score;
  save();
  // Reset temp state
  state.journeyQuizIndex=0; state.journeyQuizAnswer=null; state.journeyQuizCorrect=0;
  navigate('destination',{destId:state.destId});
}

// ── JOURNEY STORY PAGE (reader) ─────────────────────────────
function renderJourneyReaderPage(){
  // Uses the same reader engine — we just swap in the journey story object
  const story=JOURNEY_STORIES[state.destId]?.find(s=>s.id===state.journeyStoryId);
  if(!story){navigate('journeyreader',{destId:state.destId});return;}

  const steps=story.paragraphs; // always paragraph mode for journey stories
  const step=Math.min(state.readerStep||0, steps.length-1);
  const pct=Math.round((step+1)/steps.length*100);
  const isLast=step>=steps.length-1;
  const chips=Object.keys(story.vocabulary).map(w=>`<button class="vocab-chip" onclick="showPopup('${w}',null,null)">${w}</button>`).join('');
  const backBtn=step>0?`<button class="reader-back-btn" onclick="journeyStepBack()">← 戻る</button>`:'';

  const bottomHTML=isLast
    ?`<div class="vocab-section"><h4>📘 重要な言葉 — タップして確認</h4><div class="vocab-chips">${chips}</div></div>
      <div class="reader-bottom">
        ${backBtn?`<div class="reader-bottom-row">${backBtn}<button class="finish-btn reader-next-btn" onclick="finishJourneyStory()">Done ✓</button></div>`
        :`<button class="finish-btn" onclick="finishJourneyStory()">Done ✓</button>`}
      </div>`
    :`<div class="reader-bottom">
        ${backBtn?`<div class="reader-bottom-row">${backBtn}<button class="finish-btn reader-next-btn" onclick="journeyStepNext()">次へ →</button></div>`
        :`<button class="finish-btn" onclick="journeyStepNext()">次へ →</button>`}
        <div class="step-counter">${step+1} / ${steps.length}</div>
      </div>`;

  const ttsBar=`<div class="tts-bar" id="tts-bar">
    <button id="tts-play-btn" class="tts-play-btn${tts.active&&!tts.paused?' paused':''}" onclick="ttsToggle()">${tts.active&&!tts.paused?'⏸':'▶'}</button>
    <button class="tts-stop-btn" onclick="ttsStop()">■</button>
    <span class="tts-label">🔊 聴く</span>
    ${buildTTSRateSlider()}
  </div>`;

  document.getElementById('app').innerHTML=`
  <div class="screen reader-screen">
    <div class="reader-prog-bar"><div class="reader-prog-fill" style="width:${pct}%"></div></div>
    <div class="reader-time-est">残り ${estReadingMinutes(steps,step)}分</div>
    <div class="reader-header">
      <button class="back-btn" onclick="ttsStop();navigate('journeyreader',{destId:'${state.destId}'})">←</button>
      <h3>${story.title}</h3>
      <button id="tts-icon-btn" class="icon-btn${tts.active?' tts-active':''}" onclick="ttsToggle()">🔊</button>
    </div>
    ${ttsBar}
    <div class="reader-body" id="rbody"><p class="step-new">${text}</p></div>
    ${bottomHTML}
  </div>`;
  document.querySelectorAll('.tappable').forEach(el=>{
    el.addEventListener('click',function(e){
      if(this.dataset.challenge) showChallengePopup(this.dataset.word,this.dataset.challenge,e,this);
      else showPopup(this.dataset.word,e,this);
    });
  });
  addTTSWordSpans();
}
function journeyStepNext(){
  const story=JOURNEY_STORIES[state.destId]?.find(s=>s.id===state.journeyStoryId);
  if(!story) return;
  if((state.readerStep||0)<story.paragraphs.length-1){
    speechSynthesis.cancel(); tts.active=false; tts.paused=false;
    state.readerStep=(state.readerStep||0)+1; renderJourneyReaderPage();
  }
}
function journeyStepBack(){
  if((state.readerStep||0)>0){
    speechSynthesis.cancel(); tts.active=false; tts.paused=false;
    state.readerStep=(state.readerStep||0)-1; renderJourneyReaderPage();
  }
}
function finishJourneyStory(){
  ttsStop();
  markJourneyStoryDone(state.destId, state.journeyStoryId);
  navigate('journeyreader',{destId:state.destId});
}

function renderJourneyHub(){
  const tickets=state.tickets||0;
  const stampedCount=DESTINATIONS.filter(d=>getJourneyState(d.id).stamped).length;
  const totalDests=DESTINATIONS.length;

  const cards=DESTINATIONS.map((dest,i)=>{
    const js=getJourneyState(dest.id);
    const stories=JOURNEY_STORIES[dest.id]||[];
    const totalTasks=stories.length + dest.localWords.length + 1;
    const doneTasks=js.storiesDone.length + js.wordsDone.length + (js.quizScore!==null?1:0);
    const pct=totalTasks?Math.round(doneTasks/totalTasks*100):0;
    const stamped=js.stamped;

    const prevDest=i>0?DESTINATIONS[i-1]:null;
    const prevStamped=!prevDest||getJourneyState(prevDest.id).stamped;
    const departed=i===0||js.departed;
    const canDepart=!departed&&prevStamped;
    const fullyLocked=!departed&&!prevStamped;

    const bg=DEST_GRADIENTS[dest.id]||'linear-gradient(135deg,#1a1a2e,#16213e)';

    let cls='', badge='', onclickAttr='', extra='';
    if(stamped){
      cls='dgc-stamped';
      badge=`<span class="dgc-badge dgc-badge-stamped">✓ スタンプ済み</span>`;
      extra=`<div class="dgc-stamp">✓</div>`;
    } else if(departed){
      cls='dgc-active';
      badge=`<span class="dgc-badge dgc-badge-open">開放中</span>`;
      onclickAttr=`onclick="navigate('destination',{destId:'${dest.id}'})"`;
    } else if(canDepart){
      cls='dgc-depart';
      badge=`<span class="dgc-badge" style="background:rgba(249,173,59,.18);color:#f9ad3b;border:1px solid rgba(249,173,59,.4)">✈️ 出発できる</span>`;
      extra=`<button class="dgc-depart-btn" ${tickets>0?`onclick="departTo('${dest.id}')"`:' disabled'}>
        ${tickets>0?'✈️ 出発する 🎫×1':'🎫 チケットなし'}
      </button>`;
    } else {
      cls='dgc-locked';
      badge=`<span class="dgc-badge dgc-badge-locked">🔒 ロック中</span>`;
    }

    const lockOverlay=fullyLocked?`<div class="dgc-lock">🔒</div>`:'';
    return `<div class="dest-grid-card ${cls}" style="background:${bg}" ${onclickAttr}>
      <span class="dgc-bg-emoji">${dest.emoji}</span>
      <div class="dgc-emoji">${dest.emoji}</div>
      <div class="dgc-name">${dest.name}</div>
      <div class="dgc-country">${dest.country}</div>
      ${departed&&!stamped?`<div class="dgc-prog-bar"><div class="dgc-prog-fill" style="width:${pct}%"></div></div>`:''}
      ${badge}
      ${canDepart?extra:''}
      ${stamped?extra:''}
      ${lockOverlay}
    </div>`;
  }).join('');

  const progressPct=Math.round(stampedCount/totalDests*100);

  document.getElementById('app').innerHTML=`
  <div class="screen has-tab-bar journey-hub-screen">
    <!-- v2 Journey Hub header -->
    <div class="journey-hub-header">
      <h2>ワールドジャーニー</h2>
      <div class="journey-passport-pill">🛂 ${stampedCount}/${totalDests}</div>
    </div>
    <div class="journey-prog-bar"><div class="journey-prog-fill" style="width:${progressPct}%"></div></div>
    <div class="journey-sub-txt">${stampedCount}か所たんけんずみ！ あと${totalDests-stampedCount}か所でコンプリート</div>
    <div class="dest-hub-grid">${cards}</div>
  </div>
  ${tabBar()}`;
}

function departTo(destId){
  if((state.tickets||0)<1) return;
  const dest=DESTINATIONS.find(d=>d.id===destId);
  if(!dest) return;
  state.tickets=(state.tickets||0)-1;
  getJourneyState(destId).departed=true;
  save();
  runDepartureAnimation(dest,()=>{ renderJourneyHub(); });
}

function runDepartureAnimation(dest, callback){
  const overlay=document.createElement('div');
  overlay.className='depart-overlay';
  overlay.innerHTML=`
    <div class="boarding-pass">
      <div class="bp-airline">RIBBIT AIR</div>
      <div class="bp-dest-emoji">${dest.emoji}</div>
      <div class="bp-dest-name">${dest.name}</div>
      <div class="bp-dest-country">${dest.country}</div>
      <hr class="bp-divider">
      <div class="bp-row">
        <div><div style="font-size:.6rem;color:#bbb;text-transform:uppercase;letter-spacing:.1em">From</div><div class="bp-gate">🏠 Home</div></div>
        <div style="font-size:1rem;color:#bbb">— ✈️ —</div>
        <div><div style="font-size:.6rem;color:#bbb;text-transform:uppercase;letter-spacing:.1em">To</div><div class="bp-gate">${dest.name.toUpperCase()}</div></div>
      </div>
    </div>
    <div class="bp-plane-row"><span class="bp-plane-fly">✈️</span></div>`;
  document.body.appendChild(overlay);
  setTimeout(()=>{
    overlay.style.transition='opacity .45s ease';
    overlay.style.opacity='0';
    setTimeout(()=>{ overlay.remove(); if(callback) callback(); },450);
  },2800);
}

// ── XP MILESTONE CELEBRATIONS ─────────────────────────────
// One-time toasts when the player crosses key XP thresholds.
const XP_MILESTONES=[
  {xp:100,  msg:'⚡ 100 XP 達成！いいスタートだ！'},
  {xp:500,  msg:'🌟 500 XP 達成！どんどん上達中！'},
  {xp:1000, msg:'🏆 1000 XP 達成！本当にすごい！'},
  {xp:5000, msg:'🎖️ 5000 XP 達成！マスタークラス！'},
];
function checkXPMilestone(prevXP){
  const now=state.xp||0;
  XP_MILESTONES.filter(m=>prevXP<m.xp && now>=m.xp)
    .forEach((m,i)=>setTimeout(()=>showToast(m.msg), 3000+i*2600));
}

// Check all badge conditions; fire a toast for any that are newly earned this session.
// Safe to call repeatedly — only toasts once per badge ever (tracked in localStorage).
function checkBadgesAndNotify(){
  const earned=new Set(JSON.parse(localStorage.getItem('rbt_earned_badges')||'[]'));
  const newly=[];
  BADGE_DEFS.forEach(b=>{ if(!earned.has(b.key) && b.earned()){ earned.add(b.key); newly.push(b); } });
  if(!newly.length) return;
  localStorage.setItem('rbt_earned_badges', JSON.stringify([...earned]));
  // Stagger toasts so they don't overlap
  newly.forEach((b,i)=>setTimeout(()=>showToast(`🏅 バッジ獲得！${b.e} ${b.name}`), 1500+i*2600));
}

// ── DAILY LOGIN BONUS ──────────────────────────────────────
// Awards XP once per calendar day on first render. Extra bonus at 7/14/30-day streaks.
function checkDailyLoginBonus(){
  const today=new Date().toDateString();
  if(localStorage.getItem('rbt_lastlogin')===today) return;
  localStorage.setItem('rbt_lastlogin', today);
  let bonus=10;
  let msg='☀️ おかえり！デイリーボーナス +10 XP！';
  if((state.streak||0)>=30){ bonus=35; msg=`🌟 ${state.streak}日連続！特別ボーナス +${bonus} XP！`; }
  else if((state.streak||0)>=14){ bonus=25; msg=`🔥 ${state.streak}日連続達成！ボーナス +${bonus} XP！`; }
  else if((state.streak||0)>=7){ bonus=20; msg=`🔥 ${state.streak}日連続！ボーナス +${bonus} XP！`; }
  state.xp=(state.xp||0)+bonus; save();
  setTimeout(()=>showToast(msg), 700);
}

// ── TOAST NOTIFICATIONS ────────────────────────────────────
function showToast(msg){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t=document.createElement('div');
  t.className='toast'; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>{ t.classList.add('toast-out'); setTimeout(()=>t.remove(),220); },2000);
}
// ── ROUTER ─────────────────────────────────────────────────
function render(){
  // On first launch (no saved language), auto-detect from device and save.
  // This eliminates any first-launch language picker — detection is silent and immediate.
  if(!state.nativeLang){
    const full=(navigator.language||navigator.userLanguage||'en').toLowerCase();
    let detected='en';
    if(full.startsWith('zh-tw')||full.startsWith('zh-hk')) detected='zh-TW';
    else if(full.startsWith('zh')) detected='zh';
    else {
      const base=full.split('-')[0];
      const match=LANGUAGES.find(l=>l.code.split('-')[0]===base);
      if(match) detected=match.code;
    }
    state.nativeLang=detected;
    save();
  }
  switch(state.screen){
    case'landing':   renderLanding();   break;
    case'home':      renderHome();      break;
    case'levels':    renderLevels();    break;
    case'sublevels': renderSubLevels(); break;
    case'stories':   renderStories();   break;
    case'reader':    renderReader();    break;
    case'quiz':      renderQuiz();      break;
    case'results':    renderResults();       break;
    case'flashcards': renderFlashCards();        break;
    case'fcplay':     renderFlashCardPlay();     break;
    case'settings':   renderLangPicker(true);    break;
    case'profile':          renderProfile();              break;
    case'journey':          renderJourneyHub();           break;
    case'destination':      renderDestination();          break;
    case'journeyreader':    renderJourneyReader();        break;
    case'journeyreaderpage':renderJourneyReaderPage();    break;
    case'journeywords':     renderJourneyWords();         break;
    case'journeyquiz':      renderJourneyQuiz();          break;
    case'journeydone':      renderJourneyDone();          break;
    case'topics':           renderTopics();               break;
    case'genrestories':     renderGenreStories();         break;
    default:          renderHome();
  }
}
applyFontSize();
applyVocabHighlight();
render();
setTimeout(checkDailyLoginBonus, 600);

// ── KEYBOARD SHORTCUTS ─────────────────────────────────────────────────────────
document.addEventListener('keydown',function(e){
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.isContentEditable) return;
  const s=state.screen;

  // Reader: arrow keys / space = next step, backspace/left = prev step
  if(s==='reader'){
    if(e.key==='ArrowRight'||e.key===' '){ e.preventDefault(); advanceReader(); }
    else if(e.key==='ArrowLeft'||e.key==='Backspace'){ e.preventDefault(); stepBack(); }
    return;
  }

  // Journey reader page: same arrow-key navigation
  if(s==='journeyreaderpage'){
    if(e.key==='ArrowRight'||e.key===' '){ e.preventDefault(); journeyStepNext(); }
    else if(e.key==='ArrowLeft'||e.key==='Backspace'){ e.preventDefault(); journeyStepBack(); }
    return;
  }

  // Flash card play: arrows to mark, space to flip
  if(s==='fcplay'){
    if(e.key==='ArrowRight'){ e.preventDefault(); fcMark('got'); }
    else if(e.key==='ArrowLeft'){ e.preventDefault(); fcMark('hard'); }
    else if(e.key===' '){ e.preventDefault(); flipCard(); }
    return;
  }

  // Quiz: 1-4 / A-D to pick MC answer; Enter to advance when answer is locked in
  if(s==='quiz'){
    const qnxt=document.getElementById('qnxt');
    if((e.key==='Enter'||e.key===' ')&&qnxt?.classList.contains('vis')){ e.preventDefault(); nextQ(); return; }
    if(state._currentQ?.type==='mc'){
      const map={'1':0,'2':1,'3':2,'4':3,'a':0,'b':1,'c':2,'d':3};
      const idx=map[e.key.toLowerCase()];
      if(idx!==undefined){
        e.preventDefault();
        const opts=document.querySelectorAll('.q-opt');
        if(opts.length>idx&&!opts[0].disabled) pick(idx);
      }
    }
    return;
  }
});
</script>
