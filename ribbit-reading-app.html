<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ribbit v2 — OOSH ESL Reading</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* === v2 Design System (Design Handoff June 2026) === */
      --primary:#bada55; --primary-dark:#8fb832; --primary-light:rgba(186,218,85,.15);
      --primary-mid:rgba(186,218,85,.28); --accent:#f9ad3b; --accent-light:rgba(249,173,59,.12);
      --accent-dark:#d4831a; --correct:#22c55e; --correct-bg:#dcfce7;
      --wrong:#ef4444; --wrong-bg:#fee2e2;
      --red:#ef4444; --red-light:#fee2e2;
      --bg:#eef7e8; --card:#ffffff; --text:#151515; --text-muted:#888;
      --text-light:#aaa; --border:rgba(0,0,0,.06);
      --shadow-sm:0 2px 8px rgba(0,0,0,0.07);
      --shadow:0 2px 10px rgba(0,0,0,0.07);
      --shadow-lg:0 4px 16px rgba(0,0,0,0.12);
      --radius-sm:10px; --radius:18px; --radius-lg:24px;
      --font-head:'Nunito',sans-serif;
      --font-body:'Nunito Sans',sans-serif;
      /* level colors */
      --lv1:#c084fc; --lv2:#bada55; --lv3:#4ade80; --lv4:#38bdf8; --lv5:#fb923c; --lv6:#f43f5e;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
    h1,h2,h3,h4{font-family:var(--font-head)}
    button{font-family:var(--font-body);cursor:pointer;border:none;outline:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
    #app{max-width:520px;margin:0 auto;min-height:100vh;position:relative;overflow-x:hidden}
    .screen{animation:fadeSlideIn .3s ease both}
    @keyframes fadeSlideIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

    /* LANDING / SPLASH — v2 handoff spec */
    .landing-screen{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 24px 48px;background:linear-gradient(175deg,#0d1f0e 0%,#1a3020 55%,#0c1a12 100%);overflow:hidden;text-align:center}
    /* lily-pad BG decorations */
    .landing-screen::before,.landing-screen::after{content:'';position:absolute;border-radius:50%;background:rgba(186,218,85,1);opacity:.07;pointer-events:none}
    .landing-screen::before{width:320px;height:180px;top:-60px;left:-80px}
    .landing-screen::after{width:240px;height:140px;bottom:-60px;right:-60px}
    .landing-lang-pill{position:absolute;top:18px;right:18px;display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.12);backdrop-filter:blur(8px);color:rgba(255,255,255,.9);font-family:var(--font-head);font-size:.75rem;font-weight:700;border-radius:20px;padding:6px 12px;z-index:2;border:none}
    .landing-content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;width:100%;max-width:340px}
    .landing-frog{width:130px;height:130px;margin-bottom:20px;filter:drop-shadow(0 12px 28px rgba(0,0,0,.4));animation:float 3.5s ease-in-out infinite}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
    .landing-title{font-family:var(--font-head);font-size:54px;font-weight:900;color:var(--primary);letter-spacing:-1px;line-height:1}
    .landing-tagline{font-family:var(--font-body);font-size:17px;color:rgba(255,255,255,.88);margin-top:12px;font-weight:400}
    .landing-subtag{font-family:var(--font-body);font-size:12px;color:rgba(255,255,255,.45);margin-top:6px}
    .landing-ctas{width:100%;margin-top:36px;display:flex;flex-direction:column;gap:12px}
    .landing-cta-primary{height:56px;width:100%;background:var(--accent);color:#151515;border-radius:18px;font-family:var(--font-head);font-size:19px;font-weight:900;box-shadow:0 6px 24px rgba(249,173,59,0.5);transition:transform .15s,box-shadow .15s}
    .landing-cta-primary:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(249,173,59,.55)}
    .landing-cta-secondary{height:50px;width:100%;background:transparent;color:rgba(255,255,255,.8);border-radius:18px;font-family:var(--font-head);font-size:16px;font-weight:700;border:2px solid rgba(255,255,255,.2);transition:background .2s}
    .landing-cta-secondary:hover{background:rgba(255,255,255,.06)}
    .landing-footer{position:relative;z-index:1;margin-top:28px;font-family:var(--font-body);font-size:11px;color:rgba(255,255,255,.3);letter-spacing:.04em}

    /* NAV BAR — v2 */
    .nav-bar{display:flex;align-items:center;gap:12px;padding:14px 20px 12px;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
    .nav-bar h2{font-family:var(--font-head);font-size:15px;font-weight:800;color:var(--text);flex:1;text-align:center;padding:0 8px}
    .back-btn{width:36px;height:36px;border-radius:50%;background:#f3f4f6;color:#555;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:background .2s;flex-shrink:0}
    .back-btn:hover{background:#e5e7eb}

    /* HOME */
    .home-screen{display:flex;flex-direction:column;align-items:center;padding:40px 20px 32px;min-height:100vh;background:var(--bg)}
    .logo-block{text-align:center;margin-bottom:32px}
    .frog-logo{width:96px;height:96px;margin:0 auto 14px;filter:drop-shadow(0 8px 24px rgba(143,184,50,.25))}
    .logo-block h1{font-size:2.8rem;color:var(--primary-dark);letter-spacing:-1px;line-height:1}
    .logo-block p{font-size:1rem;color:var(--text-muted);margin-top:6px}
    .streak-badge{display:inline-flex;align-items:center;gap:6px;background:var(--accent-light);color:var(--accent-dark);font-weight:700;font-size:.9rem;border-radius:99px;padding:8px 18px;margin-bottom:24px;border:1px solid #f9ad3b}
    .home-stats{display:flex;gap:12px;margin-bottom:24px;width:100%}
    .home-stat-card{flex:1;background:var(--card);border-radius:var(--radius);padding:16px;text-align:center;box-shadow:var(--shadow-sm);border:1px solid var(--border)}
    .home-stat-card .big{font-size:2rem;font-weight:800;color:var(--primary-dark);line-height:1;font-family:var(--font-head)}
    .home-stat-card .label{font-size:.78rem;color:var(--text-muted);margin-top:4px}
    .xp-wrap{width:100%;margin-bottom:24px}
    .xp-meta{display:flex;justify-content:space-between;margin-bottom:6px;font-size:.8rem;color:var(--text-muted)}
    .xp-bar-wrap{height:8px;background:var(--primary-light);border-radius:99px;overflow:hidden}
    .xp-bar-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:99px;transition:width .6s ease}
    .home-cta{width:100%;padding:18px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:var(--text);border-radius:var(--radius);font-size:1.1rem;font-weight:700;box-shadow:0 6px 24px rgba(143,184,50,.35);transition:transform .15s,box-shadow .15s;margin-bottom:12px}
    .home-cta:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(143,184,50,.4)}
    .home-secondary{width:100%;padding:14px;background:var(--card);color:var(--primary-dark);border-radius:var(--radius);font-size:1rem;font-weight:600;border:2px solid var(--border);transition:border-color .2s,background .2s}
    .home-secondary:hover{border-color:var(--primary);background:var(--primary-light)}

    /* POND MAP HOME — v2 handoff spec */
    .pond-screen{display:flex;flex-direction:column;min-height:100vh;background:var(--bg)}
    /* Header row: streak pill | xp pill | avatar */
    .pond-header{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 8px;gap:8px}
    .pond-stat-pill{display:flex;align-items:center;gap:6px;background:white;border-radius:14px;padding:8px 14px;box-shadow:0 2px 8px rgba(0,0,0,.07);flex:1}
    .pond-stat-pill .psp-val{font-family:var(--font-head);font-size:18px;font-weight:900;color:var(--accent);line-height:1}
    .pond-stat-pill.xp-pill .psp-val{font-size:16px;color:var(--text)}
    .pond-stat-pill .psp-label{font-family:var(--font-body);font-size:11px;color:#888;line-height:1}
    .pond-avatar{width:44px;height:44px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;flex-shrink:0}
    /* Level row below header */
    .pond-level-row{padding:6px 16px 4px;display:flex;align-items:center;justify-content:space-between;gap:8px}
    .pond-level-badge{background:var(--primary);border-radius:10px;padding:5px 14px;font-family:var(--font-head);font-size:13px;font-weight:900;color:#151515;display:inline-block}
    .pond-sublevel-txt{font-family:var(--font-body);font-size:12px;color:#888}
    .pond-nudge{font-family:var(--font-head);font-size:12px;font-weight:700;color:#10b981}
    .pond-xp-bar-wrap{height:7px;background:rgba(0,0,0,.08);border-radius:6px;overflow:hidden;margin:0 16px 4px}
    .pond-xp-bar-fill{height:100%;background:linear-gradient(90deg,var(--primary),#9bc42a);border-radius:6px;transition:width .6s ease}
    /* Legacy header compat */
    .pond-header .ph-title{font-family:var(--font-head);font-size:1.2rem;color:var(--primary-dark);line-height:1.2}
    .pond-header .ph-sub{font-size:.78rem;color:var(--text-muted);margin-top:2px}
    .pond-level-btn{background:none;border:none;text-align:left;padding:0;cursor:pointer}
    .pond-level-btn .ph-change{font-size:.72rem;color:var(--accent-dark);font-weight:700;margin-top:2px;display:inline-block}
    .pond-chips{display:flex;gap:8px;flex-shrink:0;align-items:center}
    .pond-chip{display:inline-flex;align-items:center;gap:5px;background:var(--accent-light);color:var(--accent-dark);font-weight:700;font-size:.8rem;border-radius:99px;padding:6px 12px;border:1px solid #f9ad3b}
    .pond-chip.goal-done{background:var(--primary-light);color:var(--primary-dark);border-color:var(--primary)}
    .frog-bubble{display:flex;align-items:flex-end;gap:10px;padding:8px 20px 0}
    .frog-bubble img{width:52px;height:52px;flex-shrink:0;filter:drop-shadow(0 4px 12px rgba(143,184,50,.3))}
    .frog-bubble .fb-text{background:var(--card);border:1.5px solid var(--border);border-radius:16px 16px 16px 4px;padding:10px 14px;font-size:.88rem;color:var(--text);line-height:1.5;animation:fadeSlideIn .4s ease both}
    .pond-map-wrap{flex:1;padding:4px 0 8px;display:flex;justify-content:center}
    .pond-map{width:100%;max-width:380px;display:block}
    .pad-group{cursor:pointer}
    .pad-group.locked{cursor:default}
    .pad-group circle.pad{transition:transform .15s}
    .pad-group.current circle.pad{animation:glow-pulse-pad 2s ease-in-out infinite}
    .pulse-ring{pointer-events:none;transform-box:fill-box;transform-origin:center;animation:pulse-ring 1.8s ease-out infinite}
    .pulse-ring-2{animation-delay:.6s}
    @keyframes pulse-ring{0%{transform:scale(1);opacity:.7}100%{transform:scale(1.7);opacity:0}}
    @keyframes glow-pulse-pad{0%,100%{filter:drop-shadow(0 0 3px rgba(249,173,59,.5))}50%{filter:drop-shadow(0 0 9px rgba(249,173,59,.2))}}
    .pond-cta-wrap{position:sticky;bottom:64px;padding:10px 20px 14px;background:linear-gradient(to top,rgba(238,247,232,.99),rgba(238,247,232,0));z-index:150}
    .pond-cta{width:100%;padding:17px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:var(--text);border-radius:var(--radius);font-size:1.05rem;font-weight:800;box-shadow:0 6px 24px rgba(143,184,50,.35);transition:transform .15s}
    .pond-cta:hover{transform:translateY(-2px)}

    /* LEVEL SELECT — v2 handoff spec */
    .levels-grid{padding:14px 16px;display:flex;flex-direction:column;gap:10px;padding-bottom:32px;background:#f8faf8}
    .level-card{background:white;border-radius:18px;padding:14px 18px;border:2px solid var(--border);cursor:pointer;transition:border-color .2s,box-shadow .2s,transform .15s;display:flex;align-items:center;gap:14px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
    .level-card:hover{border-color:var(--primary);box-shadow:0 4px 16px rgba(186,218,85,.3);transform:translateY(-2px)}
    .level-card.current-level{border:2px solid var(--primary);box-shadow:0 4px 16px rgba(186,218,85,.3)}
    .level-card.locked-level{background:#fafafa;opacity:.7;cursor:default}
    .level-card.locked-level:nth-child(n+4){opacity:.55}
    .level-card.locked-level:nth-child(n+5){opacity:.45}
    .level-card.locked-level:nth-child(n+6){opacity:.35}
    .level-num{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
    .level-card[data-lv="1"] .level-num{background:rgba(192,132,252,.15);color:#c084fc}
    .level-card[data-lv="2"] .level-num{background:rgba(186,218,85,.2);color:#8fb832}
    .level-card[data-lv="3"] .level-num{background:rgba(74,222,128,.15);color:#22c55e}
    .level-card[data-lv="4"] .level-num{background:rgba(56,189,248,.15);color:#38bdf8}
    .level-card[data-lv="5"] .level-num{background:rgba(251,146,60,.15);color:#fb923c}
    .level-card[data-lv="6"] .level-num{background:rgba(244,63,94,.15);color:#f43f5e}
    .level-info{flex:1}
    .level-info h3{font-family:var(--font-head);font-size:15px;font-weight:800;color:#151515;margin-bottom:2px}
    .level-meta{font-family:var(--font-body);font-size:12px;color:#888;margin-bottom:5px}
    .tag{font-family:var(--font-head);font-size:10px;font-weight:800;padding:3px 8px;border-radius:20px;letter-spacing:.05em;text-transform:uppercase}
    .tag-green{background:#f0fce0;color:#4d7c0f}
    .tag-amber{background:rgba(249,173,59,.12);color:#d4831a}
    .tag-red{background:rgba(244,63,94,.1);color:#f43f5e}
    .level-progress{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
    .level-stars{font-size:.9rem}
    .level-count{font-family:var(--font-head);font-size:12px;font-weight:700}
    .level-prog-bar-mini{width:60px;height:5px;background:rgba(0,0,0,.08);border-radius:99px;overflow:hidden;margin-top:3px}
    .level-prog-bar-mini-fill{height:100%;border-radius:99px;transition:width .5s ease}
    .level-card[data-lv="1"] .level-prog-bar-mini-fill{background:#c084fc}
    .level-card[data-lv="2"] .level-prog-bar-mini-fill{background:#bada55}
    .level-card[data-lv="3"] .level-prog-bar-mini-fill{background:#4ade80}
    .level-card[data-lv="4"] .level-prog-bar-mini-fill{background:#38bdf8}
    .level-card[data-lv="5"] .level-prog-bar-mini-fill{background:#fb923c}
    .level-card[data-lv="6"] .level-prog-bar-mini-fill{background:#f43f5e}
    .level-card-complete{border-color:rgba(186,218,85,.5)}
    .level-badge{display:inline-flex;align-items:center;gap:4px;font-family:var(--font-head);font-size:10px;font-weight:800;color:#4d7c0f;background:#f0fce0;border-radius:20px;padding:3px 8px;margin-top:4px}

    /* SUB-LEVEL SELECT */
    .sublevel-hero{padding:20px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:white}
    .sublevel-hero h2{font-size:1.3rem;margin-bottom:4px}
    .sublevel-hero p{font-size:.85rem;opacity:.85}
    .sublevel-hero .badges{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
    .hero-badge{font-size:.75rem;font-weight:600;background:rgba(255,255,255,.22);color:white;padding:3px 10px;border-radius:99px;border:1px solid rgba(255,255,255,.35)}
    .sublevels-grid{padding:16px;display:grid;grid-template-columns:1fr 1fr;gap:10px;padding-bottom:32px}
    .sublevel-card{background:var(--card);border-radius:var(--radius);padding:14px;border:2px solid var(--border);cursor:pointer;transition:border-color .2s,box-shadow .2s,transform .15s;text-align:center}
    .sublevel-card:hover{border-color:var(--primary);box-shadow:var(--shadow);transform:translateY(-2px)}
    .sublevel-card.complete{border-color:var(--primary-mid);background:var(--primary-light)}
    .sublevel-card .sl-num{font-size:1.6rem;font-weight:900;color:var(--primary-dark);font-family:var(--font-head);line-height:1;margin-bottom:4px}
    .sublevel-card .sl-label{font-size:.82rem;color:var(--text);font-weight:600;margin-bottom:6px}
    .sublevel-card .sl-meta{font-size:.72rem;color:var(--text-muted)}
    .sublevel-card .sl-stars{font-size:.85rem;margin-top:4px}
    .sl-prog-dots{display:flex;gap:5px;justify-content:center;margin-top:7px}
    .sl-dot{width:9px;height:9px;border-radius:50%;background:#e5e7eb;transition:background .2s,transform .2s}
    .sl-dot-done{background:var(--primary);transform:scale(1.1)}
    .sublevel-card.complete .sl-dot{background:var(--primary)}
    .sublevel-card.complete .sl-num{color:var(--primary-dark)}

    /* STORY BROWSER — v2 handoff spec */
    .stories-list{padding:12px 16px;display:flex;flex-direction:column;gap:12px;padding-bottom:32px}
    .story-card{background:white;border-radius:18px;padding:16px;border:1px solid #e5e7eb;cursor:pointer;transition:box-shadow .2s,transform .15s;display:flex;gap:14px;align-items:flex-start;box-shadow:0 2px 8px rgba(0,0,0,.06)}
    .story-card:hover{box-shadow:0 6px 20px rgba(0,0,0,.1);transform:translateY(-2px)}
    .story-card.done{border-color:rgba(186,218,85,.4)}
    .story-emoji{font-size:2.2rem;line-height:1;flex-shrink:0;margin-top:2px}
    .story-info{flex:1}
    .story-info h3{font-family:var(--font-head);font-size:14px;font-weight:800;color:#151515;margin-bottom:4px}
    .story-info p{font-family:var(--font-body);font-size:12px;color:#888;margin-bottom:8px;line-height:1.5}
    .story-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .meta-chip{font-family:var(--font-body);font-size:11px;color:#888}
    .story-action{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:8px}
    .read-btn{padding:8px 18px;background:var(--primary);color:#151515;border-radius:20px;font-family:var(--font-head);font-size:13px;font-weight:800;transition:background .2s}
    .read-btn:hover{background:var(--primary-dark)}
    .done-badge{font-family:var(--font-head);font-size:11px;color:#4d7c0f;font-weight:800}

    /* READER */
    .reader-screen{padding-bottom:140px}
    .reader-prog-bar{height:4px;background:var(--primary-light)}
    .reader-prog-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));transition:width .4s ease}
    .reader-time-est{text-align:right;font-size:.68rem;font-weight:700;color:var(--text-muted);padding:4px 14px 0;background:var(--card)}
    .reader-header{padding:12px 20px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
    .reader-header h3{font-size:1rem;flex:1;text-align:center;padding:0 8px}
    .icon-btn{width:44px;height:44px;border-radius:50%;background:var(--primary-light);color:var(--primary-dark);display:flex;align-items:center;justify-content:center;font-size:1rem;transition:background .2s}
    .icon-btn:hover{background:var(--primary-mid)}
    .reader-story-meta{padding:16px 24px 8px;display:flex;gap:10px;flex-wrap:wrap}
    .meta-pill{display:flex;align-items:center;gap:5px;font-size:.78rem;color:var(--text-muted);background:var(--primary-light);padding:4px 12px;border-radius:99px}
    .reader-body{padding:8px 24px 24px}
    .reader-body p{font-size:1.18rem;line-height:1.75;letter-spacing:.01em;color:var(--text);margin-bottom:1.2em}
    .level-early .reader-body p{font-size:1.3rem;line-height:1.9;letter-spacing:.015em}
    .reader-body .tappable{border-bottom:2px solid var(--primary);background:var(--primary-light);padding:0 2px;border-radius:3px;color:var(--primary-dark)}
    .tappable{display:inline;border-bottom:1.5px dotted var(--primary-mid);cursor:pointer;border-radius:2px;transition:background .15s,color .15s}
    .tappable:hover{background:var(--primary-light);color:var(--primary-dark)}
    .tappable.hl{background:var(--accent-light);color:var(--accent-dark);border-bottom-color:var(--accent)}
    /* Vocab highlight mode — story vocabulary (green) */
    .tappable-hl{background:rgba(186,218,85,.3);color:var(--primary);border-bottom:2px solid var(--primary);padding:0 2px;border-radius:3px}
    .tappable-hl:hover{background:var(--primary-light)}
    .tappable-hl.hl{background:var(--accent-light);color:var(--accent-dark);border-bottom-color:var(--accent)}
    /* Above-level words from CEFR word lists (blue) */
    .tappable-challenge{background:#EFF6FF;color:#1D4ED8;border-bottom:2px solid #93C5FD;padding:0 2px;border-radius:3px;cursor:pointer}
    .tappable-challenge:hover{background:#DBEAFE}
    .tappable-challenge.hl{background:#DBEAFE;color:#1E40AF}
    /* Level badge in popup */
    .wp-level-badge{font-size:.72rem;font-weight:800;background:#EFF6FF;color:#1D4ED8;border:1px solid #BFDBFE;padding:2px 8px;border-radius:99px;margin-left:8px}
    .wp-challenge-note{font-size:.82rem;color:#1D4ED8;background:#EFF6FF;border-radius:8px;padding:8px 10px;margin-bottom:10px;border:1px solid #BFDBFE}
    .vocab-section{margin:8px 0 24px;padding:16px;background:var(--primary-light);border-radius:var(--radius);border:1px solid var(--primary-mid)}
    .vocab-section h4{font-size:.82rem;color:var(--primary-dark);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
    .vocab-chips{display:flex;flex-wrap:wrap;gap:8px}
    .vocab-chip{padding:4px 12px;background:var(--card);border:1px solid var(--primary-mid);color:var(--primary-dark);border-radius:99px;font-size:.82rem;font-weight:600;cursor:pointer;transition:background .2s,color .2s}
    .vocab-chip:hover{background:var(--primary-mid);color:var(--text)}
    .reader-bottom{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;background:var(--card);border-top:1px solid var(--border);padding:12px 20px 20px;z-index:100}
    .finish-btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:var(--text);border-radius:var(--radius);font-size:1rem;font-weight:700;box-shadow:0 4px 16px rgba(143,184,50,.3);transition:transform .15s,box-shadow .15s}
    .finish-btn:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(143,184,50,.4)}
    .step-counter{text-align:center;font-size:.8rem;color:var(--text-muted);margin-bottom:6px;font-family:var(--font-body)}
    .step-dots{display:flex;justify-content:center;gap:6px;margin-bottom:10px}
    .sdot{width:8px;height:8px;border-radius:50%;background:var(--primary-light);transition:background .3s,transform .3s}
    .sdot.done{background:var(--primary)}
    .sdot.cur{background:var(--primary-dark);transform:scale(1.25)}
    .reader-back-link{display:block;margin:8px auto 0;background:none;border:none;color:var(--text-muted);font-size:.85rem;font-weight:600;padding:6px 16px}
    .reader-back-link:hover{color:var(--primary-dark)}
    .step-new{animation:stepIn .4s ease both}
    @keyframes stepIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .reader-sentence{padding:4px 0}
    .story-image-wrap{width:100%;max-width:320px;margin:0 auto 18px;aspect-ratio:1/1;border-radius:var(--radius);overflow:hidden;background:var(--primary-light)}
    .story-image-wrap img{width:100%;height:100%;object-fit:cover;display:block}
    .story-image-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:3rem;opacity:.4}

    /* WORD POPUP */
    .word-popup{position:fixed;bottom:120px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:488px;background:#151515;border-radius:16px;box-shadow:0 8px 24px rgba(0,0,0,.35);padding:14px 18px;z-index:200;animation:popIn .25s cubic-bezier(.34,1.56,.64,1) both}
    @keyframes popIn{from{opacity:0;transform:translateX(-50%) translateY(20px) scale(.95)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}
    .word-popup.hiding{animation:popOut .2s ease both}
    @keyframes popOut{to{opacity:0;transform:translateX(-50%) translateY(12px)}}
    .wp-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .wp-word{font-size:1.15rem;font-weight:900;color:#fff;font-family:var(--font-head)}
    .wp-pos{font-size:.65rem;color:#151515;background:#bada55;padding:3px 8px;border-radius:8px;font-weight:800;margin-left:8px;text-transform:uppercase;letter-spacing:.04em}
    .wp-close{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.12);color:rgba(255,255,255,.7);font-size:.9rem;display:flex;align-items:center;justify-content:center}
    .wp-ja-word{display:block;font-size:1.25rem;font-weight:800;color:#bada55;font-family:var(--font-head);margin-top:2px}
    .wp-ja-def{font-size:1rem;font-weight:700;color:#d4ec96;font-family:var(--font-head);line-height:1.4;margin-bottom:8px}
    .wp-def{font-size:.95rem;color:rgba(255,255,255,.8);line-height:1.5;margin-bottom:8px}
    .wp-section-label{font-size:.68rem;font-weight:700;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;margin-top:10px}
    .wp-native-def{font-size:1.25rem;font-weight:800;color:#bada55;font-family:var(--font-head);line-height:1.4;margin-bottom:4px;min-height:0}
    .wp-example{font-size:.78rem;color:rgba(255,255,255,.6);line-height:1.5;font-style:italic;margin-bottom:8px;background:rgba(255,255,255,.06);border-radius:8px;padding:8px 10px}
    .wp-translation{min-height:22px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
    .wp-tl-loading{font-size:.78rem;color:rgba(255,255,255,.4);font-style:italic}
    .wp-tl-lang{font-size:.68rem;font-weight:700;background:rgba(186,218,85,.18);color:#bada55;padding:2px 6px;border-radius:99px}
    .wp-tl-text{font-size:1rem;font-weight:700;color:#bada55;font-family:var(--font-head)}
    .wp-actions{display:flex;flex-direction:column;gap:8px}
    .wp-translate-btn{width:100%;padding:10px 14px;border-radius:var(--radius);font-size:.85rem;font-weight:700;background:rgba(249,173,59,.14);color:#f9ad3b;border:1px solid rgba(249,173,59,.3);transition:background .2s,color .2s;text-align:center}
    .wp-translate-btn:hover{background:rgba(249,173,59,.26)}
    .wp-translate-btn:disabled{opacity:.6;cursor:default}
    .wp-fc-btn{width:100%;padding:10px 14px;border-radius:var(--radius);font-size:.85rem;font-weight:700;background:rgba(186,218,85,.16);color:#bada55;transition:background .2s,color .2s;text-align:center}
    .wp-fc-btn:hover{background:#bada55;color:#151515}
    .wp-fc-btn.in-deck{background:#bada55;color:#151515}
    .wp-save{display:flex;align-items:center;gap:6px;font-size:.82rem;color:#bada55;font-weight:700;background:none;padding:0;transition:color .2s}
    .wp-save:hover{color:#d4ec96}
    .wp-save.saved{color:#f9ad3b}

    /* QUIZ — v2 handoff spec */
    .quiz-screen{background:#f5f9ef}
    .quiz-progress{padding:14px 20px 10px;display:flex;align-items:center;gap:10px;background:#f5f9ef}
    .q-dots{display:flex;gap:7px;align-items:center}
    .q-dot{width:10px;height:10px;border-radius:50%;background:#e5e7eb;transition:background .3s,border .3s,transform .2s;border:2px solid transparent}
    .q-dot.cur{background:white;border:2px solid var(--primary);transform:scale(1.3);box-shadow:0 0 0 2px rgba(186,218,85,.3)}
    .q-dot.ok{background:var(--primary);border-color:var(--primary)}
    .q-dot.bad{background:var(--accent);border-color:var(--accent)}
    .q-label{font-family:var(--font-body);font-size:13px;color:#888;white-space:nowrap;margin-left:6px}
    .combo-pill{display:flex;align-items:center;gap:5px;margin-left:auto;background:#fff3e0;border-radius:20px;padding:6px 12px;font-family:var(--font-head);font-weight:900;font-size:13px;color:var(--accent);white-space:nowrap}
    .quiz-body{padding:4px 16px 24px;background:#f5f9ef}
    /* Question card */
    .quiz-qcard{background:white;border-radius:20px;box-shadow:0 3px 12px rgba(0,0,0,.07);padding:22px 20px 20px;margin-bottom:18px;position:relative}
    .quiz-qtype-label{display:inline-block;font-family:var(--font-body);font-size:12px;color:#aaa;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
    .quiz-question{font-family:var(--font-head);font-size:19px;color:#151515;line-height:1.5;font-weight:900;margin:0}
    .quiz-question-sub{font-family:var(--font-body);font-size:13px;color:#888;margin-top:6px}
    /* Multiple choice */
    .quiz-options{display:flex;flex-direction:column;gap:12px}
    .q-opt{min-height:56px;padding:16px 20px;background:white;border:2px solid #e5e7eb;border-radius:18px;font-family:var(--font-head);font-size:17px;font-weight:700;text-align:left;cursor:pointer;transition:border-color .2s,background .2s,box-shadow .2s;display:flex;align-items:center;gap:14px;box-shadow:0 2px 6px rgba(0,0,0,.05)}
    .q-opt:hover:not(:disabled){border-color:var(--primary);background:#f6fce8;box-shadow:0 2px 12px rgba(186,218,85,.25)}
    .q-opt:disabled{cursor:default}
    .q-opt.ok{border-color:var(--correct);background:var(--correct-bg);color:#15803d;box-shadow:0 2px 10px rgba(34,197,94,.2)}
    .q-opt.bad{border-color:var(--wrong);background:var(--wrong-bg);color:#dc2626}
    .opt-letter{width:34px;height:34px;border-radius:50%;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-family:var(--font-head);font-size:13px;font-weight:800;flex-shrink:0;color:#4b5563;transition:background .2s,color .2s}
    .q-opt.ok .opt-letter{background:var(--correct);color:white}
    .q-opt.bad .opt-letter{background:var(--wrong);color:white}
    .opt-text{flex:1;line-height:1.4}
    .opt-checkmark{width:28px;height:28px;border-radius:50%;background:var(--correct);display:none;align-items:center;justify-content:center;flex-shrink:0;font-size:1rem;color:white}
    .q-opt.ok .opt-checkmark{display:flex}
    /* Feedback */
    .quiz-fb{margin-top:14px;padding:14px 16px;border-radius:14px;font-family:var(--font-body);font-size:.9rem;line-height:1.5;animation:fadeSlideIn .25s ease both;display:none}
    .quiz-fb.ok{background:var(--correct-bg);color:#166534;border:1px solid #86efac}
    .quiz-fb.bad{background:#fff7ed;color:#7c3012;border:1px solid #fed7aa}
    /* FITB */
    .quiz-fitb-wrap{display:flex;gap:8px;margin-top:4px}
    .quiz-fitb-input{flex:1;padding:12px;border:2px solid #e5e7eb;border-radius:14px;font-size:1rem;font-family:var(--font-body);outline:none;background:#fff;color:var(--text)}
    .quiz-fitb-input:focus{border-color:var(--primary)}
    .quiz-fitb-btn{padding:12px 18px;background:var(--primary);color:#151515;border-radius:14px;font-weight:700;white-space:nowrap;font-size:.9rem}
    /* Type the word */
    .type-emoji-card{background:#fff;border-radius:18px;box-shadow:0 2px 10px rgba(0,0,0,.07);padding:18px 20px;text-align:center;margin-bottom:16px}
    .type-emoji{font-size:4.5rem;line-height:1;display:block;margin-bottom:6px}
    .type-phonetic{font-size:.9rem;color:var(--text-muted);font-weight:600;letter-spacing:.5px}
    .type-slots-wrap{margin-top:4px}
    .type-slots{display:flex;flex-wrap:wrap;gap:10px;cursor:text;justify-content:center}
    .type-slot{width:48px;height:58px;border:2.5px solid var(--primary);border-radius:14px;box-shadow:0 3px 10px rgba(186,218,85,.25);display:flex;align-items:center;justify-content:center;font-family:var(--font-body);font-weight:900;font-size:1.5rem;color:var(--text);background:#fff;transition:border-color .15s,box-shadow .15s}
    .type-slot.cursor{border-bottom:3.5px solid var(--primary)}
    .type-slot.filled{border-color:var(--primary-dark)}
    .type-slots.slots-ok .type-slot{border-color:#22c55e;background:#dcfce7}
    .type-slots.slots-bad .type-slot{border-color:#e05656;background:rgba(224,86,86,.1)}
    .type-hint{margin-top:8px;font-size:.75rem;font-weight:700;color:var(--primary-dark);text-align:center}
    .type-hidden-input{position:absolute;opacity:0;height:1px;width:1px;pointer-events:none}
    .type-submit-btn{margin-top:16px;width:100%;padding:16px;background:var(--primary);color:#151515;border-radius:18px;font-size:1rem;font-weight:800;border:none;cursor:pointer;transition:opacity .2s,transform .15s}
    .type-submit-btn:disabled{opacity:.4;cursor:default}
    .type-submit-btn:not(:disabled):hover{transform:translateY(-1px)}
    /* DnD */
    .dnd-section-label{font-size:.75rem;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--text-muted);margin-bottom:8px}
    .dnd-bank{display:flex;flex-wrap:wrap;gap:10px;margin-top:4px}
    .dnd-tile{padding:10px 16px;min-height:48px;background:#fff;border:2px solid #e5e7eb;border-radius:14px;font-size:.95rem;font-weight:700;cursor:grab;font-family:var(--font-body);transition:border-color .15s,background .15s,color .15s;display:flex;align-items:center;box-shadow:0 2px 6px rgba(0,0,0,.06)}
    .dnd-tile.sel{border-color:var(--primary);background:rgba(186,218,85,.25)}
    .dnd-tile.placed{cursor:pointer;background:#151515;color:#fff;border-color:#151515}
    .dnd-tile:disabled{opacity:.6;cursor:default}
    .dnd-zone{min-height:58px;border:2px dashed var(--primary);border-radius:16px;padding:10px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:16px;background:#f0fce4}
    .dnd-hint{color:var(--text-muted);font-size:.85rem;font-weight:600}
    .dnd-blank-zone{display:inline-block;min-width:90px;border-bottom:2px dashed var(--primary);text-align:center;padding:0 6px;transition:color .15s}
    .dnd-blank-zone.ok{color:#22c55e;border-color:#22c55e;font-weight:bold}
    .dnd-blank-zone.bad{color:#e05656;border-color:#e05656;font-weight:bold}
    .dnd-slot{border:2px dashed #e5e7eb;border-radius:14px;padding:10px 14px;min-width:84px;text-align:center;font-size:.9rem;cursor:pointer;font-weight:700;transition:border-color .15s,background .15s}
    .dnd-slot.filled{border-style:solid;border-color:var(--primary)}
    .dnd-slot.ok{border-color:#22c55e;background:#dcfce7}
    .dnd-slot.bad{border-color:#e05656;background:rgba(224,86,86,.1)}
    .dnd-match-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
    .dnd-match-def{flex:1;font-size:.9rem;color:var(--text);font-weight:600}
    .dnd-check-btn{margin-top:16px;width:100%;padding:15px;background:var(--primary);border:none;border-radius:18px;font-weight:800;font-size:.95rem;cursor:pointer;font-family:var(--font-body);color:#151515}
    .dnd-check-btn:disabled{opacity:.4;cursor:default}
    /* Next button */
    .quiz-next{margin-top:20px;width:100%;padding:16px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#151515;border-radius:18px;font-size:1rem;font-weight:800;box-shadow:0 4px 16px rgba(143,184,50,.3);transition:transform .15s;display:none}
    .quiz-next.vis{display:block;animation:quiz-next-in .28s cubic-bezier(.34,1.56,.64,1) forwards}
    @keyframes quiz-next-in{from{opacity:0;transform:translateY(8px) scale(.96)} to{opacity:1;transform:none}}
    .quiz-next:hover{transform:translateY(-1px)}
    /* XP float — v2 handoff spec */
    @keyframes xpRise{0%{transform:translateY(0) scale(0.7);opacity:0}30%{transform:translateY(-10px) scale(1.1);opacity:1}80%{transform:translateY(-24px) scale(1);opacity:1}100%{transform:translateY(-36px) scale(.9);opacity:0}}
    .xp-float{position:fixed;font-family:var(--font-head);font-size:22px;font-weight:900;color:var(--accent);pointer-events:none;animation:xpRise 2s ease forwards;z-index:999;text-shadow:0 2px 8px rgba(249,173,59,.4)}

    /* RESULTS — v2 handoff spec dark green gradient */
    .results-screen{padding:16px 16px 12px;display:flex;flex-direction:column;align-items:center;text-align:center;min-height:100dvh;max-height:100dvh;overflow-y:auto;box-sizing:border-box;background:linear-gradient(175deg,#0d2010 0%,#1a3a20 50%,#0a1a10 100%);--bg:#0d2010;--card:rgba(255,255,255,.09);--text:#e4edd8;--text-muted:rgba(228,237,216,.5);--text-light:rgba(228,237,216,.3);--border:rgba(255,255,255,.1)}
    /* すごい！ headline */
    .res-headline{font-family:var(--font-head);font-size:42px;font-weight:900;color:var(--primary);animation:fade-up .5s ease forwards;margin-bottom:2px}
    @keyframes fade-up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    .res-subhead{font-family:var(--font-head);font-size:20px;font-weight:700;color:rgba(255,255,255,.85);margin-bottom:12px}
    /* XP counter big number */
    .res-xp-big{font-family:var(--font-head);font-size:56px;font-weight:900;color:var(--accent);letter-spacing:-2px;line-height:1}
    /* Stars */
    .res-stars{display:flex;gap:6px;justify-content:center;margin:8px 0}
    .res-star{font-size:44px;animation:pop-in .3s cubic-bezier(.34,1.56,.64,1) both}
    @keyframes pop-in{0%{transform:scale(0)}70%{transform:scale(1.14)}100%{transform:scale(1)}}
    /* Stats row */
    .res-stats-row{display:flex;gap:8px;width:100%;margin:10px 0}
    .res-stat-cell{flex:1;background:rgba(255,255,255,.09);border-radius:16px;padding:14px 8px;text-align:center}
    .res-stat-val{font-family:var(--font-head);font-size:22px;font-weight:900;color:white;line-height:1}
    .res-stat-val.accent{color:var(--accent)}
    .res-stat-lbl{font-family:var(--font-body);font-size:11px;color:rgba(255,255,255,.5);margin-top:3px}
    .res-emoji{font-size:3rem;line-height:1;margin-bottom:6px;display:block;animation:bounceIn .6s cubic-bezier(.34,1.56,.64,1) both}
    @keyframes bounceIn{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
    @keyframes stampDrop{from{opacity:0;transform:scale(2) rotate(-15deg)}to{opacity:1;transform:scale(1) rotate(0deg)}}
    .results-screen h2{font-family:var(--font-head);font-size:42px;font-weight:900;color:var(--primary);margin-bottom:2px;animation:fade-up .5s ease forwards}
    .res-score{font-family:var(--font-head);font-size:56px;font-weight:900;color:var(--accent);letter-spacing:-2px;margin:4px 0}
    .res-card{flex:1;background:rgba(255,255,255,.09);border-radius:10px;padding:14px 4px;text-align:center;opacity:0;transform:scale(.5)}
    .res-card .rc-icon{font-size:.95rem;margin-bottom:1px}
    .res-card .rc-val{font-family:var(--font-head);font-size:22px;font-weight:900;color:white;line-height:1}
    .res-card .rc-label{font-family:var(--font-body);font-size:11px;color:rgba(255,255,255,.5);margin-top:3px}
    .res-continue{width:100%;padding:16px;background:var(--primary);color:#151515;border-radius:18px;font-family:var(--font-head);font-size:17px;font-weight:900;box-shadow:0 4px 20px rgba(186,218,85,.4);margin-bottom:10px;transition:transform .15s}
    .res-continue:hover{transform:translateY(-2px)}
    .res-again{width:100%;padding:14px;background:transparent;color:rgba(255,255,255,.8);border-radius:18px;font-family:var(--font-head);font-size:15px;font-weight:700;border:1.5px solid rgba(255,255,255,.2);transition:background .2s;margin-bottom:6px}
    .res-again:hover{background:rgba(255,255,255,.06)}
    .res-reread{width:100%;padding:10px;background:none;color:rgba(255,255,255,.4);border-radius:18px;font-family:var(--font-body);font-size:.84rem;font-weight:600;border:1px solid rgba(255,255,255,.1)}
    .sublevel-unlock{background:rgba(249,173,59,.12);border:1px solid rgba(249,173,59,.4);border-radius:18px;padding:12px 16px;text-align:center;font-family:var(--font-head);font-weight:800;color:var(--accent);margin:12px 0;font-size:.9rem;animation:stepIn .4s ease both}

    /* WORDLIST */
    .wl-empty{text-align:center;padding:48px 20px;color:var(--text-muted)}
    .wl-empty .we-icon{font-size:3rem;margin-bottom:12px}
    .wl-items{padding:12px 16px;display:flex;flex-direction:column;gap:10px;padding-bottom:100px}
    .wl-item{background:var(--card);border-radius:var(--radius);padding:14px 16px;border:1px solid var(--border);display:flex;align-items:center;gap:12px}
    .wl-word{font-size:1.05rem;font-weight:700;color:var(--primary-dark);font-family:var(--font-head)}
    .wl-def{font-size:.82rem;color:var(--text-muted);line-height:1.4;margin-top:2px}
    .wl-del{color:var(--text-light);font-size:1rem;background:none;transition:color .2s;padding:4px 8px}
    .wl-del:hover{color:var(--red)}
    /* Daily goal ring */
    .daily-goal-wrap{display:flex;align-items:center;gap:16px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;margin-bottom:20px;width:100%}
    .goal-ring{width:72px;height:72px;flex-shrink:0}
    .daily-goal-title{font-size:1rem;font-weight:700;color:var(--text);font-family:var(--font-head)}
    .daily-goal-sub{font-size:.85rem;color:var(--text-muted);margin-top:2px}
    .daily-goal-done{font-size:.82rem;color:var(--accent-dark);font-weight:700;margin-top:4px}
    /* DAILY QUESTS */
    .quests-wrap{width:100%;margin-bottom:16px;padding:0 20px}
    .quests-section-title{font-family:var(--font-head);font-size:.72rem;font-weight:900;color:var(--text-muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
    .quest-list{display:flex;flex-direction:column;gap:7px}
    .quest-card{display:flex;align-items:center;gap:10px;background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;transition:border-color .25s,background .25s}
    .quest-card.quest-done{border-color:var(--primary);background:var(--primary-light)}
    .quest-icon{font-size:1.25rem;flex-shrink:0;width:26px;text-align:center}
    .quest-body{flex:1;min-width:0}
    .quest-text{font-family:var(--font-head);font-size:.84rem;font-weight:800;color:var(--text);line-height:1.3}
    .quest-prog{font-family:var(--font-body);font-size:.7rem;color:var(--text-muted);margin-top:3px}
    .quest-check{font-size:1rem;flex-shrink:0;color:var(--primary-dark);opacity:0;transform:scale(.5);transition:opacity .3s,transform .3s}
    .quest-card.quest-done .quest-check{opacity:1;transform:scale(1)}
    .quest-bonus-card{display:flex;align-items:center;justify-content:space-between;gap:8px;background:var(--accent-light);border:1.5px solid rgba(249,173,59,.4);border-radius:var(--radius-sm);padding:10px 14px;margin-top:2px}
    .quest-bonus-card.quest-bonus-done{background:rgba(249,173,59,.22);border-color:var(--accent)}
    .quest-bonus-txt{font-family:var(--font-head);font-size:.82rem;font-weight:800;color:var(--accent-dark)}
    .quest-xp-badge{font-family:var(--font-head);font-size:.72rem;font-weight:900;color:var(--accent-dark);background:rgba(249,173,59,.2);border-radius:99px;padding:3px 9px;flex-shrink:0}
    /* Quest progress bar */
    .quest-prog-bar-wrap{height:3px;background:rgba(0,0,0,.07);border-radius:99px;overflow:hidden;margin-top:5px}
    .quest-prog-bar-fill{height:100%;border-radius:99px;transition:width .5s ease;background:linear-gradient(90deg,var(--primary),#9bc42a)}
    .quest-card.quest-done .quest-prog-bar-fill{background:var(--primary)}
    /* Weekly quests container */
    .weekly-quests-wrap .quests-section-title{color:var(--primary-dark)}
    /* Font size */
    .font-large .reader-body p{font-size:1.3rem;line-height:2.1}
    .font-large.level-early .reader-body p{font-size:1.45rem;line-height:2.2}
    .font-large .fc-front-word{font-size:2.7rem}
    .font-large .fc-back-word{font-size:1.8rem}
    .font-large .fc-back-def{font-size:1.05rem}
    .font-size-toggle{display:flex;gap:10px;margin-bottom:4px}
    .fs-btn{width:56px;height:56px;border-radius:var(--radius);border:2px solid var(--border);background:var(--card);color:var(--text-muted);font-weight:800;font-size:1rem;transition:all .2s}
    .fs-btn-large{font-size:1.5rem}
    .fs-active{border-color:var(--primary);background:var(--primary-light);color:var(--primary-dark)}
    /* TTS — Text-to-Speech bar */
    .tts-bar{display:flex;align-items:center;gap:8px;padding:8px 20px;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:57px;z-index:49}
    .tts-play-btn{width:44px;height:44px;border-radius:50%;background:var(--primary);color:#151515;font-size:1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s}
    .tts-play-btn:hover{background:var(--primary-dark)}
    .tts-play-btn.paused{background:var(--accent);color:var(--text)}
    .tts-stop-btn{width:44px;height:44px;border-radius:50%;background:var(--card);color:var(--text-muted);font-size:.9rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid var(--border);transition:background .2s}
    .tts-stop-btn:hover{background:var(--border)}
    .tts-rate-slider-wrap{display:flex;align-items:center;gap:6px;margin-left:auto;background:rgba(0,0,0,.06);border-radius:12px;padding:4px 10px}
    .tts-rate-emoji{font-size:.85rem;line-height:1;flex-shrink:0}
    .tts-rate-slider{width:64px;height:3px;-webkit-appearance:none;appearance:none;background:linear-gradient(to right,var(--primary) 0%,var(--primary) var(--fill,50%),rgba(0,0,0,.15) var(--fill,50%),rgba(0,0,0,.15) 100%);border-radius:99px;cursor:pointer;outline:none}
    .tts-rate-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--primary-dark);border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.25)}
    .tts-rate-slider::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--primary-dark);border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.25)}
    .tts-rate-readout{font-size:.68rem;font-weight:700;color:var(--text-muted);min-width:26px;text-align:center}
    .tts-label{font-size:.78rem;font-weight:700;color:var(--primary-dark);white-space:nowrap}
    /* TTS word highlight */
    .tts-w{transition:background .1s}
    .tts-word-hl{background:#f9ad3b !important;color:#151515 !important;border-radius:3px;padding:0 1px}
    .icon-btn.tts-active{background:var(--primary);color:white}
    /* TTS sentence-mode fallback for browsers without word-boundary events (Firefox) */
    .tts-sentence-hl{background:rgba(249,173,59,.1);border-radius:8px;transition:background .4s}
    /* Flash card swipe direction indicators */
    .fc-card.swiping-right::after{content:'わかった！✓';position:absolute;top:14px;right:12px;background:#dcfce7;color:#22c55e;border:2px solid #22c55e;border-radius:99px;padding:5px 14px;font-family:var(--font-head);font-size:.82rem;font-weight:800;transform:rotate(10deg);pointer-events:none;z-index:10}
    .fc-card.swiping-left::after{content:'わからない';position:absolute;top:14px;left:12px;background:#fee2e2;color:#ef4444;border:2px solid #ef4444;border-radius:99px;padding:5px 14px;font-family:var(--font-head);font-size:.82rem;font-weight:800;transform:rotate(-10deg);pointer-events:none;z-index:10}
    /* Reader bottom row with back + next */
    .reader-bottom-row{display:flex;align-items:center;gap:10px;padding:0}
    .reader-back-btn{padding:14px 18px;background:var(--bg);color:var(--text-muted);border:1px solid var(--border);border-radius:var(--radius);font-size:.95rem;font-weight:700;white-space:nowrap;transition:background .2s}
    .reader-back-btn:hover{background:var(--border)}
    .reader-next-btn{flex:1}
    /* Flash card Got it / Still learning */
    .fc-got-btn{flex:1;padding:14px;border-radius:var(--radius);font-size:.95rem;font-weight:700;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:white;box-shadow:0 4px 16px rgba(143,184,50,.3)}
    .fc-hard-btn{flex:1;padding:14px;border-radius:var(--radius);font-size:.95rem;font-weight:700;background:var(--bg);color:var(--text);border:1px solid var(--border)}
    /* Flash card summary */
    .fc-summary{padding:24px 20px;display:flex;flex-direction:column;align-items:center;gap:12px}
    .fc-sum-emoji{font-size:3.5rem;margin-bottom:4px}
    .fc-sum-row{width:100%;display:flex;justify-content:space-between;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px}
    .fc-sum-got{font-weight:700;color:var(--primary-dark)}
    .fc-sum-hard{font-weight:700;color:var(--accent-dark)}
    .fc-sum-num{font-size:1.4rem;font-weight:800;color:var(--text)}
    .fc-sum-perfect{color:var(--primary-dark);font-weight:700;font-size:1rem}
    .fc-play-btn-outline{background:none!important;border:2px solid var(--primary);color:var(--primary-dark)!important;box-shadow:none!important;margin-top:4px}
    /* Settings / language picker */
    .home-settings{width:100%;padding:12px;background:none;color:var(--text-muted);font-size:.85rem;font-weight:600;border:1px solid var(--border);border-radius:var(--radius);margin-top:8px;transition:background .2s}
    .home-settings:hover{background:var(--bg)}
    .lang-picker-screen{display:flex;flex-direction:column;padding-bottom:32px}
    .lang-picker-hero{text-align:center;padding:40px 24px 20px}
    .lang-picker-emoji{font-size:3rem;margin-bottom:12px}
    .lang-picker-hero h2{margin-bottom:8px}
    .lang-picker-hero p{color:var(--text-muted);font-size:.9rem}
    .lang-list{display:flex;flex-direction:column;gap:8px;padding:8px 16px 32px}
    .lang-item{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);transition:border-color .2s,background .2s;text-align:left}
    .lang-item:hover{border-color:var(--primary);background:var(--primary-light)}
    .lang-selected{border-color:var(--primary)!important;background:var(--primary-light)!important}
    .lang-flag{font-size:1.5rem;width:32px;text-align:center}
    .lang-name{flex:1;font-size:.95rem;font-weight:600;color:var(--text)}
    .lang-check{color:var(--primary);font-size:1.1rem;font-weight:800}
    .settings-section{padding:16px;border-bottom:1px solid var(--border)}
    .settings-label{font-size:.75rem;font-weight:800;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
    .settings-desc{font-size:.85rem;color:var(--text-muted);margin-bottom:14px;line-height:1.5}
    .tts-voice-select{width:100%;padding:10px 12px;border:2px solid var(--border);border-radius:var(--radius-sm);background:var(--card);color:var(--text);font-family:var(--font-body);font-size:.88rem;appearance:none;cursor:pointer;transition:border-color .2s}
    .tts-voice-select:focus{outline:none;border-color:var(--primary)}
    /* Flash card list */
    .fc-list-actions{padding:16px 16px 4px}
    .fc-play-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:white;border-radius:var(--radius);font-size:1rem;font-weight:700;box-shadow:0 4px 16px rgba(143,184,50,.3)}
    .fc-item{flex-direction:row;align-items:flex-start}
    .fc-item-left{flex:1}
    .fc-item-tl{font-size:.82rem;color:var(--primary);margin-top:4px}
    .fc-item-actions{display:flex;align-items:center}
    /* Flash card play — v2 handoff spec */
    .fc-play-screen{background:#f5f9ef;padding-bottom:100px}
    /* Card counter pill in header */
    .fc-counter-pill{background:white;border-radius:99px;padding:4px 12px;font-family:var(--font-head);font-size:15px;font-weight:900;color:white;background:#151515}
    /* Progress bar */
    .fc-progress-bar{height:7px;background:rgba(0,0,0,.08);border-radius:99px;overflow:hidden;margin:0 20px 4px}
    .fc-progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),#9bc42a);border-radius:99px;transition:width .4s ease}
    /* Card stack illusion */
    .fc-card-wrap{padding:24px 20px 16px;display:flex;justify-content:center;position:relative;min-height:310px}
    .fc-stack-layer{position:absolute;left:50%;width:calc(100% - 40px);max-width:400px;height:280px;border-radius:24px;pointer-events:none;top:24px}
    .fc-stack-3{background:#dde8ce;transform:translateX(-50%) rotate(3deg)}
    .fc-stack-2{background:#e8f2d8;transform:translateX(-50%) rotate(-1.5deg)}
    .fc-card{width:100%;max-width:400px;height:280px;perspective:600px;cursor:pointer;position:relative;z-index:2;animation:card-in .4s ease forwards}
    @keyframes card-in{from{transform:perspective(600px) rotateY(90deg);opacity:0}to{transform:perspective(600px) rotateY(0deg);opacity:1}}
    .fc-card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .4s cubic-bezier(.4,0,.2,1)}
    .fc-card-inner.flipped{transform:rotateY(180deg)}
    .fc-face{position:absolute;inset:0;border-radius:24px;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 24px;box-shadow:0 8px 32px rgba(0,0,0,.12)}
    .fc-front{background:white}
    .fc-back{background:linear-gradient(135deg,#0d2010,#1a3a1a);transform:rotateY(180deg)}
    /* Card front contents */
    .fc-level-badge{background:#f0fce4;border-radius:10px;padding:3px 10px;font-family:var(--font-head);font-size:12px;font-weight:800;color:#4d7c0f;margin-bottom:10px}
    .fc-audio-hint{font-family:var(--font-body);font-size:11px;color:#ccc;margin-bottom:8px}
    .fc-front-word{font-family:var(--font-head);font-size:36px;font-weight:900;color:#151515;letter-spacing:-.5px;text-align:center;line-height:1}
    .fc-front-phonetic{font-family:var(--font-body);font-size:14px;color:#aaa;letter-spacing:.05em;margin-top:4px;text-align:center}
    .fc-img-area{width:100%;height:80px;background:#f3f4f6;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:42px;margin:10px 0}
    .fc-tap-hint{font-family:var(--font-head);font-size:12px;font-weight:700;color:var(--primary);margin-top:8px;display:flex;align-items:center;gap:8px}
    .fc-tap-hint::before,.fc-tap-hint::after{content:'';flex:1;height:1px;background:#e5e7eb}
    /* Card back contents */
    .fc-back-word{font-family:var(--font-head);font-size:40px;font-weight:900;color:white;text-align:center;line-height:1}
    .fc-back-reading{font-family:var(--font-head);font-size:18px;font-weight:700;color:rgba(255,255,255,.6);text-align:center;margin-top:4px}
    .fc-back-pos{font-family:var(--font-body);font-size:12px;color:rgba(255,255,255,.5);background:rgba(255,255,255,.1);padding:2px 10px;border-radius:99px;margin:8px 0}
    .fc-back-tl-block{display:flex;align-items:center;gap:8px;background:rgba(249,173,59,.12);border:1px solid rgba(249,173,59,.3);border-radius:99px;padding:6px 14px;margin:4px 0 8px}
    .fc-back-tl-block{display:flex;align-items:center;gap:8px;background:rgba(249,173,59,.12);border:1px solid rgba(249,173,59,.3);border-radius:99px;padding:6px 14px;margin:4px 0 8px}
    .fc-back-tl-lang{font-size:.65rem;font-weight:800;color:var(--accent);background:rgba(249,173,59,.25);padding:2px 6px;border-radius:99px}
    .fc-back-tl-text{font-size:1.15rem;font-weight:800;color:var(--accent);font-family:var(--font-head)}
    .fc-back-tl-fetch{background:rgba(249,173,59,.12);color:var(--accent);border:1px solid rgba(249,173,59,.3);border-radius:99px;padding:6px 16px;font-size:.82rem;font-weight:700;margin:4px 0 8px;transition:background .2s}
    .fc-back-tl-fetch:hover{background:rgba(249,173,59,.22)}
    .fc-back-divider{width:80%;height:1px;background:rgba(255,255,255,.1);margin:8px 0}
    .fc-back-def{font-size:.9rem;color:var(--text);text-align:center;line-height:1.5}
    .fc-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;background:var(--card);border-top:1px solid var(--border);padding:12px 20px 20px;gap:12px;z-index:100}
    .fc-prev,.fc-next{flex:1;padding:14px;border-radius:var(--radius);font-size:1rem;font-weight:700;transition:background .2s}
    .fc-prev{background:var(--bg);color:var(--text);border:1px solid var(--border)}
    .fc-next{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:white;box-shadow:0 4px 16px rgba(143,184,50,.3)}
    .fc-done{background:linear-gradient(135deg,var(--accent),var(--accent-dark))!important}

    /* TOPIC BROWSE */
    .topics-screen{min-height:100vh;background:var(--bg)}
    .topics-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:14px 16px 32px}
    .topic-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px 10px;text-align:center;cursor:pointer;transition:border-color .2s,transform .15s,box-shadow .2s}
    .topic-card:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:var(--shadow)}
    .topic-emoji-wrap{width:52px;height:52px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.7rem;margin:0 auto 8px;line-height:1;transition:transform .15s}
    .topic-card:hover .topic-emoji-wrap{transform:scale(1.08)}
    .topic-emoji{font-size:2rem;line-height:1;margin-bottom:6px}
    .topic-jp{font-family:var(--font-head);font-size:.82rem;font-weight:800;color:var(--text);margin-bottom:2px}
    .topic-count{font-family:var(--font-body);font-size:.68rem;color:var(--text-muted)}
    .genre-stories-screen{min-height:100vh;background:var(--bg)}
    .genre-stories-list{padding:12px 16px;display:flex;flex-direction:column;gap:10px;padding-bottom:32px}
    .genre-story-card{background:var(--card);border-radius:var(--radius);padding:14px 16px;border:1.5px solid var(--border);cursor:pointer;transition:box-shadow .2s,transform .15s;display:flex;align-items:flex-start;gap:12px;box-shadow:var(--shadow-sm)}
    .genre-story-card:hover{box-shadow:var(--shadow);transform:translateY(-2px)}
    .genre-story-card.done{border-color:rgba(186,218,85,.4)}
    .genre-sc-meta{font-family:var(--font-body);font-size:.7rem;color:var(--text-muted);margin-top:3px}
    .genre-sc-badge{display:inline-flex;align-items:center;font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:20px;margin-right:4px}
    /* Genre browse button on home */
    .genre-browse-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:calc(100% - 40px);margin:0 20px 8px;padding:11px 16px;background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);font-family:var(--font-head);font-size:.88rem;font-weight:800;color:var(--text-muted);cursor:pointer;transition:border-color .2s,color .2s}
    .genre-browse-btn:hover{border-color:var(--primary);color:var(--primary-dark)}
    /* BOTTOM TAB BAR */
    .tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;background:white;border-top:1px solid rgba(0,0,0,.06);display:flex;z-index:200;height:88px;padding-bottom:env(safe-area-inset-bottom,22px);align-items:flex-start}
    /* BOTTOM TAB BAR — v2 handoff spec: 88px, white bg */
    .tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:12px 0 0;background:none;border:none;cursor:pointer;transition:color .15s;position:relative}
    .tab-btn .tab-icon{line-height:1;display:flex;align-items:center;justify-content:center}
    .tab-btn .tab-icon-bg{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;transition:background .15s}
    .tab-btn.active .tab-icon-bg{background:var(--primary)}
    .tab-btn:not(.active) .tab-icon-bg{background:transparent}
    .tab-btn .tab-label{font-family:var(--font-head);font-size:10px;font-weight:900;letter-spacing:.02em}
    .tab-btn.active .tab-label{color:var(--primary)}
    .tab-btn:not(.active) .tab-label{color:#b0b8c1}
    .tab-notif-dot{position:absolute;top:7px;right:calc(50% - 14px);width:8px;height:8px;background:var(--accent);border-radius:50%;border:2px solid white;animation:pulse 1.8s ease-in-out infinite}
    @keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.3);opacity:.7}}
    /* Screens with tab bar need bottom padding so content isn't hidden */
    .has-tab-bar{padding-bottom:88px}
    /* Subtle ticket-ready strip on results */
    .ticket-ready-strip{display:flex;align-items:center;justify-content:center;gap:6px;background:rgba(249,173,59,.12);border:1.5px solid rgba(249,173,59,.5);border-radius:8px;padding:8px 14px;font-size:.8rem;font-weight:700;color:var(--accent);margin:10px 0;cursor:pointer;transition:background .15s}
    .ticket-ready-strip:hover{background:rgba(249,173,59,.22)}
    /* WORLD JOURNEY HUB */
    .journey-hub-screen{background:#0f1d2a;min-height:100vh}
    .journey-hero{padding:24px 20px 16px;background:transparent;border-bottom:1px solid rgba(255,255,255,.08);text-align:center}
    .journey-hero h2{font-size:1.3rem;margin-bottom:4px;color:#fff;font-weight:900}
    .journey-hero p{font-size:.85rem;color:rgba(255,255,255,.55)}
    .dest-card-row{padding:14px 16px;display:flex;flex-direction:column;gap:10px;padding-bottom:32px}
    .dest-hub-card{background:rgba(255,255,255,.06);border-radius:var(--radius);border:2px solid rgba(255,255,255,.1);padding:16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:border-color .2s,transform .15s}
    .dest-hub-card:hover{border-color:var(--primary);transform:translateY(-1px)}
    .dest-hub-card.active-dest{border-color:var(--primary);background:rgba(186,218,85,.12)}
    .dest-hub-card.locked-dest{opacity:.5;cursor:default}
    .dest-hub-card.stamped-dest{border-color:var(--accent);background:rgba(249,173,59,.1)}
    .dest-hub-card.depart-dest{border-color:#f9ad3b;background:rgba(249,173,59,.08);cursor:default}
    /* Depart button */
    .depart-btn{width:100%;margin-top:8px;padding:9px 12px;background:linear-gradient(135deg,#f9ad3b,#e8941a);color:#fff;border:none;border-radius:var(--radius);font-weight:700;font-size:.82rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:transform .12s,box-shadow .12s;white-space:nowrap}
    .depart-btn:active{transform:scale(.97)}
    .depart-btn:disabled{opacity:.45;cursor:default;background:#ccc}
    /* Ticket counter in journey hub header */
    .journey-ticket-count{display:inline-flex;align-items:center;gap:5px;background:rgba(249,173,59,.12);border:1.5px solid #f9ad3b;border-radius:20px;padding:4px 12px;font-weight:700;font-size:.85rem;color:#ffd58a;margin-top:6px}
    /* Ticket earned banner — removed; replaced by .ticket-ready-strip */
    /* Departure animation overlay */
    .depart-overlay{position:fixed;inset:0;z-index:9999;background:rgba(10,30,60,.82);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;animation:fadeIn .3s ease both}
    .boarding-pass{background:#fff;border-radius:16px;padding:22px 28px;text-align:center;width:min(300px,88vw);position:relative;box-shadow:0 24px 64px rgba(0,0,0,.45);animation:boardingPassIn .55s cubic-bezier(.22,1,.36,1) both}
    .boarding-pass::before,.boarding-pass::after{content:'';position:absolute;top:50%;transform:translateY(-50%);width:22px;height:22px;background:rgba(10,30,60,.82);border-radius:50%}
    .boarding-pass::before{left:-11px}
    .boarding-pass::after{right:-11px}
    .bp-airline{font-size:.65rem;letter-spacing:.18em;color:#aaa;text-transform:uppercase;margin-bottom:6px}
    .bp-dest-emoji{font-size:2.6rem;line-height:1;margin-bottom:4px}
    .bp-dest-name{font-size:1.6rem;font-weight:900;font-family:var(--font-head);color:var(--primary-dark);margin-bottom:2px}
    .bp-dest-country{font-size:.78rem;color:#888;margin-bottom:12px}
    .bp-divider{border:none;border-top:1.5px dashed #ddd;margin:10px 0}
    .bp-row{display:flex;justify-content:space-between;align-items:center;font-size:.72rem;color:#666}
    .bp-gate{font-weight:700;color:#333;font-size:.82rem}
    .bp-plane-row{font-size:1.8rem;margin-top:20px;overflow:hidden;width:100%;display:flex;justify-content:flex-start}
    .bp-plane-fly{display:inline-block;animation:planeFly 1.6s ease-in 0.7s both}
    @keyframes boardingPassIn{0%{transform:translateY(60px) scale(.9);opacity:0}65%{transform:translateY(-6px) scale(1.02);opacity:1}100%{transform:translateY(0) scale(1);opacity:1}}
    @keyframes planeFly{0%{transform:translateX(0);opacity:0}10%{opacity:1}100%{transform:translateX(calc(100vw + 120px));opacity:1}}
    .dest-emoji{font-size:2rem;flex-shrink:0;line-height:1}
    .dest-hub-info{flex:1}
    .dest-hub-info h3{font-size:1rem;margin-bottom:2px;color:#fff;font-weight:800}
    .dest-hub-info .dest-country{font-size:.78rem;color:rgba(255,255,255,.55);margin-bottom:6px}
    .dest-hub-prog{height:5px;background:rgba(255,255,255,.12);border-radius:99px;overflow:hidden;margin-top:4px}
    .dest-hub-prog-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:99px;transition:width .5s}
    .dest-hub-badge{font-size:.68rem;font-weight:700;padding:3px 8px;border-radius:99px}
    .dhb-open{background:rgba(186,218,85,.15);color:var(--primary)}
    .dhb-locked{background:rgba(255,255,255,.07);color:rgba(255,255,255,.45);border:1px solid rgba(255,255,255,.12)}
    .dhb-stamped{background:rgba(249,173,59,.15);color:var(--accent);border:1px solid var(--accent)}
    .dest-stamp{width:40px;height:40px;border-radius:50%;border:3px solid var(--primary-dark);display:flex;align-items:center;justify-content:center;color:var(--primary-dark);font-weight:900;font-size:1.2rem;transform:rotate(-15deg);background:rgba(186,218,85,.1);flex-shrink:0;animation:stampDrop .5s cubic-bezier(.34,1.56,.64,1) both}
    /* DESTINATION DETAIL */
    .dest-detail-hero{border-bottom:1px solid var(--primary-mid);overflow:hidden}
    .dest-detail-hero-banner{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 20px 22px;gap:8px;position:relative}
    .dest-detail-hero-banner::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 50%,rgba(0,0,0,.45));pointer-events:none}
    .dest-detail-hero-emoji{font-size:3.2rem;line-height:1;position:relative;z-index:1;filter:drop-shadow(0 2px 8px rgba(0,0,0,.4))}
    .dest-detail-hero-name{font-family:var(--font-head);font-size:1.5rem;font-weight:900;color:#fff;letter-spacing:.02em;position:relative;z-index:1;text-shadow:0 2px 8px rgba(0,0,0,.5)}
    .dest-detail-hero-country{font-size:.75rem;color:rgba(255,255,255,.7);position:relative;z-index:1;text-transform:uppercase;letter-spacing:.1em}
    .dest-detail-hero-desc{padding:14px 20px;background:var(--primary-light)}
    .dest-detail-hero-desc p{font-size:.82rem;color:var(--text-muted);line-height:1.6;margin:0}
    .activity-track{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:14px 16px;margin:0 16px 10px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:border-color .2s}
    .activity-track:hover:not(.locked-track){border-color:var(--primary)}
    .activity-track.locked-track{opacity:.55;cursor:default}
    .activity-track.done-track{border-color:var(--primary);background:var(--primary-light)}
    .at-icon{font-size:1.6rem;flex-shrink:0}
    .at-info{flex:1}
    .at-info h3{font-size:.95rem;margin-bottom:2px}
    .at-info .at-sub{font-size:.78rem;color:var(--text-muted)}
    .at-prog{height:4px;background:var(--border);border-radius:99px;overflow:hidden;margin-top:5px}
    .at-prog-fill{height:100%;background:var(--primary);border-radius:99px}
    .at-count{font-size:.78rem;color:var(--text-muted);flex-shrink:0;white-space:nowrap}
    .locked-story{opacity:.5;cursor:default!important}
    /* Bust silhouette icon — pure CSS */
    .bust-icon{width:22px;height:22px;position:relative;display:flex;align-items:flex-end;justify-content:center}
    .bust-icon::before{content:'';width:10px;height:10px;border-radius:50%;background:currentColor;position:absolute;top:0;left:50%;transform:translateX(-50%)}
    .bust-icon::after{content:'';width:20px;height:11px;border-radius:10px 10px 0 0;background:currentColor;position:absolute;bottom:0;left:50%;transform:translateX(-50%)}
    /* PROFILE PAGE */
    .profile-hero{padding:28px 20px 20px;text-align:center;background:var(--primary-light);border-bottom:1px solid var(--primary-mid)}
    .profile-avatar{width:80px;height:80px;border-radius:50%;background:var(--primary);margin:0 auto 12px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
    .profile-avatar::before{content:'';width:34px;height:34px;border-radius:50%;background:var(--card);position:absolute;top:10px;left:50%;transform:translateX(-50%)}
    .profile-avatar::after{content:'';width:60px;height:38px;border-radius:30px 30px 0 0;background:var(--card);position:absolute;bottom:-4px;left:50%;transform:translateX(-50%)}
    .profile-name{font-size:1.2rem;font-weight:800;color:var(--text);font-family:var(--font-head);margin-bottom:4px}
    .profile-sub{font-size:.82rem;color:var(--text-muted)}
    .profile-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:16px 20px}
    .pstat{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 8px;text-align:center}
    .pstat .pval{font-size:1.6rem;font-weight:900;color:var(--primary-dark);font-family:var(--font-head);line-height:1}
    .pstat .plabel{font-size:.68rem;color:var(--text-muted);margin-top:4px}
    .profile-section{padding:4px 20px 16px}
    .profile-section-title{font-size:.72rem;font-weight:800;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;padding-top:12px}
    /* Level progress bars */
    .lv-prog-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
    .lv-prog-badge{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:.82rem;font-weight:800;font-family:var(--font-head);flex-shrink:0}
    .lv-prog-info{flex:1}
    .lv-prog-name{font-size:.82rem;font-weight:700;color:var(--text)}
    .lv-prog-bar-wrap{height:6px;background:var(--primary-light);border-radius:99px;overflow:hidden;margin-top:4px}
    .lv-prog-bar-fill{height:100%;background:var(--primary);border-radius:99px;transition:width .5s ease}
    .lv-prog-count{font-size:.72rem;color:var(--text-muted);flex-shrink:0;white-space:nowrap}
    /* Badge grid */
    .badge-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
    .badge-item{display:flex;flex-direction:column;align-items:center;gap:5px}
    .badge-circle{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.5rem;border:2px solid var(--border)}
    .badge-circle.earned{background:var(--primary-light);border-color:var(--primary-mid)}
    .badge-circle.locked{background:var(--bg);filter:grayscale(1);opacity:.4}
    .badge-name{font-size:.62rem;color:var(--text-muted);text-align:center;line-height:1.3}

    /* CONFETTI */
    .confetti{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:300;overflow:hidden}
    .confetti-dot{position:absolute;animation:cFall linear both}
    @keyframes cFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

    /* ── GAMIFICATION ─────────────────────────────────────── */
    /* COMBO OVERLAY */
    .combo-overlay{position:fixed;inset:0;z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;user-select:none}
    .combo-inner{position:relative;z-index:1;text-align:center;padding:14px 22px;background:rgba(15,26,16,.95);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.12);border-radius:22px;box-shadow:0 8px 36px rgba(0,0,0,.5);pointer-events:auto;animation:comboPop .42s cubic-bezier(.34,1.56,.64,1) both}
    @keyframes comboPop{from{opacity:0;transform:scale(.3) rotate(-10deg)}to{opacity:1;transform:scale(1) rotate(0)}}
    .combo-inner.combo-exit{animation:comboExit .22s ease both}
    @keyframes comboExit{to{opacity:0;transform:scale(.82) translateY(-10px)}}
    .combo-frog-em{font-size:3.5rem;display:block;animation:frogHop .5s cubic-bezier(.34,1.56,.64,1) both .05s;line-height:1.1}
    @keyframes frogHop{0%{transform:translateY(20px) scale(.75)}55%{transform:translateY(-14px) scale(1.15)}100%{transform:translateY(0) scale(1)}}
    .combo-label{font-family:var(--font-head);font-size:1.5rem;font-weight:900;line-height:1;margin:6px 0 4px;letter-spacing:-.5px;text-transform:uppercase}
    .combo-label.is-correct{color:#bada55}
    .combo-label.is-wrong{color:#E05C5C}
    .combo-pts-pill{display:inline-block;background:var(--accent);color:#fff;font-family:var(--font-head);font-size:1rem;font-weight:900;padding:4px 16px;border-radius:99px;box-shadow:0 3px 12px rgba(249,173,59,.5);animation:ptsPop .4s cubic-bezier(.34,1.56,.64,1) both .15s;margin-top:2px}
    @keyframes ptsPop{from{opacity:0;transform:scale(.5) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
    .combo-streak-line{font-size:.8rem;color:var(--text-muted);margin-top:5px;font-family:var(--font-body)}

    /* POINTS GAUGE — lily pad track */
    /* POINTS GAUGE */
    .frog-growth-panel{width:100%;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:14px 16px;margin:6px 0}
    .frog-growth-label{font-size:.68rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);text-align:center;margin-bottom:10px}
    .frog-growth-track{display:flex;align-items:flex-start;justify-content:space-between}
    .frog-stage{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;opacity:.35;transition:opacity .3s}
    .frog-stage.past{opacity:.7}
    .frog-stage.current{opacity:1}
    .frog-stage-circle{width:40px;height:40px;border-radius:50%;background:var(--card);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.3rem}
    .frog-stage.past .frog-stage-circle{background:var(--primary-light);border-color:var(--primary-mid)}
    .frog-stage.current .frog-stage-circle{background:var(--primary);border-color:var(--primary-dark);animation:glow-pulse 2s ease-in-out infinite}
    .frog-stage-label{font-size:.62rem;font-weight:800;color:var(--text-muted);text-align:center;line-height:1.2}
    .frog-stage.current .frog-stage-label{color:var(--primary-dark)}
    .frog-stage-here{font-size:.58rem;font-weight:800;color:var(--primary-dark)}
    .frog-stage-divider{width:1px;align-self:stretch;background:var(--border);margin-top:18px}
    .frog-growth-note{margin-top:10px;font-size:.72rem;font-weight:700;color:var(--primary-dark);text-align:center}
    @keyframes glow-pulse{0%,100%{box-shadow:0 0 0 4px rgba(249,173,59,.4)}50%{box-shadow:0 0 0 10px rgba(249,173,59,.15)}}
    .pts-gauge-wrap{width:100%;margin:8px 0 4px;padding:12px 14px;background:var(--card);border-radius:var(--radius);border:1px solid var(--border);display:flex;flex-direction:column;gap:10px}
    .pts-gauge-top{display:flex;align-items:stretch;gap:12px}
    /* left: life-cycle card */
    .pts-life-track{background:var(--card);border-radius:12px;border:2px solid var(--border);padding:8px 6px;display:flex;flex-direction:column;justify-content:space-between;align-items:center;flex-shrink:0;width:68px;box-shadow:0 2px 8px rgba(0,0,0,.3)}
    .pts-life-stage{font-size:1.9rem;line-height:1;opacity:.18;filter:grayscale(.7);transition:opacity .4s,transform .35s,filter .4s}
    .pts-life-stage.lit{opacity:1;filter:none;transform:scale(1.12)}
    /* right: numbers */
    .pts-gauge-right{flex:1;display:flex;flex-direction:column;justify-content:center;gap:0}
    .pts-round-line{display:flex;align-items:baseline;gap:5px;line-height:1;margin-bottom:4px}
    .pts-round-prefix,.pts-round-num{font-family:var(--font-head);font-size:2.6rem;font-weight:900;color:var(--primary-dark);line-height:1}
    .pts-round-pts-label{font-family:var(--font-head);font-size:1.3rem;font-weight:800;color:var(--primary-dark);margin-left:2px}
    .pts-total-label{font-family:var(--font-head);font-size:.8rem;font-weight:800;color:var(--primary-dark);opacity:.7;margin-top:6px}
    .pts-total-num{font-family:var(--font-head);font-size:3rem;font-weight:900;color:var(--primary-dark);line-height:1.05}
    .pts-badges{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
    .pts-perfect-badge,.pts-fast-badge{display:inline-flex;align-items:center;gap:4px;font-family:var(--font-head);font-size:.78rem;font-weight:800;padding:5px 11px;border-radius:8px}
    .pts-perfect-badge{background:var(--primary-dark);color:white}
    .pts-fast-badge{background:var(--primary-dark);color:white}
    /* stat cards — full-width bottom row */
    .pts-stat-cards{display:flex;gap:6px;width:100%}
    .res-card{flex:1;background:var(--card);border-radius:10px;padding:10px 4px;border:1px solid var(--border);text-align:center;opacity:0;transform:scale(.5)}
    @keyframes cardBurst{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
    .res-card.burst{animation:cardBurst .4s cubic-bezier(.34,1.56,.64,1) both;opacity:1;transform:scale(1)}

    /* PROFILE POINTS BANNER */
    .profile-pts-banner{margin:0 20px 0;padding:16px 20px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));border-radius:var(--radius);color:white;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow)}
    .ppb-left .ppb-label{font-size:.72rem;font-weight:700;opacity:.8;text-transform:uppercase;letter-spacing:.05em}
    .ppb-left .ppb-val{font-family:var(--font-head);font-size:2.4rem;font-weight:900;line-height:1;margin-top:2px}
    .ppb-right{font-size:2.5rem;opacity:.85}

    /* ── STORY BROWSER GRID — v2 handoff spec ── */
    .stories-search{padding:12px 16px 8px}
    .stories-search-wrap{position:relative}
    .stories-search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#ccc;font-size:.9rem;pointer-events:none}
    .stories-search-input{width:100%;padding:10px 14px 10px 36px;border:1px solid #e5e7eb;border-radius:14px;font-family:var(--font-body);font-size:14px;background:white;color:var(--text);outline:none;box-shadow:none;height:42px}
    .stories-search-input:focus{border-color:var(--primary)}
    .stories-filters{display:flex;gap:8px;overflow-x:auto;padding:4px 16px 12px;scrollbar-width:none}
    .stories-filters::-webkit-scrollbar{display:none}
    .filter-chip{flex-shrink:0;padding:7px 16px;border-radius:20px;font-family:var(--font-head);font-size:12px;font-weight:700;background:white;border:1px solid #e5e7eb;color:#555;cursor:pointer;transition:all .15s}
    .filter-chip.active{background:#151515;border-color:#151515;color:white}
    .stories-grid{padding:0 16px 32px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .story-grid-card{background:white;border-radius:18px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.07);cursor:pointer;transition:box-shadow .2s,transform .15s}
    .story-grid-card:hover{box-shadow:0 6px 20px rgba(0,0,0,.12);transform:translateY(-2px)}
    .story-grid-card.done{box-shadow:0 2px 10px rgba(0,0,0,.07),0 0 0 2px rgba(186,218,85,.4)}
    .sgc-header{height:105px;position:relative;display:flex;align-items:center;justify-content:center}
    .sgc-emoji{font-size:52px;line-height:1}
    .sgc-level-badge{position:absolute;top:8px;left:8px;border-radius:8px;padding:3px 8px;font-family:var(--font-head);font-size:10px;font-weight:900;color:#151515}
    .sgc-new-badge{position:absolute;top:8px;right:8px;background:var(--accent);border-radius:8px;padding:3px 8px;font-family:var(--font-head);font-size:10px;font-weight:900;color:white}
    .sgc-done-badge{position:absolute;top:8px;right:8px;background:rgba(255,255,255,.88);border-radius:8px;padding:3px 8px;font-family:var(--font-head);font-size:10px;font-weight:900;color:#4d7c0f}
    .sgc-body{padding:10px 12px 12px}
    .sgc-title{font-family:var(--font-head);font-size:13px;font-weight:800;color:#151515;margin-bottom:6px;line-height:1.3}
    .sgc-footer{display:flex;align-items:center;justify-content:space-between}
    .sgc-world{display:flex;align-items:center;gap:4px;font-family:var(--font-body);font-size:10px;color:#888}
    .sgc-genre{font-family:var(--font-body);font-size:10px;color:#999;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:90px}
    .sgc-xp{display:flex;align-items:center;gap:3px;font-family:var(--font-head);font-size:10px;font-weight:800;color:var(--accent)}

    /* ── READER SENTENCE STATES — v2 ── */
    .rs-past{font-family:var(--font-body);font-size:16px;color:#d1d5db;line-height:1.8;margin-bottom:1em}
